"text":"A good generative model for vision would thus seek to capture the ways in which observed lower-level visual responses are generated by an interacting web of causes – for example, the various aspects of a visually presented scene.","tag":"extension:illustrative","tier":"secondary","parent_id":22,"note":"Illustrates the definition of generative model given in [22]; parent [22] is framedef (primary).","cars_move":"M1","cars_step":"1B","move_note":null},{"id":24,"text":"In practice, this means that top-down connections within a multilevel (hierarchical and bidirectional) system come to encode a probabilistic model of the activities of units and groups of units within lower levels, thus tracking (as we shall shortly see in more detail) interacting causes in the signal source, which might be the body or the external world – see, for example, Kawato et al. (1993), Hinton and Zemel (1994), Mumford (1994), Hinton et al. (1995), Dayan et al. (1995), Olshausen and Field (1996), Dayan (1997), and Hinton and Ghahramani (1997).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the established computational implementation of generative models in hierarchical systems, with extensive citations.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":25,"text":"It is this twist – the strategy of using top-down connections to try to generate, using high-level knowledge, a kind of 'virtual version' of the sensory data via a deep multilevel cascade – that lies at the heart of 'hierarchical predictive coding' approaches to perception; for example, Rao and Ballard (1999), Lee and Mumford (2003), Friston (2005).","tag":"framedef","tier":"primary","parent_id":null,"note":"Names and defines \"hierarchical predictive coding\" as the central analytical framework for the paper.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":26,"text":"Such approaches, along with their recent extensions to action – as exemplified in Friston and Stephan (2007), Friston et al. (2009), Friston (2010), Brown et al. (2011) – form the main focus of the present treatment.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the scope and focus of the present paper.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":27,"text":"These approaches combine the use of top-down probabilistic generative models with a specific vision of one way such downward influence might operate.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a general characterization of the approach being reviewed.","cars_move":"M1","cars_step":"1B","move_note":"Return to M1 territory-setting after brief M3 announcement; part of M1->M3->M1 cycling."},{"id":28,"text":"That way (borrowing from work in linear predictive coding – see below) depicts the top-down flow as attempting to predict and fully 'explain away' the driving sensory signal, leaving only any residual 'prediction errors' to propagate information forward within the system – see Rao and Ballard (1999), Lee and Mumford (2003), Friston (2005), Hohwy et al. (2008), Jehee and Ballard (2009), Friston (2010), Brown et al. (2011); and, for a recent review, see Huang and Rao (2011).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the specific mechanism posited by the predictive coding approaches, with extensive citations.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":29,"text":"Predictive coding itself was first developed as a data compression strategy in signal processing (for a history, see Shi & Sun 1999).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the historical origin of predictive coding in signal processing.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":30,"text":"Thus, consider a basic task such as image transmission: In most images, the value of one pixel regularly predicts the value of its nearest neighbors, with differences marking important features such as the boundaries between objects.","tag":"extension:illustrative","tier":"secondary","parent_id":29,"note":"Provides an illustrative example of predictive coding in signal processing; parent [29] is tempstat.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":31,"text":"That means that the code for a rich image can be compressed (for a properly informed receiver) by encoding only the 'unexpected' variation: the cases where the actual value departs from the predicted one.","tag":"extension:illustrative","tier":"secondary","parent_id":29,"note":"Continues the illustration of how predictive coding achieves compression; re-parents to [29] tempstat.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":32,"text":"What needs to be transmitted is therefore just the difference (a.k.a. the 'prediction error') between the actual current signal and the predicted one.","tag":"framedef","tier":"primary","parent_id":null,"note":"Introduces and defines \"prediction error\" as a key technical construct; stands independently as a definitional act.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":33,"text":"This affords major savings on bandwidth, an economy that was the driving force behind the development of the techniques by James Flanagan and others at Bell Labs during the 1950s (for a review, see Musmann 1979).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the historical motivation and development of the technique.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":34,"text":"Descendents of this kind of compression technique are currently used in JPEGs, in various forms of lossless audio compression, and in motion-compressed coding for video.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the current applications of the compression technique.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":35,"text":"The information that needs to be communicated 'upward' under all these regimes is just the prediction error: the divergence from the expected signal.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports what is transmitted in predictive coding compression schemes.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":36,"text":"Transposed (in ways we are about to explore) to the neural domain, this makes prediction error into a kind of proxy (Feldman & Friston 2010) for sensory information itself.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the transposition of the compression principle to the neural domain, with citation.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":37,"text":"Later, when we consider predictive processing in the larger setting of information theory and entropy, we will see that prediction error reports the 'surprise' induced by a mismatch between the sensory signals encountered and those predicted.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces a forthcoming argument/discussion in the paper — structural forward-reference to paper's own content.","cars_move":"M3","cars_step":"3D","move_note":"Forward-reference to paper structure; functions as a structural announcement embedded within M1 territory exposition."},{"id":38,"text":"More formally – and to distinguish it from surprise in the normal, experientially loaded sense – this is known as surprisal (Tribus 1961).","tag":"framedef","tier":"primary","parent_id":null,"note":"Introduces and defines \"surprisal\" as a technical term to be used in the paper.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":39,"text":"Hierarchical predictive processing combines the use, within a multilevel bidirectional cascade, of 'top-down' probabilistic generative models with the core predictive coding strategy of efficient encoding and transmission.","tag":"framedef","tier":"primary","parent_id":null,"note":"Defines/names \"hierarchical predictive processing\" as the paper's central analytical construct, consolidating earlier components into one named framework.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":40,"text":"Such approaches, originally developed in the domain of perception, have been extended (by Friston and others – see sect. 1.5) to encompass action, and to offer an attractive, unifying perspective on the brain's capacities for learning, inference, and the control of plasticity.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the extension of the approach to action and its claimed scope.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":41,"text":"Perception and action, if these unifying models are correct, are intimately related and work together to reduce prediction error by sculpting and selecting sensory inputs.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the theoretical claim of the models under discussion.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":42,"text":"In the remainder of this section, I rehearse some of the main features of these models before highlighting (in sects. 2–5 following) some of their most conceptually important and challenging aspects.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the structure and scope of what follows in the paper.","cars_move":"M3","cars_step":"3D","move_note":null},{"id":43,"text":"A good place to start (following Rieke 1999) is with what might be thought of as the 'view from inside the black box.'","tag":"link:opening","tier":"secondary","parent_id":null,"note":"Opens sub-section 1.2 by announcing a starting point; the phrase \"a good place to start\" is purely structural, making no independent claim about the world.","cars_move":"M1","cars_step":"1C","move_note":"Structural transition sentence; inherits M1 as it introduces further territory exposition."},{"id":44,"text":"For, the task of the brain, when viewed from a certain distance, can seem impossible: it must discover information about the likely causes of impinging signals without any form of direct access to their source.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance and difficulty of the brain's computational problem — establishes that this is a real and important phenomenon worth attending to.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":45,"text":"Thus, consider a black box taking inputs from a complex external world.","tag":"extension:illustrative","tier":"secondary","parent_id":44,"note":"Opens an illustrative analogy to convey the brain's epistemic situation; parent [44] is emph (primary).","cars_move":"M1","cars_step":"1A","move_note":null},{"id":46,"text":"The box has input and output channels along which signals flow.","tag":"extension:illustrative","tier":"secondary","parent_id":44,"note":"Continues the black box illustration; re-parents to [44] emph.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":47,"text":"But all that it 'knows', in any direct sense, are the ways its own states (e.g., spike trains) flow and alter.","tag":"extension:illustrative","tier":"secondary","parent_id":44,"note":"Continues the black box illustration, specifying the epistemic constraint; re-parents to [44] emph.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":48,"text":"In that (restricted) sense, all the system has direct access to is its own states.","tag":"extension:illustrative","tier":"secondary","parent_id":44,"note":"Continues the illustration, restating the epistemic restriction; re-parents to [44] emph.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":49,"text":"The world itself is thus off-limits (though the box can, importantly, issue motor commands and await developments).","tag":"extension:illustrative","tier":"secondary","parent_id":44,"note":"Continues the black box illustration; re-parents to [44] emph.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":50,"text":"The brain is one such black box.","tag":"extension:illustrative","tier":"secondary","parent_id":44,"note":"Applies the black box analogy to the brain, closing the illustrative frame; re-parents to [44] emph.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":51,"text":"How, simply on the basis of patterns of changes in its own internal states, is it to alter and adapt its responses so as to tune itself to act as a useful node (one that merits its relatively huge metabolic expense) for the origination of adaptive responses?","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the depth and significance of the brain's epistemic problem — establishes the puzzle as real and pressing.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":52,"text":"Notice how different this conception is to ones in which the problem is posed as one of establishing a mapping relation between environmental and inner states.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces tension with an alternative framing of the brain's problem.","cars_move":"M1","cars_step":"1B","move_note":"Contrast used to sharpen field-level framing rather than to establish a gap; rhetorical work is territory-definition, not niche-carving."},{"id":53,"text":"The task is not to find such a mapping but to infer the nature of the signal source (the world) from just the varying input signal itself.","tag":"framedef","tier":"primary","parent_id":null,"note":"Reframes the core computational problem as the paper will treat it — defines the analytical framing the paper adopts.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":54,"text":"Hierarchical approaches in which top-down generative models are trying to predict the flow of sensory data provide a powerful means for making progress under such apparently unpromising conditions.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the established claim about hierarchical approaches as a solution to the problem.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":55,"text":"One key task performed by the brain, according to these models, is that of guessing the next states of its own neural economy.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports what the hierarchical models claim about brain function.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":56,"text":"Such guessing improves when you use a good model of the signal source.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the functional logic of the model-based approach.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":57,"text":"Cast in the Bayesian mode, good guesses thus increase the posterior probability of your model.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports how the guessing process maps onto Bayesian inference.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":58,"text":"Various forms of gradient descent learning can progressively improve your first guesses.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the learning mechanism used in these models.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":59,"text":"Applied within a hierarchical predictive processing regime, this will – if you survive long enough – tend to yield useful generative models of the signal source (ultimately, the world).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the long-term outcome of the learning process within the framework.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":60,"text":"The beauty of the bidirectional hierarchical structure is that it allows the system to infer its own priors (the prior beliefs essential to the guessing routines) as it goes along.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance and elegance of a particular feature of the hierarchical structure — establishes its importance.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":61,"text":"It does this by using its best current model – at one level – as the source of the priors for the level below, engaging in a process of 'iterative estimation' (see Dempster et al. 1977; Neal & Hinton 1998) that allows priors and models to co-evolve across multiple linked layers of processing so as to account for the sensory data.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the mechanism of iterative estimation with citations; parent [60] emph is primary.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":62,"text":"The presence of bidirectional hierarchical structure thus induces 'empirical priors' in the form of the constraints that one level in the hierarchy places on the level below, and these constraints are progressively tuned by the sensory input itself.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the emergent property of empirical priors from the hierarchical structure.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":63,"text":"This kind of procedure (which implements a version of 'empirical Bayes'; Robbins 1956) has an appealing mapping to known facts about the hierarchical and reciprocally connected structure and wiring of cortex (Friston 2005; Lee & Mumford 2003).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the connection between the computational procedure and neuroanatomical facts.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":64,"text":"A classic early example, combining this kind of hierarchical learning with the basic predictive coding strategy described in section 1.1, is Rao and Ballard's (1999) model of predictive coding in the visual cortex.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a classic prior model as an exemplar of the approach.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":65,"text":"At the lowest level, there is some pattern of energetic stimulation, transduced (let's suppose) by sensory receptors from ambient light patterns produced by the current visual scene.","tag":"extension:illustrative","tier":"secondary","parent_id":64,"note":"Begins description of the Rao and Ballard model for illustration; parent [64] tempstat is primary.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":66,"text":"These signals are then processed via a multilevel cascade in which each level attempts to predict the activity at the level below it via backward connections.","tag":"extension:illustrative","tier":"secondary","parent_id":64,"note":"Continues description of the Rao and Ballard model; re-parents to [64] tempstat.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":67,"text":"The backward connections allow the activity at one stage of the processing to return as another input at the previous stage.","tag":"extension:illustrative","tier":"secondary","parent_id":64,"note":"Continues description of the model mechanism; re-parents to [64] tempstat.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":68,"text":"So long as this successfully predicts the lower level activity, all is well, and no further action needs to ensue.","tag":"extension:illustrative","tier":"secondary","parent_id":64,"note":"Continues description of the model's operation under successful prediction; re-parents to [64] tempstat.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":69,"text":"But where there is a mismatch, 'prediction error' occurs and the ensuing (error-indicating) activity is propagated to the higher level.","tag":"extension:illustrative","tier":"secondary","parent_id":64,"note":"Continues description of what happens under prediction failure; re-parents to [64] tempstat.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":70,"text":"This automatically adjusts probabilistic representations at the higher level so that top-down predictions cancel prediction errors at the lower level (yielding rapid perceptual inference).","tag":"extension:illustrative","tier":"secondary","parent_id":64,"note":"Continues the model description, explaining the inference mechanism; re-parents to [64] tempstat.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":71,"text":"At the same time, prediction error is used to adjust the structure of the model so as to reduce any discrepancy next time around (yielding slower timescale perceptual learning).","tag":"extension:illustrative","tier":"secondary","parent_id":64,"note":"Continues the model description, explaining the learning mechanism; re-parents to [64] tempstat.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":72,"text":"Forward connections between levels thus carry the 'residual errors' (Rao & Ballard 1999, p. 79) separating the predictions from the actual lower level activity, while backward connections (which do most of the 'heavy lifting' in these models) carry the predictions themselves.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the directional information flow in Rao and Ballard's model with citation.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":73,"text":"Changing predictions corresponds to changing or tuning your hypothesis about the hidden causes of the lower level activity.","tag":"extension:definitional","tier":"secondary","parent_id":72,"note":"Explains what changing predictions means conceptually; parent [72] tempstat is primary.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":74,"text":"The concurrent running of this kind of prediction error calculation within a loose bidirectional hierarchy of cortical areas allows information pertaining to regularities at different spatial and temporal scales to settle into a mutually consistent whole in which each 'hypothesis' is used to help tune the rest.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the functional outcome of running prediction error calculations across the hierarchy.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":75,"text":"As the authors put it: Prediction and error-correction cycles occur concurrently throughout the hierarchy, so top-down information influences lower-level estimates, and bottom-up information influences higher-level estimates of the input signal. (Rao & Ballard 1999, p. 80)","tag":"tempstat","tier":"primary","parent_id":null,"note":"Direct quotation from prior work summarizing its key finding.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":76,"text":"In the visual cortex, such a scheme suggests that backward connections from V2 to V1 would carry a prediction of expected activity in V1, while forward connections from V1 to V2 would carry forward the error signal indicating residual (unpredicted) activity.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the neuroanatomical implication of the model for the visual cortex.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":77,"text":"To test these ideas, Rao and Ballard implemented a simple bidirectional hierarchical network of such 'predictive estimators' and trained it on image patches derived from five natural scenes.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the simulation study conducted by Rao and Ballard.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":78,"text":"Using learning algorithms that progressively reduce prediction error across the linked cascade and after exposure to thousands of image patches, the system learnt to use responses in the first level network to extract features such as oriented edges and bars, while the second level network came to capture combinations of such features corresponding to patterns involving larger spatial configurations.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the empirical findings of the Rao and Ballard simulation.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":79,"text":"The model also displayed (see sect. 3.1) a number of interesting 'extra-classical receptive field' effects, suggesting that such non-classical surround effects (and, as we'll later see, context effects more generally) may be a rather direct consequence of the use of hierarchical predictive coding.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports additional findings of the model and their implication.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":80,"text":"For immediate purposes, however, what matters is that the predictive coding approach, given only the statistical properties of the signals derived from the natural images, was able to induce a kind of generative model of the structure of the input data: It learned about the presence and importance of features such as lines, edges, and bars, and about combinations of such features, in ways that enable better predictions concerning what to expect next, in space or in time.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the key result of the Rao and Ballard study relevant to the present argument.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":81,"text":"The cascade of processing induced by the progressive reduction of prediction error in the hierarchy reveals the world outside the black box.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance of the predictive coding result — that it achieves the fundamental goal of connecting inner processing to the outer world.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":82,"text":"It maximizes the posterior probability of generating the observed states (the sensory inputs), and, in so doing, induces a kind of internal model of the source of the signals: the world hidden behind the veil of perception.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the computational interpretation of what the model achieves; parent [81] emph is primary.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":83,"text":"As an example of the power (and potential ubiquity) of the basic predictive coding strategy itself, and one that now moves context center stage, consider Hosoya et al.'s (2005) account of dynamic predictive coding by the retina.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the power and potential ubiquity of predictive coding — establishes the significance of the phenomenon — while introducing the next example. The significance claim is the primary rhetorical work; the example introduction is subordinate to it.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":84,"text":"The starting point of this account is the well-established sense in which retinal ganglion cells take part in some form of predictive coding, insofar as their receptive fields display center-surround spatial antagonism, as well as a kind of temporal antagonism.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the established empirical foundation for the Hosoya et al. account; parent [83] emph is primary.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":85,"text":"What this means, in each case, is that neural circuits predict, on the basis of local image characteristics, the likely image characteristics of nearby spots in space and time (basically, assuming that nearby spots will display similar image intensities) and subtract this predicted value from the actual value.","tag":"extension:definitional","tier":"secondary","parent_id":84,"note":"Unpacks what center-surround antagonism means computationally; parent [84] tempstat is primary.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":86,"text":"What gets encoded is thus not the raw value but the differences between raw values and predicted values.","tag":"extension:definitional","tier":"secondary","parent_id":84,"note":"Continues the definitional elaboration of the retinal predictive coding mechanism; re-parents to [84] tempstat.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":87,"text":"In this way, 'Ganglion cells signal not the raw visual image but the departures from the predictable structure, under the assumption of spatial and temporal uniformity' (Hosoya et al. 2005, p. 71).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the finding of Hosoya et al. in their words, with citation.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":88,"text":"This saves on bandwidth, and also flags what is (to use Hosoya et al.'s own phrase) most 'newsworthy' in the incoming signal.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the functional significance of the retinal predictive coding mechanism.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":89,"text":"These computations of predicted salience might be made solely on the basis of average image statistics.","tag":"extension:speculative","tier":"secondary","parent_id":88,"note":"Raises a hypothetical alternative mechanism without citation or evidence; parent [88] tempstat is primary.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":90,"text":"Such an approach would, however, lead to trouble in many ecologically realistic situations.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a limitation of the simpler alternative mechanism; primary tag, no violation.","cars_move":"M1","cars_step":"1C","move_note":"Contrast used to set up Hosoya et al.'s insight within ongoing territory-establishment; not a gap-carving move."},{"id":91,"text":"To take some of the more dramatic examples, consider an animal that frequently moves between a watery environment and dry land, or between a desert landscape and a verdant oasis.","tag":"extension:illustrative","tier":"secondary","parent_id":90,"note":"Illustrates the ecological problem with the average-statistics-only approach; parent [90] contrast is primary.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":92,"text":"The spatial scales at which nearby points in space and time are typically similar in image intensity vary markedly between such cases, because the statistical properties of the different types of scene vary.","tag":"extension:illustrative","tier":"secondary","parent_id":90,"note":"Continues the illustrative example, explaining why fixed statistics fail; re-parents to [90] contrast.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":93,"text":"This is true in less dramatic cases too, such as when we move from inside a building to a garden or lake.","tag":"extension:illustrative","tier":"secondary","parent_id":90,"note":"Extends the illustration to more mundane cases; re-parents to [90] contrast.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":94,"text":"Hosoya et al. thus predicted that, in the interests of efficient, adaptively potent, encoding, the behavior of the retinal ganglion cells (specifically, their receptive field properties) should vary as a result of adaptation to the current scene or context, exhibiting what they term 'dynamic predictive coding.'","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the hypothesis derived by Hosoya et al. from these considerations.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":95,"text":"Putting salamanders and rabbits into varying environments, and recording from their retinal ganglion cells, Hosoya et al. confirmed their hypothesis: Within a space of several seconds, about 50% of the ganglion cells altered their behaviors to keep step with the changing image statistics of the varying environments.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the empirical findings confirming the Hosoya et al. hypothesis.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":96,"text":"A mechanism was then proposed and tested using a simple feedforward neural network that performs a form of anti-Hebbian learning.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the proposed and tested mechanism for the observed phenomenon.","cars_move":"M1","cars_step":"1C","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"cropley_2023","title":"cropley 2023","authors":["Cropley"],"year":2023,"section":"Introduction"},"arc_summary":"The introduction uses a **cycling structure** that returns to territory-building twice before closing, each cycle tightening the methodological rationale. The first M1→M2 pivot challenges the prior AI-won't-threaten-creativity consensus; the first M3 announcement is immediately followed by a second M1→M2 cycle that works through the problem of creativity test selection and scoring limitations. **Both M2 niches do different work**: the first destabilizes a field-wide assumption, the second identifies a concrete measurement gap. The final M3 block resolves both gaps simultaneously by nominating the DAT as the study's instrument.","structured_arc":"M1 -> M2 -> M3 -> M1 -> M2 -> M3","move_roles":[{"move":"M1","span":[1,4],"role":"Establishes the prior consensus that AI posed no threat to human soft-skill domains, anchoring the field's received wisdom that the paper will then disrupt."},{"move":"M2","span":[5,7],"role":"Introduces ChatGPT as a disruptor of that consensus, cataloguing claims of AI creativity across verbal, visual, and musical domains to show the threat is real and multifaceted."},{"move":"M3","span":[8,8],"role":"Announces the paper's core strategy — administering a validated creativity test to AI — framing it as a 'simple' empirical resolution to the debate opened in M2."},{"move":"M1","span":[9,12],"role":"Surveys the landscape of creativity tests, characterising variation in scope and media, to build the grounds for the instrument-selection decision that follows."},{"move":"M3","span":[13,13],"role":"Makes the first narrow methodological commitment — verbal test over figural — justified directly by ChatGPT's nature as a language model."},{"move":"M2","span":[14,17],"role":"Identifies scoring subjectivity as a persistent limitation across creativity tests, undermining the apparent objectivity of both rater-based and divergent-thinking instruments."},{"move":"M1","span":[18,19],"role":"Reports recent AI-driven advances in automated scoring and specifically introduces the DAT, repositioning prior work as having already solved the limitation just identified."},{"move":"M3","span":[20,22],"role":"Closes the introduction by justifying the DAT as the study's measure, stating the hypothesis and design, and outlining the paper's structure — converting the accumulated argument into a concrete study announcement."}],"sentences":[{"id":1,"text":"The rise of Artificial Intelligence (AI), especially the recent emergence of OpenAI's large language model ChatGPT, has reinvigorated the 'future of work' debate.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance and relevance of a current phenomenon (ChatGPT's emergence) as the motivating context. Not a finding report — the sentence establishes that something real and important is happening rather than reporting a research result.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":2,"text":"Even only recently (e.g., Cropley et al., 2022; Frey & Osborne, 2017) we were reassured that AI would replace humans only in jobs that were characterised by predictable, algorithmic cognitive and physical labour (e.g., bookkeeping, editing) leaving humans free to focus on unpredictable, non-algorithmic cognitive and physical work reliant on soft skills such as emotional intelligence, complex problem solving, and creativity.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Summarizes prior research consensus with citations about the prior understanding of AI's scope of replacement.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":3,"text":"Thus, AI held no fears for us, provided we prepared ourselves appropriately.","tag":"extension:speculative","tier":"secondary","parent_id":2,"note":"Draws an inferential conclusion from [2] without citation or new evidence. Parent [2] is primary (tempstat). ✓ legal.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":4,"text":"This has been the catalyst for a renewed focus on soft skills in education systems around the world (e.g., Succi & Canovi, 2020).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports an established consequence/trend in the literature with citation support.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":5,"text":"However, the emergence of ChatGPT, among a suite of large language models, including 'Bard' and 'Claude', has ignited a new debate, threatening to disrupt the balance between humans and AI central to the notion of the future of work.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces tension against the prior established position using an explicit \"However,\" signaling that the previous consensus is now under pressure.","cars_move":"M2","cars_step":"2A","move_note":null},{"id":6,"text":"Many claims have emerged attributing considerable creative ability to AI (Du Sautoy, 2020).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports an existing claim in the literature with citation, characterizing the current state of public/scholarly discourse.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":7,"text":"This includes not just the verbal abilities of ChatGPT (Henriksen et al., 2023), but also the image-generation abilities of DALL-E 2 (Kirkpatrick, 2023), and even artificial musical creativity (Gioti, 2021).","tag":"extension:illustrative","tier":"secondary","parent_id":6,"note":"Provides cited examples illustrating the scope of claims made in [6]. Per definitions, a named case used as an example with a citation and a primary parent stays illustrative. Parent [6] is primary (tempstat). ✓ legal.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":8,"text":"Notwithstanding the considerable misinterpretation, and even misuse, of the term 'creativity' that confounds this debate (Cropley et al., 2019), a simple way to explore this hypothesis – AI is more creative than humans – is to administer a robust, validated and normed creativity test to the AI.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the paper's approach/strategy for addressing the research question. The primary rhetorical work is announcing how the paper will proceed.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":9,"text":"There is a wide variety of tests that examine different facets of the construct 'creativity', from the broad and holistic, to the narrow and focused.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the current state of the field regarding creativity measurement instruments.","cars_move":"M1","cars_step":"1B","move_note":"M2->M3 cycling: paper returns to territory-building after initial M3 announcement to motivate test selection"},{"id":10,"text":"The Test of Creative Thinking: Drawing Production (TCT-DP: Urban & Jellen, 1996), for example, examines elements of personality, cognition and creative output.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Per definitions, citation-backed domain-level patterns are tempstat even when framed as examples. This sentence reports what a named instrument does, backed by citation.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":11,"text":"By comparison, the Alternate Uses Test (AUT: Torrance, 1999), addresses specific elements of creative cognition (i.e., divergent thinking).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Same reasoning as [10]: a cited, named instrument with a described function is a domain-level reported fact, not a bare illustration.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":12,"text":"These tests also use a variety of media, from the figural (the TCT-DP) to the verbal (the AUT).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports another dimension of variation across creativity tests — media type — continuing the characterization of the field.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":13,"text":"The fact that ChatGPT is a large language model AI means that a verbal test is the obvious and salient choice.","tag":"contribution","tier":"primary","parent_id":null,"note":"Justifies and announces a methodological decision for the current study — the rationale for choosing a verbal test.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":14,"text":"However, a limitation of many creativity tests is scoring, with the majority relying on human raters.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a limitation of existing instruments, creating tension that motivates the subsequent methodological choice.","cars_move":"M2","cars_step":"2B","move_note":"Second M2 niche within cycling structure, identifying a gap in existing measurement tools"},{"id":15,"text":"Although many tests, such as the TCT-DP, have detailed scoring criteria for use by trained raters, subjectivity cannot be ruled out.","tag":"extension:definitional","tier":"secondary","parent_id":14,"note":"Unpacks and qualifies what \"relying on human raters\" from [14] means in practice — elaborating the nature of the limitation rather than providing an independent claim or a new example. Parent [14] is primary (contrast). ✓ legal.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":16,"text":"This is reflected in the fact that interrater agreement on the TCT-DP is typically around .90.","tag":"extension:illustrative","tier":"secondary","parent_id":14,"note":"Provides a specific data point as evidence for the subjectivity concern raised in [14]. [15] is secondary so cannot serve as parent; re-parented to [14] (contrast, primary) per the re-parenting rule. ✓ legal.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":17,"text":"Divergent thinking tests such as the AUT rely on apparently more objective criteria (e.g., fluency, flexibility, originality), however, these tests are typically slow, and remain vulnerable to subjectivity.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a counterpoint (more objective criteria) and immediately undercuts it with continued limitations — net effect sustains the contrast/limitation argument against existing tests.","cars_move":"M2","cars_step":"2A","move_note":null},{"id":18,"text":"Fortunately, recent advances in AI have addressed these scoring limitations, with machine learning approaches demonstrating a strong capacity to score figural (e.g., Cropley & Marrone, 2022) and written/verbal (Marrone et al., 2022) creativity tests.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports recent research developments that resolve the previously identified limitation, with citations.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":19,"text":"In particular, Olson et al. (2021) have developed the Divergent Association Task (DAT), using the concept of semantic distance (see Beaty & Johnson, 2021), to create a robust, automated test of verbal divergent thinking that is ideally suited to ChatGPT.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a specific prior development (the DAT) with citation. The primary rhetorical work is reporting what Olson et al. did.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":20,"text":"Insofar as semantic distance is an acceptable proxy for divergent thinking (Olson et al., 2021 show strong correlations between the DAT and both flexibility and originality on the AUT) and noting that divergent thinking is an important, but not sole, indicator of creativity (e.g., Plucker, Makel & Qian, 2019; Runco & Acar, 2019) the DAT is used here as a valid proxy of creativity.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces and justifies the methodological choice to use the DAT as the study's measure of creativity.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":21,"text":"Therefore, to explore the hypothesis that ChatGPT is more creative than humans, two versions of the model (GPT3.5 and GPT4) were given the DAT with results compared to the human norms reported by Olson et al. (2021).","tag":"contribution","tier":"primary","parent_id":null,"note":"Explicitly announces the study's design, hypothesis, and procedure — a core contribution/purpose statement.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":22,"text":"The method used to conduct this study, the results obtained, and a discussion of these are set out in the following sections.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the structure/organization of the remainder of the paper.","cars_move":"M3","cars_step":"3D","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"duenezguzman_2024","title":"duenezguzman 2024","authors":["Duenezguzman"],"year":2024,"section":"Introduction"},"arc_summary":"The introduction is built on a persistent **interlacing of M1 territory and M2 gap** sentences, cycling through four distinct limitation zones (static datasets, RL convergence, self-generated data degradation, exploration-exploitation trade-off) before committing to M3. **Two M3 announcements** anchor the argument: an early thesis at sentence 15 and a fuller construct-naming block from sentences 27–32. The paper's central move is reframing antagonism as synergy — **exploration-exploitation becomes 'compounding innovation'** — before a brief M2 return (sentences 33, 35) sharpens the remaining gap and cues the final structural announcement.","structured_arc":"M1 -> M2 -> M1 -> M2 -> M3 -> M1 -> M2 -> M1 -> M2 -> M3 -> M2 -> M3","move_roles":[{"move":"M1","span":[1,2],"role":"Establishes the scaling thesis as the foundational principle of modern AI, anchoring the entire introduction in a widely accepted empirical lesson."},{"move":"M2","span":[3,6],"role":"Identifies the structural limitation of static, exogenous datasets and asserts the necessity of self-generated data, opening the first gap the paper will address."},{"move":"M1","span":[7,9],"role":"Introduces reinforcement learning as the existing solution to self-generated data, building up the expectation of dramatic RL results to set up an immediate contrast."},{"move":"M2","span":[10,10],"role":"Deflates the RL expectation with a single contrastive pivot, signalling that the anticipated scaling gains do not materialise."},{"move":"M1","span":[11,13],"role":"Documents two concrete failure modes (RL convergence and NLP self-training) to substantiate the gap, while also surveying the current wave of self-generated data research."},{"move":"M2","span":[14,14],"role":"Pins down a specific degradation mechanism in self-generated NLP training, sharpening the gap immediately before the first thesis announcement."},{"move":"M3","span":[15,15],"role":"Delivers a first, compressed thesis announcement — multi-scale, multi-agent self-organisation as the path beyond the data-degradation constraint — planting the paper's flag early before cycling back."},{"move":"M1","span":[16,17],"role":"Resumes territory review by characterising when RL amplification works well, establishing the boundary condition that makes the next gap concrete."},{"move":"M2","span":[18,19],"role":"Introduces the large-state-space failure mode — novel behaviours cannot be discovered by chance — and mechanistically unpacks why no learning gradient is available."},{"move":"M1","span":[20,25],"role":"Surveys the landscape of existing solutions (adaptive environments, intrinsic motivation, curiosity models) to show the field's best responses to the exploration problem, setting up the residual gap."},{"move":"M2","span":[26,26],"role":"Identifies the pernicious residual problem that all prior approaches leave unsolved: the direction of exploration still requires external designer decisions."},{"move":"M3","span":[27,32],"role":"Names and defines the paper's central construct — compounding innovation — situates it in biological evolution and human cultural history, and reframes exploration-exploitation from trade-off to synergy."},{"move":"M2","span":[33,33],"role":"Poses the rhetorical question of whether biological compounding innovation can be replicated artificially, briefly reopening the gap to motivate the paper's empirical and design programme."},{"move":"M3","span":[34,34],"role":"Advances multi-agent systems as a candidate path to ongoing learning, pivoting back toward the paper's positive contribution."},{"move":"M2","span":[35,35],"role":"Concedes that current multi-agent algorithms still fail at compounding innovation, preserving the niche just before the closing structural announcement."},{"move":"M3","span":[36,37],"role":"Announces the paper's organisational plan — three biologically-grounded social structures — and previews the first (collective living), signalling how the argument will unfold."}],"sentences":[{"id":1,"text":"A key lesson in artificial intelligence (AI) history is that the extent to which intelligent behaviour emerges in learning systems scales with the size of the dataset used for training.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1B","move_note":null},{"id":2,"text":"Current large models are trained on vast datasets and obtain human-level performance on a wide variety of tasks, especially in natural language, but increasingly in multi-modal domains.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":3,"text":"Though large, these training datasets are exogenous to the models they train; consequently, their learning is dependent upon, and limited to, relationships in the data.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a structural limitation of the current paradigm — datasets are static and external.","cars_move":"M2","cars_step":"2A","move_note":"Interlaced M1/M2: contrast sentence immediately follows territory-establishing sentences"},{"id":4,"text":"There may be limits to what can be achieved by training on any such static dataset, even if it is very large.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance of a fundamental limitation; establishes it as real and worth attending to.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":5,"text":"For example, an algorithm trained on all of human knowledge before the performance of the double-slit experiment which catalysed the development of quantum physics would have no way of predicting the outcome in advance.","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Concrete illustration of the limitation claimed in [4], which is a primary (emph) parent.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":6,"text":"To overcome this, algorithms need to generate their own data.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts a necessary condition for progress; establishes its importance as motivation for the paper's direction.","cars_move":"M2","cars_step":"2C","move_note":null},{"id":7,"text":"Reinforcement learning (RL) algorithms do this.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports an established property of RL systems.","cars_move":"M1","cars_step":"1C","move_note":"Interlaced M1/M2: returns to territory after gap framing"},{"id":8,"text":"They learn by interacting with their environment and observing new states reached through their own behaviour, in effect generating continually-growing datasets for themselves.","tag":"extension:definitional","tier":"secondary","parent_id":7,"note":"Defines how RL achieves self-generated data, unpacking [7] (tempstat parent). Legal chain.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":9,"text":"RL agents running in simulation can generate data indefinitely, so if their cognitive abilities scale with dataset size, you would expect dramatic results from this approach.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance and expected power of RL's data-generation capacity; functions as a primary claim establishing why this approach matters. Corrected from extension:speculative — [8] was a secondary parent, which is illegal.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":10,"text":"However, this is not what typically happens.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces tension against the expectation set up in [9].","cars_move":"M2","cars_step":"2A","move_note":"Interlaced M1/M2: counter-claim against prior territory sentence"},{"id":11,"text":"In small and stationary worlds, RL agents converge to behaviours that repeatedly execute the same actions in the same states, generating no new data.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports an established finding about RL convergence behavior.","cars_move":"M1","cars_step":"1C","move_note":"Interlaced M1/M2: backs up the contrast in [10] with a documented finding"},{"id":12,"text":"When this happens their learning stagnates.","tag":"extension:definitional","tier":"secondary","parent_id":11,"note":"States the consequence of the convergence described in [11] (tempstat parent). Legal chain.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":13,"text":"In natural language processing, a wave of research is seeing performance improvement from models generating their own training data in sophisticated ways.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a current trend in the NLP literature.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":14,"text":"However, naively training a model on data generated by itself tends to remove the tails of the distribution, degrading the data stream produced and thus limiting subsequent learning.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a limitation/failure mode of the self-generated data approach described in [13].","cars_move":"M2","cars_step":"2B","move_note":"Interlaced M1/M2: gap identified immediately after territory claim"},{"id":15,"text":"In this article, we argue that next-level intelligent systems may move beyond this constraint by continually generating novel data in self-organising multi-scale, multi-agent interactions.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the thesis and purpose of the current paper.","cars_move":"M3","cars_step":"3A","move_note":"First M3 announcement; followed by cycling back to M1/M2"},{"id":16,"text":"RL algorithms strengthen rewarding actions even if they are rarely emitted, effectively amplifying the most profitable available behaviour.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports an established property of RL algorithms.","cars_move":"M1","cars_step":"1C","move_note":"M2→M3 cycling: returns to territory after first M3 announcement"},{"id":17,"text":"This works well if the initial behaviour distribution covers all relevant states.","tag":"tempstat","tier":"primary","parent_id":null,"note":"States a known boundary condition of RL — an established technical fact about when the approach succeeds, not speculation. Corrected from extension:speculative.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":18,"text":"However, when the world is large enough that the initial behaviour distribution covers only a relatively tiny subspace, an intelligent agent must invent wholly new behaviours which they are extraordinarily unlikely to produce by accident.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces the limitation that applies when the state space is large, contrasting with [17].","cars_move":"M2","cars_step":"2B","move_note":"Interlaced M1/M2: gap contrasting with prior territory sentence"},{"id":19,"text":"The agent's data stream may change through its actions, but the waiting time until a complex rewarding behaviour is emitted by chance may be so long that no learning gradient is available, thus such changes do not motivate further exploration.","tag":"extension:definitional","tier":"secondary","parent_id":18,"note":"Elaborates mechanistically on the limitation described in [18] (contrast parent). Legal chain.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":20,"text":"One way to improve exploration in RL algorithms is to have the environment adapt to the agent.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports an established approach in the literature.","cars_move":"M1","cars_step":"1C","move_note":"Interlaced M1/M2: reviews prior work addressing the gap"},{"id":21,"text":"Another is to make exploration an explicit part of the goal.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports another established approach; parallel to [20].","cars_move":"M1","cars_step":"1C","move_note":null},{"id":22,"text":"In intrinsic motivation models, the latter is achieved by incorporating models of curiosity that seek novel states or via agents that generate their own intrinsic goals.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports specific implementations of the approach mentioned in [21].","cars_move":"M1","cars_step":"1C","move_note":null},{"id":23,"text":"However, this leads to a trade-off: computation must be balanced between seeking new goals (exploration), and improving behaviours on existing goals (exploitation).","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a limitation of the intrinsic motivation approach — the exploration-exploitation trade-off.","cars_move":"M2","cars_step":"2B","move_note":"Interlaced M1/M2: gap identified against prior territory"},{"id":24,"text":"Substantial research effort has been devoted to balancing this trade-off, and some bounds are known.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Summarizes the state of prior research on the exploration-exploitation trade-off.","cars_move":"M1","cars_step":"1C","move_note":"Interlaced M1/M2: territory review of prior work on the gap"},{"id":25,"text":"Some approaches attempt to evade this trade-off, for example by focusing on the intrinsic goals where they make most progress.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports an existing class of approaches that try to sidestep the trade-off.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":26,"text":"But a pernicious difficulty remains: even if the designer can avoid the exploration-exploitation trade-off, they must still decide the direction of exploration.","tag":"contrast","tier":"primary","parent_id":null,"note":"Identifies a residual problem not solved by existing approaches; a gap/limitation claim against [25].","cars_move":"M2","cars_step":"2B","move_note":"Interlaced M1/M2: residual gap after survey of prior work"},{"id":27,"text":"By contrast, in the view we develop here, exploration and exploitation become synergistic rather than antagonistic.","tag":"contribution","tier":"primary","parent_id":null,"note":"Introduces the paper's alternative framework in contrast to the prior literature.","cars_move":"M3","cars_step":"3A","move_note":"Second M3 block following M2→M3 cycling"},{"id":28,"text":"Exploitation drives exploration in the appropriate direction as innovation builds upon prior innovation.","tag":"extension:definitional","tier":"secondary","parent_id":null,"note":"Unpacks the synergistic relationship claimed in [27] (contribution parent). Legal chain.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":29,"text":"We call this effect compounding innovation.","tag":"framedef","tier":"primary","parent_id":null,"note":"Introduces and names the central theoretical construct the paper will use.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":30,"text":"Mechanistically, compounding innovation occurs when exploitation continuously generates new data that creates opportunities for learning: exploration by exploitation.","tag":"extension:definitional","tier":"secondary","parent_id":29,"note":"Defines the mechanism underlying the construct named in [29] (framedef parent). Legal chain.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":31,"text":"We argue compounding innovation arises in biological evolution because the environment continually changes with innovation due to specific types of interactions between biological units.","tag":"contribution","tier":"primary","parent_id":null,"note":"States a core argument of the paper about the biological basis of compounding innovation.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":32,"text":"These interactions gave rise to human cultural evolution—the process that generated the data on which our most intelligent algorithms have trained.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Makes a cross-domain claim linking biological interactions to cultural evolution and AI training data; treated as tempstat per Rule 3 (cross-domain generalization).","cars_move":"M3","cars_step":"3B","move_note":null},{"id":33,"text":"Can we create analogous interactions in artificial learning systems?","tag":"nostat","tier":"primary","parent_id":null,"note":"Corrected from new_tag_needed. The rhetorical question identifies an open, unresolved problem the paper is motivated to address — the core function of nostat. Rhetorical question form does not exclude the tag.","cars_move":"M2","cars_step":"2C","move_note":"Brief return to M2 gap-framing via rhetorical question after M3 claims; part of M2→M3 cycling"},{"id":34,"text":"In a multi-agent system, the behaviour of any one agent influences the data streams of others, suggesting a possible path to ongoing learning.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance and relevance of multi-agent systems as a potential solution; establishes a phenomenon worth attending to.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":35,"text":"Yet contemporary multi-agent algorithms still fail at compounding innovation.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a gap/limitation — current multi-agent approaches do not yet achieve compounding innovation.","cars_move":"M2","cars_step":"2B","move_note":"Final M2 gap before closing M3 structural announcement"},{"id":36,"text":"Here, we consider three broad forms of social structure that arise in biological systems, each characterised by distinct types of social interaction that may contribute to compounding innovation in different ways.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the organizational scope and structure of the paper.","cars_move":"M3","cars_step":"3A","move_note":"Final M3 block; announces paper structure"},{"id":37,"text":"First, we discuss the implications of 'collective living': how competition between agents creates novel data by disrupting local equilibria, often generating naturally emergent sequences of learning opportunities that stimulate behavioural innovation.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the first major topic/section and its argument; part of the paper's structural plan introduced in [36].","cars_move":"M3","cars_step":"3D","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"hart_2017","title":"Creative foraging: An experimental paradigm for studying exploration and discovery","authors":["Hart, Y.","Mayo, A.E.","Mayo, R.","Rozenkrantz, L.","Tendler, A.","Alon, U.","Noy, L."],"year":2017,"section":"Introduction"},"arc_summary":"The introduction is structured as a quick M1 legitimation followed by a layered M2 critique that **interlaces two brief M1 interludes** ([8], [14]) — each reporting a prior finding immediately before it is critiqued — creating a tight gap-by-example rhythm. **M3 is long and internally complex**: it opens with a dual announcement ([16]–[17]), grounds the borrowed foraging paradigm with cited prior work ([18]–[21]), then alternates between design-justification (3B) and formal hypothesis statements (3C), including an **in-line contrast against naïve OFT** ([35]–[39]) that justifies H3 without reopening the paper's gap. The arc closes cleanly with a forward-pointer to Results ([47]).","structured_arc":"M1 -> M2 -> M1 -> M2 -> M1 -> M2 -> M3","prompt_version":"v0.5","move_roles":[{"move":"M1","span":[1,3],"role":"Defines creative exploration and asserts its centrality across art, design, science, and cognitive development, establishing the topic as broadly significant before the gap argument begins."},{"move":"M2","span":[4,7],"role":"Opens the gap argument with a broad knowledge-limitation claim, then narrows it to the specific methodological obstacle of non-automated, hard-to-quantify paradigms, using the AUT as a concrete illustration."},{"move":"M1","span":[8,8],"role":"Briefly reports a specific empirical finding from AUT research (category-switching) to set up the immediately following critique of what the AUT fails to capture."},{"move":"M2","span":[9,13],"role":"Resumes the critique by targeting the AUT's manual coding burden, its undefined solution space, and — most fundamentally — its blindness to the intermediate steps of the search process."},{"move":"M1","span":[14,14],"role":"Reports the think-aloud method as a prior attempt to address process-invisibility, positioning it as the next target for critique rather than as genuine prior art establishing the field."},{"move":"M2","span":[15,15],"role":"Closes the gap-establishment block by dismissing think-aloud methods as difficult to code and quantify, completing the cumulative case that no existing paradigm solves the measurement problem."},{"move":"M3","span":[16,47],"role":"Announces the creative foraging paradigm, grounds it in prior human-foraging work, describes the game mechanics, justifies the design's analytic affordances, formally states five hypotheses (H1–H5) with in-line theoretical justification for H3 and H4, and closes with a forward-pointer to the Results section."}],"sentences":[{"id":1,"text":"Creative exploration and discovery processes are defined as the search for novel and valuable elements within a set of constraints.","tag":"framedef","tier":"primary","parent_id":null,"note":"Introduces the paper's working definition of the core construct.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":2,"text":"Creative exploration is central for many fields, including art [1], design [2] and science [3].","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance/relevance of the topic across domains.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":3,"text":"More generally, it is an integral part of cognitive development [4,5].","tag":"emph","tier":"primary","parent_id":null,"note":"Extends the importance claim to a further domain.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":4,"text":"Despite progress achieved in understanding creative search processes from different perspectives [6–14], much is still unknown about their underlying dynamics and mechanisms.","tag":"nostat","tier":"primary","parent_id":null,"note":null,"cars_move":"M2","cars_step":"2B","move_note":"Concessive 'despite progress' clause nods back to M1 territory, but the rhetorical center is the gap claim, so coded 2B."},{"id":5,"text":"One obstacle for understanding creative exploration is the lack of automated and high-resolution experimental paradigms.","tag":"nostat","tier":"primary","parent_id":null,"note":"Identifies a specific methodological gap underlying [4].","cars_move":"M2","cars_step":"2B","move_note":"Narrows the gap named in [4] to a specific methodological obstacle."},{"id":6,"text":"For example, one of the most commonly used tests for creativity is the alternate usage task (AUT) [15].","tag":"extension:illustrative","tier":"secondary","parent_id":5,"note":"Gives a concrete example of the paradigm-gap claim in [5]. Parent: [5] (nostat).","cars_move":"M2","cars_step":"2B","move_note":null},{"id":7,"text":"In the AUT participants are asked to come up with creative uses for common objects (e.g., a ping-pong ball).","tag":"extension:definitional","tier":"secondary","parent_id":5,"note":"Unpacks how the AUT works; re-parented to [5] (nostat), since original parent [6] is secondary.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":8,"text":"Participants show exploration patterns such as switching between categories of solutions [12].","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a specific empirical finding from prior work, with citation.","cars_move":"M1","cars_step":"1C","move_note":"Brief M1 interlude: reports a specific empirical finding from AUT research (subject = participants/study), embedded within the surrounding M2 critique block. Locally interlaced M1/M2."},{"id":9,"text":"This test is coded manually, a laborious process which limits the extent of feasible studies.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a limitation of the AUT.","cars_move":"M2","cars_step":"2B","move_note":"Coded 2B (naming what is lacking/limited) rather than 2A, since this critiques a method's adequacy rather than directly challenging a specific prior claim."},{"id":10,"text":"The test is difficult to analyze and model because the space of possible solutions is undefined (how many different usages for a ping-pong ball exist?) and has no natural notion of similarity between different solutions.","tag":"extension:definitional","tier":"secondary","parent_id":9,"note":"Unpacks/elaborates the limitation named in [9]. Parent: [9] (contrast).","cars_move":"M2","cars_step":"2B","move_note":null},{"id":11,"text":"Other common creativity tests share these limitations [16].","tag":"contrast","tier":"primary","parent_id":null,"note":"Generalizes the critique from AUT specifically to creativity tests broadly, with citation support.","cars_move":"M2","cars_step":"2B","move_note":"Generalizes the AUT-specific critique to creativity tests broadly; continues 2B."},{"id":12,"text":"More fundamentally, AUT and other common creativity tests record only the discovered solutions and not the intermediate steps leading from one solution to another.","tag":"contrast","tier":"primary","parent_id":null,"note":"Opens a new, deeper line of critique.","cars_move":"M2","cars_step":"2B","move_note":"Opens a deeper, more fundamental gap claim (loss of process information); continues 2B."},{"id":13,"text":"Thus, they do not allow insight into the process of exploration.","tag":"extension:definitional","tier":"secondary","parent_id":12,"note":"Draws out the implication of [12]'s claim. Parent: [12] (contrast).","cars_move":"M2","cars_step":"2B","move_note":null},{"id":14,"text":"Several studies attempted to map the processes leading to creative solutions by recording verbal transcripts of thought processes—the 'think aloud' method [2,17].","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a specific prior research approach with citation.","cars_move":"M1","cars_step":"1C","move_note":"Brief M1 interlude reporting what prior studies did (subject = the studies), parallel in function to [8]. Locally interlaced M1/M2."},{"id":15,"text":"However, these methods are difficult to code and quantitatively analyze.","tag":"contrast","tier":"primary","parent_id":null,"note":"Limitation of the think-aloud method just introduced in [14].","cars_move":"M2","cars_step":"2B","move_note":"Closes out the think-aloud critique and the gap-establishing block, returning to 2B after the M1 interlude in [14]."},{"id":16,"text":"Here, we introduce a new paradigm for creative exploration that allows automated tracking of the search process in a space of possibilities that is large yet well-defined.","tag":"novstat","tier":"primary","parent_id":null,"note":"Explicit novelty claim marking the transition to the present work.","cars_move":"M3","cars_step":"3A","move_note":"Explicit novstat transition; opens the M3 block that runs to the end of the introduction."},{"id":17,"text":"To achieve this, we borrow techniques from the study of human foraging.","tag":"contribution","tier":"primary","parent_id":null,"note":"States the methodological approach/strategy of the current paper.","cars_move":"M3","cars_step":"3A","move_note":"Continues the purpose statement begun in [16], specifying the methodological strategy."},{"id":18,"text":"In a series of studies Hills, Todd and colleagues used a spatial foraging task and a letter puzzle task to experimentally study human foraging behavior [18–21].","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports prior research findings/methods with citation.","cars_move":"M3","cars_step":"3B","move_note":"Tempstat used as context-setting within M3 (per decision rules) to ground the borrowed foraging paradigm; coded 3B rather than M1/1C because its function here is to justify the present design choice, not to build the paper's own gap argument."},{"id":19,"text":"These experimental foraging tasks employed solution spaces which are finite and well-defined [22].","tag":"extension:definitional","tier":"secondary","parent_id":18,"note":"Elaborates a property of the tasks introduced in [18]. Parent: [18] (tempstat).","cars_move":"M3","cars_step":"3B","move_note":null},{"id":20,"text":"For example, in the spatial foraging task participants searched for resources on a grid of locations.","tag":"extension:illustrative","tier":"secondary","parent_id":18,"note":"Concrete example of the foraging task type; re-parented to [18] (tempstat), since original parent [19] is secondary.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":21,"text":"This task records intermediate steps between solutions and has a clear distance metric, features that allow the foraging behavior to be quantitatively analyzed and mathematically modeled using optimal foraging theory (OFT) [23].","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a substantive claim about the paradigm's analytic value, with citation to OFT.","cars_move":"M3","cars_step":"3B","move_note":"Continues justifying the borrowed paradigm by naming the analytic properties that motivate adopting it for the present design."},{"id":22,"text":"In order to develop a similar task for creative search, we need to address one key difference between foraging and creative search.","tag":"contribution","tier":"primary","parent_id":null,"note":"States the paper's goal/rationale for adapting the foraging paradigm.","cars_move":"M3","cars_step":"3B","move_note":"States a design challenge to resolve when adapting foraging methods; coded 3B (design rationale) rather than a return to M2, since the paper's gap was already established and this elaborates how the present design must address it."},{"id":23,"text":"In the foraging tasks, the goal is to find as many solutions as possible; in creativity tests the goal is two-fold: (i) to find many solutions (fluency) (ii) of high quality (novel and valuable).","tag":"extension:definitional","tier":"secondary","parent_id":22,"note":"Unpacks the \"key difference\" flagged in [22]. Parent: [22] (contribution).","cars_move":"M3","cars_step":"3B","move_note":null},{"id":24,"text":"In other words, whereas the value of the different solutions in the foraging tasks is constant (for example, all foraged pixels in the spatial foraging task are equally valuable), the distribution of solution values in creativity tests is skewed, with many low-quality solutions (boring or non-feasible) and only a handful of high-quality creative solutions.","tag":"extension:definitional","tier":"secondary","parent_id":22,"note":"Further unpacks the key difference; re-parented to [22] (contribution), since original parent [23] is secondary.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":25,"text":"We present a paradigm for creative foraging in which players seek solutions that they find interesting and beautiful, embedded within a well-defined search space.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the paper's specific paradigm/contribution.","cars_move":"M3","cars_step":"3A","move_note":"Core announcement of the paradigm; re-asserts 3A after the justification detour in [18]-[24]."},{"id":26,"text":"The creative foraging game enables high-resolution measurement of creative, intrinsically motivated search in the framework of visual exploration and discovery [24–28].","tag":"contribution","tier":"primary","parent_id":null,"note":"Further specifies the purpose/framing of the contribution.","cars_move":"M3","cars_step":"3B","move_note":"States what the design 'enables', matching 3B's defining template ('this design allows us to...')."},{"id":27,"text":"The creative foraging game is a computer game in which players can move ten adjacent squares to create different shapes (Fig 1).","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the method/task structure of the current study.","cars_move":"M3","cars_step":"3A","move_note":"Method/task description continuing the purpose announcement."},{"id":28,"text":"There are 36,446 possible shapes (Section A in S1 File).","tag":"extension:definitional","tier":"secondary","parent_id":27,"note":"Elaborates a specific parameter of the task described in [27]. Parent: [27] (contribution).","cars_move":"M3","cars_step":"3A","move_note":null},{"id":29,"text":"The players are instructed to save shapes that they find interesting and beautiful into a gallery.","tag":"extension:definitional","tier":"secondary","parent_id":27,"note":"Continues describing task mechanics; re-parented to [27] (contribution), since original parent [28] is secondary.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":30,"text":"The timing of all moves and gallery choices is recorded.","tag":"extension:definitional","tier":"secondary","parent_id":27,"note":"Continues task description; re-parented to [27] (contribution), since original parent [29] is secondary.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":31,"text":"This setting allows us to observe all intermediate steps as people search a large but finite metric space of different possibilities.","tag":"link:closing","tier":"secondary","parent_id":27,"note":"Synthesizes the preceding task-description sentences ([27]–[30]). Parent: [27] (contribution).","cars_move":"M3","cars_step":"3B","move_note":"Although parented to [27] (3A), the content explicitly states what the design 'allows' -- matches 3B's defining template more precisely than 3A, so overridden accordingly."},{"id":32,"text":"We present data on 100 participants and interpret the results in the context of OFT according to the following hypotheses:","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces scope (sample) and structure (hypotheses to follow) of the current paper.","cars_move":"M3","cars_step":"3A","move_note":"Bridges the design description to the hypothesis list by describing study scope and analytic framework; coded 3A (continuing 'what we did'), distinct from the hypotheses themselves coded 3C below."},{"id":33,"text":"(H1) Participants' trajectories in shape space are composed of distinguishable phases of exploration and exploitation: exploration for new shape categories and exploitation of similar shapes within a category.","tag":"contribution","tier":"primary","parent_id":null,"note":"States a specific hypothesis of the current study.","cars_move":"M3","cars_step":"3C","move_note":"First formally stated hypothesis; pre-announces an expected pattern of results, matching 3C."},{"id":34,"text":"(H2) In phases of exploitation people move along optimal (shortest) paths.","tag":"contribution","tier":"primary","parent_id":null,"note":"States a specific hypothesis of the current st
