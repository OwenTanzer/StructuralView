the final M3 occupation. The extended M3 block (S15–S37) is the rhetorical center of gravity, enumerating four formal RQs, a detailed pipeline description, and pre-announced findings keyed to each RQ. This structure reflects a paper confident enough in its contribution to announce purpose before fully justifying need.","structured_arc":"M1 -> M2 -> M3","move_roles":[{"move":"M1","span":[1,5],"role":"Establishes the research territory by situating CSS historically and asserting LLMs as a potentially paradigm-shifting tool, motivating the paper's central inquiry."},{"move":"M3","span":[6,6],"role":"Prematurely announces the paper's purpose before the niche is established, signaling authorial confidence in the contribution and framing what follows as elaboration rather than build-up."},{"move":"M2","span":[7,12],"role":"Establishes the niche by cataloguing the limitations of supervised and unsupervised CSS methods and identifying data constraints as the key gap that LLMs could resolve."},{"move":"M1","span":[13,13],"role":"Bolsters the territory claim by reporting prior evidence of LLM capabilities across domains, providing empirical grounding for the gap-bridging claim that follows."},{"move":"M2","span":[14,14],"role":"Sharpens the niche by specifying the conditional payoff—if LLMs work zero-shot, CSS scope expands—directly motivating the primary research question."},{"move":"M3","span":[15,37],"role":"Occupies the niche by formally stating four research questions, describing the evaluation pipeline and paper structure, and pre-announcing key findings for each RQ, functioning as a detailed roadmap for the entire paper."}],"sentences":[{"id":1,"text":"The most surprising scientific changes tend to arrive, not from accumulated facts and discoveries, but from the invention of new tools and methodologies that trigger 'paradigm shifts' (Kuhn 1962).","tag":"emph","tier":"primary","parent_id":null,"note":"Opens the introduction with a broad claim asserting the importance of tool-driven paradigm shifts, motivating the paper's central question about LLMs as transformative tools.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":2,"text":"Computational social science (CSS) (Lazer et al. 2020) was born from the immense growth of human data traces on the Web and the rapid acceleration of computational resources for processing this data.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the historical origin of CSS as an established fact with citation.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":3,"text":"These developments allowed researchers to study language and behavior at an unprecedented scale (Lazer et al. 2009), with both global and fine-grained observations (Golder and Macy 2014).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports prior findings about what CSS enabled, with citations.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":4,"text":"From the early days of content dictionaries (Stone, Dunphy, and Smith 1966), statistical text analysis facilitated CSS research by providing structure to non-numeric data.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the historical trajectory of computational methods in CSS with citation.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":5,"text":"Now, large language models (LLMs) may be poised to change the CSS landscape by providing such capabilities without custom training data.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the potential significance of LLMs for CSS — the central motivating claim. The hedged \"may be poised\" signals an assertion of relevance rather than a confirmed finding.","cars_move":"M1","cars_step":"1A","move_note":"Transition sentence bridging M1 territory to M3 purpose; retained in M1 as centrality/relevance claim about LLMs."},{"id":6,"text":"The goal of this work is to assess the degree to which LLMs can transform CSS.","tag":"contribution","tier":"primary","parent_id":null,"note":"Directly states the purpose of the paper.","cars_move":"M3","cars_step":"3A","move_note":"Early M3 announcement before the M2 niche is fully elaborated; the introduction then returns to territory/gap before the extended M3 block."},{"id":7,"text":"Solid computational approaches are needed to help analyze textual data and to understand a variety of social phenomena across academic disciplines.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the importance and relevance of computational approaches for CSS — establishes need.","cars_move":"M2","cars_step":"2B","move_note":"M2->M3 cycling: after early 3A in sentence 6, the introduction returns to gap/need language."},{"id":8,"text":"Current CSS methodologies typically use supervised text classification and generation in order to scale up manual labeling efforts to unseen texts (also called coding in the social sciences).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Describes the current state of CSS methods.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":9,"text":"Reliable supervised methods typically demand an extensive amount of human-annotated training data.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports an established constraint of supervised methods in CSS.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":10,"text":"Alternatively, unsupervised methods can run 'for free,' but the resulting output can be uninterpretable.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a tension/tradeoff against the supervised approach described in [9].","cars_move":"M2","cars_step":"2A","move_note":null},{"id":11,"text":"In the status quo, data resources constrain the theories and subjects CSS can be applied to.","tag":"nostat","tier":"primary","parent_id":null,"note":"Identifies a gap/problem in the current state — data constraints limit CSS scope.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":12,"text":"LLMs have the potential to remove these constraints.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance and relevance of LLMs as a solution to the identified gap in [11].","cars_move":"M2","cars_step":"2C","move_note":"Frames the gap resolution as an open potential, bridging M2 and M3."},{"id":13,"text":"Recent LLMs have demonstrated the striking ability to reliably classify text, summarize documents, answer questions, and generate interpretable explanations in a variety of domains, even exceeding human performance without the need for supervision (Bang et al. 2023; Qin et al. 2023; Zhuo et al. 2023; Goyal, Li, and Durrett 2022).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports prior findings about LLM capabilities across domains with multiple citations.","cars_move":"M1","cars_step":"1C","move_note":"Interlaced M1: reports prior work on LLM capabilities to further establish the territory before the final M3 block."},{"id":14,"text":"If LLMs can similarly provide reliable labels and summary codes through zero-shot prompting, CSS research can be broadened to a wider range of hypotheses than current tools and data resources support.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance of LLMs' potential for CSS — establishes that the research question is worth pursuing. Functions independently to motivate the study rather than merely extending [13] speculatively.","cars_move":"M2","cars_step":"2C","move_note":null},{"id":15,"text":"Zero-shot viability in this space is our primary research question.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the primary research question of the paper.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":16,"text":"To effectively harness the power of LLMs, behavioral researchers should understand the pros and cons of different modeling decisions (model-selection), as well as how these decisions intersect with their fields of specialization (domain-utility) and downstream use-cases (functionality).","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the scope of the paper's investigation by naming the specific analytical dimensions (model-selection, domain-utility, functionality) that correspond to RQ2–RQ4.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":17,"text":"By evaluating LLMs on an extensive suite of CSS tasks, this work provides researchers a roadmap with answers to the following research questions:","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the paper's approach and its practical output for researchers.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":18,"text":"(RQ1) Viability: Are LLMs able to augment the human annotation pipeline?","tag":"contribution","tier":"primary","parent_id":null,"note":"States the first formal research question addressed by the paper.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":19,"text":"Can they match or exceed the reliability of human annotation?","tag":"extension:definitional","tier":"secondary","parent_id":18,"note":"Unpacks and specifies what \"viability\" means in RQ1 stated in [18]. No independent primary rhetorical function; parent [18] is contribution (primary), satisfying the subordination rule.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":20,"text":"(RQ2) Model-Selection: How do different aspects of LLMs (e.g., model size, pretraining) affect their performances on CSS tasks?","tag":"contribution","tier":"primary","parent_id":null,"note":"States RQ2.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":21,"text":"(RQ3) Domain-Utility: Are zero-shot LLMs specially adapted for better results in some fields of science rather than others?","tag":"contribution","tier":"primary","parent_id":null,"note":"States RQ3.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":22,"text":"(RQ4) Functionality: Are zero-shot LLMs equipped to assist with labeling tasks (classification) or summary-explanatory tasks (generation), or both?","tag":"contribution","tier":"primary","parent_id":null,"note":"States RQ4.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":23,"text":"The research pipeline in Figure 1 allows us to answer these questions.","tag":"contribution","tier":"primary","parent_id":null,"note":"Points to the paper's methodological structure as the means of addressing the RQs.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":24,"text":"First, we survey the social science literature to understand where LLMs could serve as analytical tools (Section 2).","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes paper structure and method — first step of the pipeline.","cars_move":"M3","cars_step":"3D","move_note":null},{"id":25,"text":"Then we operationalize each use-case with a set of representative tasks (Section 3).","tag":"contribution","tier":"primary","parent_id":null,"note":"Continues describing paper structure — second step.","cars_move":"M3","cars_step":"3D","move_note":null},{"id":26,"text":"Specifically, classification and parsing methods can help researchers code for linguistic, psychological, and cultural categories (Section 3.1–Section 3.3) while generative models can explain underlying constructs (e.g., figurative language, emotional reactions, hate speech, and misinformation), and restructure text according to established theories like cognitive behavioral therapy (Section 3.4).","tag":"contribution","tier":"primary","parent_id":null,"note":"Elaborates the scope and structure of tasks covered in the paper.","cars_move":"M3","cars_step":"3D","move_note":null},{"id":27,"text":"With a final evaluation suite of 24 tasks, we test the zero-shot performance of 13 language models with differing architectures, sizes, pre-training, and fine-tuning paradigms (Section 5, Section 6).","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the scale and design of the evaluation component of the paper.","cars_move":"M3","cars_step":"3D","move_note":null},{"id":28,"text":"This allows us to suggest actionable steps for social scientists interested in co-opting LLMs for research (Section 7).","tag":"contribution","tier":"primary","parent_id":null,"note":"States the practical output and downstream implication of the paper's evaluation.","cars_move":"M3","cars_step":"3D","move_note":null},{"id":29,"text":"Specifically, we suggest a blended supervised-unsupervised scheme for human–AI partnered labeling and content analysis.","tag":"contribution","tier":"primary","parent_id":null,"note":"Specifies the paper's concrete recommendation more precisely than [28].","cars_move":"M3","cars_step":"3C","move_note":null},{"id":30,"text":"Concretely, our analysis reveals that, except in minority cases, prompted LLMs do not match or exceed the performance of carefully fine-tuned classifiers, and the best LLM performance is often too low to entirely replace human annotation.","tag":"contribution","tier":"primary","parent_id":null,"note":"Previews the paper's own key finding about LLM classification limits — a summary of results stated in the introduction as a roadmap.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":31,"text":"However, LLMs can achieve fair levels of agreement with humans on labeling tasks (RQ1).","tag":"contribution","tier":"primary","parent_id":null,"note":"Previews the positive finding addressing RQ1, contrasting with [30].","cars_move":"M3","cars_step":"3C","move_note":null},{"id":32,"text":"These results are not limited to a subset of academic fields, but rather span the social sciences across a range of conversation, utterance, and document-level classification tasks (RQ2).","tag":"contribution","tier":"primary","parent_id":null,"note":"Previews the finding addressing RQ2.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":33,"text":"Furthermore, the benefits of LLMs are compounded as models scale up (RQ3).","tag":"contribution","tier":"primary","parent_id":null,"note":"Previews the finding addressing RQ3.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":34,"text":"This suggests that LLMs can augment the annotation process through iterative joint-labeling, significantly speeding up and improving text analysis in the social sciences.","tag":"extension:speculative","tier":"secondary","parent_id":33,"note":"Extends the RQ3 finding in [33] into a broader practical implication without additional evidence presented at this point. Parent [33] is contribution (primary), satisfying the subordination rule.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":35,"text":"Importantly, some LLMs can also generate informative explanations for social science constructs.","tag":"contribution","tier":"primary","parent_id":null,"note":"Previews a key finding about generation tasks (RQ4).","cars_move":"M3","cars_step":"3C","move_note":null},{"id":36,"text":"Leading models can achieve parity with the quality of dataset references, and can even exceed them in terms of relevance, coherence, faithfulness, and fluency.","tag":"contribution","tier":"primary","parent_id":null,"note":"Provides additional detail on the generation finding previewed in [35].","cars_move":"M3","cars_step":"3C","move_note":null},{"id":37,"text":"Humans prefer model outputs 50% of the time, suggesting that human–AI collaboration will extend beyond labeling tasks to the joint coding of new constructs, analyses, and summaries.","tag":"contribution","tier":"primary","parent_id":null,"note":"Previews the empirical result on human preference and its implication for the paper's conclusions about human-AI collaboration.","cars_move":"M3","cars_step":"3C","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"}];
const DRAFT_IDS   = new Set(["tanzer_2yp"]);
const COLORS      = {"tempstat": "#4F86C6", "emph": "#D4883A", "contrast": "#C85252", "nostat": "#8960B8", "novstat": "#3FAD72", "contribution": "#2EA898", "framedef": "#B8901E", "extension:speculative": "#D4C4E8", "extension:definitional": "#C0D4E8", "extension:illustrative": "#C0DCC8", "link:opening": "#DDD4C4", "link:closing": "#C4C8D4"};
const LABELS      = {"tempstat": "tempstat", "emph": "emph", "contrast": "contrast", "nostat": "nostat", "novstat": "novstat", "contribution": "contribution", "framedef": "framedef", "extension:speculative": "ext·speculative", "extension:definitional": "ext·definitional", "extension:illustrative": "ext·illustrative", "link:opening": "link·opening", "link:closing": "link·closing"};
const PRIMARY     = ["tempstat", "emph", "contrast", "nostat", "novstat", "contribution", "framedef"];
const SECONDARY   = ["extension:speculative", "extension:definitional", "extension:illustrative", "link:opening", "link:closing"];
const MOVE_COLORS = {"M1": "#D4883A", "M2": "#8960B8", "M3": "#3FAD72"};
const MOVE_LABELS = {"M1": "Establishing Territory", "M2": "Establishing Niche", "M3": "Occupying Niche"};
const STEP_COLORS = {"1A": "#F5B870", "1B": "#D4883A", "1C": "#A86020", "2A": "#C0A0E0", "2B": "#8960B8", "2C": "#60409A", "2D": "#D8C8F0", "3A": "#80D4A0", "3B": "#3FAD72", "3C": "#248A50", "3D": "#106830"};

// ── State ──────────────────────────────────────────────────
let activePaper = null;
let legendOpen  = false;
let activeMode  = 'tag';

// ── Init ───────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  buildLegend();
  buildSelectors();

  document.getElementById('legendToggle').addEventListener('click', () => {
    legendOpen = !legendOpen;
    document.getElementById('legend').classList.toggle('visible', legendOpen);
  });

  // Default: first draft if any, else first corpus paper
  const firstDraft = PAPERS.findIndex(p => DRAFT_IDS.has(p.paper.id));
  if (firstDraft !== -1) {
    document.getElementById('draftSelect').value = firstDraft;
    document.getElementById('draftSelect').classList.add('has-selection');
    selectPaper(firstDraft);
  } else if (PAPERS.length > 0) {
    document.getElementById('corpusSelect').value = 0;
    document.getElementById('corpusSelect').classList.add('has-selection');
    selectPaper(0);
  }
});

// ── Mode ───────────────────────────────────────────────────
function setMode(mode) {
  activeMode = mode;
  document.getElementById('modeTag').classList.toggle('active',  mode === 'tag');
  document.getElementById('modeMove').classList.toggle('active', mode === 'move');
  if (mode === 'move') {
    legendOpen = false;
    document.getElementById('legend').classList.remove('visible');
  }
  renderPaper(activePaper);
}

// ── Legend ─────────────────────────────────────────────────
function buildLegend() {
  const el = document.getElementById('legend');
  let html = '<div class="legend-section-label">Primary</div>';
  for (const tag of PRIMARY)   html += legendItem(tag);
  html += '<div class="legend-section-label">Secondary</div>';
  for (const tag of SECONDARY) html += legendItem(tag);
  el.innerHTML = html;
}

function legendItem(tag) {
  return `<div class="legend-item">
    <span class="legend-chip" style="background:${COLORS[tag] || '#CCC'}"></span>
    <span class="legend-label">${LABELS[tag] || tag}</span>
  </div>`;
}

// ── Selectors ──────────────────────────────────────────────
function buildSelectors() {
  const draftSel  = document.getElementById('draftSelect');
  const corpusSel = document.getElementById('corpusSelect');
  PAPERS.forEach((p, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = shortTitle(p.paper);
    if (DRAFT_IDS.has(p.paper.id)) draftSel.appendChild(opt);
    else                            corpusSel.appendChild(opt);
  });
}

function shortTitle(meta) {
  const author = meta.authors ? meta.authors[0].split(',')[0] : meta.id;
  const year   = meta.year   ? ` (${meta.year})` : '';
  return `${author}${year}`;
}

function selectFromDraft(val) {
  if (val === '') return;
  const corpusSel = document.getElementById('corpusSelect');
  corpusSel.value = '';
  corpusSel.classList.remove('has-selection');
  document.getElementById('draftSelect').classList.add('has-selection');
  selectPaper(parseInt(val, 10));
}

function selectFromCorpus(val) {
  if (val === '') return;
  const draftSel = document.getElementById('draftSelect');
  draftSel.value = '';
  draftSel.classList.remove('has-selection');
  document.getElementById('corpusSelect').classList.add('has-selection');
  selectPaper(parseInt(val, 10));
}

function selectPaper(i) {
  activePaper = i;
  renderPaper(i);
}

// ── Paper render ───────────────────────────────────────────
function renderPaper(i) {
  const paper = PAPERS[i];
  if (!paper) return;
  const el = document.getElementById('ribbon');

  const meta    = paper.paper;
  const authStr = meta.authors ? meta.authors.join(', ') : '';

  let html = `<div class="paper-meta">
    <h2>${esc(meta.title)}</h2>
    <div class="authors">${esc(authStr)} &middot; ${meta.year}</div>
  </div>`;

  if (activeMode === 'move') {
    html += renderMoveMode(paper);
  } else {
    for (const s of paper.sentences) html += renderRow(s);
  }

  el.innerHTML = html;
}

// ── Tag mode ───────────────────────────────────────────────
function renderRow(s) {
  const tag     = s.tag || 'unknown';
  const tier    = s.tier || (PRIMARY.includes(tag) ? 'primary' : 'secondary');
  const color   = COLORS[tag] || '#CCC';
  const label   = LABELS[tag] || tag;
  const isSec   = tier === 'secondary';

  const noteHtml = s.note
    ? `<div class="sentence-note">${esc(s.note)}</div>` : '';

  return `<div class="${isSec ? 'sentence-row is-secondary' : 'sentence-row'}">
    <span class="sentence-num">${s.id}</span>
    <span class="${isSec ? 'tag-chip is-secondary' : 'tag-chip is-primary'}"
          style="background:${color}">${esc(label)}</span>
    <div class="sentence-body">
      <div class="sentence-text">${esc(s.text)}</div>
      ${noteHtml}
    </div>
  </div>`;
}

// ── Move mode ──────────────────────────────────────────────
function hasCarsData(paper) {
  return paper.sentences.some(s => s.cars_move);
}

function computeArcSegments(sentences) {
  const segs = [];
  let cur = null;
  for (const s of sentences) {
    if (!s.cars_move) continue;
    if (!cur || s.cars_move !== cur.move) {
      cur = { move: s.cars_move, sentences: [s] };
      segs.push(cur);
    } else {
      cur.sentences.push(s);
    }
  }
  return segs;
}

function renderMoveMode(paper) {
  if (!hasCarsData(paper)) {
    return `<div class="move-pending">CARS annotation not yet available for this paper.</div>`;
  }
  const segs  = computeArcSegments(paper.sentences);
  const total = paper.sentences.filter(s => s.cars_move).length;
  return [
    renderArcSummary(paper.arc_summary),
    renderArcFormula(paper),
    renderArcStrips(segs, total, paper.move_roles || null),
    renderMoveStats(segs, total),
  ].join('');
}

function renderMd(text) {
  if (!text) return '';
  let s = esc(text);
  s = s.replace(/[*][*]([^*]+)[*][*]/g, '<strong>$1</strong>');
  return s;
}

function renderArcSummary(text) {
  if (!text) return '';
  return `<div class="arc-summary">${renderMd(text)}</div>`;
}

function renderArcFormula(paper) {
  const roles = paper.move_roles;
  if (roles && roles.length) {
    const html = roles.map((r, i) => {
      const color = MOVE_COLORS[r.move] || '#CCC';
      const tip   = `${r.move} · S${r.span[0]}–${r.span[1]}
${r.role}`;
      const arrow = i < roles.length - 1 ? `<span class="arc-arrow">&#8594;</span>` : '';
      return `<span class="arc-pill" style="background:${color}" data-tip="${esc(tip)}">${esc(r.move)}</span>${arrow}`;
    }).join('');
    return `<div class="arc-formula">${html}</div>`;
  }
  const formula = paper.structured_arc;
  if (!formula) return '';
  const parts = formula.split(' -> ');
  const html = parts.map((m, i) => {
    const color = MOVE_COLORS[m] || '#CCC';
    const arrow = i < parts.length - 1 ? `<span class="arc-arrow">&#8594;</span>` : '';
    return `<span class="arc-pill" style="background:${color}">${esc(m)}</span>${arrow}`;
  }).join('');
  return `<div class="arc-formula">${html}</div>`;
}

function renderArcStrips(segs, total, roles) {
  const moveStrip = segs.map((seg, i) => {
    const w     = (seg.sentences.length / total * 100).toFixed(2);
    const color = MOVE_COLORS[seg.move] || '#CCC';
    const label = seg.sentences.length / total > 0.08 ? seg.move : '';
    const role  = roles && roles[i];
    const tip   = role
      ? `${seg.move} · S${role.span[0]}–${role.span[1]}
${role.role}`
      : `${seg.move}: ${seg.sentences.length} sentence${seg.sentences.length > 1 ? 's' : ''}`;
    return `<div class="move-segment" style="width:${w}%;background:${color}" data-tip="${esc(tip)}">
              <span class="move-segment-label">${esc(label)}</span>
            </div>`;
  }).join('');

  const stepTicks = segs.flatMap(seg =>
    seg.sentences.map(s => {
      const w    = (1 / total * 100).toFixed(3);
      const color = STEP_COLORS[s.cars_step] || MOVE_COLORS[s.cars_move] || '#CCC';
      const tip  = `#${s.id} · ${s.tag || ''} · ${s.cars_move}/${s.cars_step || '?'}
${s.text || ''}`;
      return `<div class="step-tick" style="width:${w}%;background:${color}" data-tip="${esc(tip)}"></div>`;
    })
  ).join('');

  return `<div class="arc-strips">
    <div class="move-strip">${moveStrip}</div>
    <div class="step-strip">${stepTicks}</div>
  </div>`;
}

function renderMoveStats(segs, total) {
  const order  = ['M1', 'M2', 'M3'];
  const byMove = {};
  for (const seg of segs) {
    if (!byMove[seg.move]) byMove[seg.move] = { sentences: [], steps: {} };
    byMove[seg.move].sentences.push(...seg.sentences);
    for (const s of seg.sentences) {
      if (s.cars_step) {
        byMove[seg.move].steps[s.cars_step] =
          (byMove[seg.move].steps[s.cars_step] || 0) + 1;
      }
    }
  }

  const cards = order.filter(m => byMove[m]).map(m => {
    const data  = byMove[m];
    const color = MOVE_COLORS[m] || '#CCC';
    const pct   = Math.round(data.sentences.length / total * 100);
    const chips = Object.entries(data.steps)
      .sort((a, b) => a[0].localeCompare(b[0]))
      .map(([step, count]) => {
        const sc = STEP_COLORS[step] || color;
        return `<span class="step-chip" style="background:${sc}">${esc(step)} &times;${count}</span>`;
      }).join('');
    return `<div class="move-stat-card" style="border-left-color:${color}">
      <div class="stat-move" style="color:${color}">${esc(m)} &mdash; ${esc(MOVE_LABELS[m] || '')}</div>
      <div class="stat-count">${data.sentences.length} sentences &middot; ${pct}%</div>
      <div class="stat-steps">${chips}</div>
    </div>`;
  }).join('');

  return `<div class="move-stats">${cards}</div>`;
}

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Floating tooltip ───────────────────────────────────────
const tipEl = document.getElementById('tip');

document.addEventListener('mouseover', e => {
  const t = e.target.closest('[data-tip]');
  if (!t) { tipEl.style.display = 'none'; return; }
  tipEl.textContent = t.dataset.tip;
  tipEl.style.display = 'block';
});

document.addEventListener('mousemove', e => {
  if (tipEl.style.display === 'none') return;
  const x = e.clientX + 14;
  const y = e.clientY + 14;
  const r = tipEl.getBoundingClientRect();
  tipEl.style.left = (x + r.width  > window.innerWidth  ? e.clientX - r.width  - 8 : x) + 'px';
  tipEl.style.top  = (y + r.height > window.innerHeight ? e.clientY - r.height - 8 : y) + 'px';
});

document.addEventListener('mouseout', e => {
  if (!e.relatedTarget || !e.relatedTarget.closest('[data-tip]')) {
    tipEl.style.display = 'none';
  }
});
</script>
