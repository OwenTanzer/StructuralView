an experiment to estimate β̂.","tag":"extension:definitional","tier":"secondary","parent_id":33,"note":"Introduces formal notation and sets up the definitional framework for the tasks described in [33]. This is notational/definitional setup rather than an illustrative example. Parent is [33], a primary contribution. Legal parent chain.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":36,"text":"We describe the scenario and the experiment to the LLM and ask it to independently predict yi given a particular Xi (a 'predict-yi' task).","tag":"extension:definitional","tier":"secondary","parent_id":null,"note":"Defines the predict-yi task. Parent is [33], a primary contribution. Legal parent chain.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":37,"text":"Separately, we ask it to predict β̂ (a 'predict-β̂' task).","tag":"extension:definitional","tier":"secondary","parent_id":null,"note":"Defines the second task. Parent is [33], a primary contribution. Legal parent chain.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":38,"text":"Later, we examine how the LLM does on the predict-yi task when it has access to the fitted structural causal model (i.e., β̂).","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces a third analytical component of the paper.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":39,"text":"In the predict-yi task, we prompt the LLM to predict the outcome yi given each possible combination of the Xi's from the auction experiment.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes a specific methodological step in the predict-yi task.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":40,"text":"Direct elicitation of the predictions for yi in the auction experiment is wildly inaccurate.","tag":"contribution","tier":"primary","parent_id":null,"note":"Reports a key finding about LLM direct elicitation performance.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":41,"text":"The predictions are even further from the theory than the empirical results.","tag":"extension:definitional","tier":"secondary","parent_id":40,"note":"Further characterizes/unpacks the meaning of \"wildly inaccurate\" from [40], a primary contribution. Not an illustrative example but an elaboration of degree. Legal parent chain.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":42,"text":"In the predict-β̂ task, the LLM is asked to predict the fitted structural causal model's path estimates for all four experiments, provided with contextual information about each scenario.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the second task's design.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":43,"text":"On average, the LLM predicts the path estimates are 13.2 times larger than the experimental results.","tag":"contribution","tier":"primary","parent_id":null,"note":"Reports a specific quantitative finding from the predict-β̂ task.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":44,"text":"Its predictions are overestimates for 10 out of 12 of the paths, although they are generally in the correct direction.","tag":"extension:definitional","tier":"secondary","parent_id":null,"note":"Further unpacks/characterizes the finding in [43], a primary contribution — adding directional nuance to the overestimation finding. Not an example; extension:definitional fits. Legal parent chain.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":45,"text":"We repeat the predict-yi task, but this time, we provide the LLM with the experimental path estimates.","tag":"contribution","tier":"primary","parent_id":null,"note":"Introduces a third task/condition.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":46,"text":"For each Xi, we fit the structural causal model using all but the ith observation and then ask the LLM to predict yi given Xi and this fitted model.","tag":"extension:definitional","tier":"secondary","parent_id":45,"note":"Defines the predict-yi|β̂−i task introduced in [45], a primary contribution. Legal parent chain.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":47,"text":"In this 'predict-yi|β̂−i' task, the predictions are far better than in the predict-yi task without the fitted model.","tag":"contribution","tier":"primary","parent_id":null,"note":"Reports the key finding from the third task.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":48,"text":"The mean squared error is six times lower, and the predictions are much closer to those made by the theory, but they are still further from the theory than they are to the simulations.","tag":"extension:definitional","tier":"secondary","parent_id":null,"note":"Quantifies and unpacks the finding in [47], a primary contribution — elaborating what \"far better\" means numerically. Not an illustrative example; extension:definitional fits. Legal parent chain.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":49,"text":"We design and implement an approach to automated social science because LLMs possess latent information about human behavior that can be systematically explored and extracted (Burns et al., 2023; Scherrer et al., 2024).","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the motivating premise of the work — that LLMs contain latent information worth extracting — with citation support. Functions to establish significance/relevance of the approach.","cars_move":"M1","cars_step":"1B","move_note":"Late M1 cycle; re-establishes motivating territory after extended M3 findings block."},{"id":50,"text":"These models are trained to predict the next token in a sequence of text from a massive human-generated corpus.","tag":"extension:definitional","tier":"secondary","parent_id":49,"note":"Explains the mechanism behind the claim in [49], a primary emph. Legal parent chain.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":51,"text":"From this straightforward objective, the models develop a remarkably sophisticated model of the world, at least as captured in text (Bubeck et al., 2023; Gurnee and Tegmark, 2023; Patel and Pavlick, 2021).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports cited findings about LLM world model capabilities.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":52,"text":"And while there are many situations where LLMs are imperfect proxies for humans (Cheng et al., 2023; Santurkar et al., 2023), there is also a growing body of work demonstrating that experiments with LLMs as subjects can predict human behavior in never-before-seen tasks (Binz and Schulz, 2023a; Li et al., 2024).","tag":"contrast","tier":"primary","parent_id":null,"note":"Acknowledges limitations of LLMs as human proxies while pivoting to supporting evidence — a two-sided tempstat with a contrastive structure that ultimately supports the paper's motivation.","cars_move":"M2","cars_step":"2A","move_note":"Counter-claiming/concessive move acknowledging limitations before final M3; interlaced late M2 within cycling structure."},{"id":53,"text":"Rapid and automated exploration of these models' behavior could be a powerful tool to efficiently generate new insights about humans.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the potential significance and value of the approach being proposed.","cars_move":"M1","cars_step":"1A","move_note":"Centrality claim bridging back to final M3 contribution statement."},{"id":54,"text":"Our contribution is to demonstrate that it is possible to create such a tool: a system that can simulate the entire social scientific process without human input at any step.","tag":"novstat","tier":"primary","parent_id":null,"note":"Explicitly claims the paper's contribution and novelty.","cars_move":"M3","cars_step":"3A","move_note":"Final M3 occupation following late M1/M2 cycling block."},{"id":55,"text":"The remainder of this paper is structured as follows: Section 2 provides an overview of the system. Section 3 provides some results generated using our system. Section 4 explores an LLM's capacity to predict the results in Section 3. Section 5 discusses the advantages of using SCMs over other methods for studying causal relationships in simulations of social interactions. The paper concludes in Section 6.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the structure of the paper.","cars_move":"M3","cars_step":"3D","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"mednick_1962","title":"mednick 1962","authors":["Mednick"],"year":1962,"section":"Introduction"},"arc_summary":"This introduction is **structurally inverted**: it opens with a full M3 announcement (sentences 1–3) before stepping back to build M1 territory through biographical and introspective evidence. The **M1 block is entirely retrospective justification**, assembled after the contribution is already on record. A single embedded **M2 moment** (sentence 22) briefly concedes a measurement problem, only to be immediately absorbed into a methodological scoping claim. The paper closes by situating its associative definition within British associationist lineage — using historical precedent as warrant rather than gap.","structured_arc":"M3 -> M1 -> M3","move_roles":[{"move":"M3","span":[1,3],"role":"Opens the paper with a full announcement of purpose, scope, and structure — claiming the contribution before any territory has been established."},{"move":"M1","span":[4,14],"role":"Builds retrospective justification for the contribution already announced, surveying cross-domain introspective accounts of creativity to ground the associative definition in observed patterns."},{"move":"M3","span":[15,21],"role":"Delivers the paper's core theoretical object — the formal associative definition of creative thinking — and sharpens it by distinguishing creativity from mere originality."},{"move":"M2","span":[22,22],"role":"Briefly acknowledges that the usefulness criterion in the definition is difficult to apply reliably across creative fields, creating a momentary niche before the paper scopes its own resolution."},{"move":"M3","span":[23,26],"role":"Closes by delimiting the methodological scope of the current research, operationalizing originality, and situating the framework within the British associationist tradition as historical legitimation."}],"sentences":[{"id":1,"text":"The intent of this paper is the presentation of an associative interpretation of the process of creative thinking.","tag":"contribution","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3A","move_note":"M3-first opening; paper announces its purpose before establishing territory."},{"id":2,"text":"The explanation is not directed to any specific field of application such as art or science but attempts to delineate processes that underlie all creative thought.","tag":"extension:definitional","tier":"secondary","parent_id":null,"note":"Elaborates the scope of the contribution announced in [1].","cars_move":"M3","cars_step":"3A","move_note":null},{"id":3,"text":"The discussion will take the following form, (a) First, we will define creative thinking in associative terms and indicate three ways in which creative solutions may be achieved—serendipity, similarity, and mediation, (b) This definition will allow us to deduce those individual difference variables which will facilitate creative performance, (c) Consideration of the definition of the creative process has suggested an operational statement of the definition in the form of a test. The test will be briefly described along with some preliminary research results. (d) The paper will conclude with a discussion of predictions regarding the influence of certain experimentally manipulable variables upon the creative process.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the structure and scope of the paper across four sub-goals.","cars_move":"M3","cars_step":"3D","move_note":null},{"id":4,"text":"Creative individuals and the processes by which they manifest their creativity have excited a good deal of interest and curiosity.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance and broad appeal of the topic of creativity research.","cars_move":"M1","cars_step":"1A","move_note":"Paper steps back to M1 territory-establishment after the initial M3 opening."},{"id":5,"text":"There are extended analyses of novels and novelists, poems and poets, mathematics and mathematicians, both biographical and autobiographical.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the existing body of work on creative individuals across domains.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":6,"text":"Perusal of the introspections of manifestly creative individuals uncovers a surprising vein of similarity in the processes they describe (Ghiselin, 1952).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a citation-backed finding — cross-domain similarity in creative introspection.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":7,"text":"Thus we find Albert Einstein's self-searching to suggest that 'The psychical entities which seem to serve as elements in thought are certain signs and more or less clear images which can be combined . . . This combinatory play seems to be the essential feature in productive thought.'","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Illustrates the cross-domain similarity in creative introspection claimed in [6].","cars_move":"M1","cars_step":"1C","move_note":null},{"id":8,"text":"Samuel Taylor Coleridge is described as having developed his ideas in the following manner: 'Facts which sank at intervals out of conscious recollection drew together beneath the surface through the almost chemical affinities of common elements.'","tag":"extension:illustrative","tier":"secondary","parent_id":6,"note":"Second illustrative example of the similarity in creative introspective accounts; re-parents to [6] (tempstat), skipping [7] (secondary).","cars_move":"M1","cars_step":"1C","move_note":null},{"id":9,"text":"In the field of art, we find Andre Breton referring to a collage by Ernst as being distinguished by a 'marvelous capacity to grasp two mutually distant realities without going beyond the field of our experience and to draw a spark from the juxtaposition.'","tag":"extension:illustrative","tier":"secondary","parent_id":6,"note":"Third illustrative example of the cross-domain pattern; re-parents to [6].","cars_move":"M1","cars_step":"1C","move_note":null},{"id":10,"text":"Most explicit, however, is the oft-quoted statement by the mathematician, Poincare, who talks about an evening when 'ideas rose in crowds; I felt them collide until pairs interlocked so to speak, making a stable combination. By next morning I had established the existence of a class of Fuchsian functions.'","tag":"extension:illustrative","tier":"secondary","parent_id":6,"note":"Fourth illustrative example of creative introspection; re-parents to [6].","cars_move":"M1","cars_step":"1C","move_note":null},{"id":11,"text":"From these experiences, Poincare felt that he could state that 'to create consists of making new combinations of associative elements which are useful.'","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports Poincaré's explicit theoretical conclusion drawn from his own experience; a named-source claim about the nature of creativity. Serves as a new primary parent for what follows.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":12,"text":"The mathematical facts worthy of being studied . . . are those which reveal to us unsuspected kinships between other facts well known but wrongly believed to be strangers to one another.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Continues reporting Poincaré's stated theoretical position with substantive content about mathematical creativity; elevated from extension:illustrative because [11] was itself secondary in the original (now corrected to tempstat), and this sentence carries independent reportable content attributable to a named source.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":13,"text":"Among chosen combinations the most fertile will often be those formed of elements drawn from domains which are far apart.","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Continues the Poincaré quotation, further specifying the key claim; parents to [12] (tempstat).","cars_move":"M1","cars_step":"1C","move_note":null},{"id":14,"text":"An exceptionally compelling illustration of a useful combination of elements 'drawn from domains which are far apart' occurs in a line from the poem, 'The Monkey Puzzle' by Marianne Moore (1951), 'The lion's ferocious chrysanthemum head.'","tag":"emph","tier":"primary","parent_id":null,"note":"Elevated from extension:illustrative because [13] is secondary and cannot parent a secondary sentence. The sentence independently asserts the existence and salience of a concrete case, making a primary claim about the relevance of a named example.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":15,"text":"We will state our basic hypothesis regarding the nature of creative thinking in the form of a definition.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the imminent formal definition that constitutes the paper's core theoretical move.","cars_move":"M3","cars_step":"3A","move_note":"Return to M3 after extended M1 territory block."},{"id":16,"text":"With these introspective statements serving as background, we may proceed to define the creative thinking process as the forming of associative elements into new combinations which either meet specified requirements or are in some way useful.","tag":"framedef","tier":"primary","parent_id":null,"note":"Introduces the paper's central theoretical definition of creative thinking as a new conceptual object to be used throughout.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":17,"text":"The more mutually remote the elements of the new combination, the more creative the process or solution.","tag":"extension:definitional","tier":"secondary","parent_id":16,"note":"Unpacks a key dimension of the definition introduced in [16].","cars_move":"M3","cars_step":"3A","move_note":null},{"id":18,"text":"An additional criterion of the level of creativeness of a product is described below.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces that a further criterion will be presented later in the paper; forward-scoping claim about paper content.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":19,"text":"Creative thinking as defined here is distinguished from original thinking by the imposition of requirements on originality.","tag":"framedef","tier":"primary","parent_id":null,"note":"Introduces a conceptual distinction between creative and original thinking that is foundational to the paper's framework.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":20,"text":"Thus, 7,363,474 is quite an original answer to the problem 'How much is 12 + 12?' However, it is only when conditions are such that this answer is useful that we can also call it creative.","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Illustrates the distinction between originality and creativity established in [19].","cars_move":"M3","cars_step":"3B","move_note":null},{"id":21,"text":"There are many original ideas expressed in institutions for the mentally ill and mentally retarded; few of these are likely to be creative.","tag":"emph","tier":"primary","parent_id":null,"note":"Elevated from extension:illustrative because [20] is secondary and cannot parent a secondary sentence. The sentence independently asserts a real-world pattern to reinforce the originality/creativity distinction — fits emph as a claim about a phenomenon that is real and worth attending to.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":22,"text":"There are many fields of creative endeavor in which the usefulness of products would be difficult to measure reliably.","tag":"contrast","tier":"primary","parent_id":null,"note":"Acknowledges a limitation of the usefulness criterion within the proposed definition.","cars_move":"M2","cars_step":"2B","move_note":"Brief M2 moment embedded within M3 block; acknowledges a gap/limitation in the proposed framework before the methodological scope is announced."},{"id":23,"text":"While these difficulties must eventually be faced, for the present our research efforts have been concentrated on laboratory situations in which criteria for usefulness can be arbitrarily experimenter-defined and unequivocally explained to the subject.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the methodological scope of the current work in response to the limitation acknowledged in [22].","cars_move":"M3","cars_step":"3A","move_note":"Return to M3 after brief M2 gap acknowledgment; M2->M3 micro-cycle."},{"id":24,"text":"The originality of a response is simply inversely related to its probability in a given population.","tag":"framedef","tier":"primary","parent_id":null,"note":"Introduces a formal operational definition of originality as a conceptual tool for the framework.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":25,"text":"It should be pointed out that this definition of creativity is quite similar to basic notions advanced by British associationists from Locke (1690) to Bain (1855), and by those psychologists whose work is based in large measure on their speculations.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Situates the paper's definition within a historical lineage of associationist thought.","cars_move":"M3","cars_step":"3B","move_note":"Contextualizes the contribution by relating it to prior tradition; functions as justification for the framework."},{"id":26,"text":"Freud (1938), Hollingsworth (1928), and Binet (1899) may serve as examples.","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Names specific exemplars of the prior tradition referenced in [25]; parents to [25] (tempstat).","cars_move":"M3","cars_step":"3B","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"meister_2021","title":"meister 2021","authors":["Meister"],"year":2021,"section":"Introduction"},"arc_summary":"The introduction commits three sentences to establishing the probing literature before a **single-sentence niche** (S4) flags scope restriction as the gap. The **M3 block dominates** (S5–S13), doing triple work: announcing the research question, justifying the macro-level framework against standard probing, and previewing findings. The extended justification sub-block (S7–S10) is the structural center of gravity, positioning the empirical-baseline approach as epistemically superior. The arc is **clean and asymmetric** — brief M1, minimal M2, long M3 — signaling a paper confident in its niche and focused on selling its framework.","structured_arc":"M1 -> M2 -> M3","move_roles":[{"move":"M1","span":[1,3],"role":"Establishes the research territory by tracing a causal chain: model improvements prompted new evaluation practices, which gave rise to the probing literature — framing the field's trajectory as the backdrop for the paper's intervention."},{"move":"M2","span":[4,4],"role":"Opens a niche by identifying the scope limitation of existing probing work — its restriction to sentence-level phenomena — creating the opening for a macro-level alternative."},{"move":"M3","span":[5,13],"role":"Occupies the niche across three sub-phases: announces the study's purpose and sharpens the central research question (S5–S6), justifies the macro-level empirical framework and argues for its epistemic advantages over standard probing (S7–S10), then anchors the occupation with a concrete methodological description, key findings preview, and a closing significance claim (S11–S13)."}],"sentences":[{"id":1,"text":"Neural language models have become shockingly good at modeling natural language data in recent years.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1B","move_note":null},{"id":2,"text":"Thus, to test just how well neural language models capture language NLP researchers have started to look beyond standard evaluation metrics such as perplexity, endeavoring to understand which underlying attributes of human language these models are learning.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the current state of the field's evaluative practices in response to model improvements.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":3,"text":"To this end, a nascent literature has emerged that focuses on probing language models, i.e., determining whether models encode linguistic phenomena.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":4,"text":"For the most part, these works have been limited to analyses of sentence-level phenomenon, such as subject–verb agreement and garden path effects among a myriad of other properties.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a limitation of prior probing work — scope restricted to sentence-level phenomena.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":5,"text":"In this work, we attempt to understand which macro-level phenomena of human language today's language models reflect.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the scope and purpose of the present paper.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":6,"text":"That is, we pose the question: Do neural language models exhibit the statistical tendencies of human language?","tag":"contribution","tier":"primary","parent_id":null,"note":"Sharpens the research question driving the paper; narrows and elaborates the contribution announced in [5].","cars_move":"M3","cars_step":"3A","move_note":null},{"id":7,"text":"Phenomena that can be measured at this level provide an alternate view of a model's comprehension; for example, rather than exploring whether morphological agreement is captured, we look at whether our models learn the trends across a corpus as a whole, e.g., the token rank–frequency (Zipf's) relationship.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the value and significance of macro-level statistical phenomena as a lens on model comprehension; the example is embedded but the sentence's primary job is emphatic.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":8,"text":"In comparison to standard probing techniques, this framework does not require we know a priori how linguistic phenomena should manifest themselves.","tag":"contrast","tier":"primary","parent_id":null,"note":"Positions the proposed framework favorably against existing probing approaches by identifying a limitation of the latter.","cars_move":"M3","cars_step":"3B","move_note":"Contrast used within M3 to justify the framework rather than to establish a niche; rhetorical function is justification of the announced approach."},{"id":9,"text":"That is, when there is no law stating the theoretical tendencies of an attribute of natural language or we have reason to believe our language domain does not follow such a law, we can use the statistical tendencies present in empirical data as our baseline.","tag":"extension:definitional","tier":"secondary","parent_id":8,"note":"Unpacks the practical meaning of the contrast claim in [8]; parent [8] is primary (contrast). Chain is legal.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":10,"text":"This characteristic both allows us to assess a model's fit to highly corpus-dependent distributions—like the length distribution—and mitigates the biases introduced by our own preconceptions regarding properties of natural language.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance and dual benefit of the empirical baseline approach; functions as an independent primary claim about the value of this framework property.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":11,"text":"More concretely, our paper describes an experimental design and accompanying hypothesis tests to determine precisely whether text generated from language models follows the same empirical trends as human language.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the concrete methodological contribution of the paper.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":12,"text":"Our experiments reveal that adherence to natural language tendencies varies widely with both model architecture and generation strategy, e.g., Fig. 1 shows varying degrees of adherence to the empirical type–token relationship, an artifact that perplexity alone could not reveal.","tag":"contribution","tier":"primary","parent_id":null,"note":"Previews the key experimental findings; functions as a results-announcement within the Introduction that supports the paper's contribution claim.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":13,"text":"Our findings suggest this framework is a valuable tool for gaining a deeper understanding of where today's language models are succeeding and failing at capturing human language.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance and value of the proposed framework based on the findings previewed in [12].","cars_move":"M3","cars_step":"3C","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"misra_2022","title":"misra 2022","authors":["Misra"],"year":2022,"section":"Introduction"},"arc_summary":"The introduction is structurally lean: three sentences of territory, then an immediate pivot to contribution with **no explicit gap or niche claim**. The **absence of M2** is the defining feature — the paper treats the need for minicons as self-evident given the territory, not something requiring argument. M3 then does double duty, both announcing and elaborating the library before closing with a paper roadmap. The result is a tool-paper rhetoric that prioritizes description of the artifact over justification of its necessity.","structured_arc":"M1 -> M3","move_roles":[{"move":"M1","span":[1,3],"role":"Establishes the dual landscape of LM accessibility and BlackboxNLP analysis methods, naming the field the library is designed to serve and framing the context into which minicons will be inserted."},{"move":"M3","span":[4,11],"role":"Announces, describes, and roadmaps the minicons library — opening with the contribution claim, specifying its two analytical levels and technical basis, then previewing two case studies that demonstrate its use."}],"sentences":[{"id":1,"text":"Accessing and using pre-trained language models (LMs)—now a mainstay in modern NLP research—has become ever so convenient due to the advent of high-quality open source libraries such as transformers (Wolf et al., 2020), jiant (Pruksachatkun et al., 2020), etc.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1B","move_note":null},{"id":2,"text":"Parallel to the proliferation of newer pre-training methods and LM architectures is that of the development of analyses methods and diagnostic datasets which we collectively refer to here as the field of 'BlackboxNLP' (Alishahi et al., 2019).","tag":"framedef","tier":"primary","parent_id":null,"note":"The primary rhetorical work is introducing and naming 'BlackboxNLP' as a collective label the paper will use — \"which we collectively refer to here as.\"","cars_move":"M1","cars_step":"1B","move_note":null},{"id":3,"text":"One of the foundational goals of this field is to develop and understanding of exactly what is learned by these complex LM architectures as a result of pre-training, as well as how pre-trained models operate.","tag":"extension:definitional","tier":"secondary","parent_id":2,"note":"Unpacks the content and goals of the BlackboxNLP field named in [2]; parent [2] is primary (framedef). ✓","cars_move":"M1","cars_step":"1B","move_note":null},{"id":4,"text":"In this paper, we provide an implementation-level solution to conduct such analyses in the form of an open-source python library called minicons.","tag":"novstat","tier":"primary","parent_id":null,"note":"Claims novelty by announcing the library for the first time.","cars_move":"M3","cars_step":"3A","move_note":"M2 absent — paper transitions directly from territory (M1) to announcing the contribution without an explicit gap statement."},{"id":5,"text":"minicons builds on top of the transformers library (Wolf et al., 2020), and provides a standard API to perform behavioral and representational analyses of transformer (Vaswani et al., 2017) language models.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the technical basis and scope of the current paper's contribution.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":6,"text":"In particular, it contains methods that collectively support analyses at two levels, both of which are well established in current LM analysis and evaluation literature: (1) at the prediction level, by using LM's word prediction abilities to perform a range of analyses that target specific linguistic or reasoning ability without performing any supervised training/fine-tuning; and (2) at the representational level, where the goal is to characterize the information made available in the internal activations of a given model.","tag":"contribution","tier":"primary","parent_id":null,"note":"Specifies the two analytical levels the library supports, elaborating the paper's scope and method.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":7,"text":"Together, these methods make standard model analyses methods accessible to a wider audience.","tag":"link:closing","tier":"secondary","parent_id":6,"note":"Synthesizes the two-level description in [6]; parent [6] is primary (contribution). ✓","cars_move":"M3","cars_step":"3B","move_note":null},{"id":8,"text":"In what follows, we first provide an overview of minicons and its core modules.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the structure/organization of the paper.","cars_move":"M3","cars_step":"3D","move_note":null},{"id":9,"text":"We then apply it in two motivating case studies.","tag":"contribution","tier":"primary","parent_id":null,"note":"Continues the organizational roadmap of the paper.","cars_move":"M3","cars_step":"3D","move_note":null},{"id":10,"text":"First, we analyze the learning dynamics of the BERT architecture with respect to 67 different grammatical phenomena related to syntax, semantics, and morphology.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the first case study — scope and method of the current paper.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":11,"text":"Second, we use minicons to measure the extent to which the patterns in LMs' sequence probabilities align with human-like abductive commonsense reasoning, the task of providing the most plausible explanation given partial observations – shedding light on their capacity to make abductive inferences in a 'zero-shot' manner.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the second case study — scope and method of the current paper.","cars_move":"M3","cars_step":"3C","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"moon_2025","title":"moon 2025","authors":["Moon"],"year":2025,"section":"Introduction"},"arc_summary":"This introduction uses an unusual **early M3 announcement** (S6) to telegraph the paper's purpose before returning to extended M1/M2 territory-building — a rhetorical move that anchors the reader before the literature review unfolds. The M1 block accumulates a systematic body of evidence across S1–S16 and S24–S36, bracketing an M2 paradox-framing zone (S17–S23) that names the homogenization gap. **The literature review doubles as gap evidence**: each contrast pair (individual improvement / collective homogenization) tightens the M2 niche rather than simply surveying the field. M3 (S38–S51) is fully developed, introducing the **diversity-growth-rate metric**, justifying it against prior static approaches, and detailing a three-study design — leaving no structural loose ends.","structured_arc":"M1 -> M2 -> M3","move_roles":[{"move":"M1","span":[1,4],"role":"Establishes the broad territory of creativity and generative AI, positioning LLMs as a distinctive and versatile force in creative domains before any tension is introduced."},{"move":"M2","span":[5,5],"role":"Introduces the core individual-vs.-collective tension for the first time, planting the central paradox that will drive the paper's niche claim."},{"move":"M3","span":[6,6],"role":"Early purpose announcement — signals the paper's quantification goal before the literature review resumes, anchoring the reader to the study's aim amid the extended territory-building ahead."},{"move":"M1","span":[7,16],"role":"Surveys the LLM-vs.-human creativity literature in depth, compiling both supportive and limiting empirical findings to establish what is known about individual-level creative performance."},{"move":"M2","span":[17,23],"role":"Formally names and theorizes the homogenization gap, invoking algorithmic monoculture as a framework and articulating why individual enhancement and collective diversity can diverge — carving the unresolved niche."},{"move":"M1","span":[24,36],"role":"Marshals specific prior studies that each reproduce the individual-enhancement/collective-homogenization contrast, converting the literature review into cumulative evidence for the gap while simultaneously showing the gap remains unquantified."},{"move":"M2","span":[37,37],"role":"Closes the literature synthesis by characterizing prior support as only 'initial,' explicitly signaling that the quantification gap remains open and justifying the paper's intervention."},{"move":"M3","span":[38,51],"role":"Announces and justifies the diversity-growth-rate metric, positions it against prior static approaches, and details the three-study design, measurement approach, and methodological rationale — completing a fully developed occupancy of the niche."}],"sentences":[{"id":1,"text":"Creativity centers on generating new ideas, driving individual problem-solving, and societal progress.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Opening claim about creativity backed by multiple citations; reports established understanding of the field.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":2,"text":"The recent advent of generative Artificial Intelligence (AI) systems has significantly changed how people perceive and engage in creative processes.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a field-level development with citation support.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":3,"text":"These technologies are being used to assist human involvement in various creative areas once believed to be exclusive to human capabilities, including painting (e.g., DALL-E and Mid Journey), musical composition (e.g., Jukebox), and even video production (e.g., Sora).","tag":"extension:illustrative","tier":"secondary","parent_id":2,"note":"Provides concrete examples illustrating the prior claim about AI changing creative processes. Parent [2] is tempstat.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":4,"text":"Among these generative AI systems, Large Language Models (LLMs), such as ChatGPT, stand out for their versatility in supporting various creative processes.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a comparative finding about LLMs relative to other AI systems, with citation.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":5,"text":"While LLMs might be able to produce content that is as good as or even more creative than content generated by humans, their widespread use risks reducing the collective diversity of creative outputs.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a tension — LLM quality vs. homogenization risk — that frames the paper's central problem.","cars_move":"M2","cars_step":"2B","move_note":"First M2 sentence; introduces the core tension/gap that the paper addresses"},{"id":6,"text":"In the present research, we aimed to quantify this homogenizing effect of LLMs on collective diversity in creative outputs.","tag":"contribution","tier":"primary","parent_id":null,"note":"States the purpose of the current study.","cars_move":"M3","cars_step":"3A","move_note":"Early M3 announcement before extended M1/M2 review resumes; M2->M3 cycling pattern begins here"},{"id":7,"text":"How do LLMs such as ChatGPT compare to humans as creative entities?","tag":"link:opening","tier":"secondary","parent_id":null,"note":"Rhetorical question that opens the sub-section reviewing LLM-vs-human creativity literature; no independent claim, purely structural.","cars_move":"M1","cars_step":"1B","move_note":"Returns to M1 territory-establishment after early M3 statement; M2->M3 cycle returns to M1 review"},{"id":8,"text":"Emerging research suggests that LLMs can not only match but also outperform people, at least on a few established measures of creativity.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Summarizes the current state of research on LLM creative performance.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":9,"text":"GPT models have been shown to outperform humans on the Alternative Uses Task (AUT; Guilford, 1967)—one of the most widely-used measures of creativity—although the most creative humans still outperformed GPT-3.5 and GPT-4.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports specific prior findings with citation.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":10,"text":"However, on the Torrance Tests of Creative Thinking (TTCT; Torrance, 1966), a widely used measure of divergent thinking, GPT-4 scored in the top 1% for originality and fluency, suggesting that in some cases, AI performance can reach the height of exceptionally creative humans.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports additional specific prior findings; the \"however\" here introduces a contrasting data point within the literature summary rather than a limitation of prior work.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":11,"text":"Moreover, GPT-4 outperformed 85.3% of humans in making remote associations in the Divergent Association Task (DAT; Olson et al., 2021) and exceeded 96% of humans when adopting the greedy search strategy.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports additional quantitative findings from prior research.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":12,"text":"Beyond lab tasks, LLMs can generate creative outputs comparable to human-written texts, including creative ideas, stories, poetry, motivational messages, and persuasive political messages.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Summarizes a broader set of findings extending LLM performance beyond controlled lab tasks.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":13,"text":"Unsurprisingly, when humans and AI work together, the output is often more creative than when humans work alone.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a finding about human-AI collaboration.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":14,"text":"In a creative writing task, for example, a GPT-3 powered system helped untrained crowd workers to write better by improving grammar and introducing new ideas compared to writing without AI assistance.","tag":"extension:illustrative","tier":"secondary","parent_id":13,"note":"Provides a specific example illustrating the prior claim about human-AI collaboration. Parent [13] is tempstat.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":15,"text":"However, research also indicates that LLMs do not perform as well as humans in convergent thinking.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a limitation or counterpoint to the general narrative of LLM creative superiority.","cars_move":"M1","cars_step":"1C","move_note":"Contrast within M1 territory review; reports a known limitation of LLMs rather than naming an unresolved gap"},{"id":16,"text":"For example, Claude 3.5 Sonnet showed worse performance in an abstract reasoning task (i.e., the New York Times Connections game) compared to both human novices and human experts.","tag":"extension:illustrative","tier":"secondary","parent_id":15,"note":"Provides a specific empirical example illustrating the prior contrast claim. Parent [15] is contrast (primary).","cars_move":"M1","cars_step":"1C","move_note":null},{"id":17,"text":"Even in cases where LLMs can match human performance in creative tasks and promote the creativity of individuals, these AI systems may still hamper the collective diversity of human ideas.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces the central paradox — individual enhancement vs. collective homogenization — opening the next sub-section.","cars_move":"M2","cars_step":"2B","move_note":"M2 re-entry; formally names the unresolved gap (collective homogenization) that the paper will address"},{"id":18,"text":"On the surface, it seems that enhancing the creativity of each person should also boost the creativity of the group.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the existence and relevance of a naive intuition (that individual and collective creativity move together) that the paper will challenge; establishes something as worth attending to rather than speculating from a prior claim.","cars_move":"M2","cars_step":"2C","move_note":null},{"id":19,"text":"It is also possible, however, that the widespread use of AI may have a homogenizing effect on creative ideas, wherein the diversity of new ideas and perspectives diminishes across a group of people who use the same AI model.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the existence and significance of the homogenization phenomenon as a real possibility worth attending to; introduces the core concern of the paper.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":20,"text":"This possibility is consistent with the idea of algorithmic monoculture, which suggests that the consistent use of a single prevailing AI system, such as ChatGPT, to conduct various tasks that used to be conducted by many different people can result in increased homogeneity of outcomes.","tag":"framedef","tier":"primary","parent_id":null,"note":"Introduces the theoretical construct of \"algorithmic monoculture\" as analytical machinery for the paper's argument, with citation.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":21,"text":"LLMs are designed to rely on probability distributions; consequently, the outputs of LLMs tend to lack surprise or novelty, as these models are fundamentally trained to conform to existing data distributions that are biased in favor of predominant cultural ideas.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a structural/mechanistic property of LLMs grounded in prior literature with citations.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":22,"text":"LLMs can thus exclude a variety of unique perspectives from different people.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts a consequence of LLM design as a real phenomenon worth attending to (\"can thus exclude\"); not speculative hedging but a positive claim about what LLMs do. Parent [21] is tempstat.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":23,"text":"In short, using LLMs may lead to better outcomes for individual creators but at the cost of these outcomes becoming more similar across creators.","tag":"link:closing","tier":"secondary","parent_id":22,"note":"Synthesizes the paradox argument developed across [17]–[22]; wraps up the sub-section's reasoning. Parent [22] is now emph (primary), so subordination chain is valid.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":24,"text":"Several studies provide initial support for the paradox of AI-driven homogenization in the creative process.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Announces that empirical evidence exists for the paradox; summarizes the state of prior literature.","cars_move":"M1","cars_step":"1C","move_note":"Returns to M1 territory review; compiles prior evidence that supports but does not yet resolve the gap"},{"id":25,"text":"For example, compared to those who wrote alone, writers exposed to GPT-4 generated ideas produced better and more enjoyable stories, as evaluated by independent raters.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a specific prior empirical finding with citation; a named empirical result rather than a bare illustrative example.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":26,"text":"These LLM-inspired stories were, however, more similar to each other than stories written by humans alone.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces the homogenization finding that contrasts with the individual quality improvement from the same study.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":27,"text":"Similarly, individuals using the fine-tuned InstructGPT model—which employed instruction tuning with Reinforcement Learning guided by Human Feedback (RLHF)—produced short essays that were more similar in terms of lexical and content diversity than those written without any LLM support.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports another prior empirical finding with citation.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":28,"text":"In another study, people generated more ideas when using GPT-3.5 than when using the Oblique Strategies deck, a non-AI tool consisting of prompt cards designed to stimulate creative thinking.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a prior empirical finding.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":29,"text":"However, ideas generated with GPT-3.5 were more semantically similar to each other than those produced with Oblique Strategies.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces the homogenization finding contrasting with the quantity advantage shown in the prior sentence.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":30,"text":"Moreover, in a seven-day lab experiment followed by a 30-day follow-up, college students using ChatGPT, compared to those who did not, generated more creative responses to Alternative-Use-Tasks (AUTs) and problem-solving tasks as evaluated by independent raters.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a prior empirical finding.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":31,"text":"However, this enhancement came at the cost of homogenization across different individuals: ChatGPT-assisted content lacked the diversity of human-only responses.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces the homogenization cost contrasting with the individual enhancement finding.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":32,"text":"Furthermore, students who initially relied on ChatGPT continued to produce less diverse, AI-like content even in the absence of ChatGPT, while their individual creativity reverted to baseline levels.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports an additional finding from the same study about lasting effects on diversity.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":33,"text":"Moreover, in a task that required creative problem-solving by finding innovative uses for everyday objects (i.e., MACGYVER), individual GPT-4 responses exhibited generally comparable performance to individual humans.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a prior empirical finding from another study.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":34,"text":"However, at the group level, GPT-4's responses were more homogeneous, limiting the benefits of aggregating multiple responses.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces the group-level homogenization finding contrasting with the individual performance result.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":35,"text":"In contrast, collective humans generated responses more diverse and varied more in accuracy across tasks, as individual differences in familiarity and competence contributed to a broader range of solutions.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the contrasting human collective finding from the same study.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":36,"text":"As a result, humans collectively outperformed GPT-4, underscoring the advantage of human collective creativity over AI-generated solutions.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports an empirical result from cited prior work (humans outperforming GPT-4); this is a finding from the literature, not the authors' own synthesis, so tempstat is correct rather than link:closing.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":37,"text":"In sum, this literature lends initial support to the paradox of LLMs promoting individual creativity while simultaneously reducing diversity in creative outputs across different people.","tag":"link:closing","tier":"secondary","parent_id":36,"note":"Synthesizes and closes the entire prior literature review sub-section. Parent [36] is now tempstat (primary), so subordination chain is valid.","cars_move":"M2","cars_step":"2B","move_note":"Closing synthesis frames the literature as 'initial support' only, implying the gap remains unquantified — a M2 gap-indicating function"},{"id":38,"text":"In the present study, we develop a novel metric—the diversity growth rate—to quantify the homogenizing effect of LLMs.","tag":"novstat","tier":"primary","parent_id":null,"note":"Claims novelty of the metric introduced in the current work.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":39,"text":"This metric dynamically captures the extent to which each additional creative output contributes to collective diversity, with a lower diversity growth rate indicating a stronger homogenizing effect.","tag":"framedef","tier":"primary","parent_id":null,"note":"Defines and unpacks the new construct \"diversity growth rate\" introduced in the prior sentence, establishing it as analytical machinery. Parent [38] is novstat (primary).","cars_move":"M3","cars_step":"3B","move_note":null},{"id":40,"text":"Going beyond prior approaches that primarily compared collective diversity statically between groups with a fixed number of outputs, our diversity growth rate tracks how collective diversity evolves and saturates as more creative outputs are introduced.","tag":"contrast","tier":"primary","parent_id":null,"note":"Explicitly positions the current approach against prior static approaches, asserting its advancement.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":41,"text":"The present research thus provides a new tool to quantify AI homogenization with broad applications for research and practice.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the scope and practical significance of the current paper's contribution.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":42,"text":"Across three preregistered studies, we analyzed 2,200 college admissions essays and compared the diversity of ideas in essays written by actual college applicants with those generated by GPT-4.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the method and scope of the current study.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":43,"text":"We were thus able to examine the homogenizing effects of GPT-4 in the context of real-world creative outputs rather than a controlled lab task, showcasing its potential to quantify AI homogenization across a wide variety of domains.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the scope advantage and broader applicability of the study design.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":44,"text":"In Study 1, we aimed to establish a baseline comparison between human-written and GPT-4 generated college admissions essays.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the purpose and scope of Study 1.","cars_move":"M3","cars_step":"3D","move_note":null},{"id":45,"text":"In Study 2, we aimed to replicate the findings of Study 1 while examining whether the homogenizing effect of GPT-4 would persist after enhancing the creativity of the output via prompt and parameter modifications.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the purpose and scope of Study 2.","cars_move":"M3","cars_step":"3D","move_note":null},{"id":46,"text":"In Study 3, we aimed to replicate the findings in a much larger sample of 1,600 essays and to expand our findings by enhancing the AI output via Chain-of-Thought (CoT) prompt engineering.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the purpose and scope of Study 3.","cars_move":"M3","cars_step":"3D","move_note":null},{"id":47,"text":"We adopted the CoT prompting as a state-of-the-art approach to enhancing the creativity and diversity of GPT-4 essays.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the established status of CoT prompting in the literature, justifying its use.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":48,"text":"To contextualize the effects, we also examined whether diversifying the racial and ethnic backgrounds of human authors would increase the diversity growth rate.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces an additional analytical objective of Study 3.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":49,"text":"Across all experiments, we quantified the diversity of ideas using semantic distance, which measures the degree of proximity between the meanings of words.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the measurement approach used throughout the studies.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":50,"text":"Semantic distance has emerged as a valid and reliable method for assessing creativity by capturing the originality and novelty of semantic associations.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the established validity and reliability of the semantic distance method with citation support.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":51,"text":"Specifically, semantic distance captures the integration of diverse and potentially novel concepts and ideas in written content, reflecting a greater level of the divergent thinking aspect of creativity.","tag":"extension:definitional","tier":"secondary","parent_id":50,"note":"Unpacks and specifies what semantic distance captures, elaborating on the prior tempstat claim. Parent [50] is tempstat (primary).","cars_move":"M3","cars_step":"3B","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"nijstad_2010","title":"nijstad 2010","authors":["Nijstad"],"year":2010,"section":"Introduction"},"arc_summary":"The introduction front-loads an unusually long M1 (sentences 1–21) that moves from grand centrality claims through definitional territory to a focused assertion about trait- and state-based variation — effectively pre-positioning the gap without naming it. **M2 is absorbed into sentence 22**, which folds the implicit gap directly into a purpose announcement, producing a compressed **M2/M3 fusion** rather than an explicit niche-carving moment. M3 then expands across ten sentences that alternate between model-framing (3A/3B), **pre-announced findings** (3C), and structural road-mapping (3D). The rhetorical effect is confidence-forward: the paper presents itself as delivering a model and evidence, not as responding to a crisis in the field.","structured_arc":"M1 -> M3","move_roles":[{"move":"M1","span":[1,2],"role":"Opens with a bold species-level centrality claim, using contrast with other animals to frame creativity as the defining human capacity — establishing maximum relevance before any scholarly machinery appears."},{"move":"M1","span":[3,5],"role":"Transitions to the scholarly record, reporting that creativity has long attracted study and exemplifying one dominant tradition — research on creative geniuses — that the paper will later implicitly move beyond."},{"move":"M1","span":[6,7],"role":"Introduces a corrective reframing: creativity is not the property of rare geniuses but inherent to ordinary cognition, broadening the territory to accommodate the 'little c' focus the paper will adopt."},{"move":"M1","span":[8,10],"role":"Reports the established little-c / big-C distinction and announces the paper's scope, narrowing the territory to everyday creativity without yet claiming novelty."},{"move":"M1","span":[11,13],"role":"Justifies the choice of little-c creativity as the object of study with two explicit rationales, reinforcing the significance of the paper's chosen scope."},{"move":"M1","span":[14,19],"role":"Establishes the field's working definition of creativity, refines it through the originality-appropriateness tension, and reports the expert-consensus operationalization — laying the conceptual groundwork the dual-pathway model will build on."},{"move":"M1","span":[20,21],"role":"Pivots from definitional territory to the specific empirical landscape of trait- and state-based variation, cataloguing prior findings that the paper will unify — this is the final setup sentence before the implicit gap."},{"move":"M3","span":[22,23],"role":"Performs a compressed M2/M3 fusion: announces the paper's purpose (implicitly conceding incomplete understanding of trait/state variation) and simultaneously claims novelty for the dual pathway model and its evidentiary base."},{"move":"M3","span":[24,25],"role":"Introduces and names the model's two pathways as the paper's core theoretical machinery, situating it as an integrative advance over prior theorising."},{"move":"M3","span":[26,27],"role":"Begins the structural road-map, announcing the sequence of the paper's sections on prior theories, model elaboration, ideation tasks, and measurement."},{"move":"M3","span":[28,29],"role":"Pre-announces two specific empirical findings — one for each pathway — signalling that the paper delivers concrete results rather than purely theoretical claims."},{"move":"M3","span":[30,31],"role":"Completes the structural road-map by announcing the mood-states application section and the closing discussion, including future-research directions."}],"sentences":[{"id":1,"text":"Humans have an amazing capacity for creativity.","tag":"emph","tier":"primary","parent_id":null,"note":"Opens the paper by asserting the existence and significance of human creativity as a phenomenon worth attending to.","cars_move":"M1","cars_step":"1A","move_note":"Centrality claim opening; broad 'X matters' framing."},{"id":2,"text":"While other species use artefacts and sometimes manipulate objects to better fit their needs, our capacity for creativity allows us to fly to the moon, develop DVD recorders, create art and write poems, and generate research hypotheses.","tag":"extension:illustrative","tier":"secondary","parent_id":1,"note":"Illustrates the scope of the claim in [1] through contrast with other species and enumeration of human creative achievements. Parent: [1] emph.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":3,"text":"Because of its importance to human culture, our survival, well-being, and prosperity, creativity has long been studied (Simonton, 2003a).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports that creativity has been an established object of scientific study, with citation.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":4,"text":"For example, quite some work has been devoted to understanding the characteristics, development, and career trajectories of creative geniuses (e.g., Csikszentmihalyi, 1996; Galton, 1869; Mumford & Gustafson, 1988; Simonton, 2003b).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a specific line of prior research with multiple citations.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":5,"text":"Indeed, when we think of creativity, the creative achievements of brilliant scientists (e.g., Marie Curie, Albert Einstein), of great inventors (e.g., Thomas Edison), or of famous artists (e.g., Emily Dickinson, Pablo Picasso, The Beatles) readily come to mind.","tag":"extension:illustrative","tier":"secondary","parent_id":4,"note":"Illustrates the prior claim about creative geniuses being the paradigm case. Parent: [4] tempstat.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":6,"text":"Although creativity is sometimes treated as an attribute of a few brilliant minds, it is in fact inherent to human cognitive functioning.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces tension against the 'genius' framing just described, asserting a broader view.","cars_move":"M1","cars_step":"1B","move_note":"Contrast against prior framing but still establishing the territory (broader view of creativity); not yet naming a gap in knowledge."},{"id":7,"text":"This is expressed in our flexible use of language, our ability to create and use new mental categories to organise our experiences, and our ability to mentally manipulate objects (Ward, Smith, & Finke, 1999).","tag":"extension:illustrative","tier":"secondary","parent_id":6,"note":"Illustrates the claim that creativity is inherent to human cognition with specific examples. Parent: [6] contrast.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":8,"text":"A distinction is sometimes made between 'little c' and 'big C' creativity (Gardner, 1993).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports an established distinction in the literature with citation.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":9,"text":"While 'little c' creativity refers to relatively mundane contributions and everyday creativity, 'big C' Creativity refers to genuinely important discoveries and works of art.","tag":"extension:definitional","tier":"secondary","parent_id":8,"note":"Defines the two terms introduced in [8]. Parent: [8] tempstat.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":10,"text":"This paper is concerned mainly with 'little c' creativity.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the scope of the current paper.","cars_move":"M1","cars_step":"1B","move_note":"Scope-delimiting sentence that narrows the territory rather than fully occupying the niche; precedes the justification block still within M1."},{"id":11,"text":"The study of this type of creativity is important for at least two reasons.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance of studying little-c creativity; sets up the two-part justification that follows.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":12,"text":"First, it is important in day-to-day life: it helps us to adapt to changing circumstances, to solve everyday problems, and to create new opportunities (Runco, 2004).","tag":"extension:illustrative","tier":"secondary","parent_id":11,"note":"First of two enumerated elaborations of the importance claim in [11]. Parent: [11] emph.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":13,"text":"Second, the same processes that lead to 'little c' creativity may also operate in cases of 'big C' creativity (Ward et al., 1999; see also Guilford, 1950), and the study of 'little c' creativity may therefore contribute to a better understanding of creative genius.","tag":"extension:illustrative","tier":"secondary","parent_id":11,"note":"Second enumerated elaboration of the importance claim in [11]. Parent: [11] emph.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":14,"text":"Creativity is commonly defined as the production of ideas, problem solutions, and products that are both novel (original) and appropriate (feasible, potentially useful) (e.g., Amabile, 1983; Paulus & Nijstad, 2003; Sternberg & Lubart, 1999).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the standard field definition of creativity with multiple citations.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":15,"text":"Originality is considered the hallmark of creativity, and indeed one cannot be creative without being original.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports an established view in the field about the primacy of originality.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":16,"text":"However, ideas or products that are original but not appropriate would be considered crazy and irrelevant.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a qualification against treating originality alone as sufficient for creativity.","cars_move":"M1","cars_step":"1B","move_note":"Qualifies the territory definition; still within M1 as it refines what IS known rather than naming a gap."},{"id":17,"text":"One problem is that original ideas that are considered inappropriate at some point in time may be seen as appropriate (and therefore highly creative) later on (or vice versa).","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts a genuine complication in the concept of creativity — the time-dependency of appropriateness judgments.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":18,"text":"The work of Vincent van Gogh is a good illustration: Van Gogh died a poor man, but his work now sells for millions.","tag":"extension:illustrative","tier":"secondary","parent_id":17,"note":"Provides a concrete example of the time-dependency problem raised in [17]. Parent: [17] emph.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":19,"text":"Creativity therefore cannot readily be established in an objective way, and several researchers have suggested that a product or idea is creative when relevant experts agree that it is creative (e.g., Amabile, 1982; Csikszentmihalyi, 1999).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the consensus view in the literature on how to operationalize creativity judgments, with citations.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":20,"text":"Although humans in general are a creative species, levels of creativity may vary from person to person (trait-based variation) and from situation to situation (state-based variation).","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the existence of meaningful individual and situational variation in creativity, setting up the paper's core focus.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":21,"text":"For example, social psychological research has shown that creative performance is influenced by a broad variety of dispositional and situationally induced mood states (see Baas, De Dreu, & Nijstad, 2008, for a review), by external evaluations and rewards (e.g., Amabile, 1979; Eisenberger & Rhoades, 2001), by situationally induced motivational orientation (i.e., approach versus avoidance; Friedman & Förster, 2000), and by the activation of romantic motives (Förster, Epstude, & Özelsel, 2009; Griskevicius, Cialdini, & Kenrick, 2006).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a range of prior empirical findings on factors influencing creativity, with multiple citations.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":22,"text":"This article seeks to further our understanding of these trait- and state-based variations in creativity (also see Amabile, 1983, 1996).","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the purpose of the current paper.","cars_move":"M3","cars_step":"3A","move_note":"M2 is implicit here — the gap (incomplete understanding of trait/state variation) is folded into the purpose announcement rather than stated separately as nostat."},{"id":23,"text":"We present our dual pathway to creativity model (also De Dreu, Baas, & Nijstad, 2008) and examine supportive evidence derived from a number of studies in which participants engaged in creative ideation tasks.","tag":"novstat","tier":"primary","parent_id":null,"note":"Claims novelty for the model being presented and announces the evidentiary basis of the paper.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":24,"text":"The dual pathway model assumes that there are two pathways to creative performance, the flexibility pathway and the persistence pathway, and that psychological states and traits influence creativity through their impact on either of these pathways, or both.","tag":"framedef","tier":"primary","parent_id":null,"note":"Introduces and names the core theoretical construct — the dual pathway model with its two named pathways — as analytical machinery for the paper.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":25,"text":"The dual pathway model builds on and is an integration of previous theorising.","tag":"link:closing","tier":"secondary","parent_id":24,"note":"Synthesizes the preceding framing sequence by situating the model relative to prior work. Parent: [24] framedef.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":26,"text":"After discussing some of the previous theories of creativity, we present the dual pathway model in more detail.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the organizational structure/plan of the paper.","cars_move":"M3","cars_step":"3D","move_note":null},{"id":27,"text":"We then discuss how ideation tasks (e.g., brainstorming and divergent-thinking tasks) may be used to test our model, and how various measures of creativity derived from ideation tasks relate empirically to each other.","tag":"contribution","tier":"primary","parent_id":null,"note":"Continues announcing the paper's structure and method.","cars_move":"M3","cars_step":"3D","move_note":null},{"id":28,"text":"We next focus on the persistence pathway, and show that persistence may lead to creativity even in the absence of flexibility.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces a specific finding/section of the paper.","cars_move":"M3","cars_step":"3C","move_note":"Pre-announces a specific result (persistence -> creativity without flexibility); functions as 3C within the article-structure block."},{"id":29,"text":"Focusing on the flexibility pathway, we also show that global (as opposed to local) processing modes are associated with cognitive flexibility, but only lead to original ideas when task performance benefits from cognitive flexibility.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces another finding/section of the paper.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":30,"text":"We subsequently use the dual pathway model to discuss the effects of mood states on creative performance.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces another section/application of the model.","cars_move":"M3","cars_step":"3D","move_note":null},{"id":31,"text":"We close with a discussion, in which we consider the applicability of the model to other types of creativity tasks, propose a general hypothesis and discuss avenues for future research.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the closing structure of the paper.","cars_move":"M3","cars_step":"3D","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"orwig_2024","title":"orwig 2024","authors":["Orwig"],"year":2024,"section":"Introduction"},"arc_summary":"The introduction cycles through M1 territory three times, each time establishing a distinct sub-territory (creativity assessment/AUT, episodic memory, LLMs) before pivoting to gap-and-purpose moves. **Two embedded M2 moments** — one contesting traditional DT metrics, one naming the unexamined role of perceptual details — are each quickly absorbed into M3 purpose statements rather than sustained as independent critiques. The **final M3 block** (sentences 36–48) is unusually long and dense, sequentially announcing methods, constructs, dual hypotheses, a comparison aim, and a replication — effectively doing the work of a methods preview. The overall structure reveals a paper positioning itself at three intersecting frontiers simultaneously, using repeated M1 cycling to legitimate each before claiming contribution.","structured_arc":"M1 -> M2 -> M3 -> M1 -> M2 -> M3 -> M1 -> M3","move_roles":[{"move":"M1","span":[1,3],"role":"Establishes the core research territory — creativity assessment, divergent thinking, and the AUT — citing foundational work to anchor the paper in an established field."},{"move":"M2","span":[4,5],"role":"Identifies the dual weaknesses of traditional DT metrics (low discriminability, inter-rater unreliability), creating the problem space the paper will fill."},{"move":"M1","span":[6,7],"role":"Reviews the computational/semantic distance response to those weaknesses, situating the paper's approach within an existing methodological tradition."},{"move":"M3","span":[8,9],"role":"Announces the paper's novel semantic diversity measure and its extension of prior semantic distance work — the first, partial statement of contribution."},{"move":"M1","span":[10,16],"role":"Opens a second sub-territory on episodic memory contributions to DT, reviewing ESI effects, neuroimaging findings, and perceptual detail in memory research to build the evidential base for the next gap."},{"move":"M2","span":[17,17],"role":"Names the specific gap that the episodic memory review has made visible: perceptual details have not been systematically examined in creative cognition."},{"move":"M3","span":[18,18],"role":"Pivots immediately from the gap to assert the paper's positional claim — that perceptual details are particularly relevant to creative writing — motivating the study's focus."},{"move":"M1","span":[19,24],"role":"Returns briefly to territory-building, providing theoretical grounding (semantic + episodic memory theories) and one key empirical precedent (van Genugten et al.) before reinterpreting its null result as a methodological limitation."},{"move":"M3","span":[25,27],"role":"Asserts the significance of perceptual details for narrative creativity and formally announces the episodic memory/perceptual detail aim of the present study."},{"move":"M1","span":[28,35],"role":"Opens a third sub-territory on LLM creativity research, surveying GPT-3 studies, poetry comparisons, and automated DT scoring to legitimize AI data as a new comparison source."},{"move":"M3","span":[36,48],"role":"Delivers the full, sustained statement of contribution: methodologica
