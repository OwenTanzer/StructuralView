:null},{"id":21,"text":"These conclusions imply potential mitigations for homogenization effects at the CST design level and clear research directions for follow-up work.","tag":"contribution","tier":"primary","parent_id":null,"note":"Asserts what the paper's conclusions contribute in terms of design implications and future research directions; this is a contribution-framing act rather than open-ended speculation, as it announces the scope of the paper's impact.","cars_move":"M3","cars_step":"3C","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"aswamenakul_2025","title":"Foraging dynamics of Picasso's lifelong artistic creativity","authors":["Aswamenakul, C.","Mallen, E.","Marghetis, T."],"year":2025,"section":"Introduction"},"arc_summary":"The introduction bets early on the foraging metaphor as a unifying frame, establishing territory by linking hypercreative careers to resource-search dynamics before any gap is named. **M2 does the heaviest lifting**: it both surfaces the gap (long-timescale creativity is understudied) and constructs three candidate foraging strategies — **Area-Restricted Search, Constrictive Search, and Expansive Search** — through a sustained literature-building sequence. A brief M3 intrusion at sentence 23 previews Constrictive Search via Pollock before M2 resumes, revealing that the theory-building is inseparable from the gap-filling. **M3 then closes the introduction** with a methodological announcement: Picasso's 5,008 paintings embedded in style space, analyzed as a foraging trajectory.","structured_arc":"M1 -> M2 -> M3","move_roles":[{"move":"M1","span":[1,5],"role":"Establishes the territory by framing lifelong hypercreative output as a foraging process, introducing the core metaphor that will organize the entire paper and anchoring it in prior short-timescale foraging research."},{"move":"M2","span":[6,22],"role":"Opens the gap (long-timescale hypercreative dynamics are understudied), then pivots to construct the theoretical landscape: Area-Restricted Search is reviewed through converging evidence across timescales, and Constrictive Search is introduced and grounded in prior work on hot streaks and optimization, building the conceptual toolkit needed to motivate the study."},{"move":"M3","span":[23,24],"role":"Briefly occupies the announcement slot to preview Constrictive Search as a career-level phenomenon via Jackson Pollock, serving as a transitional proof-of-concept before the theoretical framing is complete."},{"move":"M2","span":[25,30],"role":"Returns to gap-filling theory-building to introduce and justify Expansive Search as a third foraging strategy, completing the candidate framework before the formal study announcement."},{"move":"M3","span":[31,40],"role":"Announces the study proper: names Picasso as the case, justifies the choice with his prolificacy and innovation, positions the work against multi-artist computational analyses, and details the methodology — catalogue, style-space embedding, trajectory analysis — as a sustained occupying of the niche."}],"sentences":[{"id":1,"text":"In extreme cases, individuals dedicate their entire lives to continuous creative output.","tag":"emph","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1B"},{"id":2,"text":"Scientists, artists, writers, and other \"hypercreative\" individuals can spend decades in the sustained pursuit of creative breakthrough.","tag":"extension:illustrative","tier":"secondary","parent_id":1,"note":"Inherits move from parent [1].","cars_move":"M1","cars_step":"1B"},{"id":3,"text":"This long-timescale creativity can be likened to a process of foraging, a strategic search for resources — in this case, creative ideas — in an uncertain landscape of possibility.","tag":"framedef","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1B"},{"id":4,"text":"Scientists, for instance, forage through a space of potential theories or mechanisms, while visual artists forage through a space of styles, themes, or techniques.","tag":"extension:illustrative","tier":"secondary","parent_id":3,"note":"Inherits move from parent [3].","cars_move":"M1","cars_step":"1B"},{"id":5,"text":"Indeed, human creativity on a much shorter timescale — for instance, solving a puzzle over the course of seconds or minutes — has been characterized as a foraging process [1–4].","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C"},{"id":6,"text":"Much less is known about the dynamics of creativity over the long sweep of an entire career, particularly among those extreme, hypercreative individuals who devote their entire lives to a creative endeavor [5–7].","tag":"nostat","tier":"primary","parent_id":null,"note":null,"cars_move":"M2","cars_step":"2B"},{"id":7,"text":"What strategies might characterize the long-timescale foraging dynamics of lifelong creativity?","tag":"contribution","tier":"primary","parent_id":null,"note":null,"cars_move":"M2","cars_step":"2C"},{"id":8,"text":"A number of foraging strategies are likely candidates.","tag":"link:opening","tier":"secondary","parent_id":7,"note":"Inherits move from parent [7].","cars_move":"M2","cars_step":"2C"},{"id":9,"text":"One that is widespread across living organisms is Area-Restricted Search [9], in which the foraging individual alternates between periods of widespread, global 'exploration' and periods of intensive, local 'exploitation' of the resources within a particularly resource-dense patch (e.g., seabirds foraging for fish [10]).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M2","cars_step":"2D"},{"id":10,"text":"This alternation between exploration and exploitation has analogs in more abstract forms of search [11].","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M2","cars_step":"2D"},{"id":11,"text":"On the timescale of seconds and minutes, for instance, searching in semantic memory (e.g., for names of animals) often resembles Area-Restricted Search, with repeated cycles of exploitation (e.g., retrieving as many barnyard animals as possible) and exploration (i.e., searching for a new subtype of animal, e.g., pets) [2, 3].","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M2","cars_step":"2D"},{"id":12,"text":"Similarly, when musicians improvise, they may trade off repeatedly between exploring widely in the space of possible sounds and exploiting a particular acoustic texture [12].","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M2","cars_step":"2D"},{"id":13,"text":"On the longer timescale of months and years, individual reading habits may follow an Area-Restricted Search strategy; indeed, computational analyses of Charles Darwin's reading habits found repeated alternations between exploitation (reading thematically related books) and exploration (switching to new topics) [13].","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M2","cars_step":"2D"},{"id":14,"text":"Thus, when humans are foraging for insights or information — whether internally in their memory or externally in books — they sometimes adopt a strategy of Area-Restricted Search.","tag":"link:closing","tier":"secondary","parent_id":13,"note":"Inherits move from parent [13].","cars_move":"M2","cars_step":"2D"},{"id":15,"text":"While Area-Restricted Search involves cyclical shifts between exploration and exploitation, long-timescale creativity might follow more directional patterns of change.","tag":"contrast","tier":"primary","parent_id":null,"note":null,"cars_move":"M2","cars_step":"2A"},{"id":16,"text":"Long-timescale creativity, for instance, can involve progressive specialization.","tag":"emph","tier":"primary","parent_id":null,"note":null,"cars_move":"M2","cars_step":"2D"},{"id":17,"text":"Individuals might start with a vast exploration of diverse possibilities (e.g., random trial-and-error exploration of a large range of possibilities) before gradually honing in on a particular style, approach, practice, or idea.","tag":"extension:definitional","tier":"secondary","parent_id":16,"note":"Inherits move from parent [16].","cars_move":"M2","cars_step":"2D"},{"id":18,"text":"We refer to this process of specialization as Constrictive Search.","tag":"framedef","tier":"primary","parent_id":null,"note":null,"cars_move":"M2","cars_step":"2D"},{"id":19,"text":"Constrictive Search might be especially common in domains where experts specialize in a narrow subset of all possible techniques or strategies.","tag":"extension:speculative","tier":"secondary","parent_id":18,"note":"Inherits move from parent [18].","cars_move":"M2","cars_step":"2D"},{"id":20,"text":"Some scientists and artists, for instance, may begin their careers by searching widely across a large range of topics or styles before constricting to a particular area of expertise.","tag":"extension:illustrative","tier":"secondary","parent_id":18,"note":"Inherits move from parent [18].","cars_move":"M2","cars_step":"2D"},{"id":21,"text":"Among scientists and artists who experience a 'hot streak' of sustained success [7], for instance, the hot streak is typically preceded by a period of widespread intellectual or stylistic exploration, followed by a constricted focus on the more narrow set of styles, themes, or topics that dominate their hot streak.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M2","cars_step":"2D"},{"id":22,"text":"More generally, constrictive search is the basis of simulated annealing in optimization [14] or transient diversity in collective problem solving [15, 16].","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M2","cars_step":"2D"},{"id":23,"text":"Here we consider whether Constrictive Search may even characterize entire careers.","tag":"contribution","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3A"},{"id":24,"text":"The American painter Jackson Pollock, for instance, experimented with a variety of styles early in his career [17] before narrowing his output to his signature style of fractal 'drip' paintings [18].","tag":"extension:illustrative","tier":"secondary","parent_id":23,"note":"Inherits move from parent [23].","cars_move":"M3","cars_step":"3A"},{"id":25,"text":"A third potential foraging strategy in high-level creativity involves starting small — focusing on a limited set of styles, themes, or ideas — and expanding over time as a result of ongoing learning and adaptation.","tag":"emph","tier":"primary","parent_id":null,"note":null,"cars_move":"M2","cars_step":"2D"},{"id":26,"text":"We refer to this as Expansive Search.","tag":"framedef","tier":"primary","parent_id":null,"note":null,"cars_move":"M2","cars_step":"2D"},{"id":27,"text":"Formal models in ecology, for instance, have shown that organisms should increase their home-range — the region in which they forage — when resources become more scarce or random [19].","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M2","cars_step":"2D"},{"id":28,"text":"This notion of an expanded home-range has analogs in creative domains.","tag":"emph","tier":"primary","parent_id":null,"note":null,"cars_move":"M2","cars_step":"2D"},{"id":29,"text":"Mathematical discoveries, for instance, are scarce and difficult to foresee; mathematical experts gradually expand their toolbox, cultivating procedural flexibility that allows them to deploy a variety of strategies and techniques [20].","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M2","cars_step":"2D"},{"id":30,"text":"Visual artists, similarly, may incorporate new styles, themes, or techniques into their artistic practice, thus unlock new dimensions of possibility and qualitatively expanding the nature of the explored space itself.","tag":"extension:illustrative","tier":"secondary","parent_id":29,"note":"Inherits move from parent [29].","cars_move":"M2","cars_step":"2D"},{"id":31,"text":"Here, we investigate the foraging dynamics of artistic creativity of an especially prolific visual artist, Pablo Picasso.","tag":"contribution","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3A"},{"id":32,"text":"Picasso is widely considered one of the most influential artists of the 20th century [21–23].","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3B"},{"id":33,"text":"Picasso was so prolific that, between his first painting when he was 8 years old until he died at the age of 91, he produced on the order of 50000 works of art [23], averaging more than one new artwork every day of his entire life.","tag":"extension:illustrative","tier":"secondary","parent_id":32,"note":"Inherits move from parent [32].","cars_move":"M3","cars_step":"3B"},{"id":34,"text":"Moreover, he's credited with contributing to a number of 20th century artistic developments, including Cubism and Surrealism [21–23].","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3B"},{"id":35,"text":"As a complement to computational analyses that have zoomed out to identify visual or aesthetic patterns across many artists [24–28], we zoomed in on Picasso's prodigious output — hypercreative in both quantity and innovation — as an opportunity to investigate the dynamics of day-to-day creative foraging over the long sweep of an exceptionally creative career.","tag":"contribution","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3A"},{"id":36,"text":"We leveraged a digital catalogue of Picasso's prodigious output to characterize his long-timescale creative process.","tag":"contribution","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3B"},{"id":37,"text":"We embedded images of every painting (N = 5008) into a high-dimensional 'style space' that captures both low-level and high-level stylistic features.","tag":"contribution","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3B"},{"id":38,"text":"We then analyzed the trajectory within this style space of Picasso's day-to-day stylistic output over the course of his eight-decade career.","tag":"contribution","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3B"},{"id":39,"text":"To characterize this trajectory, we calculated the magnitude of day-to-day stylistic movements (i.e., how much his style changed from day to day) and changes in the direction of this movement (i.e., the cosine similarity of successive movements).","tag":"contribution","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3B"},{"id":40,"text":"We then investigate the long-timescale dynamics that emerge from this day-to-day stylistic foraging, including changes over his career in the scope of his stylistic output.","tag":"contribution","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3B"}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"bergs_2019","title":"bergs 2019","authors":["Bergs"],"year":2019,"section":"Introduction"},"arc_summary":"The introduction uses an unusually long M1 block — etymology, historical restriction, Simonton's definition, and three worked examples — to establish a rich conceptual baseline before the gap emerges. **M2 is interlaced within M1** (sentences 4–9) rather than held until the end, signaling that the definitional problem is inherent to the term itself. A single M3 sentence (15) briefly stakes the paper's territory, but the introduction **immediately cycles back into M2**, building a paradox (rule-based language vs. observable creativity) that is left unresolved. The section closes on open questions with no purpose statement, findings preview, or structural roadmap — a deliberately open-ended arc.","structured_arc":"M1 -> M3 -> M2","move_roles":[{"move":"M1","span":[1,3],"role":"Establishes the etymological and historical grounding of 'creativity,' positioning it as a term with ancient roots but recent human application — framing the conceptual territory before complications arise."},{"move":"M2","span":[4,9],"role":"Interrupts the historical narrative to assert the term's current definitional instability, then enumerates competing candidate meanings through a series of rhetorical questions — embedding the gap within M1 rather than deferring it."},{"move":"M1","span":[10,14],"role":"Returns to established knowledge by presenting Simonton's formula as an anchor definition, then deploys three worked examples (birthday song, deathbed song, Norma) to give the definition concrete, testable shape."},{"move":"M3","span":[15,15],"role":"Briefly names the paper's scope — creativity in language and linguistics — but functions as a pivot rather than a full claim, immediately giving way to renewed question-raising."},{"move":"M2","span":[16,23],"role":"Constructs a paradox: language is rule-governed (like computers) yet speakers demonstrably create novel words, metaphors, and literary works. Closes on two unanswered questions about production and comprehension, leaving the gap explicitly open with no M3 resolution."}],"sentences":[{"id":1,"text":"The term 'creativity' comes from Latin, and means 'give birth to' or 'bring into existence' (cf. Cicero Omnes res, quas et creat natura, et tuetur 'All things, which nature makes as well as protects').","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports etymological/historical fact about the term's origin, functioning as established knowledge.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":2,"text":"However, the act of creation was not available to humans; only gods and nature could create something or someone.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the classical historical conception of creation as restricted to gods and nature.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":3,"text":"The idea that man can be creative is a fairly recent one, and probably not much older than a thousand years.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a historical claim about when the human concept of creativity emerged.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":4,"text":"Yet, the term is now both widespread and ill-defined.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces tension: despite currency, the term lacks definitional clarity.","cars_move":"M2","cars_step":"2B","move_note":"Interlaced M1/M2: gap-indicating sentence embedded within the otherwise M1 territory block"},{"id":5,"text":"Does it refer to the creation of something new, valuable, or worthwhile?","tag":"emph","tier":"primary","parent_id":null,"note":"Rather than identifying a research gap, this asserts the genuine reality of the definitional problem by enumerating competing candidate meanings — rhetorical emphasis on the term's ill-defined nature.","cars_move":"M2","cars_step":"2C","move_note":null},{"id":6,"text":"The combination of hitherto unconnected elements?","tag":"extension:illustrative","tier":"secondary","parent_id":5,"note":"Another candidate meaning illustrating the definitional plurality asserted in [5]; legally secondary to primary [5].","cars_move":"M2","cars_step":"2C","move_note":null},{"id":7,"text":"The filling or using of already existing patterns in skillful ways?","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Continues the illustrative enumeration of candidate meanings from primary [5].","cars_move":"M2","cars_step":"2C","move_note":null},{"id":8,"text":"Is there creation out of nothing, ex nihilo, as the romanticist would have it?","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Another illustrative candidate definition, legally secondary to primary [5].","cars_move":"M2","cars_step":"2C","move_note":null},{"id":9,"text":"What did Ezra Pound mean with his smashing 1934 slogan: Make it new?","tag":"extension:illustrative","tier":"secondary","parent_id":5,"note":"A final illustrative instance of the definitional problem asserted in [5]; legally secondary to primary [5].","cars_move":"M2","cars_step":"2C","move_note":null},{"id":10,"text":"In a very influential study, Dean Simonton (2012) defined creativity as originality times appropriateness (cf. Thomas Hoffmann, 2018).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a prior definition from the literature with citation.","cars_move":"M1","cars_step":"1C","move_note":"Return to M1 after M2 gap-raising; interlaced M1/M2 structure"},{"id":11,"text":"So, ideas need to be both new (original) and appropriate in a given situation to be truly 'creative'.","tag":"extension:definitional","tier":"secondary","parent_id":10,"note":"Unpacks the Simonton definition introduced in [10]; legally secondary to primary [10].","cars_move":"M1","cars_step":"1C","move_note":null},{"id":12,"text":"Singing 'Happy Birthday' at somebody's birthday party is highly appropriate, but hardly original, and therefore not creative.","tag":"extension:illustrative","tier":"secondary","parent_id":10,"note":"Concrete example illustrating the definition from [10]–[11]; re-parents to primary [10].","cars_move":"M1","cars_step":"1C","move_note":null},{"id":13,"text":"Singing Pharell Williams's song 'Happy' at the dying bed of a beloved person is highly original, but hardly appropriate, and so it is not creative either, according to this definition.","tag":"extension:illustrative","tier":"secondary","parent_id":10,"note":"Second illustrative example of the same definition; re-parents to primary [10].","cars_move":"M1","cars_step":"1C","move_note":null},{"id":14,"text":"When Vincenzo Bellini and Felice Romani created Norma as their masterpiece in the novel combination of 'gothic romanticism' with elements of classic tragedy, this innovation was both highly original and very appropriate, and so can be considered an act of creativity, according to Simonton.","tag":"extension:illustrative","tier":"secondary","parent_id":10,"note":"Third illustrative example showing a positive case under Simonton's definition; re-parents to primary [10].","cars_move":"M1","cars_step":"1C","move_note":null},{"id":15,"text":"The present paper is concerned with creativity in language and linguistics.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the paper's scope and topic.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":16,"text":"Can language users be creative, and if so, how?","tag":"nostat","tier":"primary","parent_id":null,"note":"Poses the central open question the paper addresses.","cars_move":"M2","cars_step":"2C","move_note":"M2->M3 cycling: after the M3 announcement in [15], the introduction returns to open question-raising"},{"id":17,"text":"How do we model linguistic creativity in our theoretical models?","tag":"nostat","tier":"primary","parent_id":null,"note":"A further open question about the theoretical challenge of representing linguistic creativity.","cars_move":"M2","cars_step":"2C","move_note":null},{"id":18,"text":"At first sight, language as a rule-based system should not allow for any innovations, for any creativity in the common sense.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces tension between language's rule-governed nature and the possibility of creativity.","cars_move":"M2","cars_step":"2A","move_note":null},{"id":19,"text":"After all, computers and their programs cannot be creative either.","tag":"emph","tier":"primary","parent_id":null,"note":"Makes a substantive independent assertion — that rule-following systems are by nature non-creative — which establishes a real-world analogy as a claim, not merely as an illustration.","cars_move":"M2","cars_step":"2A","move_note":null},{"id":20,"text":"Yet, we see what can only be termed 'acts of creation in speakers', in both everyday and poetic language.","tag":"contrast","tier":"primary","parent_id":null,"note":"Counters [18]–[19] by asserting that creative acts empirically occur, deepening the tension.","cars_move":"M2","cars_step":"2A","move_note":null},{"id":21,"text":"Speakers produce new words and new metaphors apparently without thinking, and poets create works such as Finegan's Wake.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the existence and significance of spontaneous creative linguistic acts, including extreme literary cases.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":22,"text":"How is this possible?","tag":"nostat","tier":"primary","parent_id":null,"note":"Poses the core explanatory gap — how to account for the phenomena just described.","cars_move":"M2","cars_step":"2C","move_note":null},{"id":23,"text":"How do hearers and readers deal with the unexpected and surprising input?","tag":"nostat","tier":"primary","parent_id":null,"note":"Poses a related open question about the comprehension side of linguistic creativity.","cars_move":"M2","cars_step":"2C","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"brennan_1996","title":"brennan 1996","authors":["Brennan"],"year":1996,"section":"Introduction"},"arc_summary":"The introduction opens with a **tight M1→M2→M3 pivot** in just six sentences, establishing ahistoricity as the shared blind spot of all current theories before immediately announcing the paper's corrective argument. It then executes an unusually **extended M1/M2 cycling block** (sentences 7–34) that surveys ahistorical factors while repeatedly surfacing their inadequacy, keeping the niche visible throughout the review. From sentence 35 onward, the paper shifts into **M3 territory-building**, presenting its experimental paradigm and four-factor framework — but this M3 is heavily interlaced with fresh M2 gap moves targeting each prior account in turn (recency, then recency+frequency). The result is a **layered argumentative structure** where each new factor the authors introduce is preceded by a gap that only their framework can fill.","structured_arc":"M1 -> M2 -> M3 -> M1 -> M2 -> M1 -> M2 -> M3","move_roles":[{"move":"M1","span":[1,4],"role":"Establishes the research territory by characterising the field of reference production and surveying the two dominant classes of theoretical account (minimally-informative vs. over-informative theories)."},{"move":"M2","span":[5,5],"role":"Identifies the single shared limiting assumption — ahistoricity — that unites all existing theories, creating the niche the paper will occupy."},{"move":"M3","span":[6,6],"role":"Announces the paper's central argument (speakers exploit past and potential interaction) and its experimental purpose, directly occupying the niche just opened."},{"move":"M1","span":[7,14],"role":"Returns to territory review, introducing the principle of contrast and the two best-supported ahistorical factors (informativeness and Gricean quantity) with concrete examples, building the empirical baseline the paper will later challenge."},{"move":"M2","span":[15,15],"role":"Inserts a brief gap moment signalling that informativeness alone is insufficient, pivoting the review toward additional complicating factors."},{"move":"M1","span":[16,23],"role":"Extends the territory review to cover lexical availability and perceptual salience as further ahistorical factors, populating the theoretical landscape the paper's historical model must ultimately supersede."},{"move":"M2","span":[24,27],"role":"Names the residual problem that ahistorical accounts cannot solve — the high and systematic variability in speakers' lexical choices — and quantifies its extent with two empirical demonstrations."},{"move":"M1","span":[28,30],"role":"Establishes centrality by articulating two motivations (practical and theoretical) for understanding lexical variability, framing the research problem as broadly significant before returning to the gap."},{"move":"M2","span":[31,31],"role":"Restates the core limiting assumption of all reviewed accounts — no past or future interaction — as a named structural gap, echoing sentence 5 and preparing the transition to historical models."},{"move":"M1","span":[32,33],"role":"Reports established findings on lexical entrainment in conversation, introducing the historical literature that will anchor the paper's framework."},{"move":"M2","span":[34,34],"role":"Sets up the open empirical question by asserting that historical and ahistorical models make divergent predictions, framing the A/B/C paradigm as the instrument for adjudicating between them."},{"move":"M3","span":[35,40],"role":"Presents the paper's own experimental paradigm (A/B/C trial structure) in detail, occupying the niche by introducing the specific apparatus through which the theoretical distinctions will be tested."},{"move":"M2","span":[41,44],"role":"Poses the key unresolved question (what will the director do in C trials?) and derives the contrasting predictions of ahistorical and historical models, making the gap concrete and testable within the paper's own paradigm."},{"move":"M1","span":[45,45],"role":"Reports the ahistorical model's specific prediction for C trials, giving the baseline against which the paper's historical account will be measured."},{"move":"M2","span":[46,46],"role":"Introduces the historical model's contrasting prediction, framing overinformativeness in C trials as the phenomenon demanding explanation."},{"move":"M3","span":[47,48],"role":"Announces the paper's four-factor framework and introduces the first factor (recency), beginning the systematic construction of the historical model that constitutes the paper's theoretical contribution."},{"move":"M1","span":[49,54],"role":"Reviews Garrod and Anderson's output/input coordination principle and its a priori advantages, positioning prior work as a partial precursor to the paper's recency factor before identifying its limits."},{"move":"M2","span":[55,58],"role":"Identifies two specific limitations of the recency-only account — it cannot explain initial reference or accommodate the observed evolution of description schemes — motivating the need for additional factors."},{"move":"M1","span":[59,62],"role":"Reports prior authors' own modifications to the output/input principle, acknowledging the state of the art before showing that even these modifications leave a residual gap."},{"move":"M2","span":[63,64],"role":"Identifies the residual limitation of even the modified recency account within the paper's own paradigm, directly setting up the need for the frequency-of-use factor."},{"move":"M3","span":[65,72],"role":"Introduces, names, and elaborates the second factor (frequency of use), deriving its novel predictions for A/B/C trial behavior and distinguishing it from recency — the core theoretical innovation of this section."},{"move":"M2","span":[73,73],"role":"Identifies the limitation of recency and frequency of use taken together — they cannot account for partner-sensitivity — opening the niche for the remaining two factors."},{"move":"M1","span":[74,74],"role":"Reports empirical evidence that partner interaction (not just precedent) shapes reference shortening, grounding the gap in established findings."},{"move":"M3","span":[75,80],"role":"Announces what a complete historical model must include (adaptability to partner feedback), names the next two factors (provisionality and partner specificity), and grounds them in the collaborative view of language use — extending the paper's framework toward its full four-factor account."}],"sentences":[{"id":1,"text":"When speakers refer to an object, as with the loafer, one of their goals is to get their addressees to identify the object.","tag":"emph","tier":"primary","parent_id":null,"note":"Opens the paper by asserting the existence and significance of a core phenomenon in reference production.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":2,"text":"Current theories of reference differ on how they manage that.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Characterizes the state of the field.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":3,"text":"By some theories, speakers design each referring expression with enough information, but no more than enough, to distinguish the referent from its surroundings.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports one class of existing theoretical account.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":4,"text":"By other theories, speakers may include more information than necessary.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a contrasting class of existing theoretical account.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":5,"text":"Both of these types of theories are ahistorical: They assume that speakers design references without regard to past or potential interaction with addressees.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a tension — both theory types share a limiting assumption (ahistoricity) that the paper will argue against.","cars_move":"M2","cars_step":"2A","move_note":null},{"id":6,"text":"In this article, we argue that speakers exploit both past and potential interactions, and we test several alternatives for how they do that.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the paper's argument and purpose.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":7,"text":"Labels reflect conceptualizations.","tag":"link:opening","tier":"secondary","parent_id":null,"note":"Bolded section header in original text; announces the sub-section topic without making an independent claim.","cars_move":"M1","cars_step":"1B","move_note":"M2->M3 cycling: returns to M1 territory review after initial M3 announcement"},{"id":8,"text":"According to the principle of contrast (E. V. Clark, 1987), all forms of language contrast in meaning, and there are no true synonyms (see also Bolinger, 1977; H. H. Clark & Clark, 1979; Levelt, 1989).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports an established theoretical principle from the literature.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":9,"text":"So when speakers refer to the loafer, they are conceptualizing an object, for current purposes, as a loafer, not merely as a piece of clothing, shoe, or casual shoe (Brown, 1958a, 1958b).","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Applies the principle of contrast to a concrete example; subordinate to [8].","cars_move":"M1","cars_step":"1C","move_note":null},{"id":10,"text":"How do speakers choose and mark the particular conceptualization they use?","tag":"link:opening","tier":"secondary","parent_id":null,"note":"Rhetorical question that opens the topic sequence on ahistorical factors; no gap is identified, no finding reported — purely organizational.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":11,"text":"Let us first consider three ahistorical factors: informativeness, lexical availability, and perceptual salience.","tag":"link:opening","tier":"secondary","parent_id":null,"note":"Structural announcement introducing the ahistorical factors sequence; no independent claim.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":12,"text":"The best known proposal is that speakers simply design their referring expressions to distinguish a referent from a set of alternatives (Brown, 1958b; Olson, 1970): They choose the most concise expression that will enable their addressees to pick out the referent uniquely.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the dominant established proposal in the reference literature.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":13,"text":"By Grice's (1975) maxim of quantity, for example, speakers try to provide enough information (\"Make your contribution as informative as is required\") but without providing too much (\"Do not make your contribution more informative than is required\"; Grice, 1975, p. 26; see also Horn, 1984; Levinson, 1983).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports Grice's maxim as a specific theoretical account.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":14,"text":"So if they want to refer to a brown loafer in a set consisting of the loafer, a sneaker, and a high-heeled shoe, they should not use the shoe, which is not informative enough, or the brown loafer, which is more informative than required, but rather the loafer.","tag":"extension:illustrative","tier":"secondary","parent_id":13,"note":"Provides a concrete example illustrating the Gricean maxim; subordinate to [13].","cars_move":"M1","cars_step":"1C","move_note":null},{"id":15,"text":"Informativeness, however, may be overridden by other factors.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces tension against the informativeness account.","cars_move":"M2","cars_step":"2A","move_note":"Interlaced M1/M2: brief gap moment within extended territory review"},{"id":16,"text":"One such factor is lexical availability—how easy it is to conceptualize a thing in one way and to retrieve and produce a corresponding label.","tag":"framedef","tier":"primary","parent_id":null,"note":"Introduces and defines \"lexical availability\" as a named factor used in the paper's framework.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":17,"text":"For many objects, the most available labels are basic-level nouns—dog, for example, as opposed to animal or terrier (Cruse, 1977; Murphy & Smith, 1982; Rosch, Mervis, Gray, Johnson, & Boyes-Braem, 1976).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports established findings about basic-level terms and lexical availability.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":18,"text":"When the alternatives consist of a terrier, a bicycle, and a hammer, by Grice's (1975) maxim of quantity speakers should refer to the terrier as the animal.","tag":"extension:illustrative","tier":"secondary","parent_id":17,"note":"Illustrates the conflict between informativeness and availability with a concrete example; subordinate to [17].","cars_move":"M1","cars_step":"1C","move_note":null},{"id":19,"text":"In fact, they are more likely to choose dog even though it is more informative than required.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports an empirical finding that speakers violate Gricean informativeness in favor of basic-level terms.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":20,"text":"Another factor that can override informativeness is perceptual salience.","tag":"framedef","tier":"primary","parent_id":null,"note":"Introduces \"perceptual salience\" as another named factor in the paper's analytical framework.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":21,"text":"Sometimes speakers describe what is salient about an object (e.g., small black terrier) rather than just those features that will distinguish it from its neighbors (Ford & Olson, 1975; Mangold & Pobel, 1988).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports findings supporting the role of perceptual salience in referential choice.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":22,"text":"When the set of alternative objects is large, speakers may be overinformative if they begin their references before they have taken in the entire array (Deutsch & Pechmann, 1982; Pechmann, 1989).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports empirical findings about overinformativeness in large arrays.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":23,"text":"According to one account of lexical choice (Cruse, 1977), the most common term that is also informative enough should be considered to be unmarked; all other terms are marked.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports Cruse's theoretical account of markedness in lexical choice.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":24,"text":"Even in light of informativeness, availability, and salience, there is still a great deal of variability in speakers' lexical choices.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a limitation of ahistorical accounts — they cannot fully explain observed variability.","cars_move":"M2","cars_step":"2B","move_note":"Interlaced M1/M2: gap named explicitly after extended territory review"},{"id":25,"text":"The problem is that most objects can be conceptualized in indefinitely many ways.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the scope and significance of the conceptualization variability problem.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":26,"text":"In one study, when people had to label an action to be carried out by a computer, the likelihood that any two people would use the same label, conceptualizing the action in the same way, was only 7-18% (Furnas, Landauer, Gomez, & Dumais, 1987).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a specific empirical finding illustrating the extent of lexical variability.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":27,"text":"In another study, pairs of people in conversation referred to the same abstract geometric form variously as \"the rice bag,\" \"the whale,\" \"the complacent one,\" \"the stretched-out stop sign,\" and \"the baby in a straitjacket\" (Schober & Clark, 1989, p. 217).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports another empirical finding demonstrating lexical variability in referring.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":28,"text":"We would like to understand variability and consistency in lexical choices for at least two reasons.","tag":"link:opening","tier":"secondary","parent_id":null,"note":"Structural announcement that two motivations will follow; no independent rhetorical claim.","cars_move":"M1","cars_step":"1A","move_note":"Centrality claim framing: motivates why the phenomenon matters"},{"id":29,"text":"First, predicting lexical choices should improve speech recognition by machines (Brennan, Ries, Rubman, & Lee, 1996).","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the practical significance of understanding lexical choice.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":30,"text":"Second, if lexical choices reflect conceptual coordination in conversation (H. H. Clark & Wilkes-Gibbs, 1986; Garrod & Anderson, 1987), then they should tell us not only about individual processes of language use, but also about distributed ones.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts broader theoretical significance of the research topic.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":31,"text":"The factors described so far account for \"one-shot\" referring; the tacit assumption is that there is no past or future interaction between speakers and addressees.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a fundamental limitation of ahistorical accounts — they presuppose no interaction history.","cars_move":"M2","cars_step":"2A","move_note":"Return to M2 gap: identifies shared limiting assumption of reviewed accounts"},{"id":32,"text":"In conversation—the primary site of language use—it is known that people design their referring expressions on the basis of their past references to the same objects (Carroll, 1980; H. H. Clark & Wilkes-Gibbs, 1986; Krauss, 1987; Krauss & Weinheimer, 1964, 1966; Schober & Clark, 1989).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports established findings that conversational reference is shaped by history.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":33,"text":"With repeated references to objects, they tend to reuse the same terms as they coordinate their perspectives, a phenomenon that Garrod and Anderson (1987) have labeled lexical entrainment.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the established phenomenon of lexical entrainment and its label from prior literature.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":34,"text":"Historical models differ from ahistorical models in their predictions about lexical choices.","tag":"contrast","tier":"primary","parent_id":null,"note":"Asserts a substantive difference between historical and ahistorical models — a genuine claim, not merely a topic announcement.","cars_move":"M2","cars_step":"2C","move_note":"Question-raising: sets up the open question to be resolved by the paper's experimental paradigm"},{"id":35,"text":"Suppose there are two sets of 12 cards, Set A and Set B, with a picture of a common object on each card.","tag":"contribution","tier":"primary","parent_id":null,"note":"Introduces the paper's own experimental paradigm via a hypothetical scenario used to explain theoretical distinctions.","cars_move":"M3","cars_step":"3A","move_note":"M2->M3 cycling: paper occupies the niche by presenting its paradigm"},{"id":36,"text":"Both sets include the same loafer; this is the only shoe in Set A, whereas Set B has a high-heeled shoe and a sneaker as well.","tag":"extension:definitional","tier":"secondary","parent_id":35,"note":"Elaborates the experimental scenario introduced in [35].","cars_move":"M3","cars_step":"3A","move_note":null},{"id":37,"text":"Now suppose two people, a director and a matcher, are asked to talk about these objects one set at a time.","tag":"extension:definitional","tier":"secondary","parent_id":35,"note":"Continues elaborating the experimental scenario introduced in [35].","cars_move":"M3","cars_step":"3A","move_note":null},{"id":38,"text":"And in doing that, the director refers first to all the objects in Set A, then to all the objects in Set B, and then again to all the objects in Set A.","tag":"extension:definitional","tier":"secondary","parent_id":null,"note":"Further specifies the trial structure of the scenario; subordinate to [35].","cars_move":"M3","cars_step":"3A","move_note":null},{"id":39,"text":"We call these the A, B, and C trials.","tag":"framedef","tier":"primary","parent_id":null,"note":"Names a terminological construct (A, B, C trials) used as analytical machinery throughout the paper.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":40,"text":"For simplicity's sake, we refer to the director as female and the matcher as male in examples.","tag":"new_tag_needed","tier":"unknown","parent_id":null,"note":"Establishes a presentational convention for the paper.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":41,"text":"The issue is how the director will refer to the loafer.","tag":"nostat","tier":"primary","parent_id":null,"note":"Frames the open question that the A/B/C scenario is designed to address.","cars_move":"M2","cars_step":"2C","move_note":"M2->M3 cycling: returns to gap/question language within M3 paradigm presentation"},{"id":42,"text":"In the A trials (with Card Set A), she will probably refer to it as the shoe, using the highly available basic-level term.","tag":"extension:speculative","tier":"secondary","parent_id":null,"note":"Offers a prediction about behavior in A trials derived from the ahistorical account; subordinate to [41].","cars_move":"M2","cars_step":"2C","move_note":null},{"id":43,"text":"In the B trials (with Card Set B), she should be more specific, using a phrase such as the loafer, to distinguish it from the other two shoes.","tag":"extension:speculative","tier":"secondary","parent_id":null,"note":"Continues predictions about trial behavior based on informativeness principles; subordinate to [41].","cars_move":"M2","cars_step":"2C","move_note":null},{"id":44,"text":"What will she do in the C trials (with Card Set A again)?","tag":"nostat","tier":"primary","parent_id":null,"note":"Poses the key unresolved question that motivates the paper's investigation.","cars_move":"M2","cars_step":"2C","move_note":null},{"id":45,"text":"In ahistorical models such as Cruse's (1977), she should use the shoe because it is both informative enough and highly available.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the prediction of the ahistorical model for C trials.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":46,"text":"But in historical models, the director might retain the loafer even though it is overinformative.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces the contrasting prediction of historical models against [45].","cars_move":"M2","cars_step":"2A","move_note":"Interlaced M1/M2: counter-claim against ahistorical model prediction"},{"id":47,"text":"To explain why she might do that, let us consider four factors that define increasingly specific models: recency, frequency of use, provisionality, and partner specificity.","tag":"link:opening","tier":"secondary","parent_id":null,"note":"Structural announcement of the four-factor framework to be developed; does not assert an independent claim beyond naming the topics.","cars_move":"M3","cars_step":"3A","move_note":"Returns to M3: announces the paper's own theoretical framework"},{"id":48,"text":"With the first factor, recency, people in conversation expect to conceptualize an object the same way they conceptualized it on their last successful reference.","tag":"framedef","tier":"primary","parent_id":null,"note":"Introduces and defines \"recency\" as a named theoretical factor in the paper's framework.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":49,"text":"This factor is embodied in Garrod and Anderson's (1987) output/input coordination principle, which holds that people formulate their current utterance according to the same model and semantic rules used to interpret their partner's most recent utterance.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports Garrod and Anderson's theoretical principle as prior work instantiating the recency factor.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":50,"text":"This accounts for how they come to use the same terms and share an underlying conceptualization (Garrod & Anderson, 1987).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports what the output/input coordination principle explains, per prior literature.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":51,"text":"The output/input coordination principle has several a priori advantages.","tag":"link:opening","tier":"secondary","parent_id":null,"note":"Announces that advantages will follow; the substantive content is in [52] and [54].","cars_move":"M1","cars_step":"1C","move_note":null},{"id":52,"text":"First, because it is strictly local, all speakers have to do is keep track of the last description.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports an advantage of Garrod and Anderson's principle as characterized in prior work.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":53,"text":"That should simplify their job in forming a reference.","tag":"extension:speculative","tier":"secondary","parent_id":null,"note":"Extends the locality claim into an inference about cognitive simplification; subordinate to [52].","cars_move":"M1","cars_step":"1C","move_note":null},{"id":54,"text":"Second, the principle does not assume that speakers and their partners necessarily form complicated models of each other or beliefs about their shared knowledge—their mutual beliefs—and that also should simplify the process of referring.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a second advantage of the output/input coordination principle from prior literature.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":55,"text":"Recency, however, does not tell the whole story.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a limitation of the recency-based account.","cars_move":"M2","cars_step":"2B","move_note":"Interlaced M1/M2: gap identified in the existing recency account"},{"id":56,"text":"It does not account for how people choose their terms for a brand-new referent.","tag":"contrast","tier":"primary","parent_id":null,"note":"Specifies a first limitation of the recency account.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":57,"text":"If their initial choice is based on informativeness, availability, and salience, then recency is a plausible basis only for re-referring.","tag":"extension:speculative","tier":"secondary","parent_id":56,"note":"Derives an inference about recency's scope from [56]; subordinate to [56].","cars_move":"M2","cars_step":"2B","move_note":null},{"id":58,"text":"Second, in a historical account based on recency alone, repeated references to an object would seem to result in rigid conformity, for \"once co-ordination has been achieved, no modification can be introduced without violating the principle of local consistency\" (Garrod & Anderson, 1987, p. 209).","tag":"contrast","tier":"primary","parent_id":null,"note":"Reports a second limitation of pure recency-based accounts, citing Garrod and Anderson's own acknowledgment.","cars_move":"M2","cars_step":"2A","move_note":null},{"id":59,"text":"But as Garrod and his colleagues noted (Garrod & Anderson, 1987; Garrod & Clark, 1993; Garrod & Doherty, 1994), description schemes often continue to evolve, which prompted them to offer several modifications to the output/input coordination principle.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports that prior authors acknowledged the limitation and proposed modifications.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":60,"text":"The first modification assumed that \"one participant, the leader, [is] the arbiter over the established scheme, while the other participant, the follower, [has] to abide rigidly by the output/input principle\" (Garrod & Anderson, 1987, p. 209).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the first modification to the output/input coordination principle from prior work.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":61,"text":"The second assumed that speakers override the principle when they need to repair a referring expression that has been misunderstood (Garrod & Clark, 1993).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the second modification from prior work.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":62,"text":"And the third assumed that the principle can be overridden by situational salience (Garrod & Doherty, 1994).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the third modification from prior work.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":63,"text":"Even with these modifications, the output/input coordination principle predicts that directors in our C trials should retain the most recent successful reference to an object.","tag":"contrast","tier":"primary","parent_id":null,"note":"Identifies a residual limitation — even modified recency makes a prediction inconsistent with what the authors will demonstrate.","cars_move":"M2","cars_step":"2A","move_note":"Interlaced M1/M2: residual gap in prior literature even after modifications"},{"id":64,"text":"It should not matter how they conceptualized the object before that.","tag":"extension:definitional","tier":"secondary","parent_id":null,"note":"Unpacks the implication of the recency prediction stated in [63]; subordinate to [63].","cars_move":"M2","cars_step":"2A","move_note":null},{"id":65,"text":"Lexical choices should also be affected by speakers' memory for a conceptualization.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the existence and relevance of a memory-based factor in lexical choice, opening the frequency-of-use discussion.","cars_move":"M3","cars_step":"3A","move_note":"Returns to M3: begins articulating the paper's own theoretical contribution"},{"id":66,"text":"The more often people appeal to a particular conceptualization, the more durable its memory representation should be, as Garrod and Doherty (1994) pointed out.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a claim from prior literature about frequency and memory durability.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":67,"text":"We call this frequency of use.","tag":"framedef","tier":"primary","parent_id":null,"note":"Names the construct that the paper will use as a factor in its model.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":68,"text":"A model based on both frequency of use and recency predicts one additional phenomenon over a model based on recency alone.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance of combining frequency of use with recency.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":69,"text":"Consider the situation described earlier in which a director and a matcher discuss a set of B cards in which the loafer is not the only shoe and then, in C trials, discuss a set of cards in which it is the only shoe.","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Refers back to the scenario to illustrate the frequency-of-use prediction; subordinate to [68].","cars_move":"M3","cars_step":"3C","move_note":null},{"id":70,"text":"The more often the director has referred to the loafer in Set B, the more firmly that conceptualization has been established, so the more likely she should be to retain the loafer in the C trials.","tag":"extension:speculative","tier":"secondary","parent_id":68,"note":"Derives the frequency-of-use prediction from [68]; no new evidence.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":71,"text":"Likewise, if they had discussed the unique A cards several times before discussing the nonunique B cards, then upon returning to the unique cards in the C trials they should be more likely to return to using the shoe than if they had never discussed the unique cards before.","tag":"extension:speculative","tier":"secondary","parent_id":68,"note":"Extends the frequency-of-use prediction to A-trial history effects.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":72,"text":"Frequency of use takes into account how strongly and easily activated a conceptualization is, whereas recency considers only the conceptualization used on the last reference.","tag":"contrast","tier":"primary","parent_id":null,"note":"Makes an independent comparative claim distinguishing frequency of use from recency.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":73,"text":"Recency and frequency of use are not the only factors in re-referring; if they were, speakers should use the same terms in talking to responsive partners as in talking into a tape recorder, and they do not.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a limitation of recency and frequency-of-use accounts together, using evidence that interactive partners matter.","cars_move":"M2","cars_step":"2B","move_note":"M2->M3 cycling: gap identified in combined recency + frequency account"},{"id":74,"text":"With partners, but not with tape recorders, repeated references tend to become shorter and more efficient (Krauss & Weinheimer, 1964, 1966; Kraut, Lewis, & Swezey, 1982; Schober, 1993).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports empirical findings showing partner-specific shortening of references.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":75,"text":"In a more complete historical model, then, references are not only based on precedent but are also adapted to changing circumstances.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts what a complete historical model must include — establishes adaptability as a real and necessary property.","cars_move":"M3","cars_step":"3A","move_note":"Returns to M3: announces what the paper's model must and will include"},{"id":76,"text":"They are modified in response to a partner's feedback and shortened as precedents become more firmly established.","tag":"extension:definitional","tier":"secondary","parent_id":null,"note":"Unpacks what \"adapted to changing circumstances\" means in [75]; subordinate to [75].","cars_move":"M3","cars_step":"3A","move_note":null},{"id":77,"text":"We consider this adaptability with the next two factors—provisionality and partner specificity.","tag":"link:opening","tier":"secondary","parent_id":null,"note":"Structural announcement of the next subsections; no independent rhetorical claim.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":78,"text":"According to the collaborative view of language use (Brennan, 1990; H. H. Clark & Schaefer, 1987, 1989; H. H. Clark & Wilkes-Gibbs, 1986; Schober & Clark, 1989), establishing a precedent in conversation requires interaction.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the collaborative view of language use from prior literature as the theoretical basis for provisionality.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":79,"text":"When speakers present a reference, they do so only provisionally, and they then work with their addressees to establish that it has been understood.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the provisionality claim as established in prior collaborative view literature.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":80,"text":"When speakers first refer to an object as the loafer, they are proposing to their addressees that it be conceptualized as a loafer.","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Illustrates the provisional nature of reference with a concrete example; subordinate to [79].","cars_move":"M1","cars_step":"1C","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"brownschmidt_2015","title":"brownschmidt 2015","authors":["Brownschmidt"],"year":2015,"section":"Introduction"},"arc_summary":"The introduction builds an unusually wide M1 base — spanning perception, decision-making, memory, and physical-context language effects — before pivoting twice to M3 scope announcements (sentences 8 and 16), making the **niche implicit rather than stated**. The final arc compresses **M2 into a single contrast sentence** (21), sandwiched between M3 thesis claims, so gap-carving and occupation are nearly simultaneous. The structural effect is that the paper's originality emerges from reframing (people as contexts) rather than from identifying a research void. **People-as-contexts outcompeting physical context** is the pivot the whole M1 survey was scaffolding toward.","structured_arc":"M1 -> M3 -> M1 -> M2 -> M3","move_roles":[{"move":"M1","span":[1,7],"role":"Establishes the cross-domain universality of context-dependence in cognition — spanning perception, decision-making, and memory — to license the chapter's eventual claim that the conversational partner is just another (but superior) contextual cue."},{"move":"M3","span":[8,8],"role":"Pivots from general cognition to language use, narrowing the territory and signaling the chapter's domain before returning to extend the M1 review within that domain."},{"move":"M1","span":[9,15],"role":"Surveys established physical-context effects in language processing — referential domains, modifier use — building the specific sub-territory against which the conversational-partner focus will be contrasted."},{"move":"M3","span":[16,20],"role":"Announces the chapter's specific focus (conversational partner as contextual cue), introduces the conceptual framework, and states the central thesis — occupying the implicit niche opened by the physical-context survey without formally naming a gap."},{"move":"M2","span":[21,21],"role":"Carves the niche retroactively by conceding the established status of physical-context effects and asserting that people-as-contexts are a more potent source of constraint — compressing the entire gap-identification into a single contrast move."},{"move":"M3","span":[22,23],"role":"Closes the arc by elaborating why conversational partners outperform physical context (unique perspective, knowledge, goals) and asserting the broad reach of these representations across language, interaction, and memory."}],"sentences":[{"id":1,"text":"A constant feature across many, if not all, domains of cognition is that cognitive processes are contextually dependent.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the existence and broad significance of context-dependence in cognition; sets up the entire chapter's framing claim.","cars_move":"M1","cars_step":"1A","move_note":"Extended M1 opening; broad 'X matters' framing for context-dependence across cognition."},{"id":2,"text":"This includes processes in the moment, such as basic perceptual processes, as well as longer term memorial representations (see Yeh & Barsalou, 2006 for discussion).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Makes a citation-backed empirical claim about the scope of context-dependence across process types; Rule 3 requires tempstat for citation-supported domain claims.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":3,"text":"For example, the perceived size of an object varies as a function of the size of the nearby objects (i.e., the Ebbinghaus illusion, see Massaro & Anderson, 1971).","tag":"extension:illustrative","tier":"secondary","parent_id":2,"note":"Provides a concrete cited example of the context-dependence claim in [2]; parent [2] is tempstat (primary). A named example with citation under primary parent remains illustrative per the rules.","cars_move":"M1","cars_step":"1C","move_note":"Inherits move from parent sentence 2; specific study cited."},{"id":4,"text":"Likewise, judgments about the brightness of an object vary with the brightness of the nearby objects and their geometrical organization (Adelson, 1993).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a second independently cited finding supporting context-dependence in perception; parallel to [3] but independently primary.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":5,"text":"In decision making, preferences for one selection over another are influenced by the set of options available and the framing of the problem or choice (Huber, Payne, & Puto, 1982; Tversky & Kahneman, 1981; see Mellers, Schwartz, & Cooke, 1998 for a review).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports established citation-backed findings on context-dependence in decision making, extending the cross-domain survey.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":6,"text":"Memory is context bound as well; learners form source-item bindings, such as whom a piece of information was heard from (Johnson, Hashtroudi, & Lindsay, 1993), as well as destination-item bindings, such as whom you told a piece of information to (Gopie & MacLeod, 2009).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports established findings on context-dependence in memory, including person-linked bindings directly relevant to the chapter's thesis.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":7,"text":"Similarly, arbitrary environmental context affects retrieval of items from memory such that recall is improved when the learning and retrieval occur in the same location (Godden & Baddeley, 1975).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the classic environmental context effect in memory; this finding is used as a direct analogy throughout the chapter.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":8,"text":"The focus of this chapter is the domain of language use and the way in which context shapes how we communicate in conversational settings.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the scope and subject matter of the chapter.","cars_move":"M3","cars_step":"3A","move_note":"First M3 pivot: announces chapter scope before returning to M1 territory review of language context."},{"id":9,"text":"Well established in the language literature are findings that the physical context of language use guides language processing (Olson, 1970; Osgood, 1971; Tanenhaus, Spivey-Knowlton, Eberhard, & Sedivy, 1995).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports established findings on physical context effects in language processing.","cars_move":"M1","cars_step":"1C","move_note":"Return to M1 after brief M3 pivot in sentence 8; part of M2->M3 cycling variant."},{"id":10,"text":"When describing a specific object, speakers typically distinguish the intended referent from other referents in the local context or referential domain (see Chambers, Tanenhaus, Eberhard, Carlson, & Filip, 2002).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports an established finding about referential domain effects on language production.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":11,"text":"For example, consider a situation in which a customer is deciding which of two shirts to purchase, a checkered shirt or a striped shirt.","tag":"extension:illustrative","tier":"secondary","parent_id":10,"note":"Opens an illustrative scenario to concretize the claim in [10]; parent [10] is tempstat (primary).","cars_move":"M1","cars_step":"1C","move_note":"Inherits move from parent sentence 10."},{"id":12,"text":"If the customer said to the salesperson, I'll take 'the shirt,' that referring expression would be ambiguous.","tag":"extension:illustrative","tier":"secondary","parent_id":10,"note":"Continues the illustrative scenario from [11]; re-parents to [10] (primary) per the subordination rule since [11] is secondary.","cars_move":"M1","cars_step":"1C","move_note":"Inherits move from parent sentence 10."},{"id":13,"text":"Instead, the customer must distinguish the intended referent from other potential referents in the local context, for example, by saying 'I'll take the striped shirt.'","tag":"extension:illustrative","tier":"secondary","parent_id":10,"note":"Completes the illustration; re-parents to [10] (primary) per the subordination rule.","cars_move":"M1","cars_step":"1C","move_note":"Inherits move from parent sentence 10."},{"id":14,"text":"When using language, speakers use modifiers like striped not only to characterize or describe the intended referent (attributive uses of modifiers) but also to distinguish the intended referent from other potential referents in the referential domain (Brennan & Clark, 1996; Osgood, 1971; Pechmann, 1989).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports established citation-backed findings on the dual function of modifiers in referential language; generalizes beyond the example.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":15,"text":"In these examples, the language user must take note of constraints imposed by the physical environment in order to communicate effectively with others.","tag":"link:closing","tier":"secondary","parent_id":14,"note":"Wraps up the physical-context example sequence by drawing a functional conclusion; parent [14] is tempstat (primary), so secondary parenting is valid.","cars_move":"M1","cars_step":"1B","move_note":"Inherits move from parent sentence 14; functions as a field-level generalizing close of the M1 block."},{"id":16,"text":"In the present chapter, we focus on a different aspect of the context of language use, specifically the ways in which the conversational partner herself is an important source of contextual constraint.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the specific focus of the chapter, distinguishing it from prior work on physical context.","cars_move":"M3","cars_step":"3A","move_note":"Second M3 pivot; the implicit niche (gap from physical-context focus) is bridged here rather than stated as nostat."},{"id":17,"text":"In some cases, the partner constrains the relevant physical context, for example, in situations where two conversational partners have a different perspective in the physical world.","tag":"extension:illustrative","tier":"secondary","parent_id":16,"note":"Provides a qualifying example of how partner-as-context overlaps with physical context; parent [16] is contribution (primary).","cars_move":"M3","cars_step":"3A","move_note":"Inherits move from parent sentence 16."},{"id":18,"text":"The central goal of the present chapter is to draw parallels between context dependency in cognition broadly, and the partner specificity of language use.","tag":"contribution","tier":"primary","parent_id":null,"note":"Explicitly restates the chapter's central goal at the opening of subsection 1.1.","cars_move":"M3","cars_step":"3A","move_note":"Restates purpose; part of extended M3 occupation block."},{"id":19,"text":"Here we conceptualize the conversational partner as a contextual cue in language use (also see Horton & Gerrig, 2005a) and draw parallels between the conversational partner and other types of context in language, such as objects in the visual world, in order to gain insights into how the partner shapes the use of language.","tag":"framedef","tier":"primary","parent_id":null,"note":"Introduces the conceptual framework that drives the chapter's analysis — the conversational partner as a contextual cue — naming it explicitly and linking to prior work.","cars_move":"M3","cars_step":"3B","move_note":"Presents the conceptual framework justifying the study's approach; 3B (justification/framing)."},{"id":20,"text":"In doing so, we argue that people are a particularly potent source of contextual constraint that structures and shapes the representations that underlie language processing.","tag":"contribution","tier":"primary","parent_id":null,"note":"States the paper's central argument/thesis claim.","cars_move":"M3","cars_step":"3C","move_note":"Pre-announces the central finding/thesis of the chapter."},{"id":21,"text":"Although the significance of the physical context (e.g., the physical environment and the objects therein) is well established in both memory and language (e.g., Godden & Baddeley, 1975; Osgood, 1971), here we argue that people as contexts offer a potentially more important and influential source of contextual constraint.","tag":"contrast","tier":"primary","parent_id":null,"note":"Concedes the established status of physical context effects, then asserts that people-as-contexts are more important — a contrast move setting up the chapter's specific contribution.","cars_move":"M2","cars_step":"2A","move_note":"M2->M3 cycling: returns to niche-carving via counter-claim after initial M3 statements; directly challenges the sufficiency of prior work on physical context."},{"id":22,"text":"Unlike a place or a scent, a conversational partner provides a context enriched with his or her unique perspective, knowledge, beliefs, and goals.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the distinctive and superior nature of conversational partners as contextual cues; elaborates the contrast in [21].","cars_move":"M3","cars_step":"3C","move_note":"Returns to M3 after the M2 counter-claim in sentence 21; supports the thesis claim with elaboration of the principal finding/argument."},{"id":23,"text":"These perspective representations and these goals guide our language, our interactions, and our memory of those interactions.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the broad significance and reach of perspective representations and goals — not hedged speculation but a positive claim about their role; parent [22] is emph (primary), and this sentence makes its own independent assertion of significance.","cars_move":"M3","cars_step":"3C","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"caucheteux_2023","title":"caucheteux 2023","authors":["Caucheteux"],"year":2023,"section":"Introduction"},"arc_summary":"The introduction builds credibility for deep language models as brain proxies (S1–3) before pivoting hard on a **persistent gap** between model and human language processing (S4–6). The niche is constructed in two moves: first via **predictive coding theory** as an explanatory framework (S7), then via a brief return to prior territory (S8) before a sharpened gap statement (S9–10) — an interlaced M1/M2 structure that isolates exactly what is unknown. The paper then occupies that niche cleanly, announcing the study design, the enhancement strategy, and a **hierarchical cortical finding** that validates predictive coding theory empirically (S11–13).","structured_arc":"M1 -> M2 -> M3","move_roles":[{"move":"M1","span":[1,3],"role":"Establishes the research territory by documenting recent progress in deep language models and their brain alignment, culminating in the key finding that predictive training drives brain-like computation — setting up the contrast to follow."},{"move":"M2","span":[4,7],"role":"Counters the optimistic territory review by cataloguing model failures relative to human cognition, then introduces predictive coding theory as the explanatory lens that reframes those failures as a researchable question about timescale and representational depth."},{"move":"M1","span":[8,8],"role":"Briefly re-enters the territory to acknowledge prior brain-prediction work, providing a baseline that the subsequent gap statement (S9–10) will directly undercut."},{"move":"M2","span":[9,10],"role":"Sharpens the niche by contrasting prior surprisal-based approaches with their fundamental limitation — reduction to a single token probability — and stating the resulting unknown: the nature and temporal scope of predicted representations."},{"move":"M3","span":[11,13],"role":"Occupies the niche in three steps: announcing the large-scale fMRI study design, describing the analytic strategy of enhanced multi-level predictions, and pre-announcing the hierarchical cortical finding that validates predictive coding theory."}],"sentences":[{"id":1,"text":"In less than three years, deep learning has made considerable progress in text generation, translation and completion thanks to algorithms trained with a simple objective: predicting words from their nearby context.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1B","move_note":null},{"id":2,"text":"Remarkably, the activations of these models have been shown to linearly map onto human brain responses to speech and text.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":3,"text":"Additionally, this mapping primarily depends on the algorithms' ability to predict future words, hence suggesting that this objective suffices to make them converge to brain-like computations.","tag":"tempstat","tier":"primary","parent_id":null,"note":"The speculative framing is part of the cited finding, not the authors' own speculation.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":4,"text":"Yet, a gap persists between humans and these algorithms: in spite of considerable training data, current language models are challenged by long story generation, summarization and coherent dialogue and information retrieval; they fail to capture several syntactic constructs and semantics properties and their linguistic understanding is superficial.","tag":"contrast","tier":"primary","parent_id":null,"note":null,"cars_move":"M2","cars_step":"2A","move_note":null},{"id":5,"text":"For instance, they tend to incorrectly assign the verb to the subject in nested phrases like 'the keys that th
