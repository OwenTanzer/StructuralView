l choices (story task, DSI, LLMs), dual hypotheses about human vs. GPT-3/4 creativity, a human–AI comparison aim, a GPT-4 replication, and broader implications — functioning as a compressed methods preview."}],"sentences":[{"id":1,"text":"The question of how to reliably assess the creative quality of ideas is a longstanding topic in creativity research (Amabile, 1982; Reiter-Palmon, Forthmann, & Barbot, 2019).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1B","move_note":null},{"id":2,"text":"Divergent thinking (DT) refers to the ability to generate creative ideas by combining diverse types of information.","tag":"framedef","tier":"primary","parent_id":null,"note":"Introduces DT as a named construct the paper will use as analytical machinery throughout.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":3,"text":"The alternative uses task (AUT) is the most common measure of DT (Guilford, 1967), in which participants are presented with an object and asked to generate unusual and creative uses for it.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":4,"text":"Studies using the AUT have traditionally relied on metrics such as fluency, counting the number of responses produced, or flexibility, the number of different categories of responses, to assess AUT performance; however, these measures are highly correlated with each other and fall short in capturing the full scope of creative ideation (Acar, Ogurlu, & Zorychta, 2022; Acar & Runco, 2015).","tag":"contrast","tier":"primary","parent_id":null,"note":"Reports traditional metrics and then introduces their limitation within the same sentence; the contrast/limitation against prior methods is the dominant rhetorical function.","cars_move":"M2","cars_step":"2A","move_note":null},{"id":5,"text":"While subjective scoring methods for originality, the creative quality of ideas produced on the AUT, have shown evidence of convergent validity (Forthmann, Oyebade, Ojo, Günther, & Holling, 2019; Jauk, Benedek, & Neubauer, 2014), inter-rater agreement is not always high, raising issues of reliability (Barbot, 2018).","tag":"contrast","tier":"primary","parent_id":null,"note":"Concedes validity of subjective methods but pivots to the limitation of unreliability.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":6,"text":"Researchers in creativity assessment have sought to standardize DT performance with computational measures of semantic distance to address the subjectivity of traditional scoring methods (Beaty & Johnson, 2021; Dumas, Doherty, & Organisciak, 2020).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":"Returns to M1 after M2 to review the computational response to the gap"},{"id":7,"text":"The application of semantic distance to DT assessment is based on the associative theory of creativity (Kenett & Faust, 2019; Mednick, 1962), which characterizes creative thought as a novel and useful recombination of semantic knowledge; thus, the combination of more remotely associated concepts is considered more creative.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the theoretical grounding for the semantic distance approach with citation support.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":8,"text":"In light of recent evidence showing that semantic distance scores of AUT responses are correlated with human ratings of creativity (Orwig, Diez, Vannini, Beaty, & Sepulcre, 2021), the present study implements a novel semantic diversity measure (Johnson et al., 2023) to overcome the limits of traditional DT assessments and characterize the degree to which creative stories connect semantically divergent concepts.","tag":"novstat","tier":"primary","parent_id":null,"note":"Uses prior evidence as springboard to announce the novel methodological contribution of the present study.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":9,"text":"Extending past work, we define semantic diversity in narrative texts and examine its relation to human judgments of creativity.","tag":"contribution","tier":"primary","parent_id":null,"note":"States the scope and purpose of the present study's extension.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":10,"text":"Complementary research has highlighted the contributions of episodic memory to DT.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Corrected from link:opening. The sentence makes a substantive claim about a body of literature — asserting that research has demonstrated episodic memory contributes to DT — rather than merely naming a topic. That is a domain-level summary fitting tempstat.","cars_move":"M1","cars_step":"1B","move_note":"M2->M3 cycle: returns to M1 to establish a new sub-territory on episodic memory"},{"id":11,"text":"After receiving a brief Episodic Specificity Induction (ESI) – a procedure that enhances the contribution of episodic retrieval processes to a subsequent task (for review, see Schacter & Madore, 2016) – participants reliably generate more novel uses for objects on the AUT compared with a control induction (Madore, Addis, & Schacter, 2015; Madore, Jing, & Schacter, 2016).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":12,"text":"Furthermore, neuroimaging results show increased activity in memory-related brain regions, such as the hippocampus, when participants perform the AUT following the ESI, compared to following a control induction (Madore, Thakral, Beaty, Addis, & Schacter, 2019).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":13,"text":"Related studies indicate that participants generated fewer episodic details when imagining a future event and fewer ideas on a DT task, after receiving inhibitory transcranial magnetic stimulation to the angular gyrus, which led to reduced activity in connected regions including hippocampus (Thakral, Madore, Kalinowski, & Schacter, 2020).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":14,"text":"Together these findings suggest that DT may be facilitated by similar hippocampus-mediated episodic processes as autobiographical memory and imagination of future events.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Corrected from link:closing. Although integrative, the sentence makes a substantive cross-domain empirical generalization — the kind of citation-backed domain-level claim that tempstat covers. It must also be primary to serve as parent for [15].","cars_move":"M1","cars_step":"1B","move_note":null},{"id":15,"text":"Perceptual details, such as sights, sounds and smells, are a central feature of episodic memory (e.g., Brunel, Labeye, Lesourd, & Versace, 2009; Conway, 2001; Saive, Royet, & Plainly, 2014; Wheeler, Petersen, & Buckner, 2000).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1B","move_note":null},{"id":16,"text":"Recent studies have shown impairment of perceptual memory retrieval following hippocampal damage (St-Laurent, Moscovitch, Jadd, & McAndrews, 2014; St-Laurent, Moscovitch, & McAndrews, 2016).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":17,"text":"Despite the growing literature on episodic contributions to creativity, the role of perceptual details in creative cognition has not yet been systematically examined.","tag":"nostat","tier":"primary","parent_id":null,"note":"Identifies the specific gap the paper addresses.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":18,"text":"We contend that perceptual details are particularly relevant to creative writing, and may serve to illustrate the role of imagination in the construction of creative narratives.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance and relevance of perceptual details for creative writing; motivates the study's focus rather than reporting a finding.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":19,"text":"Current theories suggest that both semantic and episodic memory processes contribute to the emergence of creative ideas (Benedek, Beaty, Schacter, & Kenett, 2023).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1B","move_note":"Brief return to M1 to provide theoretical grounding before the next M3 contribution"},{"id":20,"text":"If future imagination and creative thinking are mutually supported by episodic processes, a logical extension is that creative stories will contain a high degree of episodic details.","tag":"extension:speculative","tier":"secondary","parent_id":19,"note":"Derives a hypothesis from [19] without new evidence. Parent is [19] (tempstat). Subordination rule satisfied.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":21,"text":"Indeed, one recent study showed that participants who received an ESI prior to a creative writing task produced more episodic details in their stories compared to participants in a control induction, although originality ratings of the stories were comparable following ESI and control inductions (van Genugten, Beaty, Madore, & Schacter, 2022).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":22,"text":"Episodic detail is typically quantified in memory research by tallying the 'who, what, where' of a memory, as well as information that conveys the perceptual quality, or range of sensory experience, recalled.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports standard measurement practice in the field.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":23,"text":"Sheldon, Gurguryan, Madore, and Schacter (2019) found that emphasizing spatial information with a modified ESI procedure prior to autobiographical memory recollection and future simulation promoted the use of episodic processes to specifically access perceptual details of that event.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":24,"text":"It may be that stories written after ESI were not rated as more original than those from a control condition (van Genugten, Beaty, Madore, & Schacter, 2022) because the induction was geared toward the more general category of episodic, as opposed to perceptual, details.","tag":"contrast","tier":"primary","parent_id":null,"note":"Corrected from extension:speculative. The sentence critically reframes a prior null finding by arguing the study's null result stems from a methodological limitation (wrong category of induction). This is a reinterpretive critique of prior work — the defining function of contrast — not a simple speculative extension of a parent claim.","cars_move":"M2","cars_step":"2A","move_note":null},{"id":25,"text":"We suggest that the presence of perceptual details is a salient feature of creative narratives, serving to construct a rich scene and transport the reader to an alternative time and place.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the importance and defining character of perceptual details in creative narratives, motivating the study's focus.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":26,"text":"Provoking sensory details with descriptions of smells, tastes, sights, and sounds may allow readers to more deeply engage with a narrative.","tag":"extension:definitional","tier":"secondary","parent_id":25,"note":"Corrected from extension:illustrative. The sentence unpacks the mechanism of \"transport\" introduced in [25] by specifying which sensory modalities are involved — this is definitional elaboration, not an example or case. Parent is [25] (emph). Subordination rule satisfied.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":27,"text":"Thus, in the present study we examine contributions of episodic memory processes to creativity, looking at the specific role of perceptual details in creative short stories.","tag":"contribution","tier":"primary","parent_id":null,"note":"States the purpose of the present study with respect to the episodic memory/perceptual detail thread.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":28,"text":"With groundbreaking progress in natural language processing, generative language models have experienced a global surge in attention over the past year and a growing number of studies have sought to test their creative abilities.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance and timeliness of LLMs as a phenomenon worthy of attention; does not report a specific finding.","cars_move":"M1","cars_step":"1A","move_note":"Opens a new M1 sub-territory on LLMs/AI creativity; M2->M3 cycle returns to M1"},{"id":29,"text":"Computer science and psychology researchers alike have set out to test the limits of these sophisticated language models, by identifying tasks on which the models succeed and those on which they fail (Brown et al., 2020; Suzgun et al., 2022; Taecharungroj, 2023).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":30,"text":"A study by Stevenson, Smal, Baas, Grasman, and van der Maas (2022) tested the ability of GPT-3, an autoregressive language model from OpenAI, to generate responses on the AUT, comparing its performance to human responses in terms of fluency, flexibility, and semantic distance.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":31,"text":"Their findings indicate that humans currently outperform GPT-3 on traditional measures of creativity, though authors suggest that AI may soon achieve human-level performance.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":32,"text":"Other studies have demonstrated that in the context of poetry, GPT-3 generated text is indistinguishable from human poems (Köbis & Mossink, 2021; Liao, Wang, Liu, & Jiang, 2019).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":33,"text":"These findings have led some to explore the possibility of AI-human collaboration leading to more creative art (Hitsuwari, Ueda, Yun, & Nomura, 2023).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":34,"text":"In a related line of research, Organisciak, Acar, Dumas, and Berthiaume (2023) have demonstrated how large language models can be fine-tuned for the automated scoring of divergent thinking tasks, enabling a more nuanced evaluation of creativity.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":35,"text":"This advancement surpasses earlier computational approaches, including those based solely on semantic distance, highlighting the multifaceted utility of large language models in both generating and evaluating creative content.","tag":"extension:definitional","tier":"secondary","parent_id":34,"note":"Corrected from extension:illustrative. The sentence elaborates and characterizes the significance and scope of the advancement described in [34] — no example or case is provided; it unpacks what the advancement amounts to and why it matters. Parent is [34] (tempstat). Subordination rule satisfied.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":36,"text":"Given that the primary aim of this project is to identify characteristic features of creative text, we leverage large language models, in addition to human stories, as a new source of data.","tag":"contribution","tier":"primary","parent_id":null,"note":"States a methodological choice and its rationale for the current study.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":37,"text":"We explore the use of generative large language models, such as GPT-3 and GPT-4, to supplement human data collection and examine the extent to which machine-generated stories can mimic human creativity.","tag":"contribution","tier":"primary","parent_id":null,"note":"Elaborates the scope of the LLM-related aims of the study.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":38,"text":"We extend prior work comparing output from GPT-3 and human participants in the context of short stories.","tag":"novstat","tier":"primary","parent_id":null,"note":"Claims novelty/extension relative to prior work, situating the contribution in the short story domain.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":39,"text":"Here, we further define the features of creativity using computational linguistic tools.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the overall purpose of the current work.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":40,"text":"To overcome the limitations of conventional DT assessments such as the AUT, we assess the creative quality of short stories with an established story-writing task (Johnson et al., 2022; Prabhakaran, Green, & Gray, 2014).","tag":"contribution","tier":"primary","parent_id":null,"note":"States the methodological approach and its rationale.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":41,"text":"To assess the degree to which stories connect semantically divergent ideas, we compute divergent semantic integration (DSI) scores, leveraging creativity theory and distributional semantics (Johnson et al., 2022).","tag":"framedef","tier":"primary","parent_id":null,"note":"Introduces \"divergent semantic integration (DSI)\" as the named computational construct the paper will use as analytical machinery.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":42,"text":"We hypothesize that, in addition to combining semantically distant concepts, the degree to which a story incorporates perceptual details will be predictive of creativity.","tag":"contribution","tier":"primary","parent_id":null,"note":"States a formal hypothesis of the present study.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":43,"text":"Additionally, developments in artificial intelligence have raised questions about the capacity of machines to be creative.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance of the AI creativity question as motivation for a portion of the study.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":44,"text":"Given the findings from Stevenson et al. (2022) one might expect human-written stories to be rated as more creative than those from GPT-3.","tag":"contribution","tier":"primary","parent_id":null,"note":"Corrected from extension:speculative. The sentence articulates one of the study's working hypotheses/predictions that the study explicitly tests — this is contribution work (hypothesis statement), not mere speculative extension of a prior sentence.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":45,"text":"Alternatively, based on findings from studies of poetry, human and GPT-3 stories might be indistinguishable in their creativity.","tag":"contribution","tier":"primary","parent_id":null,"note":"Corrected from extension:speculative. Presents the alternative hypothesis the paper explicitly tests — independent rhetorical work framing a testable prediction, not a speculative extension of a single parent sentence.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":46,"text":"To determine whether or not there are any substantive differences in the creative quality of text written by human participants and that of recently developed large language models, we compare the subjective creativity ratings between human and computer-generated stories.","tag":"contribution","tier":"primary","parent_id":null,"note":"States a specific research aim and method of the present study.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":47,"text":"Lastly, given the appearance of GPT-4 after we initiated our study, we replicate these findings in an independent sample of stories generated by GPT-4 and examine whether current language models achieve human-level performance on this creative writing task.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the replication component of the study.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":48,"text":"The findings from this study have implications for the assessment of verbal creativity and shed light on the potential role of large language models in augmenting human data collection for creative tasks.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the broader significance and implications of the study's findings.","cars_move":"M3","cars_step":"3B","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"piantadosi_2023","title":"piantadosi 2023","authors":["Piantadosi"],"year":2023,"section":"Introduction"},"arc_summary":"The introduction is almost entirely **territory-building (M1)**, with a single early **M2 niche signal** at sentence 3 before retreating into an extended empirical showcase. The **M2 at sentence 3** is structurally isolated — it flags the gap (computational advances undermining Chomsky's framework) but is immediately swallowed by 37 sentences of capability demonstration. There is **no M3**: no purpose statement, no announcement of findings or structure. The rhetorical strategy is accumulation — the sheer weight of the M1 block is itself the argument for why the niche matters.","structured_arc":"M1 -> M2 -> M1","move_roles":[{"move":"M1","span":[1,2],"role":"Frames the downfall of Chomsky's approach as a historically significant and broadly cautionary phenomenon, establishing the stakes before any specifics are introduced."},{"move":"M2","span":[3,3],"role":"Acknowledges that prior critiques of Chomsky exist but flags the specific, under-recognized gap: how computational advances have undermined his framework — the paper's central niche."},{"move":"M1","span":[4,40],"role":"Builds an extended evidentiary territory demonstrating the power of neural language models through citations, illustrative ChatGPT examples, historical benchmarks, and counter-dismissals — the cumulative weight of which justifies why the niche identified in sentence 3 is consequential."}],"sentences":[{"id":1,"text":"After decades of privilege and prominence in linguistics, Noam Chomsky's approach to the science of language is experiencing a remarkable downfall.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the existence and significance of a phenomenon (the downfall of Chomsky's approach) as a framing claim.","cars_move":"M1","cars_step":"1A","move_note":"Centrality claim framing the phenomenon as remarkable and historically significant."},{"id":2,"text":"The story is, in part, a cautionary tale about what happens when an academic field isolates itself from what should be complementary endeavours.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the broader significance of the situation as a cautionary tale.","cars_move":"M1","cars_step":"1A","move_note":"Continues centrality framing by asserting broad disciplinary significance."},{"id":3,"text":"Chomsky's approach and methods are often argued to be problematic (e.g. Harris 1993, Pullum 1989, Behme 2012, Postal 2012, Behme 2014), but it is yet to be widely recognized just how the underlying ideas have been undermined by recent computational advances.","tag":"nostat","tier":"primary","parent_id":null,"note":"Acknowledges prior critique but identifies a remaining gap in recognition of how computational advances undermine the framework.","cars_move":"M2","cars_step":"2B","move_note":"Gap indication: prior critiques exist but the specific undermining by computational advances is not yet widely recognized. Early interlaced M2 niche signal before the extended M1 block."},{"id":4,"text":"The state of the art in virtually all computational language tasks makes use of deep neural networks (LeCun et al. 2015), often neural networks called transformers (Vaswani et al. 2017, Brown et al. 2020, Bommasani et al. 2021).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the current state of the field with citations.","cars_move":"M1","cars_step":"1C","move_note":"Returns to territory establishment after the M2 niche signal; reports what specific prior work has established."},{"id":5,"text":"These are models of text that are trained on huge datasets of internet-based text to predict upcoming linguistic material (often at a sub-word but supra-character encoding).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports established facts about how these models work — a domain-level factual claim, not merely unpacking a term.","cars_move":"M1","cars_step":"1B","move_note":"Field-level generalization about how the dominant class of models operates."},{"id":6,"text":"Several advances have allowed these models to become wildly successful.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance of the models' success; introduces the explanation that follows.","cars_move":"M1","cars_step":"1A","move_note":"Centrality/significance assertion about the success of the models."},{"id":7,"text":"First, we have become able to train them on massive data sets.","tag":"extension:definitional","tier":"secondary","parent_id":6,"note":"Elaborates the first of the advances asserted in [6] (emph, primary parent). Legal secondary.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":8,"text":"This is in part due to advances in computing (e.g. computing derivatives in arbitrary models) and in part the availability of huge collections of text from the internet.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Previously extension:definitional with secondary parent [7] — secondary-parenting-secondary violation. Reassigned to tempstat: reports factual causal claims about computing advances and data availability. Now a primary parent for [9].","cars_move":"M1","cars_step":"1B","move_note":null},{"id":9,"text":"A typical language model might be trained on hundreds of billions of tokens, estimated to cost millions of dollars in energy alone.","tag":"extension:illustrative","tier":"secondary","parent_id":8,"note":"Illustrates the scale of training described in [8] (tempstat, primary parent). Legal secondary.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":10,"text":"Second, the model architecture flexibly deals with nonlocal dependencies and allows the prediction of a word to potentially depend on material that is far away.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Previously extension:definitional with secondary parent [9] — secondary-parenting-secondary violation. Reassigned to tempstat: reports an architectural property of the models as an established fact.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":11,"text":"The key consequence is that leading models are able to generate not only grammatical sentences, but entire discourses, scripts, explanations, poems, etc.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance of the consequence of these architectural properties.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":12,"text":"This pursuit has been led in recent years by AI companies (Ahmed et al. 2023).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a factual state of affairs about who has driven the development, with citation.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":13,"text":"A nice example can be provided by the following, produced by ChatGPT when prompted with only the text in bold.","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Introduces an illustrative example of the models' capabilities. Parent is [11] (emph, primary). Legal secondary.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":14,"text":"All examples in this paper show the first response generated by ChatGPT to these queries by the author in early 2023.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces a methodological scope for the examples used throughout the paper.","cars_move":"M1","cars_step":"1B","move_note":"Though tagged contribution, this sentence describes the evidentiary territory (ChatGPT examples) rather than announcing a research purpose; it functions as a field-level methodological framing within M1."},{"id":15,"text":"Good queries often focus on weird or unusual requests in order to ensure that the output is well outside of the training set.","tag":"extension:definitional","tier":"secondary","parent_id":14,"note":"Explains the rationale for the query design described in [14] (contribution, primary parent). Legal secondary.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":16,"text":"Ignore whatever theoretical persuasions you have for a moment and just recognize how remarkable that response is.","tag":"emph","tier":"primary","parent_id":null,"note":"Direct rhetorical appeal asserting the significance of the ChatGPT output just shown.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":17,"text":"A coherent and grammatical story unfolds from a simple prompt, even though the requested scenario strains plausibility and probability.","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Previously emph. Elaborates the specific example output in support of [16] (emph, primary parent) rather than asserting an independent significance claim. Legal secondary.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":18,"text":"The response tackles the core essence of the question to provide a compelling story about how an ant might sink an aircraft carrier.","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Further illustrates the quality of the example. Parent re-anchored to [16] (emph, primary), skipping [17] (secondary). Legal secondary.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":19,"text":"The answer is outside of the training set.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts a significant independent property of the output — genuine generalization, not memorization.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":20,"text":"In fact, after 'Once upon a time, in a far-off land, there lived a colony of ants,' a Google search returns no matching strings on the entire internet.","tag":"extension:illustrative","tier":"secondary","parent_id":19,"note":"Provides empirical illustration of the claim in [19] (emph, primary parent). Legal secondary.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":21,"text":"Anyone who has dealt in simpler language models like n-grams or context-free grammars will be impressed that this model is capable of incorporating not just longer dependencies within sentences, but across sentences.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance of LLM capabilities by contrast with simpler prior systems.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":22,"text":"It also creates complex structures, with e.g. multiple embedded clauses, prepositional phrases, conjunctions, etc; it uses pronouns, determiners, quantifiers, adjectives, etc. in realistic ways; this and similar models have few apparent problems with agreement or pronoun reference (Gulordava et al. 2018, Goldberg 2019).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports specific empirical findings about model capabilities with citations.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":23,"text":"Any one of these abilities has been the topic of countless dissertations in linguistics.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance of these capabilities by reference to the vast scholarly attention they have attracted.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":24,"text":"Beyond that, such models succeed on tasks that formal linguistic theories haven't yet dreamed of—like interpreting the semantics of the words in question and maintaining not just coherent sentences but entire coherent discourses.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces tension — models exceed what formal theories have even attempted.","cars_move":"M1","cars_step":"1B","move_note":"Contrast tag, but rhetorically this sentence extends the territory by generalizing model capabilities beyond what formal theories cover — still M1 territory-building rather than gap-indicating."},{"id":25,"text":"Such models exhibit over 90% accuracy in Winograd-style questions (Kocijan et al. 2020, 2022), which require interpreting language in world contexts (e.g. 'The trophy doesn't fit in the brown suitcase because it is too large. What is too large?').","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports specific empirical findings about model performance with citations.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":26,"text":"What is clear is that these models use language in a way that is remarkably human (Mahowald & Ivanova et al. 2023).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a finding from prior work with citation.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":27,"text":"This kind of example hearkens back to Turing 1950, who considered asking an artificial intelligence to write a sonnet on the topic of 'The Forth Bridge', and suggested that success in solving such tasks would demonstrate many key aspects of humanlike intelligence.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports prior work (Turing 1950) and its claims, providing historical context.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":28,"text":"Contemporary language models can do much more—they can write raps, explain things, imagine conversations, create a mashup script of Seinfeld and Star Trek, etc.","tag":"contrast","tier":"primary","parent_id":null,"note":"Contrasts current capabilities against the Turing benchmark, asserting models exceed that historic standard.","cars_move":"M1","cars_step":"1B","move_note":"Contrast with Turing benchmark functions as field-level generalization extending the territory rather than indicating a gap."},{"id":29,"text":"They are aware of even sub-word properties like rhymes:","tag":"extension:illustrative","tier":"secondary","parent_id":28,"note":"Previously emph. Introduces a specific illustrative capability subordinate to the broader significance claim in [28] (contrast, primary parent). Does not assert an independent significance claim. Legal secondary.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":30,"text":"And they are aware of style:","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Previously emph. Introduces another specific illustrative example, subordinate to [28] (contrast, primary parent — skipping [29] secondary). Legal secondary.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":31,"text":"Note that this specific example was not in the model's training set—there is no possibility that Trump understands prime numbers.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts an independent significant property (genuine generalization, not memorization). Parent re-anchored to [28] (contrast, primary), independent of the secondary chain in [29]–[30].","cars_move":"M1","cars_step":"1A","move_note":null},{"id":32,"text":"However information about the fundamental theorem of arithmetic was, as was the speech style of Donald Trump.","tag":"extension:definitional","tier":"secondary","parent_id":31,"note":"Clarifies what was in the training set, elaborating on the generalization claim in [31] (emph, primary parent). Legal secondary.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":33,"text":"'Believe me, I know a lot about prime numbers' is probably not something Trump has actually said, but certainly something he would say.","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Illustrates the generalization point. Parent is [31] (emph, primary — skipping [32] secondary). Legal secondary.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":34,"text":"Examples like these show why dismissals from cognitive scientists like Gary Marcus that the models are just the same as 'autocomplete' systems on your phone are far too shallow.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces tension against a specific dismissive critique of LLMs.","cars_move":"M1","cars_step":"1A","move_note":"Counter-dismissal functions to assert centrality and significance of the territory, not to identify a research gap; remains M1."},{"id":35,"text":"The model is able to put together things in its training in new ways that maintain a considerable amount of linguistic and conceptual coherence.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts a positive property of the models, countering the autocomplete dismissal in [34].","cars_move":"M1","cars_step":"1A","move_note":null},{"id":36,"text":"That requires more than merely guessing things it has seen before—it requires modeling the dynamics of language.","tag":"extension:definitional","tier":"secondary","parent_id":null,"note":"Elaborates what the capability in [35] (emph, primary parent) actually entails. Legal secondary.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":37,"text":"If models only repeated what they had seen before, they would not be able to generate anything new, particularly complex sentence structures that are grammatical and coherent.","tag":"extension:speculative","tier":"secondary","parent_id":35,"note":"Previously had secondary parent [36] — secondary-parenting-secondary violation. Re-parented to [35] (emph, primary). Develops the logical implication as a conditional without new evidence. Legal secondary.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":38,"text":"It is somewhat difficult to convey how remarkable the models are currently.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the extraordinary nature of current models.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":39,"text":"You just have to interact with them.","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Parent is [38] (emph, primary). Legal secondary.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":40,"text":"They are imperfect, to be sure, but my qualitative experience interacting with them is like talking to a child, who happened to have memorized much of the internet.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance of the models through an analogical characterization while briefly acknowledging limitation.","cars_move":"M1","cars_step":"1A","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"ryskin_2025","title":"Efficient Audience Design in LLMs","authors":["Ryskin, R.","et al."],"year":2025,"section":"Introduction"},"arc_summary":"The introduction builds a long M1 foundation across two distinct sub-blocks — human audience design (S1–S10) and LLM communicative competence (S11–S14) — before pivoting to M2. **The LLM sub-block is the rhetorical bridge**: by establishing that LLMs resemble humans on pragmatics and ToM, the paper earns the right to ask whether they also exhibit audience design. **The gap is then staged in three steps**: a broad characterization deficit (S15), a concrete fragility finding that substantiates it (S16), and a sharp, explicitly scoped unstudied-gap claim (S17). The introduction closes with a mechanistic question about least-effort pressure (S18), leaving M3 entirely absent.","structured_arc":"M1 -> M2","prompt_version":"v0.5","move_roles":[{"move":"M1","span":[1,10],"role":"Establishes human audience design as a well-documented phenomenon via two concrete paradigms (NYC landmarks and tangram reduction), then synthesizes them under an informativeness-effort tradeoff and closes with an open mechanistic question — grounding the paper's later efficiency framing in existing human-communication research."},{"move":"M1","span":[11,14],"role":"Opens a second territory on LLMs, claiming they share hallmarks of human communication and citing specific successes on pragmatics and Theory of Mind tasks — constructing the warrant that LLMs are plausible candidates for audience design before the gap is named."},{"move":"M2","span":[15,18],"role":"Names the gap in LLM audience-design research: first broadly (performance not fully characterized), then concretely (fragility evidence from Jones 2024), then precisely (audience design untested), and finally mechanistically (least-effort pressure unexamined) — escalating specificity to frame the paper's exact niche."}],"sentences":[{"id":1,"text":"Human communication is inherently social, requiring speakers to tailor their language to their audience's knowledge and goals (e.g. H. H. Clark & Wilkes-Gibbs, 1986; H. Clark, 1992; Brown-Schmidt, Yoon, & Ryskin, 2015).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1B","move_note":null},{"id":2,"text":"For example, Isaacs and Clark (1987) showed that, in conversations with listeners who are familiar with New York City (NYC), New Yorkers described pictures of NYC locations succinctly, using landmarks names like \"Citicorp Building.\"","tag":"extension:illustrative","tier":"secondary","parent_id":1,"note":"Parent [1]. Concrete illustration of the prior tempstat claim, explicitly example-marked.","cars_move":"M1","cars_step":"1C","move_note":"Inherits move from parent [1]; step shifts to 1C since this sentence reports what a specific study (Isaacs & Clark) found, rather than a field-level generalization."},{"id":3,"text":"In contrast, when addressing listeners who were unfamiliar with NYC, they provided longer descriptions, such as \"the building with the slanted roof\" for that same building.","tag":"extension:illustrative","tier":"secondary","parent_id":1,"note":"Re-parents to [1] (nearest primary above), continuing the same Isaacs & Clark illustration begun in [2].","cars_move":"M1","cars_step":"1C","move_note":"Continues the Isaacs & Clark illustration from [2]; 'In contrast' is internal to the study's own results, not a contrast against the paper's territory, so this stays M1/1C rather than M2."},{"id":4,"text":"In addition to relying on knowledge of the idiosyncrasies of their audience, speakers tailor their utterances to their conversation partners by collaboratively developing shared terms over the course of an interaction (e.g., Brennan & Clark, 1996; H. H. Clark & Wilkes-Gibbs, 1986; Hawkins, Frank, & Goodman, 2020).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1B","move_note":null},{"id":5,"text":"For instance, when referring to an abstract tangram shape in the first round of a communication task, a speaker may use a lengthy utterance to refer to it such as \"uh, it looks like a person with the arms out to the left and head back kind of like they are dancing.\"","tag":"extension:illustrative","tier":"secondary","parent_id":4,"note":"Parent [4].","cars_move":"M1","cars_step":"1C","move_note":"Inherits move from parent [4]; step is 1C as this reports findings from the tangram referential-communication paradigm."},{"id":6,"text":"The other interlocutor will typically acknowledge that they've understood which referent is intended (e.g., \"Uh, arms out, OK.\").","tag":"extension:illustrative","tier":"secondary","parent_id":4,"note":"Re-parents to [4], skipping [5].","cars_move":"M1","cars_step":"1C","move_note":"Inherits move/step from parent [4], continuing the tangram illustration."},{"id":7,"text":"In a second round, when referring to the same shape, the speaker will be briefer and re-use the previously established terms, as in \"the person with the arms out that is dancing.\"","tag":"extension:illustrative","tier":"secondary","parent_id":4,"note":"Re-parents to [4].","cars_move":"M1","cars_step":"1C","move_note":"Inherits move/step from parent [4], continuing the tangram illustration."},{"id":8,"text":"And by the third round, they may simply say \"the dancer\" and be clearly understood by their conversation partner.","tag":"extension:illustrative","tier":"secondary","parent_id":4,"note":"Re-parents to [4].","cars_move":"M1","cars_step":"1C","move_note":"Inherits move/step from parent [4], concluding the tangram illustration."},{"id":9,"text":"In both forms of audience design, speakers appear to design their utterances with the goal of balancing informativeness — allowing their interlocutor to uniquely identify the referent — and effort — not producing more than is needed (i.e., being brief).","tag":"link:closing","tier":"secondary","parent_id":4,"note":"Synthesizes the two preceding cited phenomena ([1]–[3] and [4]–[8]) without new citation support; re-parents to [4], the nearest primary above.","cars_move":"M1","cars_step":"1B","move_note":"Inherits M1 from parent [4]; step reassigned to 1B (rather than 1C) since this sentence makes a field-level synthesizing generalization across both illustrations, not a report of one specific study."},{"id":10,"text":"Whether this kind of communicative efficiency relies on sophisticated reasoning about the mental states of the interlocutor (H. H. Clark & Marshall, 1981; Hawkins et al., 2022; Heller & Brown-Schmidt, 2023) or can come about from more low-level memorial or alignment mechanisms (Horton & Gerrig, 2005; Pickering & Garrod, 2004) remains an open question.","tag":"nostat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1B","move_note":"Tagged nostat (typically M2), but rhetorically this open question concerns the mechanism underlying human audience design -- a question the paper does not go on to occupy. Functions as a coda generalization closing the human-communication territory rather than the niche the paper will fill, so kept in M1 as a field-level statement of the unresolved theoretical landscape."},{"id":11,"text":"Communication with Large Language Models (LLMs), such as ChatGPT, appears to bear many of the hallmarks of human-to-human communication.","tag":"emph","tier":"primary","parent_id":null,"note":"Opens new sub-section but carries independent claim of relevance/similarity, so primary per Rule 1.","cars_move":"M1","cars_step":"1A","move_note":"Pivot sentence opening a second M1 sub-block on LLMs; emph tag and broad 'this is relevant/similar' framing match Step 1A (claiming centrality)."},{"id":12,"text":"Beyond producing fluent, human-sounding utterances, LLMs appear to perform similarly to humans on tests of pragmatic language interpretation, including indirect speech, metaphor, deceit, and humor (Hu, Floyd, Jouravlev, Fedorenko, & Gibson, 2023).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":"Reports the finding of a specific cited study (Hu et al., 2023); subject is the study's result, matching 1C."},{"id":13,"text":"In humans, pragmatic understanding has often been thought to rely on reasoning about the mental states of the speaker.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1B","move_note":"Field-level generalization about human pragmatics (no single study cited), matching 1B; sets up the parallel drawn in [14]."},{"id":14,"text":"Similarly, LLMs succeed on some tasks previously used to test Theory of Mind (ToM) in humans (Strachan et al., 2024).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":"Reports a specific study's finding (Strachan et al., 2024), matching 1C."},{"id":15,"text":"However, LLM performance on pragmatic and ToM tasks remains to be fully characterized.","tag":"nostat","tier":"primary","parent_id":null,"note":null,"cars_move":"M2","cars_step":"2B","move_note":"First clear gap statement of the introduction; nostat plus 'remains to be fully characterized' names what is unknown, opening Move 2."},{"id":16,"text":"For instance, Jones (2024) found that models, such as GPT-3, demonstrate sensitivity to belief states in the False Belief Task, but minor task modifications can lead to significant performance drops, suggesting that some of the successes of LLMs may reflect reliance on surface-level statistical patterns.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Citation-backed report; internal \"but\" reflects the study's own results, not the author's contrast against prior literature.","cars_move":"M2","cars_step":"2B","move_note":"Tagged tempstat (typically M1), but functions here as substantiating evidence for the gap just raised in [15]. Kept in M2/2B since its rhetorical job is to deepen the gap, not generalize about the field."},{"id":17,"text":"To our knowledge, whether LLMs engage in audience design, either through explicit information about the speaker's knowledge and expertise, or through the coordination of efficient reference over the course of an interaction, has not yet been tested.","tag":"nostat","tier":"primary","parent_id":null,"note":null,"cars_move":"M2","cars_step":"2B","move_note":"Explicit, sharply-scoped gap statement ('has not yet been tested') -- the paper's specific niche."},{"id":18,"text":"While LLMs succeed at other linguistic tasks thought to tap social reasoning about the communication partner, and they are trained to maximize the informativeness of their answers, it is unclear whether they are subject to a pressure for least effort, which may be necessary to elicit human-like audience design behavior.","tag":"nostat","tier":"primary","parent_id":null,"note":"\"While\" clause sets up tension, but rhetorical center is the unresolved question, matching nostat over contrast.","cars_move":"M2","cars_step":"2C","move_note":"Frames the gap from [17] as an open question about mechanism (least-effort pressure), matching Step 2C. Introduction ends here with no M3 (Step 3A) present in this excerpt."}],"gloss_version":"v0.3"},{"paper":{"id":"strachan_2024","title":"strachan 2024","authors":["Strachan"],"year":2024,"section":"Introduction"},"arc_summary":"The introduction builds a clean **M1 → M2 → M3** arc with no cycling. The extended M1 (sentences 1–9) moves deliberately from folk phenomenon to formal construct to measurement history to LLM promise, constructing maximum territory before the pivot. **M2 lands hard on robustness** — not absence of findings, but their uninterpretability — and closes by citing calls for a \"machine psychology,\" which pre-authorizes the paper's own systematic approach. M3 then delivers a tightly specified study design, including the reproducibility rationale for LLaMA2 and the process-level analysis angle, leaving no methodological choice unjustified.","structured_arc":"M1 -> M2 -> M3","move_roles":[{"move":"M1","span":[1,9],"role":"Establishes the research territory by grounding theory of mind in everyday human social life, formally defining the construct, surveying its measurement history, and reporting recent LLM performance findings — building a platform of established knowledge that makes the subsequent critique meaningful."},{"move":"M2","span":[10,14],"role":"Carves the niche by challenging the robustness and interpretability of prior LLM-ToM findings, naming the heuristics hypothesis as an emerging concern, and invoking the 'machine psychology' framework to frame a systematic multi-task approach as the field-endorsed solution the current study will deliver."},{"move":"M3","span":[15,20],"role":"Announces the study's purpose and specifies all major methodological commitments — the model set, test battery scope, reproducibility rationale for LLaMA2, human comparison sample, and process-level analysis — presenting the design as a direct answer to the gap identified in M2."}],"sentences":[{"id":1,"text":"People care about what other people think and expend a lot of effort thinking about what is going on in other minds.","tag":"emph","tier":"primary","parent_id":null,"note":"Opens the paper by asserting the existence and centrality of a human phenomenon (interest in others' mental states) without citing a finding.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":2,"text":"Everyday life is full of social interactions that only make sense when considered in light of our capacity to represent other minds: when you are standing near a closed window and a friend says, 'It's a bit hot in here', it is your ability to think about her beliefs and desires that allows you to recognize that she is not just commenting on the temperature but politely asking you to open the window.","tag":"extension:illustrative","tier":"secondary","parent_id":1,"note":"Provides a concrete everyday example of the phenomenon asserted in [1]; [1] is the primary parent.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":3,"text":"This ability for tracking other people's mental states is known as theory of mind.","tag":"framedef","tier":"primary","parent_id":null,"note":"Formally names the construct (theory of mind) that will serve as the paper's analytical framework.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":4,"text":"Theory of mind is central to human social interactions—from communication to empathy to social decision-making—and has long been of interest to developmental, social and clinical psychologists.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the importance and broad relevance of theory of mind as a topic.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":5,"text":"Far from being a unitary construct, theory of mind refers to an interconnected set of notions that are combined to explain, predict, and justify the behaviour of others.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports an established characterization of theory of mind in the field, with citation.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":6,"text":"Since the term 'theory of mind' was first introduced in 1978 (ref. 3), dozens of tasks have been developed to study it, including indirect measures of belief attribution using reaction times and looking or searching behaviour, tasks examining the ability to infer mental states from photographs of eyes, and language-based tasks assessing false belief understanding and pragmatic language comprehension.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Summarizes the historical development and breadth of the research literature on theory of mind measurement.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":7,"text":"These measures are proposed to test early, efficient but inflexible implicit processes as well as later-developing, flexible and demanding explicit abilities that are crucial for the generation and comprehension of complex behavioural interactions involving phenomena such as misdirection, irony, implicature and deception.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports established theoretical framing of what the different ToM measures are thought to capture.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":8,"text":"The recent rise of large language models (LLMs), such as generative pre-trained transformer (GPT) models, has shown some promise that artificial theory of mind may not be too distant an idea.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a recent development in the field and the general finding that LLMs show promise on ToM-related tasks.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":9,"text":"Generative LLMs exhibit performance that is characteristic of sophisticated decision-making and reasoning abilities including solving tasks widely used to test theory of mind in humans.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports prior findings about LLM capabilities on ToM tasks, with citations.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":10,"text":"However, the mixed success of these models, along with their vulnerability to small perturbations to the provided prompts, including simple changes in characters' perceptual access, raises concerns about the robustness and interpretability of the observed successes.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces tension against the prior positive findings by noting limitations and failures.","cars_move":"M2","cars_step":"2A","move_note":null},{"id":11,"text":"Even in cases where these models are capable of solving complex tasks that are cognitively demanding even for human adults, it cannot be taken for granted that they will not be tripped up by a simpler task that a human would find trivial.","tag":"contrast","tier":"primary","parent_id":null,"note":"Extends the critique by pointing out an additional paradoxical limitation — failure on simpler tasks despite success on harder ones.","cars_move":"M2","cars_step":"2A","move_note":null},{"id":12,"text":"As a result, work in LLMs has begun to question whether these models rely on shallow heuristics rather than robust performance that parallels human theory of mind abilities.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports an emerging research direction questioning the nature of LLM ToM performance, with citation.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":13,"text":"In the service of the broader multidisciplinary study of machine behaviour, there have been recent calls for a 'machine psychology' that have argued for using tools and paradigms from experimental psychology to systematically investigate the capacities and limits of LLMs.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports recent calls in the literature for a systematic psychological approach to studying LLMs, with citations.","cars_move":"M2","cars_step":"2D","move_note":"Frames the current study as extending/responding to an established call in the literature; functions as 2D (continuing a tradition/responding to a gap framed as a research direction)."},{"id":14,"text":"A systematic experimental approach to studying theory of mind in LLMs involves using a diverse set of theory of mind measures, delivering multiple repetitions of each test, and having clearly defined benchmarks of human performance against which to compare.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports what a systematic approach entails, attributed to prior work with citation.","cars_move":"M2","cars_step":"2B","move_note":"Identifies what has been absent from prior work (a systematic approach meeting these criteria), implicitly naming the gap before the M3 announcement."},{"id":15,"text":"In this Article, we adopt such an approach to test the performance of LLMs in a wide range of theory of mind tasks.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the paper's purpose and the approach adopted.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":16,"text":"We tested the chat-enabled version of GPT-4, the latest LLM in the GPT family of models, and its predecessor ChatGPT-3.5 (hereafter GPT-3.5) in a comprehensive set of psychological tests spanning different theory of mind abilities, from those that are less cognitively demanding for humans such as understanding indirect requests to more cognitively demanding abilities such as recognizing and articulating complex mental states like misdirection or irony.","tag":"contribution","tier":"primary","parent_id":null,"note":"Specifies the models tested and the scope of the test battery used in this study.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":17,"text":"GPT models are closed, evolving systems.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts a relevant property of GPT models that motivates a methodological decision; establishes this characteristic as real and consequential rather than reporting a finding.","cars_move":"M3","cars_step":"3B","move_note":"Provides justification for the subsequent methodological choice (adding LLaMA2)."},{"id":18,"text":"In the interest of reproducibility, we also tested the open-weight LLaMA2-Chat models on the same tests.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces an additional methodological choice (testing LLaMA2) and its rationale.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":19,"text":"To understand the variability and boundary limitations of LLMs' social reasoning capacities, we exposed each model to multiple repetitions of each test across independent sessions and compared their performance with that of a sample of human participants (total N = 1,907).","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the study design and human comparison sample.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":20,"text":"Using variants of the tests considered, we were able to examine the processes behind the models' successes and failures in these tests.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces an additional analytical capability of the study design — examining underlying processes through test variants.","cars_move":"M3","cars_step":"3A","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"tanzer_2yp","title":"tanzer 2yp","authors":["Tanzer"],"year":0,"section":"Introduction"},"arc_summary":"The structure is **interlaced rather than blocked**: the first purpose statement (s10) lands early, immediately gets justified by a returning gap (s11), and from there the introduction **cycles repeatedly through M1 -> M2 -> M3**. Each cycle pairs a territory review (LLM vs. human language, foraging, entrainment) with a contrast that distinguishes **dyadic word generation**, then announces a corresponding aim, framework, or measure. Multiple M3 segments accumulate — the explore/exploit lens, the similarity measure, the **individuation effect** — so the contribution is built incrementally rather than declared once. The recurring rhetorical engine is the same move each time: review what's known, mark how this task differs, derive a study construct from the difference.","structured_arc":"M1 -> M2 -> M3 -> M2 -> M1 -> M2 -> M3 -> M1 -> M2 -> M3 -> M1 -> M2 -> M3 -> M1 -> M2","move_roles":[{"move":"M1","span":[1,9],"role":"Establishes the territory: AI-human creative collaboration as a real phenomenon, then reviews the contrast between LLMs' narrow associative output and humans' multi-timescale, flat-hierarchy creativity. Names the 'flat associative hierarchy' construct the paper will draw on."},{"move":"M3","span":[10,10],"role":"Early purpose statement — declares the study targets the hybrid human-LLM dyad — placed before the gap is even spelled out."},{"move":"M2","span":[11,11],"role":"Retroactively justifies the just-stated aim: prior work covered fully-human and fully-LLM dyads but never the hybrid case."},{"move":"M1","span":[12,12],"role":"Adds context that human-AI collaboration's net value is unsettled, motivating the inquiry."},{"move":"M2","span":[13,15],"role":"Sharpens the gap into a concrete deficiency: LLM creative output is consistently less semantically diverse, evidenced across essays and creative writing, with social stakes."},{"move":"M1","span":[16,19],"role":"Reviews the collective-foraging literature on how individual search style shapes group diffusion, supplying the explore/exploit grounding."},{"move":"M3","span":[20,21],"role":"Positions dyadic word generation as an extension of foraging work to a two-agent case, framing the hybrid condition as the means to probe search-style diversity."},{"move":"M1","span":[22,22],"role":"Returns to territory: meaning arises from interactive interplay between minds, grounding the task in interactive-language theory."},{"move":"M3","span":[23,26],"role":"Defines the central task construct — the alternating single-word co-creative game — and asserts its value as a real-time trace of two minds through lexical space, with a worked example."},{"move":"M1","span":[27,27],"role":"Cites prior work in this exact paradigm showing AI word generation diverges systematically from the human baseline."},{"move":"M2","span":[28,29],"role":"Marks the residual gap: even steered LLMs miss the human balance of coherence and volatility, posing the open question the study addresses."},{"move":"M3","span":[30,41],"role":"Introduces the explore/exploit analytical framework, distinguishes the task from foraging/category-recall paradigms, and operationalizes exploration vs. exploitation via cosine-similarity runs and drops — the methodological core."},{"move":"M1","span":[42,45],"role":"Reviews the entrainment literature: speakers bring distinct lexical identities that align only gradually through communicative negotiation."},{"move":"M2","span":[46,47],"role":"Distinguishes the task from communicative collaboration — no convergence pressure means individual lexical identities can persist rather than being negotiated away."},{"move":"M3","span":[48,50],"role":"Derives the study's prediction from that distinction and names a new construct, the 'individuation effect,' as the measurable signature."},{"move":"M1","span":[51,54],"role":"Closes by reviewing the contrasting LLM case — a single statistical model with no independent lexical identity and a tendency to anchor to surface context — setting up why the individuation effect should be absent in pure-LLM dyads."}],"sentences":[{"id":1,"text":"Human creativity is a collective achievement, and even conventionally solitary creative acts increasingly involve the participation of one or many AI (often LLM-based) partner(s).","tag":"emph","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1A","move_note":null},{"id":2,"text":"LLMs are driven by high-probability associations derived from common patterns in the training corpora.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1B","move_note":null},{"id":3,"text":"As a result their words tend to concentrate within a relatively tight range of locally similar responses, steepening their 'associative hierarchy' (Mednick, 1962) and producing a narrower range of creative responses than humans (Chen & Ding, 2023; Mahowald et al., 2024).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":4,"text":"Human language production, by contrast, operates hierarchically across multiple timescales (Caucheteux et al., 2023).","tag":"contrast","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1B","move_note":"contrast tag here contrasts known properties, still reviewing territory"},{"id":5,"text":"Human creativity in general, meanwhile, has been shown to alternate dynamically between convergent and divergent solution-generating strategies (Malaie et al., 2024; Nijstad et al., 2010).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":6,"text":"Predictive weight in human language judgments is distributed across multiple levels of abstraction rather than concentrated only at the local level (Heilbron et al., 2022).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":7,"text":"Human creativity in language use is therefore characterized by a probability distribution in which no single response dominates.","tag":"emph","tier":"primary","parent_id":null,"note":"asserts a substantive characterization with independent content, not bare synthesis","cars_move":"M1","cars_step":"1B","move_note":null},{"id":8,"text":"In Mednick's terms, this is the 'flat associative hierarchy,' in which remote associations become more accessible.","tag":"framedef","tier":"primary","parent_id":null,"note":"names/introduces the construct the paper will use","cars_move":"M1","cars_step":"1B","move_note":null},{"id":9,"text":"Through joint interaction, pairs and groups navigate shared conceptual terrain and explore a common space of possible expressions without explicit instruction or reward (Williams et al., 2025).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1B","move_note":null},{"id":10,"text":"The present study aims to investigate not how the collaborative creative dynamic of human and LLM-powered participants change in a hybrid context where both work together to generate words in sequence.","tag":"contribution","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3A","move_note":"early purpose statement, intro then cycles back to M2/M1"},{"id":11,"text":"Prior work has characterized word generation in fully human and fully LLM dyads, but the hybrid case, in which a human and an LLM work together, has not yet been examined.","tag":"nostat","tier":"primary","parent_id":null,"note":null,"cars_move":"M2","cars_step":"2B","move_note":"return to gap after early M3 statement; M2->M3 cycling"},{"id":12,"text":"Evidence for whether human-AI collaboration is a net positive remains mixed (Anderson et al., 2024; Vaccaro et al., 2024).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":13,"text":"However, LLM-generated creative content consistently shows less semantic diversity than human-generated content.","tag":"contrast","tier":"primary","parent_id":null,"note":null,"cars_move":"M2","cars_step":"2A","move_note":null},{"id":14,"text":"This gap emerges quantitatively across human vs. LLM-generated college admissions essays (Moon et al., 2025), and human expert evaluation confirms a parallel quality gap in creative writing (Chakrabarty et al., 2024).","tag":"extension:illustrative","tier":"secondary","parent_id":13,"note":"provides evidence/examples of the gap asserted in [13]","cars_move":"M2","cars_step":"2A","move_note":null},{"id":15,"text":"The downstream consequences of this creativity gap between human and AI-generated content have the potential to pose significant social challenges.","tag":"emph","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1A","move_note":"centrality framing of the gap's importance"},{"id":16,"text":"In collective foraging, individual search style determines how well groups diffuse across new territory.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1B","move_note":null},{"id":17,"text":"Garg, Kello & Smaldino (2022) modeled this directly, simulating agents who balanced individual exploration against the exploitation of social information.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":18,"text":"Exploratory individuals spread out with minimal overlap, covered ground quickly, and kept the collective from converging on patches that were already depleted.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":19,"text":"When individual search was exploitative, groups snowballed onto the same locations, exhausted them, and lost the diversity of coverage on which productive collective search depends.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":20,"text":"Dyadic word generation extends this work by enabling us to investigate a two-agent case in which partners may differ substantially in their individual tendency to diffuse.","tag":"contribution","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3B","move_note":null},{"id":21,"text":"A hybrid condition enables us to ask how that diversity in search style shapes the collective's dynamics.","tag":"contribution","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3A","move_note":null},{"id":22,"text":"Meaning in language, also, does not emerge from individual minds working in isolation, but from the dynamic interplay between them (Clark & Brennan, 1991; Pickering & Garrod, 2004).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1B","move_note":null},{"id":23,"text":"Dyadic word generation is a co-creative task in which pairs take strictly alternating turns producing single words.","tag":"framedef","tier":"primary","parent_id":null,"note":"defines the central task construct of the paper","cars_move":"M3","cars_step":"3B","move_note":null},{"id":24,"text":"Each individual is prompted by their partner's most recent response, and the task functions as a minimal co-creative language game.","tag":"extension:definitional","tier":"secondary","parent_id":23,"note":"unpacks the task introduced in [23]","cars_move":"M3","cars_step":"3B","move_note":null},{"id":25,"text":"Every word in the context of this task is a real-time measure of where two minds are in a wide-ranging trajectory through lexical space.","tag":"emph","tier":"primary","parent_id":null,"note":"asserts the significance/relevance of the task measure","cars_move":"M3","cars_step":"3B","move_note":null},{"id":26,"text":"In one session, for example, a pair produced: Plane, flight, Bird, sky, Clouds, rain, Water, ocean, Fish, marine, Biology, ecosystem, Nature, forest, Trees, roots, mountain, trail —eighteen words arcing through a single sustained region of very lush and green lexical space— before the sequence broke abruptly into a double-meaning and, from there, a category shift — mix, blend.","tag":"extension:illustrative","tier":"secondary","parent_id":25,"note":"illustrative example of the task described in [25]","cars_move":"M3","cars_step":"3B","move_note":null},{"id":27,"text":"Prior work comparing human and LLM dyads in this paradigm has found that AI word generation behavior differs systematically from the human baseline (Tanzer, 2024).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":28,"text":"While LLMs could, in fact, be steered toward greater divergence, even then, they failed to replicate the dynamic balance of local coherence and semantic volatility that characterizes human-produced word sequences.","tag":"contrast","tier":"primary","parent_id":null,"note":null,"cars_move":"M2","cars_step":"2A","move_note":null},{"id":29,"text":"What, then, drives these differences, and what happens when a human and an LLM work collaboratively as a single dyad?","tag":"nostat","tier":"primary","parent_id":null,"note":"poses the open question the study addresses","cars_move":"M2","cars_step":"2C","move_note":null},{"id":30,"text":"Dyadic word generation can be understood through the lens of explore/exploit dynamics — a framework that has been shown to organize behavior across foraging, decision-making, learning, and creativity (Hills et al., 2015; Mehlhorn et al., 2015).","tag":"framedef","tier":"primary","parent_id":null,"note":"introduces the analytical framework of the paper","cars_move":"M3","cars_step":"3B","move_note":null},{"id":31,"text":"In lexical space, partners alternate between exploitation — concentrated sampling within a local region of related meanings — and exploration — departure toward new, more distant areas of the space.","tag":"extension:definitional","tier":"secondary","parent_id":null,"note":"defines explore/exploit as applied to the task","cars_move":"M3","cars_step":"3B","move_note":"parent inferred as [30]"},{"id":32,"text":"This profile of behavior resembles category recall, long studied as a foraging task (Hills et al., 2012, 2015), but dyadic word generation is less restrictive, with no fixed category requirement and no time or performance pressure.","tag":"contrast","tier":"primary","parent_id":null,"note":"distinguishes the task from prior foraging paradigms","cars_move":"M2","cars_step":"2A","move_note":null},{"id":33,"text":"Our task therefore allows pairs to roam the lexical space more freely.","tag":"contrast","tier":"primary","parent_id":null,"note":"makes a substantive comparative claim continuing the distinction in [32], not a bare synthesis","cars_move":"M3","cars_step":"3B","move_note":null},{"id":34,"text":"Moreover, responses are partner-cued rather than internally driven.","tag":"emph","tier":"primary","parent_id":null,"note":"asserts a distinguishing feature of the task","cars_move":"M3","cars_step":"3B","move_note":null},{"id":35,"text":"Unlike paradigms where foraging yields an explicit score, the reward structure here is intrinsic.","tag":"contrast","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3B","move_note":null},{"id":36,"text":"Experiences of insight and semantic resolution engage neural reward circuitry (Oh et al., 2020), analogous to the dopaminergic responses that accompany harmonic resolution in music (Belfi & Loui, 2019; Williams et al., 2025).","tag":"tempstat","tier":"primary","parent_id":null,"note":"cross-domain claim with citation support","cars_move":"M1","cars_step":"1C","move_note":null},{"id":37,"text":"The semantic similarity between words at different times in the series functions as our quantitative measurement of participants' movement through the lexical space (Johnson et al., 2023; Mikolov et al., 2013; OpenAI, 2022).","tag":"contribution","tier":"primary","parent_id":null,"note":"describes the measurement approach of the present study","cars_move":"M3","cars_step":"3B","move_note":null},{"id":38,"text":"Bouts of exploitation appear in the sequence as continuous runs of high cosine similarity.","tag":"extension:definitional","tier":"secondary","parent_id":null,"note":"operationalizes exploitation in terms of the measure in [37]","cars_move":"M3","cars_step":"3B","move_note":"parent inferred as [37]"},{"id":39,"text":"These arise from clustered series of words drawn from the same area of lexical space.","tag":"extension:definitional","tier":"secondary","parent_id":null,"note":"continues unpacking the measure; parent is [37]","cars_move":"M3","cars_step":"3B","move_note":"parent inferred as [37]"},{"id":40,"text":"Exploratory transitions are the drops in similarity that punctuate them when a move away from the local cluster is made.","tag":"extension:definitional","tier":"secondary","parent_id":null,"note":"operationalizes exploration; parent is [37]","cars_move":"M3","cars_step":"3B","move_note":"parent inferred as [37]"},{"id":41,"text":"The sustained arc through sky, water, and forest in our opening example is one such cluster; mix, blend was the transition out.","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"illustrative example tied to the measurement; parent is [37]","cars_move":"M3","cars_step":"3B","move_note":"parent inferred as [37]"},{"id":42,"text":"Human language production is deeply personal.","tag":"emph","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1B","move_note":null},{"id":43,"text":"Each speaker brings a distinct lexical identity to any exchange as a result of their particular lif
