udy.","cars_move":"M3","cars_step":"3C","move_note":"Second formal hypothesis; same step as [33]."},{"id":35,"text":"Our third hypothesis diverges from the predictions of a naïve version of OFT, in which there is a constant value for any shape collected.","tag":"contrast","tier":"primary","parent_id":null,"note":"Frames H3 as diverging from a prior theoretical account (naïve OFT).","cars_move":"M3","cars_step":"3B","move_note":"Locally contrasts H3 against naive OFT predictions to justify the hypothesis; coded 3B (in-line justification) rather than a return to M2, since this challenges a theoretical baseline internal to the paper's framework, not the paper's own gap. Not a true M2-M3 cycle."},{"id":36,"text":"The performance metric in naïve OFT is therefore the amount of collected resources.","tag":"extension:definitional","tier":"secondary","parent_id":35,"note":"Unpacks the naïve OFT account referenced in [35]. Parent: [35] (contrast).","cars_move":"M3","cars_step":"3B","move_note":null},{"id":37,"text":"Hence naïve OFT predicts that exploitation of a given patch is terminated due to diminishing returns caused by depletion of the patch.","tag":"extension:definitional","tier":"secondary","parent_id":35,"note":"Continues unpacking the naïve OFT prediction; re-parented to [35] (contrast), since original parent [36] is secondary.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":38,"text":"In contrast, in creative foraging the intrinsic interest 'value' of collected resources is important.","tag":"contrast","tier":"primary","parent_id":null,"note":"Explicitly opposes the naïve OFT account elaborated in [35]–[37].","cars_move":"M3","cars_step":"3B","move_note":"Continues the naive-OFT contrast as justification for H3; same reasoning as [35]."},{"id":39,"text":"Collection from a given patch may lead to diminishing interest, far before the patch is depleted.","tag":"extension:speculative","tier":"secondary","parent_id":38,"note":"Extends the contrast claim in [38] into an unevidenced prediction. Parent: [38] (contrast).","cars_move":"M3","cars_step":"3B","move_note":null},{"id":40,"text":"We therefore hypothesize that: (H3) In creative foraging participants leave exploitation phases sooner than predicted by naïve OFT, far before patch depletion.","tag":"contribution","tier":"primary","parent_id":null,"note":"States H3 formally.","cars_move":"M3","cars_step":"3C","move_note":"Formal statement of H3; matches 3C, same step as [33]-[34]."},{"id":41,"text":"The next hypothesis concerns the moment when a new category of shapes is discovered.","tag":"link:opening","tier":"secondary","parent_id":40,"note":"Pure structural announcement of the upcoming topic (H4); makes no independent claim. Parent: [40] (contribution).","cars_move":"M3","cars_step":"3C","move_note":"Purely structural/transitional sentence previewing H4, with no independent claim; inherits parent [40]'s step (3C) by default rather than being treated as a distinct article-structure (3D) statement, since it previews a single hypothesis rather than the article as a whole."},{"id":42,"text":"We suggest that entry points to phases of exploitation can serve as an experimental proxy for creative leaps.","tag":"contribution","tier":"primary","parent_id":null,"note":"States the paper's proposed conceptual move/claim.","cars_move":"M3","cars_step":"3B","move_note":"States the conceptual claim motivating H4; coded 3B (justification) preceding the formal hypothesis in [45]."},{"id":43,"text":"Qualitative descriptions of creative processes suggest that creative leaps often occur in the periphery of a field [29], through a road that is not often taken.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a finding/characterization from prior cited work.","cars_move":"M3","cars_step":"3B","move_note":"Reviews prior qualitative findings to justify H4; tempstat-as-context-setting within M3, paralleling [18]-[21]."},{"id":44,"text":"In addition, creativity was previously linked to ambiguity [30].","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports another prior finding with citation.","cars_move":"M3","cars_step":"3B","move_note":"Reviews another prior finding to justify H4; same function as [43]."},{"id":45,"text":"We therefore hypothesize that: (H4) Shapes at the entry points to phases of exploitation are more ambiguous, in the sense that they can lead different players to different categories.","tag":"contribution","tier":"primary","parent_id":null,"note":"States H4 formally.","cars_move":"M3","cars_step":"3C","move_note":"Formal statement of H4; matches 3C."},{"id":46,"text":"Finally, we hypothesize that (H5) People show individual differences in their search strategies and patterns.","tag":"contribution","tier":"primary","parent_id":null,"note":"States H5 formally.","cars_move":"M3","cars_step":"3C","move_note":"Formal statement of H5; matches 3C, closing the hypothesis list."},{"id":47,"text":"In the results section we operationalize these hypotheses in terms of the creative foraging task.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the structure/plan of the paper going forward.","cars_move":"M3","cars_step":"3D","move_note":"Explicit forward-pointer to the Results section; classic terminal 3D, closing the introduction."}],"gloss_version":"v0.3"},{"paper":{"id":"hawkins_2020","title":"hawkins 2020","authors":["Hawkins"],"year":2020,"section":"Introduction"},"arc_summary":"The paper spends the bulk of its introduction building a thick M1 territory around flexible language use, pragmatic reasoning, and the repeated reference game paradigm before a single **'however' pivot at sentence 24** opens a narrow M2 gap. The M3 occupation is structurally interrupted by **three returns to gap language** (sentences 26–27, 30, 34), each one tethering a new contribution claim to a concrete prior limitation rather than allowing M3 to stand alone. This M2→M3 cycling reveals a paper positioning itself as empirical infrastructure—**the corpus and analyses are motivated limitation-by-limitation**, not declared as a unified theoretical advance. The introduction closes with a broad significance claim that reaches from dyadic microcosm to community-level convention.","structured_arc":"M1 -> M2 -> M3 -> M2 -> M3","move_roles":[{"move":"M1","span":[1,23],"role":"Establishes the communicative territory of flexible meaning, pragmatic reasoning, and learning-based adaptation, then anchors these claims in the repeated reference game paradigm and its empirical findings—building the empirical backdrop against which the paper's corpus contribution will be measured."},{"move":"M2","span":[24,24],"role":"Opens the central niche with a single 'however' pivot: the rise of formalized computational models demands quantitative precision that the existing qualitative empirical record cannot supply."},{"move":"M3","span":[25,25],"role":"Announces the paper's core contribution—a new open corpus plus a suite of analyses—framing the work explicitly as foundational infrastructure for future modeling rather than an argument for any single theory."},{"move":"M2","span":[26,27],"role":"Returns to gap language to name the first concrete limitation motivating the corpus: prior studies lacked the sample sizes needed for fine-grained behavioral characterization."},{"move":"M3","span":[28,29],"role":"Addresses the sample-size gap directly by citing recent web-based methods and providing an explicit numeric comparison (83 pairs vs. 8) to establish the corpus's scale advantage."},{"move":"M2","span":[30,30],"role":"Identifies the second methodological limitation: prior work lacked the NLP tools needed to analyse rich natural language data at scale, situating the current analyses as newly possible."},{"move":"M3","span":[31,33],"role":"Maps the two-part analytic structure (syntactic and semantic), previews Section 3's focus on shortening dynamics, and introduces the random corruption model as a concrete theoretical foil against which the syntactic findings will be measured."},{"move":"M2","span":[34,34],"role":"Inserts a narrow measurement gap—word counts alone cannot distinguish the random corruption model from cognitively richer accounts—justifying the POS-tagging and syntactic analysis that immediately follows."},{"move":"M3","span":[35,46],"role":"Completes the contribution arc: announces the syntactic methods and previews their key findings, introduces the semantic constructs of arbitrariness and stability with their operationalization in GloVe space, previews the semantic results, and closes with a broad significance claim extending the dyadic findings to community-level conventions."}],"sentences":[{"id":1,"text":"Human language use is remarkably flexible.","tag":"emph","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1A","move_note":null},{"id":2,"text":"We are able to coax new meanings out of existing words—or even coin new ones—to handle the diverse challenges encountered in everyday communication (Clark, 1983; Davidson, 1986).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1B","move_note":null},{"id":3,"text":"This flexibility is partially explained by de novo pragmatic reasoning, which allows listeners to use context to infer an intended meaning even in cases of ambiguous or non-literal usage (Glucksberg, 2001; Goodman & Frank, 2016; Lascarides & Copestake, 1998).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":4,"text":"However, a rich theoretical thread has suggested that learning mechanisms may also play an important role, allowing speakers and listeners to dynamically adapt their representations of meaning over the course of an interaction (Brennan & Clark, 1996; Delaney-Busch, Morgan, Lau, & Kuperberg, 2019; Pickering & Garrod, 2004).","tag":"tempstat","tier":"primary","parent_id":null,"note":"The \"however\" signals contrast in content but the sentence reports a cited theoretical tradition rather than asserting a gap or limitation; tempstat is correct.","cars_move":"M1","cars_step":"1C","move_note":"Surface 'however' contrasts with pragmatics-only view but introduces a cited theoretical tradition, functioning as additional territory rather than gap."},{"id":5,"text":"Two functional considerations motivate the need for continued learning in communication, even among adults.","tag":"emph","tier":"primary","parent_id":null,"note":"Makes a substantive claim that two real functional motivations exist for continued learning; not a bare topic label, so link:opening is incorrect. This asserts the existence and relevance of these motivations.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":6,"text":"First, just as there is substantial phonetic variability across speakers with different accents (Kleinschmidt, 2019), words may vary in meaning from speaker to speaker.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":7,"text":"This variability is clear for cases like slang, technical lingo, nicknames, or colloquialisms (e.g. Clark, 1998), but it may extend even to more ordinary nouns and adjectives.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":8,"text":"It may be difficult to know at the outset of an interaction exactly which meanings will be shared and which will not, requiring ongoing adaptation.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the existence and significance of a communicative challenge (the difficulty of predicting shared meanings); establishes that the problem is real and worth attending to rather than deriving a testable prediction.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":9,"text":"Second, because we live in a changing environment, we often experience novel entities, events, thoughts, and feelings that we want to talk about but do not already share (literal) words to express.","tag":"emph","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1B","move_note":null},{"id":10,"text":"Both of these obstacles can be overcome using feedback from one's partner to dynamically re-calibrate expectations about meaning.","tag":"emph","tier":"primary","parent_id":null,"note":"Parent [9] was previously tagged emph (secondary), violating the subordination rule. Elevated to emph: the sentence asserts the existence and significance of a real mechanism (partner feedback for re-calibration), establishing it as worth attending to.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":11,"text":"The repeated reference game task has provided a natural and productive paradigm for eliciting behavior under such conditions.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":12,"text":"In this task, pairs of participants are presented with arrays of novel images.","tag":"extension:definitional","tier":"secondary","parent_id":11,"note":"Parent [11] is tempstat (primary). Begins unpacking the paradigm introduced in [11].","cars_move":"M1","cars_step":"1C","move_note":null},{"id":13,"text":"On each trial, one player (the director) is privately shown a target object and must produce a referring expression allowing their partner (the matcher) to correctly select that object from the array.","tag":"extension:definitional","tier":"secondary","parent_id":11,"note":"Parent [11] is tempstat (primary); continues defining the paradigm.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":14,"text":"The director is then given feedback at the end of each trial about which object the matcher selected, and the matcher is given feedback about the true target object.","tag":"extension:definitional","tier":"secondary","parent_id":11,"note":"Parent [11] is tempstat (primary); continues defining the paradigm's feedback structure.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":15,"text":"Critically, each object appears as the target multiple times in the trial sequence, allowing the experimenter to examine how referring expressions change as the director and matcher accumulate shared experience.","tag":"extension:definitional","tier":"secondary","parent_id":11,"note":"Parent [11] is tempstat (primary); defines the key repeated-exposure feature of the paradigm.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":16,"text":"To the extent that the director and matcher converge on an accurate system of stable referring expressions, and these referring expressions differ from the ones that were initially produced, it may be claimed that ad hoc conventions or pacts have formed within the dyad (Hawkins, Goodman, & Goldstone, 2019).","tag":"framedef","tier":"primary","parent_id":null,"note":"Introduces and names \"ad hoc conventions or pacts\" as the theoretical construct used as analytical machinery throughout the paper.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":17,"text":"One of the earliest and most intriguing phenomena observed in this task is that descriptions are dramatically shortened across repetitions: An initial description like 'the one that looks like an upside-down martini glass in a wire stand' may gradually converge to 'martini' by the end (Krauss & Weinheimer, 1964).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":18,"text":"That is, speakers are able to communicate the same referential content much more efficiently over time.","tag":"extension:definitional","tier":"secondary","parent_id":17,"note":"Parent [17] is tempstat (primary). Restates and unpacks the meaning of the cited finding.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":19,"text":"Subsequent work has established a number of signature properties of this process through careful experimental manipulation.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":20,"text":"First, the extent to which descriptions are shortened is contingent on evidence of understanding from the matcher (Hupet & Chantraine, 1992; Krauss, Garlock, Bricker, & McMahon, 1977; Krauss & Weinheimer, 1966), and it is therefore not easily explained as a mere practice or repetition effect.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":21,"text":"Second, the resulting labels are partner-specific in the sense that they do not transfer if a novel matcher is introduced (Brennan & Hanna, 2009; Metzing & Brennan, 2003; Wilkes-Gibbs & Clark, 1992).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":22,"text":"Third, they are sticky in the sense that they persist through precedent with the same partner even after the referential context changes (Brennan & Clark, 1996) and are readily extended to similar objects (Markman & Makin, 1998).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":23,"text":"These qualitative effects provide an empirical backbone for theories of communication to explain.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance and relevance of the prior enumerated findings — they constitute a meaningful empirical backbone. This is emph, not link:closing, because it makes an independent claim about the importance of the findings rather than merely synthesizing them structurally.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":24,"text":"However, as theories are increasingly formalized as computational models making more precise quantitative predictions, setting criteria to distinguish between them will depend critically upon resolving more detailed theoretical questions about the dynamics of adaptation in natural language communication.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces tension against the sufficiency of existing qualitative findings for the demands of increasingly precise computational theories.","cars_move":"M2","cars_step":"2A","move_note":null},{"id":25,"text":"In this paper, rather than arguing in favor of a particular theory, we release a new, open corpus of repeated reference games and conduct a variety of analyses to address current gaps in measurement and establish a firmer theoretical foundation facilitating future modeling work.","tag":"contribution","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3A","move_note":null},{"id":26,"text":"In particular, we address two methodological challenges that have limited the ability of previous studies to provide a sufficiently fine-grained characterization of behavior.","tag":"nostat","tier":"primary","parent_id":null,"note":"Identifies specific limitations/gaps in prior work that motivate the current study.","cars_move":"M2","cars_step":"2B","move_note":"M2->M3 cycling: returns to gap language after initial M3 claim at sentence 25."},{"id":27,"text":"First, we need more data.","tag":"nostat","tier":"primary","parent_id":null,"note":"Names the first gap concisely.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":28,"text":"Recent technical developments have allowed interactive multi-player experiments to be run on the web (Hawkins, 2015), boosting sample sizes by an order of magnitude.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3B","move_note":null},{"id":29,"text":"For comparison, seminal work by Clark and Wilkes-Gibbs (1986) used a sample of eight pairs of participants, while our confirmatory sample alone contains 83 pairs.","tag":"novstat","tier":"primary","parent_id":null,"note":"Claims novelty/superiority of the current data by explicit contrast with prior seminal work's sample size.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":30,"text":"Second, the computational techniques needed to work with rich natural language data were limited at the time of prior work, but they have become newly tractable, given developments in natural language processing (NLP).","tag":"nostat","tier":"primary","parent_id":null,"note":"Identifies the second gap/limitation of prior work that has now been resolved.","cars_move":"M2","cars_step":"2B","move_note":"Return to gap language mid M3 block; continuation of M2->M3 cycling."},{"id":31,"text":"Our analyses roughly divide into two broad categories, corresponding to the dynamics of syntactic structure and semantic content.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the organizational structure and scope of the analyses.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":32,"text":"Our investigations of syntactic structure in Section 3 focus on the process by which referring expressions are shortened to communicate the same idea more efficiently.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the topic and scope of the first analytic category.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":33,"text":"One particularly simple model, for example, might predict that shortening is purely driven by a random corruption process: at each repetition, each word from the previous repetition's utterance has some probability of being dropped.","tag":"emph","tier":"primary","parent_id":null,"note":"Introduces a specific candidate theoretical competitor (the random corruption model) as a real and concrete object of analysis; analogous to \"A third potential foraging strategy involves starting small\" in the guidelines. Asserts the existence of this model as worth attending to. Parent [32] is contribution (primary).","cars_move":"M3","cars_step":"3B","move_note":null},{"id":34,"text":"Raw word counts alone are not sufficient for disambiguating this simple model from more cognitively complex proposals.","tag":"nostat","tier":"primary","parent_id":null,"note":"Identifies a limitation of existing measurement (word counts) that motivates finer-grained analysis. Parent [33] is emph (primary).","cars_move":"M2","cars_step":"2B","move_note":"Brief return to gap/limitation language within M3 block; M2->M3 cycling."},{"id":35,"text":"To move beyond word counts, we extracted part-of-speech tags and syntax trees from the text to understand which parts of utterances were being dropped, and in which sequence.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the specific method deployed to address the gap identified in [34].","cars_move":"M3","cars_step":"3A","move_note":null},{"id":36,"text":"In contrast to the predictions of the random corruption model, we find that clauses and modifiers tend to be dropped in clusters, preferentially leaving open-class parts of speech (e.g., an adjective and noun) by the final repetition, and that the choice to shorten an utterance or not depends on sources of listener feedback.","tag":"novstat","tier":"primary","parent_id":null,"note":"Claims a novel finding that contrasts with the simple model; previews a key result.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":37,"text":"In Section 4, we examine the semantic content of utterances over the course of this shortening process.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the second category of analyses.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":38,"text":"Our analyses revolve around the theoretical constructs of arbitrariness and stability, which have been central to accounts of convention since Lewis (1969).","tag":"framedef","tier":"primary","parent_id":null,"note":"Introduces arbitrariness and stability as the theoretical constructs serving as analytical machinery for Section 4.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":39,"text":"Arbitrariness refers to the claim that multiple equally successful solutions exist in the space of possible conventions: There is no single optimal solution that all speakers should objectively use.","tag":"extension:definitional","tier":"secondary","parent_id":38,"note":"Parent [38] is framedef (primary). Defines the construct of arbitrariness.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":40,"text":"Stability refers to the claim that, once a solution has been found, speakers should not deviate from it.","tag":"extension:definitional","tier":"secondary","parent_id":38,"note":"Parent [38] is framedef (primary). Defines the construct of stability.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":41,"text":"Our contribution is to operationalize these claims in the high-dimensional space of vector embeddings for referring expressions (i.e., GloVe embeddings).","tag":"novstat","tier":"primary","parent_id":null,"note":"Claims novelty in the operationalization method applied to the constructs.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":42,"text":"By measuring the similarity between referring expressions in this space, we find that signatures of arbitrariness and stability gradually increase over the course of the interaction.","tag":"novstat","tier":"primary","parent_id":null,"note":"Claims a novel empirical finding as a preview of results.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":43,"text":"We also clarify the (non-arbitrary) processes shaping which words eventually become conventions.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces an additional contribution/aim of the paper.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":44,"text":"In particular, we test the prediction that pragmatic pressures to be informative in context lead more discriminative words to conventionalize (Gibson et al., 2017; Kirby, Tamariz, Cornish, & Smith, 2015).","tag":"contribution","tier":"primary","parent_id":null,"note":"Specifies a hypothesis being tested, with citations to prior work motivating the prediction.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":45,"text":"Taken together, our findings characterize core processes operating within the microcosm of dyadic, natural-language interactions.","tag":"link:closing","tier":"secondary","parent_id":null,"note":"Synthesizes the contribution claims of the preceding sentences; wraps up the Introduction's contribution sub-section structurally.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":46,"text":"These processes may ultimately contribute to the adaptive properties of conventions shared across language communities.","tag":"emph","tier":"primary","parent_id":null,"note":"Previously tagged extension:speculative with parent link:closing (secondary) — subordination violation. Elevated to emph: asserts the broader significance of the processes described for community-level conventions, establishing that they matter beyond the dyadic context. Parent [45] is link:closing; re-parents to nearest primary above, [44] (contribution).","cars_move":"M3","cars_step":"3C","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"heilbron_2022","title":"heilbron 2022","authors":["Heilbron"],"year":2022,"section":"Introduction"},"arc_summary":"The introduction builds its niche through **sustained interlacing of prior-work review and immediate limitation**, rather than a clean M1-then-M2 sequence. A compact M1 (S1–5) establishes predictive language processing as a well-evidenced territory, then **a single pivot sentence (S6)** names two unresolved questions and opens M2. The niche is then deepened across twelve sentences via alternating tempstat/contrast pairs — each citing a prior finding only to constrain it — culminating in two explicit **nostat gap statements (S16–17)** that frame the study's motivation. The introduction ends entirely in M2 with no M3 present.","structured_arc":"M1 -> M2","move_roles":[{"move":"M1","span":[1,5],"role":"Establishes predictive language processing as a legitimate, well-evidenced research territory by asserting the phenomenon's existence, citing broad scholarly consensus, extending evidence cross-domain (AI and motor/perceptual systems), and accumulating behavioral and neural examples — building sufficient credibility to motivate the pivot to a gap."},{"move":"M2","span":[6,17],"role":"Carves the niche by first naming two open questions (ubiquity and representational level), then deepening the gap through an interlaced pattern of reviewing prior ERP and naturalistic studies only to immediately limit each — cycling through counter-claim and limitation pairs — before closing with two explicit gap statements about multi-level interaction and the nature of predictability effects."}],"sentences":[{"id":1,"text":"Understanding spoken language requires transforming ambiguous stimulus streams into a hierarchy of increasingly abstract representations, ranging from speech sounds to meaning.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the existence and nature of a real phenomenon (the hierarchical transformation required for language comprehension) to establish relevance — not reporting a specific finding.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":2,"text":"It is often argued that during this process, the brain relies on prediction to guide the interpretation of incoming information (1, 2).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Summarizes a position held in the prior literature with citations.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":3,"text":"Such a 'predictive processing' strategy has not only proven effective for artificial systems processing language (3, 4) but has also been found to occur in neural systems in related domains such as perception and motor control, and might constitute a canonical neural computation (5, 6).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports cross-domain findings from prior work with citations supporting the generality of predictive processing.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":4,"text":"There is a considerable amount of evidence that appears in line with predictive language processing.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Summarizes the general state of evidence in the field.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":5,"text":"For instance, behavioral and brain responses are highly sensitive to violations of linguistic regularities (7, 8) and to deviations from linguistic expectations more broadly (9–13).","tag":"extension:illustrative","tier":"secondary","parent_id":4,"note":"Provides specific cited examples of the evidence summarized in [4] (primary tempstat parent). Citation present but sentence functions as illustration of [4]'s claim rather than asserting an independent cross-domain generalization.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":6,"text":"While such effects are well documented, two important questions about the role of prediction in language processing remain unresolved (14).","tag":"contrast","tier":"primary","parent_id":null,"note":"Concedes prior work but pivots to identify unresolved issues — classic tension-introducing move.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":7,"text":"The first question concerns the ubiquity of prediction.","tag":"link:opening","tier":"secondary","parent_id":null,"note":"Sole job is structural announcement introducing the first sub-topic; all substantive content is delivered in [8].","cars_move":"M2","cars_step":"2B","move_note":null},{"id":8,"text":"While some models cast prediction as a routine, integral part of language processing (1, 15, 16), others view it as relatively rare, pointing out that apparent widespread prediction effects might, instead, reflect other processes like semantic integration difficulty (17, 18), or that such prediction effects might be exaggerated by the use of artificial, prediction-encouraging experiments focusing on highly predictable 'target' words (17, 19).","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces disagreement in the literature between two positions on prediction ubiquity. [7] is link:opening (secondary) so [8] re-parents to [6] (contrast, primary) as its nearest primary ancestor — subordination rule satisfied.","cars_move":"M2","cars_step":"2A","move_note":null},{"id":9,"text":"The second question concerns the representational nature of predictions: Does linguistic prediction occur primarily at the level of syntax (15, 20–22) or rather at the lexical (16, 23), semantic (24, 25), or the phonological level (13, 26–29)?","tag":"nostat","tier":"primary","parent_id":null,"note":"Identifies an open, unresolved question about the representational level of linguistic prediction.","cars_move":"M2","cars_step":"2C","move_note":null},{"id":10,"text":"And is prediction limited to incremental, anticipatory processing within a given level, or does it extend to top-down prediction across levels (30)?","tag":"nostat","tier":"primary","parent_id":null,"note":"Identifies a second unresolved question — whether prediction operates within or across levels.","cars_move":"M2","cars_step":"2C","move_note":null},{"id":11,"text":"Event-related potential (ERP) studies have described brain responses to violations of, and deviations from, both high- and low-level expectations, suggesting prediction might occur at all levels simultaneously (1, 31) (but see refs. 19 and 32).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports prior ERP findings with citations.","cars_move":"M2","cars_step":"2B","move_note":"Interlaced M1/M2: prior research is reviewed here not to establish territory but to set up the immediately following limitation, deepening the niche."},{"id":12,"text":"However, it has been disputed whether these findings would generalize to natural language, where violations are rare or absent and with few highly predictable words.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a limitation of prior ERP work regarding generalizability to naturalistic settings.","cars_move":"M2","cars_step":"2A","move_note":null},{"id":13,"text":"In these cases, prediction may be less relevant or might, perhaps, be limited to the most abstract levels (17, 19, 32).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Corrected from extension:speculative. Although hedged in phrasing, this sentence cites refs (17, 19, 32), making it a citation-backed report of a position held in the literature. Per the citation = primary rule, it is tempstat.","cars_move":"M2","cars_step":"2B","move_note":"Interlaced M1/M2: reports a cited position that elaborates the scope of the limitation identified in [12], functioning to widen the gap rather than to establish territory."},{"id":14,"text":"Studies on naturalistic comprehension, on the other hand, have found neural sensitivity to various metrics of linguistic unexpectedness, suggesting prediction does, in fact, generalize to natural language (10, 11, 13, 22, 27, 28, 33, 34).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports findings from naturalistic studies as a counterpoint, with citations.","cars_move":"M2","cars_step":"2A","move_note":"Interlaced M1/M2: reviews prior work as a counter-claim to [12–13], but the subsequent sentence immediately limits it, maintaining the niche-building function."},{"id":15,"text":"However, these studies often focused on just one [or two (35)] levels of analysis—for example, speech sounds, words, or grammar.","tag":"contrast","tier":"primary","parent_id":null,"note":"Identifies a limitation of prior naturalistic studies.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":16,"text":"This leaves open whether metrics at different levels provide different vantage points onto a single underlying process or whether prediction happens at multiple levels simultaneously—and, if so, whether predictions at different levels may interact.","tag":"nostat","tier":"primary","parent_id":null,"note":"Identifies the gap left open by the limitation named in [15].","cars_move":"M2","cars_step":"2B","move_note":null},{"id":17,"text":"Moreover, it is unclear whether such overall predictability effects actually reflect continuous prediction, or might be driven by a subset of (highly predictable) events in naturalistic stimuli.","tag":"nostat","tier":"primary","parent_id":null,"note":"Identifies an additional unresolved question about the nature of predictability effects in naturalistic paradigms.","cars_move":"M2","cars_step":"2B","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"holbrook_2024","title":"holbrook 2024","authors":["Holbrook"],"year":2024,"section":"Introduction"},"arc_summary":"The introduction makes a **direct M1 → M3 leap**, skipping M2 entirely — a move that signals grant proposal conventions over journal norms. Six sentences of territory-building establish AI mentalizing as significant and feasible, then sentence 7 pivots immediately to purpose without ever articulating a gap. The bulk of the text is an unusually **extended M3** that sequences methodology, multi-year experimental design, team qualifications, and budget across 42 sentences. Two embedded **tempstat returns** (S9, S33) within M3 serve as local justifications for methodological choices rather than reopening the territory.","structured_arc":"M1 -> M3","move_roles":[{"move":"M1","span":[1,6],"role":"Establishes the significance and readiness of the AI mentalizing territory by asserting broad societal relevance, citing prior research calls, reporting empirical findings on over-reliance, and framing performance and trust as the key outcomes at stake."},{"move":"M3","span":[7,48],"role":"Occupies the niche by announcing the project's purpose and then exhaustively detailing the mentalizing model architecture, measurement instruments, task paradigms, year-by-year experimental plan, team qualifications, and budget — the full argumentative weight of a grant proposal."}],"sentences":[{"id":1,"text":"Artificially intelligent agents are under active development as resources to enhance decision-making in diverse domains spanning navigation, investment, the creative arts, healthcare, warfare, and beyond.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the existence and broad relevance of AI agents; establishes significance of the topic area.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":2,"text":"To facilitate human-machine teaming with artificial agents, researchers have called for the engineering of mentalizing to enable agents to model their human interactants' mental states on the basis of observable data [1].","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports prior research calls and establishes an existing concept with citation.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":3,"text":"Artificial mentalizing promises to promote effective partnership with agents by increasing their capacity to infer and adaptively respond to humans' cognitive states, including intentions, effort and emotions.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance and promise of artificial mentalizing; establishes why the topic matters.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":4,"text":"Of particular interest, prior findings of human over-reliance on agents suggest a tendency to down-regulate cognitive effort they might otherwise have engaged to respond to task challenges.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a prior finding about human over-reliance on agents.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":5,"text":"Agents equipped with the capacity to detect deficits in human cognitive effort can be programmed to react correctively, thereby increasing their human partner's engagement and improving team performance.","tag":"emph","tier":"primary","parent_id":null,"note":"Changed from extension:speculative. Makes a confident, non-hedged assertion about what mentalizing agents can do; functions as a significance/capability claim rather than a hedged speculation. Stands independently as an emph claim.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":6,"text":"In addition to enhancing performance, mentalizing is also anticipated to increase trust in and rapport with agents as social companions [2].","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports an anticipated effect from the literature with citation support.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":7,"text":"The goal of this project is to assess the impact of artificial mentalizing on performance and relational trust.","tag":"contribution","tier":"primary","parent_id":null,"note":"Direct statement of the project's purpose and scope.","cars_move":"M3","cars_step":"3A","move_note":"M2-absent: no explicit gap statement precedes this purpose announcement; the paper moves directly from M1 territory-building to M3 occupation."},{"id":8,"text":"Our project will begin with the development of a novel mentalizing model based on relaying multimodal situational and psychophysiological data to a Large Language Model (LLM).","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the method and approach of the current project.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":9,"text":"LLMs have already been demonstrated to possess mentalizing-like capacities comparable to those of humans when provided linguistic descriptions [3].","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a prior empirical finding about LLM mentalizing capacities with citation.","cars_move":"M3","cars_step":"3B","move_note":"Prior literature cited here functions as justification for the LLM-based methodological choice within M3, not as territory-establishment."},{"id":10,"text":"and may well exceed human abilities if additionally equipped with real-time physiological data.","tag":"extension:speculative","tier":"secondary","parent_id":9,"note":"Extends the prior cited finding into a speculative prediction without new citation; parent [9] is primary (tempstat). Chain is legal.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":11,"text":"Cognitive effort will be assessed according to correlated shifts in cerebral blood flow measured using functional near-infrared spectroscopy (fNIRS) [4, 5], with three spot EEG electrodes, as shown in Figure 1, incorporated to assess engagement.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the methodological approach for measuring cognitive effort in the current study.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":12,"text":"Workload and engagement will be relayed in real time using a machine learning classifier.","tag":"contribution","tier":"primary","parent_id":null,"note":"Continues describing the technical method of the project.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":13,"text":"The psychophysiological inputs will also include participant gaze fixations, heart-rate variability, electrodermal activity, pupil dilation, bodily movement, and affective speech to infer participants' attentional foci and emotions.","tag":"contribution","tier":"primary","parent_id":null,"note":"Further specifies the methodological inputs for the mentalizing model.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":14,"text":"This mentalizing model will initially be tested using a joint task in which a target is concealed within panoramic images containing diverse, emotionally evocative distracter video stimuli.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the task paradigm to be used in the study.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":15,"text":"The imagery will be presented using an augmented reality (AR) display such that gaze fixations on particular stimuli will be readily detectable via eyetracking.","tag":"contribution","tier":"primary","parent_id":null,"note":"Further describes the technical setup of the experimental method.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":16,"text":"The mentalizing inferences will trigger contingent responses.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes a key functional feature of the mentalizing system in the study.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":17,"text":"For example, the robot might comment on participants' interest in a particular scene (e.g., a crying child), and/or on a semantically associated emotion (e.g., \"That's sad, isn't it?\").","tag":"extension:illustrative","tier":"secondary","parent_id":16,"note":"Provides a concrete example of contingent responses; parent [16] is primary (contribution). Chain is legal.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":18,"text":"The robot may also respond in ways that support teamwork, such as acknowledging when participants appear distracted and encouraging them to try to help accomplish their task, or providing reassurance to participants who appear anxious or to have stopped trying (e.g., \"Don't worry, we've got this\"; \"Are you still looking? I need your help.\")","tag":"extension:illustrative","tier":"secondary","parent_id":16,"note":"Further illustrates contingent robot responses. Re-parented to [16] (primary) rather than [17] (secondary), per subordination rule allowing skipping of intermediate secondary sentences.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":19,"text":"The robot will not know where the target stimuli are located, but will rather search the visual scene alongside the human using its own image classification capacity and a random fixation sequence, such that its assistance as a partner will primarily derive from its capacity to influence the human via its mentalizing ability.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes a key design feature of the robot's role in the experimental paradigm.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":20,"text":"Performance will be measured according to whether and how long it takes the team to find the target stimuli; relational trust will be assessed via self-report.","tag":"contribution","tier":"primary","parent_id":null,"note":"Specifies the dependent variables and measurement approach.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":21,"text":"The primary robot platform will be Ameca, an interactive humanoid capable of sophisticated linguistic, facial and bodily expression [6].","tag":"contribution","tier":"primary","parent_id":null,"note":"Identifies the robot platform to be used in the study.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":22,"text":"Ameca utilizes an LLM approach to spoken interaction, but may be programmed to produce specified responses to eliciting events, thereby permitting experimental control and consistency across study sessions.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes relevant technical features of the robot platform as they pertain to the study design.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":23,"text":"We will also explore the impact of mentalizing when implemented in physically nonanthropomorphic mobile robots deployed in field studies outside the lab.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces an additional planned component of the research.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":24,"text":"In the virtual reality (VR) study, we will maximize immersion and realism by incorporating embodied movement using an omnidirectional treadmill [7], haptic feedback when touching simulated objects, olfactory input (e.g., the fragrance of grass when near simulated grass) [8], and mild pain correspondent to simulated injury via transcutaneous electrical nerve stimulation.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes methodological features of a planned VR study component.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":25,"text":"Dr. Holbrook's lab is currently equipped with almost all of the hardware and software required for this project.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts practical viability/readiness of the project; functions as a significance/feasibility claim establishing that the work can be done. Emph is the closest fit as it asserts something real and worth attending to about the project's capacity.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":26,"text":"The complementary expertise of the investigators will serve project aims.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the relevance and adequacy of the research team's qualifications.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":27,"text":"Dr. Holbrook has extensive experience conducting psychological experiments centered upon trust, mentalizing and social appraisal; Dr. Wagner possesses the expertise to oversee development of the mentalizing model as well as novel human-robot interaction (HRI) study paradigms; Dr. Hirshfield has pioneered the use of fNIRS to measure and model cognitive effort and emotion in contexts of human-machine interaction.","tag":"extension:illustrative","tier":"secondary","parent_id":26,"note":"Elaborates the specific expertise of each investigator, illustrating the claim in [26] (primary: emph). Chain is legal.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":28,"text":"In Year 1, we will develop our mentalizing model by iteratively conducting studies comparing its predictions to the self-reports and actual performance of human subjects in the HRI task involving searching for target stimuli hidden among emotionally evocative imagery.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the Year 1 research plan and its structure.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":29,"text":"The model will be validated to accurately infer level of cognitive effort, attentional foci, and emotional responses to the stimuli in this task.","tag":"contribution","tier":"primary","parent_id":null,"note":"States the validation goal for Year 1.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":30,"text":"As the model grows more accurate, the task will be elaborated with additional stimuli to generalize functionality.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the iterative development plan for Year 1.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":31,"text":"In Year 2, we will conduct three HRI experiments testing the effects of artificial mentalizing.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the Year 2 research plan.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":32,"text":"The first experiment will consist of a one-shot encounter in which the robot is either equipped with the mentalizing model and programmed to respond contingently to participants' shifting levels of cognitive effort, attentional foci, and emotional states, or, in a between-subjects design, with a version of the model programmed to generate inappropriate responses (i.e., signaling that the robot is unable to accurately infer mental states).","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the design of the first Year 2 experiment.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":33,"text":"Time invested working with agents has also been hypothesized to enhance trust and affiliation [9].","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a prior hypothesis from the literature with citation, used to motivate the second experiment.","cars_move":"M3","cars_step":"3B","move_note":"Prior literature cited here functions as justification for the longitudinal design of the second experiment within M3, not as new M1 territory-building."},{"id":34,"text":"Accordingly, the second experiment will introduce a longitudinal design to compare the impact of mentalizing versus mere time spent interacting on the development of relational trust and affiliation over a series of four study sessions.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the second Year 2 experiment design, motivated by the prior tempstat.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":35,"text":"Both studies will use the Year 1 task paradigm in which participants team with the robot to identify hidden target stimuli; alternate distracter stimuli and target locations will be utilized across the different sessions of the longitudinal experiment.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes shared methodological features of the first two Year 2 experiments.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":36,"text":"In the third experiment, the generalizability and ecological validity of the findings obtained previously will be tested in a mobile robot field study using AR and fNIRS/EEG equipment capable of being used wirelessly while walking outside.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the third Year 2 experiment and its purpose.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":37,"text":"AR will permit us to superimpose visual stimuli over real-world environments as participants cooperate with the mobile robots to pursue a navigation task conceptually patterned after the previous lab-based target-location paradigm, now utilizing evocative distracter stimuli to mask subtle arrows hidden in the vicinity directing the human-robot team to a series of destinations.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the specific design of the field study paradigm.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":38,"text":"Performance will be measured according to whether and how long it takes the human to find the target arrows, and the relative circuitousness of their routes (to be recorded by the mobile robot).","tag":"contribution","tier":"primary","parent_id":null,"note":"Specifies dependent variables for the field study.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":39,"text":"Relational trust will be measured both using self-report, as before, and also according to human willingness to walk over to places the robot indicates a potential arrow may be, as opposed to pursuing their own search vectors.","tag":"contribution","tier":"primary","parent_id":null,"note":"Specifies trust measurement approach for the field study, including a novel behavioral measure.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":40,"text":"In Year 3, we will test the impact of mentalizing on performance and relational trust using an ecologically valid, longitudinal design.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the Year 3 research plan.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":41,"text":"The final experiment will employ VR to model human-robot teaming in a paradigm conceptually extending the prior target-identification task to a plausible real-world context.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the Year 3 VR experiment design.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":42,"text":"Over a period of four weekly sessions, participants will simulate working with a robot as a student worker assigned to assess potentially threatening individuals (Non-Player Characters [NPCs]) as they move through a public event.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the specific scenario and procedure of the Year 3 VR experiment.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":43,"text":"Potential threats will be directed away from the entrance line to simulated security personnel for further assessment.","tag":"contribution","tier":"primary","parent_id":null,"note":"Continues describing the Year 3 VR task scenario.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":44,"text":"Mirroring the use of emotionally evocative distracter imagery in the preceding target-identification paradigms, in this VR environment, we will seed attention-garnering (but task-irrelevant) people, vehicles, animals, and noises.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes a methodological feature of the Year 3 VR environment and its conceptual connection to earlier paradigms.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":45,"text":"In place of the target stimuli used previously, participants and their robot partners will be trained to move through the crowd looking for indications of weapons or particular extremist symbols (e.g., on clothing or as tattoos).","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the target stimuli and task procedure for the Year 3 experiment.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":46,"text":"In a between-subjects manipulation, as before, the robot either will mentalize and respond to their human partners contingently, or not (in the control condition).","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the between-subjects design of the Year 3 experiment.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":47,"text":"Performance will be measured in terms of the number of threats correctly identified; relational trust will be assessed in terms of self-report and willingness to walk over to places the robot indicates a potential threat may be.","tag":"contribution","tier":"primary","parent_id":null,"note":"Specifies the dependent variables for Year 3.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":48,"text":"ROM is estimated to be ~$850K over three years.","tag":"new_tag_needed","tier":"unknown","parent_id":null,"note":"Budget/cost statement typical of grant proposals. Does not fit any tag: not a significance claim, prior finding, gap, novelty claim, contribution description, or framing device. It is purely administrative/financial information outside the rhetorical vocabulary of the tag system.","cars_move":"M3","cars_step":"3D","move_note":"Administrative/budgetary closing statement; assigned 3D as the nearest terminal step within M3, as it closes the proposal rather than announcing purpose, justification, or findings."}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"isaacs_1987","title":"isaacs 1987","authors":["Isaacs"],"year":1987,"section":"Introduction"},"arc_summary":"The introduction opens with a single M1 sentence before immediately pivoting to M2, using the doctor-patient scenario to build the problem of expertise discrepancy rather than citing a gap in the literature. **The M2-to-M3 transition at sentence 7 is unusually sharp**, compressing what might otherwise be a multi-sentence gap statement into a one-sentence purpose announcement. The bulk of the introduction is an extended M3 that does double duty: it presents the collaborative theory framework *and* describes the study design, with a brief **M2 re-entry at sentence 38** (the open empirical question) to re-motivate the methodology. The introduction closes with a sustained theoretical elaboration of \"perspective,\" treating the conceptual apparatus as itself a contribution rather than mere scaffolding.","structured_arc":"M1 -> M2 -> M3 -> M2 -> M3","move_roles":[{"move":"M1","span":[1,1],"role":"Anchors the paper in the established literature on common ground, lending theoretical legitimacy before the problem is introduced."},{"move":"M2","span":[2,6],"role":"Constructs the central problem — unequal expertise undermines common ground — through an extended doctor-patient illustration rather than a citation-based gap claim, making the problem vivid and motivating before any theory is introduced."},{"move":"M3","span":[7,37],"role":"Announces the paper's purpose, introduces the collaborative theory of reference as its analytical framework, and elaborates all three processes (assessing, supplying, acquiring expertise) with hypothetical illustrations, constituting the paper's primary theoretical contribution."},{"move":"M2","span":[38,38],"role":"Re-opens the empirical gap with a direct question about whether the three proposed processes actually occur, pivoting from theoretical elaboration to the need for an empirical study."},{"move":"M3","span":[39,57],"role":"Describes the study design, specifies the expertise domain (New York City landmarks and proper names), and develops the construct of perspective — extending the theoretical contribution while grounding it in the study's logic."}],"sentences":[{"id":1,"text":"For success in conversation, people must continually appeal to their common ground—their mutual knowledge, beliefs, and assumptions (Clark, 1985; Clark & Carlson, 1981; Clark & Marshall, 1981; Cohen, 1978; Gazdar, 1979; Stalnaker, 1978).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1B","move_note":null},{"id":2,"text":"The problem is that the participants in a conversation inevitably know different amounts about any topic under discussion.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a tension against the prior claim about common ground.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":3,"text":"As a result, they have to start at the level of the least knowledgeable person among them and build from there.","tag":"extension:speculative","tier":"secondary","parent_id":2,"note":"Derives a behavioral consequence from [2] without citation; speculative elaboration of the contrast.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":4,"text":"Doctors, for example, ordinarily assume their patients know little anatomy, pathology, and pharmacology, so they believe they must use lay terminology, such as heart attack instead of myocardial infarction, and couch their explanations in a form that nonphysicians can understand.","tag":"extension:illustrative","tier":"secondary","parent_id":2,"note":"Re-parented to [2] (contrast) by skip rule; illustrates the expert-novice asymmetry.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":5,"text":"Yet the moment they discover their patient is also a doctor, they realize they can adjust their terminology and explanations to fit the broader common ground.","tag":"extension:illustrative","tier":"secondary","parent_id":2,"note":"Re-parented to [2] (contrast) by skip rule; continues the doctor illustration showing adjustment.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":6,"text":"Even when discrepancies in expertise are not as great, people have to adjust.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the generality of the adjustment phenomenon; establishes it as real and worth attending to.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":7,"text":"In this article, we examine a proposal about how people in conversation deal with discrepancies in expertise.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the purpose and scope of the current paper.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":8,"text":"The proposal we consider is concerned with the making of definite references in conversation, as characterized by the collaborative theory of reference (Clark & Wilkes-Gibbs, 1986).","tag":"framedef","tier":"primary","parent_id":null,"note":"Introduces the collaborative theory of reference as the paper's analytical framework.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":9,"text":"The theory, briefly, is that when speakers make such a reference, they try to establish with their partners the mutual belief that their partners have understood the reference to a criterion sufficient for current purposes.","tag":"extension:definitional","tier":"secondary","parent_id":8,"note":"Unpacks the content of the framework introduced in [8].","cars_move":"M3","cars_step":"3B","move_note":null},{"id":10,"text":"That requires a collaborative process, as illustrated here in A's reference to Monday (simplified from Schegloff, Jefferson, & Sacks, 1977, p. 369):","tag":"extension:illustrative","tier":"secondary","parent_id":8,"note":"Re-parented to [8] (framedef) by skip rule; signals and introduces an illustration of the collaborative process.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":11,"text":"A initiated the referential process by presenting the noun phrase Monday, but A and B didn't consider the process complete until they mutually accepted that B had understood A's reference.","tag":"extension:definitional","tier":"secondary","parent_id":8,"note":"Re-parented to [8] (framedef) by skip rule; unpacks the mechanics of the exchange in terms of the theory.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":12,"text":"To reach that acceptance, they took several turns: B asked A to clarify which Monday he meant, A did so, and then B continued.","tag":"extension:illustrative","tier":"secondary","parent_id":8,"note":"Re-parented to [8] (framedef) by skip rule; describes turn-by-turn process in the example.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":13,"text":"Two people usually reach mutual acceptance simply by allowing the next contribution to proceed uninterrupted.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a general finding about conversational practice; independent empirical claim.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":14,"text":"Other times they need several turns, as A and B did here.","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Contrasts with [13] using the prior example; subordinate to [13] (tempstat).","cars_move":"M3","cars_step":"3B","move_note":null},{"id":15,"text":"Discrepancies in expertise should influence the process in predictable ways.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the relevance and significance of expertise discrepancies for the referential process.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":16,"text":"Suppose Dr. Cohen presupposes that her patient Mr. Baker is also a physician and says, 'Contract your deltoid.'","tag":"extension:illustrative","tier":"secondary","parent_id":15,"note":"Opens a hypothetical scenario illustrating the claim in [15]; parent is [15] (emph).","cars_move":"M3","cars_step":"3B","move_note":null},{"id":17,"text":"If she is right about his knowledge, Baker will accept her reference and comply.","tag":"extension:illustrative","tier":"secondary","parent_id":15,"note":"Re-parented to [15] (emph) by skip rule; continues the hypothetical scenario.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":18,"text":"If not, he might ask, 'Uh, my deltoid?' to which she might respond, 'Oh, raise your arm out to the side.'","tag":"extension:illustrative","tier":"secondary","parent_id":15,"note":"Re-parented to [15] (emph) by skip rule; continues the hypothetical showing repair.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":19,"text":"If instead Cohen presupposes that Baker is not a physician, then she should begin, 'Raise your arm out to the side,'","tag":"extension:illustrative","tier":"secondary","parent_id":15,"note":"Re-parented to [15] (emph) by skip rule; explores the alternative assumption in the hypothetical.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":20,"text":"If she is right, Baker will simply comply.","tag":"extension:illustrative","tier":"secondary","parent_id":15,"note":"Re-parented to [15] (emph) by skip rule; continues the hypothetical scenario.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":21,"text":"If not, he might add, 'Oh, right, contract my deltoid.'","tag":"extension:illustrative","tier":"secondary","parent_id":15,"note":"Re-parented to [15] (emph) by skip rule; continues the hypothetical scenario.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":22,"text":"That is, as they complete the referential process, not only can they discover who is expert and who is not, but they also may supply or acquire a bit of expertise (the technical term deltoid).","tag":"emph","tier":"primary","parent_id":null,"note":"Draws the key claim from the hypothetical: the referential process enables expertise exchange; asserts significance of the phenomenon.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":23,"text":"Our proposal is that experts and novices accommodate to discrepancies in expertise in the very process of collaborating to complete a reference.","tag":"contribution","tier":"primary","parent_id":null,"note":"States the paper's central proposal directly.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":24,"text":"Their accommodation divides into three processes—assessing, supplying, and acquiring expertise.","tag":"framedef","tier":"primary","parent_id":null,"note":"Names and introduces the three-part conceptual framework structuring the paper's argument.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":25,"text":"1. Assessing expertise: Any two people in conversation must assess each other's expertise on the topic they are talking about.","tag":"framedef","tier":"primary","parent_id":null,"note":"Names and defines the first process of the three-part framework.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":26,"text":"One method Cohen might use, for example, is to ask Baker, 'Are you a doctor?' (see Schegloff, 1972).","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Provides an example of one assessment method; parent is [25] (framedef).","cars_move":"M3","cars_step":"3B","move_note":null},{"id":27,"text":"Yet a person's primary source, we suppose, is the expertise their partner displays in passing as they collaborate in their references.","tag":"extension:speculative","tier":"secondary","parent_id":25,"note":"Re-parented to [25] (framedef) by skip rule; proposes the authors' preferred account of assessment; marked as supposition.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":28,"text":"Cohen could judge Baker to be a novice when he asks, 'What's my deltoid?' but to be an expert when he adds, 'Oh, right, contract my deltoid.'","tag":"extension:illustrative","tier":"secondary","parent_id":25,"note":"Re-parented to [25] (framedef) by skip rule; illustrates the speculative claim about in-passing assessment.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":29,"text":"2. Supplying expertise: Experts who realize they are talking to novices should often fill in the needed expertise.","tag":"framedef","tier":"primary","parent_id":null,"note":"Names and introduces the second process of the three-part framework.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":30,"text":"If Cohen expects to refer several times to Baker's deltoids, it may be reasonable for her to try to broaden their common ground so that eventually she can refer to it as your deltoid.","tag":"extension:speculative","tier":"secondary","parent_id":null,"note":"Extends the supplying expertise concept with hypothetical reasoning; parent is [29] (framedef).","cars_move":"M3","cars_step":"3B","move_note":null},{"id":31,"text":"One way to do this is to select a noun phrase appropriate to the current common ground, but to add information instructive to her addressee, as in your deltoid—the muscle you contract when you raise your arm out to the side.","tag":"extension:illustrative","tier":"secondary","parent_id":29,"note":"Re-parented to [29] (framedef) by skip rule; illustrates the mechanism of supplying expertise.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":32,"text":"Experts who are addressees may expand on the noun phrases used by novice speakers and thereby acquaint them with information useful for more efficient noun phrases.","tag":"extension:speculative","tier":"secondary","parent_id":29,"note":"Re-parented to [29] (framedef) by skip rule; extends the supplying expertise concept to expert-as-addressee configuration.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":33,"text":"If Baker complains of the muscle that hurts when he lifts his arm, Cohen might respond, 'Yeah, your deltoid.'","tag":"extension:illustrative","tier":"secondary","parent_id":29,"note":"Re-parented to [29] (framedef) by skip rule; illustrates the addressee-as-expert scenario.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":34,"text":"Thereafter Baker can use my deltoid.","tag":"extension:illustrative","tier":"secondary","parent_id":29,"note":"Re-parented to [29] (framedef) by skip rule; continues the illustration showing downstream efficiency benefit.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":35,"text":"3. Acquiring expertise: Novices who realize they are talking to experts should try to fill the gaps in their knowledge.","tag":"framedef","tier":"primary","parent_id":null,"note":"Names and introduces the third process of the three-part framework.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":36,"text":"They may try to elicit information from their addressees.","tag":"extension:speculative","tier":"secondary","parent_id":null,"note":"Speculates about one mechanism of expertise acquisition; parent is [35] (framedef).","cars_move":"M3","cars_step":"3B","move_note":null},{"id":37,"text":"They can also pick up incidental information that experts present in the course of their references.","tag":"extension:speculative","tier":"secondary","parent_id":35,"note":"Re-parented to [35] (framedef) by skip rule; speculates about a second acquisition mechanism.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":38,"text":"Do people assess, supply, and acquire expertise in the process of referring, and if so, how?","tag":"nostat","tier":"primary","parent_id":null,"note":"Frames the open empirical question motivating the study.","cars_move":"M2","cars_step":"2C","move_note":"M2->M3 cycle: brief return to gap language (open question) after extended M3 framework presentation, before final M3 study announcement."},{"id":39,"text":"To investigate this question, we used a variation of a task pioneered by Krauss and Glucksberg (1969; Krauss & Weinheimer, 1964, 1966, 1967; Glucksberg, Krauss, & Higgins, 1975).","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the method used in the current study.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":40,"text":"The area of expertise we chose was knowledge of New York City.","tag":"contribution","tier":"primary","parent_id":null,"note":"Specifies the domain of the current study.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":41,"text":"We asked New Yorkers to describe picture postcards of 16 New York City landmarks to non-New Yorkers, and vice versa, and we compared their references to those of pairs of New Yorkers and pairs of non-New Yorkers talking about the same postcards.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the study design and comparisons made.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":42,"text":"The primary piece of expertise we examined was knowledge of proper names.","tag":"contribution","tier":"primary","parent_id":null,"note":"Specifies the primary dependent measure of interest.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":43,"text":"Initially, most New Yorkers know, for example, that the Citicorp Building is called the Citicorp Building, and most non-New Yorkers do not.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the existence and nature of the expert-novice asymmetry in the chosen domain; establishes why proper names are a meaningful index.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":44,"text":"The name Citicorp is information that experts can supply the novices, that novices can acquire from experts, and that both can exploit in assessing their partner's expertise.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the theoretical relevance of proper names to all three framework processes; connects domain choice to the paper's conceptual machinery.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":45,"text":"Note that to learn that a particular building is called Citicorp is not simply to learn the proper name Citicorp.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the importance of a nuance about what proper-name learning involves; establishes depth of the expertise concept.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":46,"text":"One has to learn what features distinguish the Citicorp Building from other buildings, and that it is the building with these features that bears the name Citicorp.","tag":"extension:definitional","tier":"secondary","parent_id":45,"note":"Unpacks and elaborates the claim in [45] about the nature of proper-name knowledge; parent is [45] (emph).","cars_move":"M3","cars_step":"3B","move_note":null},{"id":47,"text":"Non-New Yorkers, in referring to a postcard of the building, may focus on pictured features that are in reality incidental to the building's identity, whereas New Yorkers should bring out those features of the building that are truly characteristic.","tag":"extension:speculative","tier":"secondary","parent_id":45,"note":"Re-parented to [45] (emph) by skip rule; derives a predicted behavioral difference from the prior claim.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":48,"text":"So part of learning a proper name is learning the most apt way of characterizing its referent.","tag":"link:closing","tier":"secondary","parent_id":45,"note":"Re-parented to [45] (emph) by skip rule; wraps up the sub-section on what proper-name learning entails.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":49,"text":"Another part of this expertise is what we will call perspective.","tag":"framedef","tier":"primary","parent_id":null,"note":"Introduces and names a new conceptual construct — \"perspective\" — as an additional dimension of expertise the paper will analyze.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":50,"text":"When people become experts on a topic, not only do they know more than novices, but their understanding of it changes (for a review, see Chi, Glaser, & Rees, 1982).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Cites prior literature on expert-novice differences in knowledge structure.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":51,"text":"They can adopt more abstract perspectives on the topic and organize their knowledge more on structural properties and less on surface features.","tag":"extension:definitional","tier":"secondary","parent_id":50,"note":"Elaborates the nature of expert knowledge change introduced in [50]; parent is [50] (tempstat).","cars_move":"M3","cars_step":"3B","move_note":null},{"id":52,"text":"Most New Yorkers know the Citicorp's distinctive slanted roof, what happens there, its neighboring buildings, and what it looks like from other directions, whereas most non-New Yorkers don't.","tag":"extension:illustrative","tier":"secondary","parent_id":50,"note":"Re-parented to [50] (tempstat) by skip rule; illustrates the expert-novice knowledge difference in the paper's domain.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":53,"text":"So when a New Yo
