e man holds ARE here'.","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Concrete example of the limitation stated in [4], which is the primary parent.","cars_move":"M2","cars_step":"2A","move_note":null},{"id":6,"text":"Similarly, when text generation is optimized on next-word prediction only, deep language models generate bland, incoherent sequences or get stuck in repetitive loops.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Corrected from extension:illustrative. This is a cited empirical claim and cannot have a secondary-tagged sentence ([5]) as its direct parent. It independently reports a finding about model behavior, making tempstat appropriate.","cars_move":"M2","cars_step":"2A","move_note":"Continues counter-claim block despite tempstat tag; rhetorically functions as additional evidence for the gap between models and human cognition."},{"id":7,"text":"Predictive coding theory offers a potential explanation to these shortcomings; while deep language models are mostly tuned to predict the very next word, this framework suggests that the human brain makes predictions over multiple timescales and levels of representations across the cortical hierarchy (Fig. 1a).","tag":"framedef","tier":"primary","parent_id":null,"note":"Introduces predictive coding theory as the analytical framework the paper will deploy.","cars_move":"M2","cars_step":"2C","move_note":"Frames the shortcoming as an open explanatory question via predictive coding theory; functions as question-raising in the niche."},{"id":8,"text":"Previous work already evidenced speech predictions in the brain by correlating word or phonetic surprisal, that is, the extent to which a word or phone is expected, with functional magnetic resonance imaging (fMRI), electroencephalography, magnetoencephalography and electrocorticography.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":"Brief return to territory review before a sharper gap statement; interlaced M1 within M2 block."},{"id":9,"text":"However, such surprisal estimates derive from models trained to predict the very next word or phoneme and reduce down their output to a single number, that is, the probability of the next token.","tag":"contrast","tier":"primary","parent_id":null,"note":null,"cars_move":"M2","cars_step":"2A","move_note":null},{"id":10,"text":"Consequently, the nature of the predicted representations and their temporal scope are largely unknown.","tag":"nostat","tier":"primary","parent_id":null,"note":null,"cars_move":"M2","cars_step":"2B","move_note":null},{"id":11,"text":"In this study, we address these issues by analysing the brain signals of 304 individuals listening to short stories while their brain activity is recorded with fMRI.","tag":"contribution","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3A","move_note":null},{"id":12,"text":"After confirming that deep language algorithms linearly map onto brain activity, we show that enhancing these models with long-range and multi-level predictions improves such brain mapping.","tag":"contribution","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3A","move_note":null},{"id":13,"text":"Critically, and in line with predictive coding theory, our results reveal a hierarchical organization of language predictions in the cortex, in which the highest areas predict the most distant and highest-level representations.","tag":"novstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3C","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"chakrabarty_2024","title":"chakrabarty 2024","authors":["Chakrabarty"],"year":2024,"section":"Introduction"},"arc_summary":"The introduction stakes its territory minimally — one sentence on LLMs in creative writing — before immediately announcing the paper's investigative purpose, a strikingly early **M3 move** that signals confidence over gap-building. A brief **M2 contrast** (evaluation is hard) and a mid-arc return to M1 background (TTCT origins) both serve as rhetorical scaffolding for the paper's core contribution: the **TTCW framework**. The dominant pattern is **M2→M3 cycling** with M1 segments deployed instrumentally to justify design choices rather than to establish broad territory.","structured_arc":"M1 -> M3 -> M2 -> M3 -> M1 -> M2 -> M3","move_roles":[{"move":"M1","span":[1,1],"role":"Establishes the research territory of LLMs in creative writing with a single sentence and citation cluster, providing just enough context to situate the paper before pivoting immediately to purpose."},{"move":"M3","span":[2,2],"role":"Announces the paper's investigative scope and ultimate goal (informing interaction design) unusually early, before any gap has been fully established — a confident rhetorical move that frames the entire introduction."},{"move":"M2","span":[3,3],"role":"Introduces the core difficulty (objectively evaluating creativity) that motivates the paper's methodological contribution, retroactively justifying the M3 purpose statement that preceded it."},{"move":"M3","span":[4,4],"role":"Proposes TTCW as the paper's central protocol and grounds it in TTCT, naming the contribution and anchoring the methodological solution to the gap just identified."},{"move":"M1","span":[5,6],"role":"Inserts background territory on TTCT and its four dimensions to legitimize the framework choice; this M1 is deployed instrumentally within M3 development rather than as an opening scene-setter."},{"move":"M2","span":[7,7],"role":"Acknowledges a limitation of direct TTCT application across creative domains, creating a targeted gap that the paper's adapted TTCW design directly answers — tightening the M2→M3 cycling logic."},{"move":"M3","span":[8,13],"role":"Defines TTCW, justifies it via CAT, and unfolds the full study design in sequential detail — formative expert study, 14 binary tests, benchmark construction, and expert evaluation — occupying the bulk of the introduction as the extended contribution announcement."}],"sentences":[{"id":1,"text":"Recent work has explored the potential of using large language models (LLMs) as assistants in creative writing tasks, from stories to screenplays [17, 34, 41, 47, 73].","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":2,"text":"An important aspect of this research is to investigate LLMs' capabilities in terms of their ability to both generate creative content and assess whether a piece of writing is creative, with the ultimate goal of informing interaction design.","tag":"contribution","tier":"primary","parent_id":null,"note":"Frames the paper's investigative purpose and scope; \"informing interaction design\" signals the paper's goal, making this a contribution statement rather than an emph claim about significance.","cars_move":"M3","cars_step":"3A","move_note":"Early M3 purpose announcement before the gap is fully established; part of M2->M3 cycling pattern."},{"id":3,"text":"However, evaluating objectively the creativity of a piece of writing is challenging.","tag":"contrast","tier":"primary","parent_id":null,"note":null,"cars_move":"M2","cars_step":"2B","move_note":"Returns to gap language after initial M3 announcement; M2->M3 cycling."},{"id":4,"text":"We propose a protocol to evaluate creativity as product grounded in a widely accepted protocol that evaluates creativity as process — the Torrance Tests of Creative Thinking (TTCT) [64].","tag":"novstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3A","move_note":null},{"id":5,"text":"Based on Guilford's work on divergent thinking [31], TTCT measures creativity as a process by testing participants' abilities in dealing with unusual uses of objects, specific situations, or impossibilities.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":"Background territory-review inserted within M3 to justify the chosen framework; temporarily returns to M1."},{"id":6,"text":"TTCT is centered around evaluating four dimensions of creativity: fluency (the sheer volume of meaningful ideas produced in reaction to a given stimulus), flexibility (the diversity of categories within the responses), originality (the uniqueness or novelty of answers) and elaboration (the depth or granularity of details within the responses).","tag":"extension:definitional","tier":"secondary","parent_id":5,"note":"Unpacks the TTCT framework introduced in [5]; parent is [5] tempstat ✓.","cars_move":"M1","cars_step":"1C","move_note":"Secondary sentence inherits M1/1C from parent sentence 5."},{"id":7,"text":"While the direct application of TTCT might not be possible across diverse creative domains [3, 6], its four fundamental dimensions have proven adaptable [11, 46, 65].","tag":"contrast","tier":"primary","parent_id":null,"note":"Opens with a limitation against TTCT's direct applicability; the rhetorical move is to introduce tension before the pivot to the current paper's design. The citations support the limiting condition and the adaptability claim, but the dominant function is contrast against straightforward application of TTCT.","cars_move":"M2","cars_step":"2A","move_note":"Returns to gap/limitation language; continuation of M2->M3 cycling pattern."},{"id":8,"text":"Thus, based on TTCT and using the Consensual Assessment Technique (CAT) [3] we design the Torrance Tests for Creative Writing (TTCW) to evaluate creativity as product (Section 3 Design Principle 1 and 2; Figure 1 Step 1).","tag":"framedef","tier":"primary","parent_id":null,"note":"Introduces and names TTCW as the conceptual/methodological instrument the paper will deploy throughout; the naming act is the primary rhetorical function.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":9,"text":"The Consensual Assessment Technique states that the most valid assessment of the creativity of an idea or creation in any field is the collective judgment of experts in that field.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3B","move_note":"Background principle cited to justify the CAT-based design choice; functions as justification within M3."},{"id":10,"text":"Thus, to design TTCW, we asked 8 creative writing experts in a formative study (Section 4) to propose creativity measures for the evaluation of short fictional stories aligned with the four Torrance dimensions.","tag":"contribution","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3A","move_note":null},{"id":11,"text":"This resulted in 14 binary tests organized across the four original Torrance dimensions of fluency, flexibility, originality and elaboration (Section 4.2).","tag":"contribution","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3C","move_note":null},{"id":12,"text":"To empirically validate TTCW as an evaluation protocol for creativity as product (fictional short stories), we build a benchmark consisting of 48 short stories: 12 stories written by professionals, and 36 by three top performing LLMs (ChatGPT [52], GPT4 [53] and Claude 1.3 [4]) with 1400 words on average per story (Section 5; Figure 1 Step 2).","tag":"contribution","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3A","move_note":null},{"id":13,"text":"We recruit a new set of 10 experts, again adhering to CAT, to administer the 14 tests of TTCW on each story, collecting 3 evaluations per story.","tag":"contribution","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3A","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"chen_2023","title":"chen 2023","authors":["Chen"],"year":2023,"section":"Introduction"},"arc_summary":"The introduction builds its case through two full **M1→M2→M3** cycles before landing on a clean contributions list. The first cycle is compact (S1–S10), using the creativity-intelligence nexus and the 'curse of recursion' to motivate a brief purpose statement. The second, longer cycle (S11–S30) does the heavier lifting: an extended M1 block establishes dual-process theory and prior evidence of machine creativity, then a sustained **M2 block hammers decoding-strategy limitations** until the 'it is unclear' pivot at S25. The double-cycle structure signals that the paper's contribution is best understood as resolving *two* distinct problems — whether LLMs are creative at all, and whether decoding strategy matters.","structured_arc":"M1 -> M2 -> M3 -> M1 -> M2 -> M3","move_roles":[{"move":"M1","span":[1,5],"role":"Establishes the research territory by asserting LLMs' broad language mastery, emergent cognitive abilities, and the growing interest in creativity — framing creativity as a legitimate and important dimension of LLM capability."},{"move":"M2","span":[6,6],"role":"Introduces the first tension in the territory: GPT-4's claimed humor ability versus demonstrated limitations in the literature, signalling that LLM creativity is contested."},{"move":"M1","span":[7,8],"role":"Reinforces the stakes of the creativity question by citing its centrality to human life and by introducing the 'curse of recursion' problem, which makes creative generation practically urgent."},{"move":"M2","span":[9,9],"role":"Sharpens the conceptual paradox: if LLMs only predict probable next words, genuine novelty appears impossible — crystallising the puzzle the paper will investigate."},{"move":"M3","span":[10,10],"role":"Delivers a first, brief purpose announcement — empirical investigation of LLM creativity via divergent concept generation — before the paper cycles back into extended background."},{"move":"M1","span":[11,18],"role":"Lays the theoretical and empirical foundation for the second cycle: the dual-process theory of creativity, the prevailing assumption that creativity is uniquely human, and evidence challenging that assumption across art, algorithms, and language models."},{"move":"M2","span":[19,25],"role":"Builds the core gap argument around decoding strategies: deterministic decoding is dull, stochastic decoding is better but still fundamentally unlike human cognitive control, and no strategy cleanly separates creative from nonsense output — culminating in the explicit 'it is unclear' niche statement."},{"move":"M3","span":[26,30],"role":"Occupies the niche with a purpose statement, methodological specification (the DAT measure), and a two-item contributions list — directly answering both questions raised in the preceding M2 block."}],"sentences":[{"id":1,"text":"Large language models (LLMs) have exhibited unparalleled mastery of natural language (Bubeck et al., 2023).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1B","move_note":null},{"id":2,"text":"The primary capacity of producing the most probable next word is broadly generalizable to many language tasks, suggesting underlying cognitive abilities beyond specialized linguistic rules and patterns.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1B","move_note":null},{"id":3,"text":"There is observation that LLMs may possess reasoning abilities which is a core aspect of intelligence, including decision-making (Binz and Schulz, 2023) and theory of mind (Moghaddam and Honey, 2023).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":4,"text":"Meanwhile, there is also increasing interest in exploring LLMs' creativity, which is closely related to intelligence (Frith et al., 2021).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1B","move_note":null},{"id":5,"text":"Creative use of language, such as metaphor and humor, is important during communication.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the importance/relevance of creative language use; not reporting a specific finding but establishing that the phenomenon matters.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":6,"text":"OpenAI (2023) has reported GPT-4's ability to understand jokes, while subsequent works show limited capacity for LLMs to generate or explain humor (Jentzsch and Kersting, 2023; Hessel et al., 2023).","tag":"contrast","tier":"primary","parent_id":null,"note":"Sets up a tension between claimed ability and demonstrated limitations in the literature.","cars_move":"M2","cars_step":"2A","move_note":null},{"id":7,"text":"As creativity is essential to the development of art, science, and everyday life for human (Gabora and Kaufman, 2010), it is non-trivial if models could produce creative content.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance and relevance of creativity as a topic worth investigating for LLMs.","cars_move":"M1","cars_step":"1A","move_note":"Brief return to territory-establishing centrality claim after M2 contrast; interlaced M1/M2 structure"},{"id":8,"text":"Regarding to the curse of recursion for LLMs that training on generated data makes models collapse, one promising solution might be the novel language distribution through creative generation (Shumailov et al., 2023).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a specific finding/problem from prior work and a proposed solution tied to it.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":9,"text":"But since LLMs represent word meaning and predict the next word in context, it seems paradoxical that such models could create ideas not seen in training.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a tension or puzzle against the prior claim — if LLMs only predict likely next words, how could they be creative?","cars_move":"M2","cars_step":"2C","move_note":null},{"id":10,"text":"Here, we empirically investigate the creativity of LLMs by examining models' ability to generate divergent concepts.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the purpose and approach of the current study.","cars_move":"M3","cars_step":"3A","move_note":"First M3 announcement; paper cycles back to M1 before a final M3 block"},{"id":11,"text":"A general definition of creativity is the ability to create something both novel and valuable (Runco and Jaeger, 2012).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports an established definition from the literature.","cars_move":"M1","cars_step":"1C","move_note":"M2->M3 cycle: return to M1 territory after first M3 announcement"},{"id":12,"text":"According to the dual-process theory of creativity (Beaty et al., 2014), creative thinking relies on remote association while inhibiting common ideas (Figure 1).","tag":"framedef","tier":"primary","parent_id":null,"note":"Introduces the dual-process theory as the theoretical construct/framework the paper will use analytically.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":13,"text":"Because of the intrinsic complexity, creativity is universally accepted to be unique to human beings, while models are regarded as great predictors to master the existing distribution but not qualified creators to generate new distribution.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the prevailing view in the field about creativity being uniquely human and models being limited to distribution prediction.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":14,"text":"However, there have been evidences of models possessing creativity in different domains.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a counter-position against the prevailing view just stated.","cars_move":"M1","cars_step":"1C","move_note":"Counter-claim within M1 territory; contrasts prevailing view to broaden the territory rather than carving a niche"},{"id":15,"text":"For artistic creation, deep generative models reveals exquisite painting skills (Ramesh et al., 2022).","tag":"extension:illustrative","tier":"secondary","parent_id":14,"note":"Provides a citation-backed named example of model creativity supporting [14]. Per the rule, a named case used as example with a primary parent stays illustrative; parent [14] is primary (contrast). Legal chain.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":16,"text":"For algorithms, models are able to generate original and superhuman strategies in board game (Silver et al., 2016).","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Second illustrative example supporting [14]. Parent is [14] (primary), not [15] (secondary) — re-parented to nearest primary above, satisfying the subordination rule.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":17,"text":"As for language models, creativity is an emerging concern.","tag":"link:opening","tier":"secondary","parent_id":null,"note":"Opens a new sub-topic sequence focused specifically on language models and creativity; makes no independent assertion beyond naming the topic.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":18,"text":"Since GPT-2 (Radford et al., 2019), language models are able to naturally produce answers given a prompt, even for open-ended and creative generation tasks (Kaddour et al., 2023).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":19,"text":"However, when generating texts from these probabilistic models, decoding strategy has a prominent effect on the quality of result.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a complication/limitation against the prior positive characterization.","cars_move":"M2","cars_step":"2B","move_note":"Return to M2 gap language after extended M1 cycle"},{"id":20,"text":"Decoding strategies that search for the highest-probability words tend to produce texts that is dull and repetitive (Zhang et al., 2021), while stochastic strategies, which randomly sample from models, generate texts with better human preference (DeLucia et al., 2021; Holtzman et al., 2020).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports established findings contrasting deterministic and stochastic decoding strategies.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":21,"text":"These texts have human-like information distribution, which are viewed as informative and interesting (Meister et al., 2022).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Citation-backed reported finding about the quality of stochastic outputs; per the rule, citation-backed cross-domain claims are tempstat.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":22,"text":"Despite this, stochastic strategies are distinct from human.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a limitation/tension against the positive characterization of stochastic strategies.","cars_move":"M2","cars_step":"2A","move_note":null},{"id":23,"text":"The decoding process is probabilistic and independent, while humans produce language under elaborated cognitive control, especially for creative generation.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts a substantive claim about a real and significant distinction between machine and human language production; goes beyond merely unpacking a term, so emph is more accurate than extension:definitional.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":24,"text":"Creative and nonsense contents are both infrequent during next word prediction that cannot be simply distinguished via sampling strategies (Figure 1).","tag":"contrast","tier":"primary","parent_id":null,"note":"Sharpens the limitation — sampling cannot reliably separate creative from nonsense outputs.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":25,"text":"Thus, it is unclear whether LLMs genuinely have creativity during modeling, and whether decoding strategies help.","tag":"nostat","tier":"primary","parent_id":null,"note":"Identifies the open/unresolved question that motivates the current study.","cars_move":"M2","cars_step":"2C","move_note":null},{"id":26,"text":"To answer both of these questions, we evaluate the creativity of LLMs.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the purpose of the current work in response to the identified gap.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":27,"text":"Specifically, we use an objective semantic measurement, the divergent association task (DAT), which asks models to generate unrelated nouns and compute the pairwise semantic distance between them (Olson et al., 2021).","tag":"contribution","tier":"primary","parent_id":null,"note":"Specifies the method used in the current study.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":28,"text":"In summary, we make the following contributions:","tag":"link:opening","tier":"secondary","parent_id":null,"note":"Announces what follows (the bullet list of contributions); structural transition with no independent content claim.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":29,"text":"Investigate the creativity of LLMs and compare the results with human.","tag":"contribution","tier":"primary","parent_id":null,"note":"Lists the first stated contribution of the paper.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":30,"text":"Explore the effect of decoding strategies on the creative generation of LLMs.","tag":"contribution","tier":"primary","parent_id":null,"note":"Lists the second stated contribution of the paper.","cars_move":"M3","cars_step":"3A","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"clark_1986","title":"clark 1986","authors":["Clark"],"year":1986,"section":"Introduction"},"arc_summary":"The introduction is structured as a tight **M1→M2→M3** arc, but M3 is unusually expansive: after announcing the collaborative model, Clark devotes the majority of the introduction to justifying and instantiating it. The **literary model critique** (sentences 31–43) and the **three-reasons contrast** (sentences 44–51) serve as extended warrant for the premise announced in M3, not as a new niche-carving move. Eight example classes then function as principal findings, making M3 do double duty as both announcement and evidence. The result is an introduction that effectively contains the first section of the paper.","structured_arc":"M1 -> M2 -> M3","move_roles":[{"move":"M1","span":[1,4],"role":"Establishes conversation as the primary site of language use and frames the central question about speaking and understanding, positioning it as a legitimate and important research focus."},{"move":"M2","span":[5,5],"role":"Plants an early gap signal — psychologists have neglected the central question — creating initial tension before the literature review proper begins."},{"move":"M1","span":[6,18],"role":"Reviews the philosophical tradition (Grice, illocutionary acts, implicature) and the sociological tradition (turn-taking, back-channel responses, repair) as the two bodies of prior work that have addressed the coordination question, culminating in a synthesis of their shared concern."},{"move":"M2","span":[19,22],"role":"Identifies the incompatibility between the philosophical idealization of complete utterances and the sociological evidence of incomplete ones, then crystallizes this as an open, unresolved question demanding a new resolution."},{"move":"M3","span":[23,30],"role":"Announces the paper's purpose (a resolution via collaborative reference), delimits scope to speaker's reference, states the foundational collaborative premise, justifies the goal's significance, and maps the article's four-section structure."},{"move":"M3","span":[31,85],"role":"Provides extended justification for the collaborative model by critiquing the literary model's four idealizations, presenting three reasons conversation differs from writing, and instantiating the collaborative model with eight attested example classes — functioning simultaneously as warrant, principal findings, and evidence for the announced contribution."}],"sentences":[{"id":1,"text":"Conversation is the fundamental site of language use.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the primacy and significance of conversation as a phenomenon worth attending to.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":2,"text":"For many people, even for whole societies, it is the only site, and it is the primary one for children acquiring language.","tag":"extension:illustrative","tier":"secondary","parent_id":1,"note":"Illustrates the scope of the claim in [1] (primary parent: [1] emph).","cars_move":"M1","cars_step":"1A","move_note":null},{"id":3,"text":"From this perspective other arenas of language use—novels, newspapers, lectures, street signs, rituals—are derivative or secondary.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Makes an independent cross-domain claim about the status of non-conversational language use that the field operates with; has independent rhetorical force as a field-level assertion.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":4,"text":"How, then, do speaking and understanding work in conversation?","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the existence and centrality of a key question; establishes it as real and worth attending to.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":5,"text":"For psychologists this ought to be a central question, but surprisingly, it has not been.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces tension between what ought to be the case and what actually is — a limitation of the field.","cars_move":"M2","cars_step":"2B","move_note":"Early gap indicator embedded in otherwise M1 territory; interlaced M1/M2 opening."},{"id":6,"text":"The main attempts to answer it have come instead from philosophy and sociology.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the current state of the literature on who has addressed this question.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":7,"text":"Among philosophers the study of conversation grew out of an analysis of what speakers mean and what listeners understand them to mean.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the origin and content of the philosophical tradition on conversation.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":8,"text":"The idea was that, when speakers utter sentences, they do so with certain intentions toward their addressees.","tag":"extension:definitional","tier":"secondary","parent_id":7,"note":"Unpacks the philosophical tradition introduced in [7] (primary parent: [7] tempstat).","cars_move":"M1","cars_step":"1C","move_note":null},{"id":9,"text":"They assert, request, promise, and perform other illocutionary acts, and their interlocutors are expected to recognize these intentions (Austin, 1962; Grice, 1957, 1968; Schiffer, 1972; Searle, 1969).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Cites specific philosophical work supporting the claim about illocutionary acts.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":10,"text":"In 1967 Grice argued that, for this scheme to work, people in conversation must be cooperative.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a specific prior finding/argument by Grice.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":11,"text":"Speakers must try to 'make their contribution such as is required, at the stage at which it occurs, by the accepted purpose or direction of the talk exchange in which [they] are engaged (Grice, 1975, p. 45).'","tag":"extension:illustrative","tier":"secondary","parent_id":10,"note":"Provides the specific content of Grice's cooperative principle as quoted evidence (primary parent: [10] tempstat).","cars_move":"M1","cars_step":"1C","move_note":null},{"id":12,"text":"Only then can their partners go beyond what is 'said' to infer what is conversationally 'implicated' (Grice, 1975, 1978).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the consequence of Gricean cooperation — implicature — with citation.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":13,"text":"Among sociologists the issue has been how people direct the course of conversation and repair its inherent troubles.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the sociological tradition's focus, parallel to [7] for philosophy.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":14,"text":"As this work has shown, people in conversation manage who is to talk at which times through an intricate system of turn taking (Sacks, Schegloff, & Jefferson, 1974).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a specific finding from the sociological tradition with citation.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":15,"text":"Further, when one person speaks, the others not only listen but let the speaker know they are understanding—with head nods, yes's, uh huh's, and other so-called back channel responses (Duncan, 1973; Goodwin, 1981; Schegloff, 1981; Yngve, 1970).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports another established finding — back-channel responses — with multiple citations.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":16,"text":"When listeners don't understand, or when other troubles arise, they can interrupt for correction or clarification (Schegloff, Jefferson, & Sacks, 1977).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports another documented conversational phenomenon with citation.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":17,"text":"The participants also have techniques for initiating, guiding, and terminating conversations and the topics within them (Schegloff, 1968; Schegloff & Sacks, 1973).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports additional findings from the sociological tradition with citations.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":18,"text":"In both traditions a central issue is coordination: How do the participants in a conversation coordinate on the content and timing of what is meant and understood?","tag":"link:closing","tier":"secondary","parent_id":null,"note":"Synthesizes the two traditions reviewed and identifies their shared concern; wraps up the prior review sequence.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":19,"text":"The issue, however, cannot be resolved within either tradition alone.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a limitation — neither tradition alone can resolve the coordination problem.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":20,"text":"In the first tradition conversation is idealized as a succession of illocutionary acts—assertions, questions, promises—each uttered and understood clearly and completely (Gazdar, 1979; Kamp, 1981; Stalnaker, 1978).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the idealization operative in the philosophical tradition, with citations.","cars_move":"M2","cars_step":"2A","move_note":"Reports prior assumption in order to challenge it; serves counter-claiming function within M2."},{"id":21,"text":"Yet from the second tradition we know that many utterances remain incomplete and only partly understood until corrected or amplified in further exchanges.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces tension between the philosophical idealization and the sociological findings.","cars_move":"M2","cars_step":"2A","move_note":null},{"id":22,"text":"How are these two views to be reconciled?","tag":"nostat","tier":"primary","parent_id":null,"note":"Identifies the unresolved tension as an open problem requiring resolution.","cars_move":"M2","cars_step":"2C","move_note":null},{"id":23,"text":"In this paper we propose a resolution for an essential use of language: how people in conversation coordinate in the making of a definite reference.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the purpose and scope of the current paper.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":24,"text":"Our concern is not with semantic reference, but with speaker's reference—not, for example, with what the phrase the clown with the red nose means, but with what the speaker does in referring, say, to a clown as part of an assertion that the clown is funny (Donnellan, 1978; Kripke, 1977; Searle, 1969).","tag":"contribution","tier":"primary","parent_id":null,"note":"Specifies the scope of the paper's focus — speaker's reference vs. semantic reference — with supporting citations.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":25,"text":"Our premise is that making such a reference is a collaborative process requiring actions by both speakers and interlocutors.","tag":"contribution","tier":"primary","parent_id":null,"note":"States the paper's foundational premise and theoretical stance.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":26,"text":"To some it may appear self-evident that the process is collaborative, but it is one thing to assume it is and quite another to understand why it is and how it works.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance and non-triviality of the paper's goal.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":27,"text":"The goal here is important, since, if conversation is fundamental, its processes are likely to underlie or shape those in other uses of language as well.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the broader importance of the paper's goal by connecting it to the primacy of conversation established earlier.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":28,"text":"In the first section of this paper, then, we offer evidence for the premise itself and outline what we will call a collaborative model for the process of reference.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the paper's structure — first section content — and introduces the name of the model.","cars_move":"M3","cars_step":"3D","move_note":null},{"id":29,"text":"In the second and third sections we describe an experiment on referring and use it to corroborate and fill in details of the model.","tag":"contribution","tier":"primary","parent_id":null,"note":"Continues describing the paper's structure — second and third sections.","cars_move":"M3","cars_step":"3D","move_note":null},{"id":30,"text":"In the final section we return to the general issue of coordination and note problems still to be resolved.","tag":"contribution","tier":"primary","parent_id":null,"note":"Completes the paper structure announcement — final section content.","cars_move":"M3","cars_step":"3D","move_note":null},{"id":31,"text":"Traditionally, philosophers, linguists, and psychologists have presupposed what might be called a literary model of definite reference.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports an established (if tacit) assumption in the prior literature, introducing the concept to be critiqued.","cars_move":"M3","cars_step":"3B","move_note":"Begins extended justification section supporting the announced collaborative model by critiquing the literary model."},{"id":32,"text":"Speakers refer as if they were writing to distant readers.","tag":"framedef","tier":"primary","parent_id":null,"note":"Names and characterizes the \"literary model\" as a conceptual framework the paper will critique.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":33,"text":"When Elizabeth selects the noun phrase the clown with a red nose in talking to Sam, the assumption is that she intends it to enable him to identify the clown uniquely.","tag":"extension:illustrative","tier":"secondary","parent_id":32,"note":"Illustrates the literary model with a concrete example (primary parent: [32] framedef).","cars_move":"M3","cars_step":"3B","move_note":null},{"id":34,"text":"She satisfies her intentions by issuing the noun phrase.","tag":"extension:definitional","tier":"secondary","parent_id":32,"note":"Elaborates a specific property of the literary model (primary parent: [32] framedef).","cars_move":"M3","cars_step":"3B","move_note":null},{"id":35,"text":"Her act of referring is cotemporal with that noun phrase, beginning with the and ending with nose.","tag":"extension:definitional","tier":"secondary","parent_id":32,"note":"Further defines the temporal scope of reference under the literary model (primary parent: [32] framedef).","cars_move":"M3","cars_step":"3B","move_note":null},{"id":36,"text":"Further, she retains complete responsibility and control over the course of this process.","tag":"extension:definitional","tier":"secondary","parent_id":32,"note":"Adds another defining property of the literary model — speaker's sole control (primary parent: [32] framedef).","cars_move":"M3","cars_step":"3B","move_note":null},{"id":37,"text":"Sam hears the definite description as if he were reading it and, if successful, infers the identity of the referent.","tag":"extension:definitional","tier":"secondary","parent_id":32,"note":"Completes the characterization of the listener's role in the literary model (primary parent: [32] framedef).","cars_move":"M3","cars_step":"3B","move_note":null},{"id":38,"text":"But his actions have no bearing on hers in this reference.","tag":"extension:definitional","tier":"secondary","parent_id":32,"note":"States the key property of the literary model regarding the listener's non-influence (primary parent: [32] framedef).","cars_move":"M3","cars_step":"3B","move_note":null},{"id":39,"text":"The literary model makes these tacit idealizations.","tag":"link:opening","tier":"secondary","parent_id":null,"note":"Opens the enumeration of the literary model's assumptions; purely structural.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":40,"text":"(1) The reference is expressed linguistically with one of three standard types of noun phrase—a proper noun (e.g., Napoleon, King George), a definite description (this year, the man with the moustache), or a pronoun (he, this, they).","tag":"extension:definitional","tier":"secondary","parent_id":39,"note":"First enumerated idealization of the literary model (primary parent: [32] framedef).","cars_move":"M3","cars_step":"3B","move_note":null},{"id":41,"text":"(2) The speaker uses the noun phrase intending the addressee to be able to identify the referent uniquely against their common ground.","tag":"extension:definitional","tier":"secondary","parent_id":32,"note":"Second idealization of the literary model (primary parent: [32] framedef).","cars_move":"M3","cars_step":"3B","move_note":null},{"id":42,"text":"(3) The speaker satisfies her intention simply by the issuing of that noun phrase.","tag":"extension:definitional","tier":"secondary","parent_id":32,"note":"Third idealization (primary parent: [32] framedef).","cars_move":"M3","cars_step":"3B","move_note":null},{"id":43,"text":"And (4) the course of the process is controlled by the speaker alone.","tag":"extension:definitional","tier":"secondary","parent_id":32,"note":"Fourth idealization — completes the enumeration of literary model assumptions (primary parent: [32] framedef).","cars_move":"M3","cars_step":"3B","move_note":null},{"id":44,"text":"A conversational model of the process, however, ought to look quite different for three reasons.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces the contrast between the literary model and what a conversational model should look like.","cars_move":"M3","cars_step":"3B","move_note":"Contrast here serves to justify the paper's collaborative model, not to open a new niche."},{"id":45,"text":"First, in conversation unlike writing, speakers have limited time for planning and revision.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the first reason a conversational model differs — time pressure.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":46,"text":"They need to overcome this limitation, and in doing so they may exploit techniques possible only in conversational settings.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the existence of conversational-only techniques as a real phenomenon.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":47,"text":"Second, speech is evanescent.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the second distinguishing feature of conversation — the temporal fleetingness of speech.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":48,"text":"The listener has to attend to, hear, and try to understand an utterance at virtually the same time it is being issued.","tag":"extension:definitional","tier":"secondary","parent_id":47,"note":"Unpacks what \"evanescent\" means for the listener's processing demands (primary parent: [47] emph).","cars_move":"M3","cars_step":"3B","move_note":null},{"id":49,"text":"That requires a type of process synchronization not found in reading.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the existence of a real distinguishing phenomenon (synchronization demand).","cars_move":"M3","cars_step":"3B","move_note":null},{"id":50,"text":"And third, listeners in conversations aren't mute or invisible during an utterance.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the third distinguishing feature — listener visibility and activity during the speaker's turn.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":51,"text":"Speakers may alter what they say midcourse based on what addressees say and do.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts a real phenomenon — midcourse speaker adjustment — that is the paper's core claim.","cars_move":"M3","cars_step":"3C","move_note":"Pre-announces a principal finding/claim of the paper."},{"id":52,"text":"Indeed, once we look at actual conversations, we find that the four idealizations of the literary model are very wide of the mark.","tag":"contrast","tier":"primary","parent_id":null,"note":"Asserts that empirical evidence contradicts the literary model's idealizations.","cars_move":"M3","cars_step":"3C","move_note":"Pre-announces principal finding by summarizing the empirical result before presenting examples."},{"id":53,"text":"To see this, let us turn to eight types of examples that fail on one or more of these assumptions.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the structure of the upcoming evidence — eight types of examples.","cars_move":"M3","cars_step":"3D","move_note":null},{"id":54,"text":"Self-corrected noun phrases.","tag":"link:opening","tier":"secondary","parent_id":null,"note":"Sub-header introducing the first example type; purely structural.","cars_move":"M3","cars_step":"3D","move_note":null},{"id":55,"text":"Consider this attested utterance: She was giving me all the people that were gone this year I mean this quarter y'know (from Schegloff et al., 1977, p. 364, in simplified notation).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Cites an attested example from prior work to illustrate the phenomenon.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":56,"text":"The speaker began the referential process by uttering all the people that were gone this year, but corrected the last two words to this quarter in what Schegloff et al. (1977) called a self-initiated repair.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Describes and labels the phenomenon using prior work's terminology; citation-backed.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":57,"text":"The referential process, clearly, isn't cotemporal with one particular noun phrase, since two noun phrases were uttered in succession.","tag":"contrast","tier":"primary","parent_id":null,"note":"Uses this example to introduce tension with the literary model's idealizations.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":58,"text":"It is more naturally described as a process in which the speaker decided midcourse to repair the initial noun phrase, indicated her change with I mean, and then uttered this quarter (see Levelt, 1983).","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts how the process is more naturally described — an independent positive claim about the nature of the process with citation.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":59,"text":"The process began with all the people and was completed with y'know.","tag":"extension:illustrative","tier":"secondary","parent_id":58,"note":"Provides a specific illustrative detail about the process scope in this example (primary parent: [58] emph).","cars_move":"M3","cars_step":"3C","move_note":null},{"id":60,"text":"Expanded noun phrases.","tag":"link:opening","tier":"secondary","parent_id":null,"note":"Sub-header introducing the second example type.","cars_move":"M3","cars_step":"3D","move_note":null},{"id":61,"text":"Although the first noun phrase a speaker utters may be technically correct, he or she may still judge it insufficient and change course, as here (from Cohen, 1985):","tag":"tempstat","tier":"primary","parent_id":null,"note":"Introduces the second phenomenon with a citation to prior work.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":62,"text":"S began with the spout.","tag":"extension:illustrative","tier":"secondary","parent_id":61,"note":"Begins analysis of the cited example (primary parent: [61] tempstat).","cars_move":"M3","cars_step":"3C","move_note":null},{"id":63,"text":"But when he saw that it was insufficient for J to pick out the referent, he expanded on it with the parenthetical noun phrase.","tag":"extension:illustrative","tier":"secondary","parent_id":61,"note":"Continues analysis of the example (primary parent: [61] tempstat).","cars_move":"M3","cars_step":"3C","move_note":null},{"id":64,"text":"Ordinarily, parenthetical phrases are nonrestrictive—not needed for identifying the referent.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the conventional linguistic status of parenthetical phrases.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":65,"text":"Here, the parenthetical phrase was deemed necessary, and S changed course midutterance to add it.","tag":"contrast","tier":"primary","parent_id":null,"note":"Contrasts the example's use of the parenthetical with its ordinary function, highlighting deviation from the literary model.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":66,"text":"Episodic noun phrases.","tag":"link:opening","tier":"secondary","parent_id":null,"note":"Sub-header introducing the third example type.","cars_move":"M3","cars_step":"3D","move_note":null},{"id":67,"text":"For similar reasons, once S completed the other large tube, he judged that to be insufficient as well and added the restrictive phrase with the round top under a separate intonation contour, as part of a new tone group.","tag":"extension:illustrative","tier":"secondary","parent_id":65,"note":"Illustrates the episodic noun phrase phenomenon (primary parent: [65] contrast).","cars_move":"M3","cars_step":"3C","move_note":null},{"id":68,"text":"He produced a single noun phrase, but intonationally, he divided it into two information units.","tag":"extension:definitional","tier":"secondary","parent_id":65,"note":"Defines the key characteristic of episodic noun phrases (primary parent: [65] contrast).","cars_move":"M3","cars_step":"3C","move_note":null},{"id":69,"text":"We will call this an episodic noun phrase, and it is another nonstandard type.","tag":"framedef","tier":"primary","parent_id":null,"note":"Names \"episodic noun phrase\" as a new conceptual category the paper introduces.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":70,"text":"Other-corrected noun phrases.","tag":"link:opening","tier":"secondary","parent_id":null,"note":"Sub-header introducing the fourth example type.","cars_move":"M3","cars_step":"3D","move_note":null},{"id":71,"text":"The process becomes more complicated when the addressee makes the repair, as with A's reference to Monday in this example (from Schegloff et al., 1977, p. 369):","tag":"tempstat","tier":"primary","parent_id":null,"note":"Introduces the other-corrected phenomenon with citation.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":72,"text":"A initiated the referential process by uttering Monday.","tag":"extension:illustrative","tier":"secondary","parent_id":71,"note":"Begins analysis of the cited example (primary parent: [71] tempstat).","cars_move":"M3","cars_step":"3C","move_note":null},{"id":73,"text":"Uncertain of the intended referent, B offered a correction, which A accepted, all before B proceeded.","tag":"extension:illustrative","tier":"secondary","parent_id":71,"note":"Continues analysis of the example (primary parent: [71] tempstat).","cars_move":"M3","cars_step":"3C","move_note":null},{"id":74,"text":"The process took place over several turns and was participated in by both A and B.","tag":"extension:illustrative","tier":"secondary","parent_id":71,"note":"Draws out the key implication of the example — collaborative, multi-turn nature (primary parent: [71] tempstat).","cars_move":"M3","cars_step":"3C","move_note":null},{"id":75,"text":"In the four cases so far, then, the speakers changed the course of their reference after uttering an initial noun phrase.","tag":"link:closing","tier":"secondary","parent_id":null,"note":"Synthesizes the first four example types.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":76,"text":"They did so in reaction to both their own and their addressee's judgments of inadequacy or error.","tag":"extension:definitional","tier":"secondary","parent_id":71,"note":"Characterizes the mechanism driving the changes in the first four cases (primary parent: [71] tempstat).","cars_move":"M3","cars_step":"3C","move_note":null},{"id":77,"text":"But speakers are not merely reactive.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a contrast — shifting from reactive to proactive speaker behavior.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":78,"text":"At other times they bring addressees into the referential process by the very design of their utterance.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the existence of a proactive form of addressee involvement in the referential process.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":79,"text":"Consider the next four classes of examples.","tag":"link:opening","tier":"secondary","parent_id":null,"note":"Structural announcement of the next set of examples.","cars_move":"M3","cars_step":"3D","move_note":null},{"id":80,"text":"Trial noun phrases.","tag":"link:opening","tier":"secondary","parent_id":null,"note":"Sub-header introducing the fifth example type.","cars_move":"M3","cars_step":"3D","move_note":null},{"id":81,"text":"Some noun phrases are uttered with a rising intonation, or try marker (Sacks & Schegloff, 1979), imposed on them, as in this example (from Cohen, 1985):","tag":"tempstat","tier":"primary","parent_id":null,"note":"Introduces the trial noun phrase phenomenon with citations to prior work.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":82,"text":"With the small blue cap we talked about before? S asks J to say whether or not he has understood S's reference.","tag":"extension:illustrative","tier":"secondary","parent_id":81,"note":"Analyzes the cited example, explaining the function of the try marker (primary parent: [81] tempstat).","cars_move":"M3","cars_step":"3C","move_note":null},{"id":83,"text":"The process begins when S utters this phrase and ends only with J's yeah.","tag":"extension:illustrative","tier":"secondary","parent_id":81,"note":"Specifies the temporal scope of the referential process in this example (primary parent: [81] tempstat).","cars_move":"M3","cars_step":"3C","move_note":null},{"id":84,"text":"If J hadn't understood, the process would have continued as here (from Sacks & Schegloff, 1979):","tag":"extension:illustrative","tier":"secondary","parent_id":81,"note":"Extends the illustration with a further example (primary parent: [81] tempstat).","cars_move":"M3","cars_step":"3C","move_note":null},{"id":85,"text":"When A received no reply to Fords? she offered the expanded noun phrase Mrs. Holmes Ford? and then went to the cellist? before B implicated that she had identified the referent.","tag":"extension:illustrative","tier":"secondary","parent_id":81,"note":"Describes the sequence of events in the Sacks & Schegloff example (primary parent: [81] tempstat).","cars_move":"M3","cars_step":"3C","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"clark_1991","title":"clark 1991","authors":["Clark"],"year":1991,"section":"Introduction"},"arc_summary":"The introduction is dominated by extended M1 territory-building that does double duty: it both reviews established ground (common ground, coordination) and progressively installs **grounding** as the paper's central construct. **M2 is minimal and implicit** — sentences 20–23 gesture at situational variability and importance rather than announcing a gap in the literature. The pivot to **M3 is crisp and well-bounded**, naming two focal factors (purpose, medium) then providing a two-step structural roadmap.","structured_arc":"M1 -> M2 -> M3","move_roles":[{"move":"M1","span":[1,9],"role":"Establishes joint action and coordination as the foundational phenomenon, introduces the content/process distinction, and anchors common ground as the prerequisite for all collective action."},{"move":"M1","span":[10,19],"role":"Narrows the territory to communication as the primary collective activity, applies the content/process framework to language, and formally names and defines 'grounding' as the key theoretical construct via citations."},{"move":"M2","span":[20,23],"role":"Signals that grounding varies systematically across situations (implicit gap) and asserts its fundamental importance, jointly motivating the comparative inquiry without citing a literature gap."},{"move":"M3","span":[24,26],"role":"Announces the chapter's investigative scope and names the two focal factors — purpose and medium — that will organize the analysis."},{"move":"M3","span":[27,28],"role":"Provides the structural roadmap, signaling the chapter's two-phase organization: grounding in face-to-face conversation first, then variation across purposes and media."}],"sentences":[{"id":1,"text":"It takes two people working together to play a duet, shake hands, play chess, waltz, teach, or make love.","tag":"emph","tier":"primary","parent_id":null,"note":"Opens by asserting the fundamental reality of joint action as a phenomenon worth attending to.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":2,"text":"To succeed, the two of them have to coordinate both the content and process of what they are doing.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts a core claim about joint action — that it requires dual coordination — establishing the significance of the phenomenon.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":3,"text":"Alan and Barbara, on the piano, must come to play the same Mozart duet.","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Concrete illustration of content coordination from the prior sentence.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":4,"text":"This is coordination of content.","tag":"framedef","tier":"primary","parent_id":null,"note":"Names a conceptual distinction the paper will use as analytical machinery.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":5,"text":"They must also synchronize their entrances and exits, coordinate how loudly to play forte and pianissimo, and otherwise adjust to each other's tempo and dynamics.","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Illustrates process coordination using the same piano example; re-parents to sentence 2 (emph, primary), skipping sentence 4 (framedef, primary also valid).","cars_move":"M1","cars_step":"1B","move_note":null},{"id":6,"text":"This is coordination of process.","tag":"framedef","tier":"primary","parent_id":null,"note":"Names the second term of the content/process distinction introduced in sentence 2.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":7,"text":"They cannot even begin to coordinate on content without assuming a vast amount of shared information or common ground—that is, mutual knowledge, mutual beliefs, and mutual assumptions (Clark & Carlson, 1982; Clark & Marshall, 1981; Lewis, 1969; Schelling, 1960).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports an established theoretical claim (with multiple citations) that coordination requires common ground.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":8,"text":"And to coordinate on process, they need to update their common ground moment by moment.","tag":"emph","tier":"primary","parent_id":null,"note":"Makes a direct positive assertion about what process coordination requires; not a speculation but a claim about necessity. Parent is sentence 7 (tempstat).","cars_move":"M1","cars_step":"1B","move_note":null},{"id":9,"text":"All collective actions are built on common ground and its accumulation.","tag":"emph","tier":"primary","parent_id":null,"note":"Broad assertion of the importance and universality of common ground across all collective action.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":10,"text":"Communication, of course, is a collective activity of the first order.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the primacy and significance of communication as a collective activity, anchoring the pivot from joint action generally to communication specifically.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":11,"text":"When Alan speaks to Barbara, he must do more than merely plan and issue utterances, and she must do more than just listen and understand.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts that communication involves more than the classical speaker/hearer model captures — establishing the significance of the gap the paper will address.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":12,"text":"They have to coordinate on content (Grice, 1975, 1978).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Claims with citation support that communication requires content coordination.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":13,"text":"When Alan refers to 'my dogs,' the two of them must reach the mutual belief that he is referring to his feet.","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Illustrates content coordination in communication with a concrete example. Parent is sentence 12 (tempstat, primary).","cars_move":"M1","cars_step":"1C","move_note":null},{"id":14,"text":"They must also coordinate on process.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts that process coordination is also required in communication, extending the content/process framework to the communication domain.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":15,"text":"Speech is evanescent, and so Alan must try to speak only when he thinks Barbara is attending to, hearing, and trying to understand what he is saying, and she must guide him by giving him evidence that she is doing just this.","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Illustrates process coordination in speech with the Alan/Barbara scenario. Parent is sentence 14 (emph, primary).","cars_move":"M1","cars_step":"1B","move_note":null},{"id":16,"text":"Accomplishing this, once again, requires the two of them to keep track of their common ground and its moment-by-moment changes.","tag":"emph","tier":"primary","parent_id":null,"note":"Makes a direct positive assertion about what accomplishing process coordination requires; asserts a claim about the phenomenon rather than merely synthesizing. Parent is sentence 14 (emph, primary).","cars_move":"M1","cars_step":"1B","move_note":null},{"id":17,"text":"In communication, common ground cannot be properly updated without a process we shall call grounding (see Clark & Schaefer, 1987, 1989; Clark & Wilkes-Gibbs, 1986; Isaacs & Clark, 1987).","tag":"framedef","tier":"primary","parent_id":null,"note":"Names the central theoretical construct \"grounding\" and anchors it with citations. This is the paper's key conceptual object.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":18,"text":"In conversation, for example, the participants try to establish that what has been said has been understood.","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Illustrates what grounding involves in the conversational context. Parent is sentence 17 (framedef, primary).","cars_move":"M1","cars_step":"1C","move_note":null},{"id":19,"text":"In our terminology, they try to ground what has been said—that is, make it part of their common ground.","tag":"extension:definitional","tier":"secondary","parent_id":null,"note":"Unpacks and defines the term \"grounding\" introduced in sentence 17. Parent is sentence 17 (framedef, primary).","cars_move":"M1","cars_step":"1C","move_note":null},{"id":20,"text":"But how they do this changes a great deal from one situation to the next.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the variability of grounding across situations as a real and significant phenomenon, motivating the paper's comparative agenda.","cars_move":"M2","cars_step":"2B","move_note":"Implicit gap-indication: signals that understanding situational variation in grounding is an open problem. M2 opens here."},{"id":21,"text":"Grounding takes one shape in face-to-face conversation but another in personal letters.","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Illustrates the situational variability of grounding claimed in sentence 20. Parent is sentence 20 (emph, primary).","cars_move":"M2","cars_step":"2B","move_note":null},{"id":22,"text":"It takes one shape in casual gossip but another in calls to directory assistance.","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Continues illustrating the variability of grounding across communicative contexts. Re-parents to sentence 20 (emph, primary), skipping sentence 21 (secondary).","cars_move":"M2","cars_step":"2B","move_note":null},{"id":23,"text":"Grounding is so basic to communication—indeed, to all collective actions—that it is important to understand how it works.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the fundamental importance and significance of grounding, motivating the paper's inquiry.","cars_move":"M2","cars_step":"2C","move_note":"Raises the implicit question of how grounding works, completing the niche before M3 occupies it."},{"id":24,"text":"In this chapter we take up two main factors that shape it.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the scope and structure of the paper's investigation.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":25,"text":"One is purpose—what the two people are trying to accomplish in their communication.","tag":"contribution","tier":"primary","parent_id":null,"note":"Identifies the first factor (purpose) that the chapter will examine.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":26,"text":"The other is the medium of communication—the techniques available in the medium for accomplishing that purpose, and what it costs to use them.","tag":"contribution","tier":"primary","parent_id":null,"note":"Identifies the second factor (medium) that the chapter will examine.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":27,"text":"We begin by briefly describing grounding as it appears in casual face-to-face conversation.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the structural organization — the starting point of the chapter's argument.","cars_move":"M3","cars_step":"3D","move_note":null},{"id":28,"text":"We then consider how it gets shaped by other purposes and in other media.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the subsequent scope of the chapter, completing the roadmap.","cars_move":"M3","cars_step":"3D","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"clark_2013","title":"clark 2013","authors":["Clark"],"year":2013,"section":"Introduction"},"arc_summary":"This introduction is almost entirely M1: Clark builds a deep historical and conceptual territory before announcing the paper's focus. **Two brief M3 islands** (S26, S37, S42) punctuate the M1 exposition without ever resolving into a true gap-and-niche sequence. The absence of M2 means the paper positions itself as a **synthesizing exposition** of an established tradition rather than as a corrective intervention. The rhetorical weight falls on accumulating definitional and historical authority — Ashby to Helmholtz to the Helmholtz Machine to Rao & Ballard — so that the framework arrives fully legitimized before the paper's own argument begins.","structured_arc":"M1 -> M3 -> M1 -> M3 -> M1","move_roles":[{"move":"M1","span":[1,25],"role":"Constructs the research territory by tracing the intellectual lineage from Ashby and Helmholtz through the Helmholtz Machine to hierarchical predictive coding, defining key technical constructs (generative model, prediction error, surprisal, hierarchical predictive processing) and establishing the field's current state with dense citation."},{"move":"M3","span":[26,26],"role":"First announcement of the paper's scope: names the specific models (predictive coding extended to action) that will form the paper's focus, staking out what the present treatment covers."},{"move":"M1","span":[27,36],"role":"Resumes territory-building by elaborating the 'explain-away' prediction-error mechanism and tracing the historical origin of predictive coding in signal processing and data compression, grounding the neural framework in an established engineering tradition."},{"move":"M3","span":[37,37],"role":"Forward-reference to a later section of the paper (information theory and entropy), briefly flagging that surprisal will be revisited — structural signposting embedded within the ongoing exposition rather than a full paper-structure announcement."},{"move":"M1","span":[38,96],"role":"Extends the territory through defining key terms (surprisal, hierarchical predictive processing), expounding the Rao & Ballard model in detail, presenting the black-box epistemic framing of perception, and concluding with the Hosoya et al. retina example — all consolidating the conceptual and empirical ground on which the paper's subsequent argument will stand."}],"sentences":[{"id":1,"text":"'\"The whole function of the brain is summed up in: error correction.\"'","tag":"tempstat","tier":"primary","parent_id":null,"note":"Opening quotation attributed to Ashby; reports a prior claim from the literature.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":2,"text":"So wrote W. Ross Ashby, the British psychiatrist and cyberneticist, some half a century ago.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Contextualizes the prior quotation historically.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":3,"text":"Computational neuroscience has come a very long way since then.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the current state of the field relative to that historical starting point.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":4,"text":"There is now increasing reason to believe that Ashby's (admittedly somewhat vague) statement is correct, and that it captures something crucial about the way that spending metabolic money to build complex brains pays dividends in the search for adaptive success.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the current state of evidence/belief in the field.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":5,"text":"In particular, one of the brain's key tricks, it now seems, is to implement dumb processes that correct a certain kind of error: error in the multi-layered prediction of input.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports an emerging consensus finding about brain function.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":6,"text":"In mammalian brains, such errors look to be corrected within a cascade of cortical processing events in which higher-level systems attempt to predict the inputs to lower-level ones on the basis of their own emerging models of the causal structure of the world (i.e., the signal source).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports current scientific understanding of cortical error-correction mechanisms.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":7,"text":"Errors in predicting lower level inputs cause the higher-level models to adapt so as to reduce the discrepancy.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the established mechanism of predictive model adaptation.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":8,"text":"Such a process, operating over multiple linked higher-level models, yields a brain that encodes a rich body of information about the source of the signals that regularly perturb it.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the functional outcome of the described process.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":9,"text":"Such models follow Helmholtz (1860) in depicting perception as a process of probabilistic, knowledge-driven inference.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the historical lineage of the theoretical framework.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":10,"text":"From Helmholz comes the key idea that sensory systems are in the tricky business of inferring sensory causes from their bodily effects.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a specific historical theoretical contribution.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":11,"text":"This in turn involves computing multiple probability distributions, since a single such effect will be consistent with many different sets of causes distinguished only by their relative (and context dependent) probability of occurrence.","tag":"extension:definitional","tier":"secondary","parent_id":10,"note":"Unpacks the computational implication of the claim in [10]; parent [10] is tempstat.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":12,"text":"Helmholz's insight informed influential work by MacKay (1956), Neisser (1967), and Gregory (1980), as part of the cognitive psychological tradition that became known as 'analysis-by-synthesis' (for a review, see Yuille & Kersten 2006).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the historical influence and lineage of Helmholtz's ideas.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":13,"text":"In this paradigm, the brain does not build its current model of distal causes (its model of how the world is) simply by accumulating, from the bottom-up, a mass of low-level cues such as edge-maps and so forth.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports what the analysis-by-synthesis paradigm holds about brain function.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":14,"text":"Instead (see Hohwy 2007), the brain tries to predict the current suite of cues from its best models of the possible causes.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the contrasting positive claim of the analysis-by-synthesis paradigm.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":15,"text":"In this way: The mapping from low- to high-level representation (e.g. from acoustic to word-level) is computed using the reverse mapping, from high- to low-level representation. (Chater & Manning 2006, p. 340, their emphasis)","tag":"tempstat","tier":"primary","parent_id":null,"note":"Cites prior work to characterize the computational principle.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":16,"text":"Helmholz's insight was also pursued in an important body of computational and neuroscientific work.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a broader lineage of work building on Helmholtz.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":17,"text":"Crucial to this lineage were seminal advances in machine learning that began with pioneering connectionist work on backpropagation learning (McClelland et al. 1986; Rumelhart et al. 1986) and continued with work on the aptly named 'Helmholz Machine' (Dayan et al. 1995; Dayan & Hinton 1996; see also Hinton & Zemel 1994).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the key prior work in the historical lineage.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":18,"text":"The Helmholtz Machine sought to learn new representations in a multilevel system (thus capturing increasingly deep regularities within a domain) without requiring the provision of copious pre-classified samples of the desired input-output mapping.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports what the Helmholtz Machine aimed to do.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":19,"text":"In this respect, it aimed to improve (see Hinton 2010) upon standard back-propagation driven learning.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the specific improvement the Helmholtz Machine targeted.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":20,"text":"It did this by using its own top-down connections to provide the desired states for the hidden units, thus (in effect) self-supervising the development of its perceptual 'recognition model' using a generative model that tried to create the sensory patterns for itself (in 'fantasy,' as it was sometimes said).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the mechanism by which the Helmholtz Machine operated.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":21,"text":"(For a useful review of this crucial innovation and a survey of many subsequent developments, see Hinton 2007a).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Points to prior review literature on the topic.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":22,"text":"A generative model, in this quite specific sense, aims to capture the statistical structure of some set of observed inputs by tracking (one might say, by schematically recapitulating) the causal matrix responsible for that very structure.","tag":"framedef","tier":"primary","parent_id":null,"note":"Introduces and defines the technical construct \"generative model\" as it will be used throughout the paper.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":23,
