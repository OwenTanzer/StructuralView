e experience (Brennan & Clark, 1996; Brown-Schmidt et al., 2015; Isaacs & Clark, 1987).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":44,"text":"When human pairs begin communicative collaboration, they enter with distinct cognitive models and idiosyncratic description schemes that do not immediately align (Garrod & Anderson, 1987).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":45,"text":"The process of entrainment is progressive, emerging only across many exchanges as partners negotiate a shared framework.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":46,"text":"In dyadic word generation there is no such pressure to converge because there is no communicative demand that forces alignment.","tag":"contrast","tier":"primary","parent_id":null,"note":"distinguishes this task from communicative collaboration in [44]-[45]","cars_move":"M2","cars_step":"2A","move_note":null},{"id":47,"text":"Individual lexical identities are free to persist throughout the sequence rather than being negotiated away.","tag":"extension:definitional","tier":"secondary","parent_id":null,"note":"unpacks the consequence of the contrast in [46]; parent is [46]","cars_move":"M2","cars_step":"2A","move_note":"parent inferred as [46]"},{"id":48,"text":"If partners respond by drawing from overlapping but distinct lexical spaces, we predict that each person's words should be more semantically similar to their own prior words than to their partner's.","tag":"contribution","tier":"primary","parent_id":null,"note":"states a prediction/hypothesis of the study","cars_move":"M3","cars_step":"3C","move_note":null},{"id":49,"text":"This asymmetry is detectable in the structure of the shared sequence.","tag":"extension:speculative","tier":"secondary","parent_id":null,"note":"extends the prediction in [48]","cars_move":"M3","cars_step":"3C","move_note":"parent inferred as [48]"},{"id":50,"text":"We term this the individuation effect — a measurable signature of distinct cognitive identity within a jointly navigated lexical space.","tag":"framedef","tier":"primary","parent_id":null,"note":"names a new construct the paper introduces","cars_move":"M3","cars_step":"3B","move_note":null},{"id":51,"text":"An LLM generating both sides of a dyad, by contrast, draws from the same statistical model with no independent lexical identity to contribute.","tag":"contrast","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1B","move_note":null},{"id":52,"text":"Both 'partners' respond from the same internal distribution, with no variation in available vocabulary.","tag":"extension:definitional","tier":"secondary","parent_id":51,"note":"unpacks the claim in [51]","cars_move":"M1","cars_step":"1B","move_note":null},{"id":53,"text":"Moreover, previous work has also revealed a tendency on the part of LLMs to anchor tightly to user behavior and immediate surface context.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":54,"text":"This is evidenced in audience","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"sentence truncated; appears to begin an illustrative example of [53]","cars_move":"M1","cars_step":"1C","move_note":"parent inferred as [53]; sentence truncated"}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"vaccaro_2024","title":"vaccaro 2024","authors":["Vaccaro"],"year":2024,"section":"Introduction"},"arc_summary":"The introduction opens with a compact **M1→M2→M3** spine, then cycles twice more through gap and niche moves embedded within the findings block. The first cycle (S9–S14) reframes the field's focus on *augmentation* as insufficient, elevating **synergy** as the real target before re-announcing the study corpus. A second micro-cycle (S19–S22) exploits a **prior-research emphasis vs. null finding** contrast to sharpen the paper's contribution. The net effect is a structure that continuously re-earns its niche rather than stating it once.","structured_arc":"M1 -> M2 -> M3 -> M1 -> M2 -> M3","move_roles":[{"move":"M1","span":[1,3],"role":"Establishes the significance and breadth of human–AI systems as a research territory, anchoring the paper in a recognized and consequential phenomenon before any gap is introduced."},{"move":"M2","span":[4,6],"role":"Counters the optimistic territory with evidence that human–AI systems often fail to outperform their parts alone, then converts that tension into the paper's central research question."},{"move":"M3","span":[7,8],"role":"Announces the meta-analytic study and defines its two focal constructs—synergy and augmentation—giving the reader the conceptual vocabulary needed for the rest of the introduction."},{"move":"M1","span":[9,10],"role":"Returns to territory to describe the field's prevailing focus on augmentation, setting the baseline against which the paper's higher standard (synergy) will be contrasted."},{"move":"M2","span":[11,12],"role":"Exposes the mismatch between what researchers typically measure and what practitioners actually expect, reframing the gap as a conceptual misalignment around the synergy criterion."},{"move":"M1","span":[13,13],"role":"Briefly re-grounds the argument in an emerging body of work on synergy, bridging from the gap back toward the paper's own contribution without reopening the gap."},{"move":"M3","span":[14,18],"role":"Re-occupies the niche by describing the meta-analytic corpus, reporting the headline findings on augmentation and the absence of synergy, and pivoting toward the moderator analysis that follows."},{"move":"M1","span":[19,19],"role":"Briefly characterizes prior research emphasis on confidence levels and explanations, providing the foil against which the paper's null finding will land as surprising."},{"move":"M3","span":[20,20],"role":"Delivers the null finding that neither factor significantly affected human–AI performance, converting the prior-research foil into a contribution claim."},{"move":"M2","span":[21,21],"role":"Identifies an under-investigated area—task types and relative human-vs-AI performance—creating a final mini-gap that the very next sentence closes."},{"move":"M3","span":[22,23],"role":"Reports the positive moderator findings and closes with a forward-looking contribution claim about designing future human–AI systems for greater synergy."}],"sentences":[{"id":1,"text":"People increasingly work with artificial intelligence (AI) tools in fields including medicine, finance and law, as well as in daily activities such as travelling, shopping and communicating.","tag":"emph","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1A","move_note":null},{"id":2,"text":"These human–AI systems have tremendous potential given the complementary nature of humans and AI—the general intelligence of humans allows us to reason about diverse problems, and the computational power of AI systems allows them to accomplish specific tasks that people find difficult.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the importance and significance of human-AI systems by appealing to complementary potential. No citation; motivating claim establishing relevance rather than reporting a finding.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":3,"text":"A large body of work suggests that integrating human creativity, intuition and contextual understanding with AI's speed, scalability and analytical power can lead to innovative solutions and improved decision-making in areas such as health care, customer service and scientific research.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":4,"text":"However, a growing number of studies reveal that human–AI systems do not necessarily achieve better results than the best of humans or AI alone.","tag":"contrast","tier":"primary","parent_id":null,"note":null,"cars_move":"M2","cars_step":"2A","move_note":null},{"id":5,"text":"Challenges such as communication barriers, trust issues, ethical concerns and the need for effective coordination between humans and AI systems can hinder the collaborative process.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports established findings from prior work (citations [4–9]) about sources of difficulty in human-AI collaboration.","cars_move":"M2","cars_step":"2B","move_note":"Continues elaborating the gap by cataloguing known barriers; functions as gap-support rather than territory-building."},{"id":6,"text":"These seemingly contradictory results raise important questions: when do humans and AI complement each other, and by how much?","tag":"nostat","tier":"primary","parent_id":null,"note":null,"cars_move":"M2","cars_step":"2C","move_note":null},{"id":7,"text":"To address these issues, we conducted a systematic literature review and meta-analysis in which we quantified synergy in human–AI systems and identified factors that explain its presence (or absence) in different settings.","tag":"contribution","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3A","move_note":null},{"id":8,"text":"We focused on two outcomes: (1) human–AI synergy, where the human–AI group performs better than both the human alone and the AI alone, which is analogous to strong synergy in human groups; and (2) human augmentation, where the human–AI group performs better than the human alone (see Supplementary Information section 1.1 for more details).","tag":"framedef","tier":"primary","parent_id":null,"note":"Introduces and names the two key conceptual constructs — \"human–AI synergy\" and \"human augmentation\" — that serve as the paper's analytical machinery.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":9,"text":"When evaluating human–AI systems, many studies focus on human augmentation.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":"M2->M3 cycling: return to territory-review after initial M3 close, setting up the contrast between augmentation and synergy."},{"id":10,"text":"This measure can serve important purposes in contexts for which full automation cannot happen for legal, ethical or safety reasons and in cases when AI does not align with human values.","tag":"extension:definitional","tier":"secondary","parent_id":9,"note":"Unpacks and delimits the scope of the human augmentation measure introduced in [9]; defines when the concept applies rather than giving a named illustrative case. Parent [9] is tempstat (primary). ✓","cars_move":"M1","cars_step":"1C","move_note":null},{"id":11,"text":"But when talking about the potential of human–AI systems, most people implicitly assume that the combined system should be better than either alone; otherwise, they would just use the best of the two.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces tension between what researchers measure (augmentation) and what is broadly expected of human-AI systems (synergy).","cars_move":"M2","cars_step":"2A","move_note":null},{"id":12,"text":"They are thus looking for human–AI synergy.","tag":"emph","tier":"primary","parent_id":null,"note":"Previously tagged extension:definitional with parent contrast [11] — a secondary-parented-by-secondary violation. Elevated to emph: the sentence asserts that synergy is the genuinely relevant target of interest, establishing its importance as an independent rhetorical claim.","cars_move":"M2","cars_step":"2B","move_note":"Emphasises the unaddressed target (synergy) as the implicit gap; rhetorical function is gap-framing."},{"id":13,"text":"In light of these considerations, a growing body of work emphasizes evaluating and searching for synergy in human–AI systems.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":"Brief return to territory framing, bridging back toward the study's own contribution."},{"id":14,"text":"To evaluate synergy in human–AI systems, we analysed 370 unique effect sizes from 106 different experiments published between January 2020 and June 2023 that included the performance of the human-only, AI-only and human–AI systems.","tag":"contribution","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3A","move_note":null},{"id":15,"text":"On average, we found evidence of human augmentation, meaning that the average human–AI systems performed better than the human alone.","tag":"novstat","tier":"primary","parent_id":null,"note":"Reports a novel finding of the current study (human augmentation exists on average) as a results preview in the introduction.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":16,"text":"But we did not find human–AI synergy on average, meaning that the average human–AI systems performed worse than at least one of the human alone or the AI alone.","tag":"novstat","tier":"primary","parent_id":null,"note":"Reports the contrasting novel finding — absence of synergy on average.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":17,"text":"So, in practice, if we consider only the performance dimensions the researchers studied, it would have been better to use either a human alone or an AI system alone rather than the human–AI systems studied.","tag":"link:closing","tier":"secondary","parent_id":null,"note":"Previously tagged extension:speculative, but no forward prediction or hypothesis is made. Synthesizes the practical implication of [15]–[16]; parents are novstat (primary). ✓","cars_move":"M3","cars_step":"3C","move_note":null},{"id":18,"text":"While this overall result may appear discouraging, we also identified specific factors that did or did not contribute to synergy in human–AI systems.","tag":"contribution","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3A","move_note":null},{"id":19,"text":"On the one hand, for example, much of the recent research in human–AI collaboration has focused on using AI systems to help humans make decisions by providing not only suggested decisions but also confidence levels or explanations.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":"Brief interlaced M1 within M3 block: reviews prior research emphasis to set up the contrasting null finding in sentence 20."},{"id":20,"text":"But we found that neither of these factors significantly affected the performance of human–AI systems.","tag":"novstat","tier":"primary","parent_id":null,"note":"Claims a novel null finding of the current study — a surprising result contradicting common research emphasis.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":21,"text":"On the other hand, little work has investigated the effects of task types and the relative performance of humans alone and AI alone.","tag":"nostat","tier":"primary","parent_id":null,"note":null,"cars_move":"M2","cars_step":"2B","move_note":"Second M2->M3 cycle: brief gap sentence within the M3 findings block, noting an under-investigated area before announcing a positive finding."},{"id":22,"text":"But we found that both factors significantly affected human–AI performance.","tag":"novstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3C","move_note":null},{"id":23,"text":"Our work thus sheds needed light on promising directions for designing future human–AI systems to unlock the potential for greater synergy.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the significance and scope of the paper's contribution in terms of future design implications; closing summative claim for the introduction.","cars_move":"M3","cars_step":"3A","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"wang_2023","title":"wang 2023","authors":["Wang"],"year":2023,"section":"Introduction"},"arc_summary":"The introduction is almost entirely M1, with **eleven consecutive sentences building territory** before a two-sentence M3 closes the piece — M2 is never invoked. The M1 block itself is internally layered: centrality claims (S1–2) give way to definitional framing of alignment (S3–5), empirical prior findings (S6), domain-scoped importance claims (S7–9), and a contextualizing pivot to LLMs (S10–11). **The absence of a stated gap or counter-claim** means the justification for the study rests entirely on accumulated significance rather than an identified problem. The M3 (S12–13) then lands as a direct purpose-contribution announcement, with no preceding niche-carving to frame it.","structured_arc":"M1 -> M3","move_roles":[{"move":"M1","span":[1,11],"role":"Builds the entire research territory through layered significance claims: opening with the societal importance of conversational agents, introducing and defining linguistic/lexical alignment, reviewing empirical findings on alignment's effects, reasserting domain-specific importance for human-agent interaction, and contextualizing GPT models as the state-of-the-art subject of study — all without identifying a gap."},{"move":"M3","span":[12,13],"role":"Announces the study's purpose and broader contributions directly, occupying a niche that was implied by accumulated territory rather than explicitly carved out by a gap claim."}],"sentences":[{"id":1,"text":"The growing significance of conversational agents in daily life, supported by their ongoing evolution, has led to a wide range of applications, including but not limited to agents functioning as healthcare helpers, customer service assistants, learning guides, and emotional companions [3,9,11,13].","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the real-world significance and broad applicability of conversational agents.","cars_move":"M1","cars_step":"1A","move_note":"Centrality claim: asserts the growing significance of the domain to motivate the territory."},{"id":2,"text":"Due to this increasing involvement of agents in human life, there is an increasing need to not only advance AI technologies but also gain a profound understanding of the factors contributing to successful human-computer interactions.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the importance and urgency of the research domain.","cars_move":"M1","cars_step":"1A","move_note":"Continues centrality/importance framing before moving to field-level topic generalizations."},{"id":3,"text":"Linguistic alignment, a notion first systematically accounted for by Pickering and Garrod [14], refers to the process where two speakers in a conversation adjust to each other's linguistic behaviors to be more aligned in the representations of what is being communicated.","tag":"framedef","tier":"primary","parent_id":null,"note":"Introduces and defines the theoretical construct of linguistic alignment that the paper will use as its analytical framework.","cars_move":"M1","cars_step":"1B","move_note":"Field-level topic generalization: introduces the phenomenon under study with a definitional framing."},{"id":4,"text":"This phenomenon, according to Pickering and Garrod [14,15], can be activated on multiple levels, including phonological, lexical, syntactic, and semantic alignment.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports an established finding from prior work about the multi-level nature of alignment.","cars_move":"M1","cars_step":"1C","move_note":"Reports a specific finding attributed to prior researchers; subject is the researcher/study."},{"id":5,"text":"Among these, lexical alignment, pertaining to the adoption of the same lexical items [14], has piqued broad research interest.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance and research attention given to lexical alignment specifically.","cars_move":"M1","cars_step":"1B","move_note":"Field-level generalization narrowing the territory to lexical alignment specifically."},{"id":6,"text":"Studies have demonstrated that lexical alignment can result in heightened engagement and rapport, as well as successful accomplishment of tasks among human-human interlocutors [2,16].","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports prior empirical findings on the consequences of lexical alignment.","cars_move":"M1","cars_step":"1C","move_note":"Reviews prior research: subject is 'Studies'; reports specific empirical findings."},{"id":7,"text":"In the scope of human-agent interaction, investigating lexical alignment is essential in understanding its influence on both human users and conversational agents.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the importance and relevance of studying lexical alignment specifically in the human-agent context.","cars_move":"M1","cars_step":"1A","move_note":"Centrality claim scoped to the human-agent subdomain; bridges general alignment literature to the specific focus."},{"id":8,"text":"Insights can be derived regarding how agents can better adapt to users linguistically and provide more engaging and efficient conversations, resulting in more satisfied interactions for the users [7,17].","tag":"emph","tier":"primary","parent_id":null,"note":"Citation-backed assertion of the value and significance of this research area; disqualified from extension:speculative by the presence of citations. Functions as an importance claim extending the significance of the domain.","cars_move":"M1","cars_step":"1B","move_note":"Field-level generalization about what can be gained from this line of research; continues territory establishment."},{"id":9,"text":"Furthermore, examining the metrics and patterns of alignment enables the identification and assessment of the areas where agents excel or fall short in aligning with users, which in turn can aid the design, development, and optimization of agents.","tag":"emph","tier":"primary","parent_id":null,"note":"Continues asserting practical significance of the research area for applied agent design.","cars_move":"M1","cars_step":"1B","move_note":"Continues field-level importance claim about the applied value of alignment research."},{"id":10,"text":"Recent months have witnessed a breakthrough in highly sophisticated large language models, among which GPT models, developed by OpenAI, have demonstrated state-of-the-art competencies in natural language generation and comprehension.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the current state of the field regarding recent LLM developments.","cars_move":"M1","cars_step":"1C","move_note":"Reviews recent prior developments in the field (LLMs/GPT); subject is the model/field."},{"id":11,"text":"Specifically, GPT-3.5 and GPT-4, as the latest versions of the GPT model, have showcased significant technological progress in terms of handling complex language tasks and engaging with users.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the established performance capabilities of the specific models under study.","cars_move":"M1","cars_step":"1C","move_note":"Reviews prior/current knowledge about specific models that will be studied; completes the territory before M3."},{"id":12,"text":"The current study aims to examine lexical alignment in human-agent conversations by concentrating on GPT-3.5 and GPT-4 models.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the purpose and scope of the present study.","cars_move":"M3","cars_step":"3A","move_note":"M2 is absent/implicit; paper moves directly from extended M1 territory to occupying the niche."},{"id":13,"text":"By delving into the lexical alignment patterns and comparing their performances, the study seeks to contribute to the understanding of the implications of advancements of large language models on human-agent communication and provide information on the development of more engaging and effective conversational agents.","tag":"contribution","tier":"primary","parent_id":null,"note":"Elaborates the broader goals and anticipated contributions of the study.","cars_move":"M3","cars_step":"3A","move_note":"Continues the purpose announcement with elaboration of broader contribution goals."}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"wilkesgibbs_1992","title":"wilkesgibbs 1992","authors":["Wilkesgibbs"],"year":1992,"section":"Introduction"},"arc_summary":"The introduction is dominated by an unusually long **M1** that does double duty: it reviews collaborative reference theory *and* walks through a detailed worked example, building the evidentiary base the M2 gap will depend on. The **M2** pivot is strikingly compressed — just three sentences — pivoting on the question of what happens when collaboration is indirect or cross-partner. The bulk of the introduction is then an extended **M3** that is itself structured as a mini-argument: each of the four conditions is introduced, theoretically grounded, and assigned competing predictions before a final summary restatement. An early M3 flash at sentence 9, followed by a return to M1, signals the paper's habit of interleaving announcement and context-building.","structured_arc":"M1 -> M2 -> M3","move_roles":[{"move":"M1","span":[1,8],"role":"Establishes the collaborative theory of reference as the research territory, summarizing its core mechanism and the breadth of empirical support it has accumulated across a range of prior studies."},{"move":"M3","span":[9,9],"role":"Flashes the paper's contribution early — comparing ways people coordinate mutual understanding of references — before the full M1 context has been laid out, signaling the paper's orienting question without yet justifying it."},{"move":"M1","span":[10,35],"role":"Returns to territory-building with a sustained account of common ground accumulation and a worked dialogue example from Clark & Wilkes-Gibbs (1986), supplying the empirical baseline against which the present study's manipulations will be measured."},{"move":"M2","span":[36,38],"role":"Opens the gap with a focused question about the evidence people use to coordinate common ground, then narrows it to the case the collaborative theory has not addressed: coordination without direct collaboration between partners."},{"move":"M3","span":[39,83],"role":"Announces the study's purpose and methodological design, then walks through each of the four experimental conditions in sequence, supplying theoretical grounding and competing behavioral predictions for each before closing with a summary restatement of the study's scope."}],"sentences":[{"id":1,"text":"In conversation, speakers collaborate with their partners in making references.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1B","move_note":null},{"id":2,"text":"In an earlier paper (Clark & Wilkes-Gibbs, 1986), we proposed that when a speaker wants to refer to an object, it is not enough for her to utter a noun phrase such as the Allen wrench.","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":3,"text":"She and her partner are also responsible for establishing that he has understood her as intended.","tag":"extension:definitional","tier":"secondary","parent_id":2,"note":"Unpacks the theoretical claim introduced in [2].","cars_move":"M1","cars_step":"1C","move_note":null},{"id":4,"text":"What they do, therefore, is try to reach the mutual belief that he has understood her reference well enough for current purposes.","tag":"extension:definitional","tier":"secondary","parent_id":2,"note":"Continues unpacking the mechanism proposed in [2]; re-parents to [2] as primary.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":5,"text":"They collaborate to reach this belief; she looks for reliable evidence of his understanding and he tries to provide it.","tag":"extension:definitional","tier":"secondary","parent_id":2,"note":"Further elaborates the collaborative mechanism; re-parents to [2] as primary.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":6,"text":"In the process, he may offer alternative phrasing and ask for repeats or repairs (you mean the small metal thing shaped like an L?); she may offer more information and ask for confirmation.","tag":"extension:illustrative","tier":"secondary","parent_id":2,"note":"Provides concrete examples of the process described in [2]–[5]; re-parents to [2] as primary.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":7,"text":"Predictions of the collaborative theory, as we will call it, have been confirmed for repeated references to objects (Clark & Wilkes-Gibbs, 1986), for partners with disparate goals (Wilkes-Gibbs, 1986), and disparate expertise (Isaacs & Clark, 1987), for understanding by partners versus overhearers (Schober & Clark, 1989), for partners trying to conceal their references from overhearers (Clark & Schaefer, 1987b), and for partners with continuous evidence of understanding (Brennan, 1990).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":8,"text":"The theory has been extended to tasks such as giving directions (Wilkes-Gibbs, 1986) and to general contributions to discourse (Clark & Schaefer, 1987a, 1989).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":9,"text":"In this paper, we compare several ways in which people might coordinate beliefs about their mutual understanding of references.","tag":"contribution","tier":"primary","parent_id":null,"note":null,"cars_move":"M3","cars_step":"3A","move_note":"Early M3 announcement before returning to extended M1 context-setting; M2->M3 cycling begins here."},{"id":10,"text":"Past work has looked mainly at the process when people talk to one another.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Characterizes the scope of prior work, setting up the gap.","cars_move":"M1","cars_step":"1C","move_note":"Returns to M1 territory after early M3 announcement — part of M2->M3 cycling."},{"id":11,"text":"When one person speaks to another, she is trying to add what she says to their common ground—to the information they believe they share (Clark, 1985; Clark & Marshall, 1981; Cohen, 1978; Gazdar, 1979; Stalnaker, 1978).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1B","move_note":null},{"id":12,"text":"She accomplishes this by choosing her wording based on their common ground so far, and by collaborating with her partner to reach the mutual belief that he has understood her.","tag":"extension:definitional","tier":"secondary","parent_id":11,"note":"Elaborates the mechanism described in [11].","cars_move":"M1","cars_step":"1B","move_note":null},{"id":13,"text":"Throughout this process, the partner tries to interpret what she says based on his beliefs about their common ground.","tag":"extension:definitional","tier":"secondary","parent_id":11,"note":"Continues elaborating [11]; re-parents to [11] as primary.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":14,"text":"When they accept that he has understood appropriately, that understanding is added to their shared knowledge.","tag":"extension:definitional","tier":"secondary","parent_id":11,"note":"Describes the outcome of the process in [11]; re-parents to [11] as primary.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":15,"text":"So common ground in a discourse is continually growing.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Corrected from link:closing. Asserts an established theoretical property of discourse — an independent claim about how common ground works, not merely a wrap-up formula.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":16,"text":"In making a reference, the speaker must design what she says against the current common ground with her partner.","tag":"extension:definitional","tier":"secondary","parent_id":15,"note":"Draws out a design implication of the growing-common-ground claim in [15].","cars_move":"M1","cars_step":"1B","move_note":null},{"id":17,"text":"His beliefs about their common ground should be coordinated with hers if they are to understand one another efficiently, and collaboration helps them solve this coordination problem.","tag":"tempstat","tier":"primary","parent_id":null,"note":"States the theoretical prediction about coordination; grounded in the established framework.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":18,"text":"Accumulating common ground has predictable effects on the referential process, as an example from a previous study illustrates (Clark & Wilkes-Gibbs, 1986).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":19,"text":"In that study, a director (D) was asked to get a matcher (A) to put 12 so-called tangram figures (see Fig. 1) one-by-one into a particular order.","tag":"extension:illustrative","tier":"secondary","parent_id":18,"note":"Begins describing the prior study to illustrate the claim in [18].","cars_move":"M1","cars_step":"1C","move_note":null},{"id":20,"text":"(For convenience, we will consider the directors female and the matchers male, even though this was not always the case.)","tag":"extension:definitional","tier":"secondary","parent_id":18,"note":"Defines a notational convention; re-parents to [18] as nearest primary.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":21,"text":"The director and matcher could not see each other's arrangements, but they could talk as much as they needed.","tag":"extension:illustrative","tier":"secondary","parent_id":18,"note":"Continues describing the prior study setup; re-parents to [18] as primary.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":22,"text":"They matched different arrangements of the same figures six times, which we will call Trials Al through A6.","tag":"extension:illustrative","tier":"secondary","parent_id":18,"note":"Continues describing the prior study procedure; re-parents to [18] as primary.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":23,"text":"On the very first trial (Al), D got A to identify one tangram figure (labeled A in Fig. 1) this way: [dialogue excerpt]","tag":"extension:illustrative","tier":"secondary","parent_id":18,"note":"Provides the concrete dialogue example; re-parents to [18] as primary.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":24,"text":"According to the collaborative theory, once D and A reached the mutual belief that A had understood, they incremented their common ground with descriptions of the figure as (1) 'someone that looks like they're trying to climb stairs,' (2) as having 'two feet, one way above the other,' and (3) as having 'a diamond on the right side, on a slant' that 'kind of looks like it's off the back.'","tag":"extension:illustrative","tier":"secondary","parent_id":18,"note":"Applies the theory to interpret the dialogue excerpt; re-parents to [18] as primary.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":25,"text":"Later when D wanted to refer to the same figure, she could presuppose this information and form a simpler description based on it, as she did in this example from Trial A3: [dialogue excerpt]","tag":"extension:illustrative","tier":"secondary","parent_id":18,"note":"Continues illustrating efficiency gains; re-parents to [18] as primary.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":26,"text":"After this exchange she could presuppose the new description and be even briefer, as on Trial A6: [dialogue excerpt]","tag":"extension:illustrative","tier":"secondary","parent_id":18,"note":"Extends the illustration to show further compression; re-parents to [18] as primary.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":27,"text":"Accumulating common ground affected two main features of the referential process: type of reference and efficiency of reference.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the key empirical finding from the prior study.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":28,"text":"First, in our study, D almost always introduced the figures on Trial Al with indefinite references (e.g., 'someone that looks like . . .') or descriptions ('is climbing some stairs').","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a specific finding from prior work about initial reference type.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":29,"text":"But from Trial A2 on, she switched to definite references ('the person climbing the stairs') or nominals without articles ('stair climber').","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the contrasting finding about reference type in subsequent trials.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":30,"text":"For simplicity, let us call this a change from indefinite to definite references.","tag":"framedef","tier":"primary","parent_id":null,"note":"Introduces a terminological shorthand the paper will use.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":31,"text":"Second, D and A made great gains in efficiency over repeated references to the same figures on Trials A2 through A6.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the efficiency finding from prior work.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":32,"text":"On Trial Al, the two partners we cited took 54 words and six turns before going to the next figure.","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Provides specific quantitative illustration of inefficiency at Trial A1; parents to [31].","cars_move":"M1","cars_step":"1C","move_note":null},{"id":33,"text":"By Trial A3, they were down to 11 words and two turns, and by Trial A6, four words and two turns.","tag":"extension:illustrative","tier":"secondary","parent_id":31,"note":"Continues the quantitative illustration; re-parents to [31] as primary.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":34,"text":"In our study, D and A's increasing efficiency was shown in words, turns, and elapsed time.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Summarizes the measures by which efficiency gains were observed.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":35,"text":"This pattern has been replicated in many other studies (e.g., Krauss & Weinheimer, 1964, 1966; Isaacs & Clark, 1987; Schober & Clark, 1989; Wilkes-Gibbs, 1986).","tag":"tempstat","tier":"primary","parent_id":null,"note":null,"cars_move":"M1","cars_step":"1C","move_note":null},{"id":36,"text":"What evidence, then, do people use for coordinating their beliefs about the buildup of common ground in order to design and interpret references?","tag":"nostat","tier":"primary","parent_id":null,"note":"Poses the open question motivating the present study.","cars_move":"M2","cars_step":"2C","move_note":null},{"id":37,"text":"The collaborative theory proposes that people rely on the verdicts of mutual understanding they collaborate to reach.","tag":"tempstat","tier":"primary","parent_id":null,"note":"States the established theoretical answer, which is then shown as incomplete.","cars_move":"M2","cars_step":"2C","move_note":"Contextual M1-style content deployed in M2 to frame the gap — states what IS known in order to set up what is NOT known in [38]."},{"id":38,"text":"But how do people coordinate when they have not been collaborating with one another directly?","tag":"nostat","tier":"primary","parent_id":null,"note":"Identifies the gap not addressed by prior theory.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":39,"text":"The issue we consider here is how speakers judge whether to rely on common ground built in collaboration with one person as also being common ground with someone else.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the specific question the present paper addresses.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":40,"text":"To study this, we looked at how a speaker who had been collaborating on references with one partner would refer to the same things for a different addressee.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the methodological approach.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":41,"text":"Many kinds of information could conceivably affect people's beliefs about their common ground.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance and breadth of the factor space being investigated.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":42,"text":"Here, we examined three combinations of evidence available to the speaker: (1) whether the new addressee had heard the speaker's previous conversation, (2) whether he knew, in addition, exactly what the speaker intended to refer to with each of her references in that conversation, and (3) whether he had also been a sanctioned (though silent) participant in the speaker's prior conversation.","tag":"contribution","tier":"primary","parent_id":null,"note":"Specifies the three manipulations examined in the study.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":43,"text":"Concretely, we asked a director to perform six trials (Al-A6) in our matching task with one partner (Matcher A), and then to carry out six more trials (Bl-B6) with a second partner (Matcher B), using the same 12 tangram figures.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the concrete experimental design.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":44,"text":"The crucial trial, really, is Trial Bl, when D first began speaking directly to B.","tag":"contribution","tier":"primary","parent_id":null,"note":"Identifies the focal moment in the design.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":45,"text":"How will the type and efficiency of her references be affected by the change of addressee?","tag":"contribution","tier":"primary","parent_id":null,"note":"Frames the specific empirical question the design addresses.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":46,"text":"That should depend on D's beliefs about her common ground with B.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Corrected from extension:speculative. This is a theoretical deduction grounded in the established collaborative theory framework, not open speculation — it reports what the theory predicts about the determining factor.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":47,"text":"To look at some possible influences on D's beliefs about common ground, we placed B in one of four circumstances while D was discussing the figures with her first partner.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the four-condition manipulation structure.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":48,"text":"We varied both the amount of information from the first six trials that B had access to, as well as his status in the first conversation.","tag":"contribution","tier":"primary","parent_id":null,"note":"Specifies the two dimensions along which conditions were varied.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":49,"text":"In one condition, matcher B sat next to D as a silent side participant in the session with matcher A.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the first experimental condition.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":50,"text":"Side participants are what Goffman (1979) called 'unaddressed recipients' of talk.","tag":"framedef","tier":"primary","parent_id":null,"note":"Introduces and defines the theoretical construct of \"side participant\" via citation.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":51,"text":"Even though they are not addressed directly, they are nonetheless ratified parties in a conversation (Clark & Carlson, 1982).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports an established theoretical claim about side participants' status.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":52,"text":"According to the collaborative theory, all participants in a conversation assume responsibilities for their mutual understanding, and therefore can be taken to accumulate common ground along with the speaker and addressee(s).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the collaborative theory's prediction about participant roles.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":53,"text":"If D considered matcher B a side participant in her conversation with A, she should assume the same common ground with him on Trial Bl as she had with A after their last trial.","tag":"extension:speculative","tier":"secondary","parent_id":null,"note":"Derives a specific prediction from the theory stated in [52]; parent is [52] (primary ✓).","cars_move":"M3","cars_step":"3C","move_note":null},{"id":54,"text":"This means she should use definite references, and the only loss of efficiency on Trial Bl should come from B's lack of practice in working with the figures.","tag":"extension:speculative","tier":"secondary","parent_id":52,"note":"Extends and specifies the prediction in [53]; re-parents to [52] as primary to avoid secondary-secondary chain.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":55,"text":"In a second condition, matcher B had been what we will call an omniscient bystander during D's conversation with A.","tag":"contribution","tier":"primary","parent_id":null,"note":"Introduces the second experimental condition and names it.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":56,"text":"Bystanders are observers of a conversation without being participants in it (Clark & Carlson, 1982; Goffman, 1979).","tag":"framedef","tier":"primary","parent_id":null,"note":"Defines the \"bystander\" construct used in the paper.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":57,"text":"They do not always have full knowledge of what a speaker intends to refer to, or of her common ground with the participants.","tag":"extension:definitional","tier":"secondary","parent_id":56,"note":"Elaborates the defining properties of bystanders introduced in [56].","cars_move":"M3","cars_step":"3B","move_note":null},{"id":58,"text":"But since the side participants had such information, in this condition we wanted to give the same knowledge to nonparticipants.","tag":"contribution","tier":"primary","parent_id":null,"note":"Explains the rationale for the omniscient bystander condition design.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":59,"text":"During Trials Al-A6, we placed B in another room where he could hear and see all of D's actions on a video monitor.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the specific implementation of the omniscient bystander condition.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":60,"text":"Since D knew about B's access to all this information, what should she presuppose in making her references on Trial Bl?","tag":"nostat","tier":"primary","parent_id":null,"note":"Poses the open empirical/theoretical question the condition is designed to answer.","cars_move":"M3","cars_step":"3A","move_note":"Question-raising in service of M3 design justification, not a new M2 gap."},{"id":61,"text":"If she considered him equivalent to a silent side participant, then these two conditions should look the same.","tag":"extension:speculative","tier":"secondary","parent_id":null,"note":"States one possible predicted outcome; parent is [60] (primary ✓).","cars_move":"M3","cars_step":"3C","move_note":null},{"id":62,"text":"But if she were less certain about their common ground, then she should initially use fewer definite references and more elaborate phrasing.","tag":"extension:speculative","tier":"secondary","parent_id":60,"note":"States the alternative predicted outcome; re-parents to [60] as primary to avoid secondary-secondary chain.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":63,"text":"Information about omniscient bystanders, then, is crucial.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the importance of this condition for the theoretical question.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":64,"text":"Do speakers build up common ground with these listeners as confidently as they do with side participants?","tag":"nostat","tier":"primary","parent_id":null,"note":"Restates the open empirical question posed by the omniscient bystander condition.","cars_move":"M3","cars_step":"3A","move_note":"Question framing is in service of M3 study design rationale."},{"id":65,"text":"On informational grounds, they should.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Corrected from extension:speculative. Reports what the established theoretical framework (informational equivalence in common-ground theory) predicts — a theory-derived claim, not open speculation.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":66,"text":"The side participant and the omniscient bystander see and hear the same information on Trials Al through A6, and D knows this.","tag":"extension:illustrative","tier":"secondary","parent_id":65,"note":"Corrected from extension:definitional. Grounds the claim in [65] by specifying the concrete empirical basis for equivalence — this is illustrative support for the theoretical prediction, not a definition. Parent is [65] (primary ✓).","cars_move":"M3","cars_step":"3C","move_note":null},{"id":67,"text":"Yet, for other reasons, speakers may not hold such firm beliefs.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces tension against the informational-equivalence prediction in [65].","cars_move":"M3","cars_step":"3C","move_note":"Contrast within M3 prediction elaboration — not a new M2 gap but a nuanced prediction."},{"id":68,"text":"First, speakers do not normally need to represent the information being accumulated by people who are not parties to a conversation in order to converse sensibly.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Provides a theory-grounded reason why speakers might not treat bystanders as equivalent to participants.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":69,"text":"Even when they intend to keep track of nonparticipants, how certain can they be that the nonparticipants know this, are paying attention, and actually are accumulating the proper information?","tag":"emph","tier":"primary","parent_id":null,"note":"Corrected from extension:speculative. A rhetorical question asserting the genuine epistemic difficulty faced by speakers — establishes the significance of the uncertainty problem rather than speculating from a prior claim.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":70,"text":"Because of this, speakers and nonparticipants may face difficulty in coordinating their beliefs about what information they share.","tag":"extension:speculative","tier":"secondary","parent_id":null,"note":"Speculatively extends [69] into a predicted consequence; parent is [69] (now primary ✓).","cars_move":"M3","cars_step":"3C","move_note":null},{"id":71,"text":"For these reasons, then, the omniscient bystander and side participant conditions may differ.","tag":"link:closing","tier":"secondary","parent_id":68,"note":"Wraps up the argument starting at [68]; re-parents to [68] (nearest primary) to avoid secondary-secondary chain from [70].","cars_move":"M3","cars_step":"3C","move_note":null},{"id":72,"text":"In the third condition, matcher B was meant to be considered a simple bystander during D's first conversation—a bystander who was not given privileged information about D's figures as they were being discussed.","tag":"contribution","tier":"primary","parent_id":null,"note":"Introduces and describes the third experimental condition.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":73,"text":"These bystanders were in the same room with D and A and could hear everything that was said.","tag":"extension:definitional","tier":"secondary","parent_id":null,"note":"Elaborates the access characteristics of the simple bystander condition; parent is [72] (primary ✓).","cars_move":"M3","cars_step":"3A","move_note":null},{"id":74,"text":"However, they sat farther from D than the side participants, and could not see the figures.","tag":"extension:definitional","tier":"secondary","parent_id":72,"note":"Specifies the limitation differentiating simple bystanders; re-parents to [72] as primary.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":75,"text":"This allows us to see what assumptions D will make from knowing B has overheard her conversation with A.","tag":"contribution","tier":"primary","parent_id":null,"note":"States the rationale/purpose of the simple bystander condition.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":76,"text":"On informational grounds, D should be less confident in this simple bystander's understanding than for the omniscient bystander or side participant.","tag":"extension:speculative","tier":"secondary","parent_id":null,"note":"Derives a prediction for the simple bystander condition; parent is [75] (primary ✓).","cars_move":"M3","cars_step":"3C","move_note":null},{"id":77,"text":"If so, she may use more indefinite references, and the collaborative process between D and B should be less efficient.","tag":"extension:speculative","tier":"secondary","parent_id":75,"note":"Specifies the behavioral prediction following from [76]; re-parents to [75] as primary to avoid secondary-secondary chain.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":78,"text":"In the final condition, matcher B was a fully naive partner, completely unfamiliar with D's first conversation.","tag":"contribution","tier":"primary","parent_id":null,"note":"Introduces the fourth experimental condition.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":79,"text":"With no shared information, D should make a fresh start and treat matcher B much as she initially did matcher A.","tag":"extension:speculative","tier":"secondary","parent_id":null,"note":"Derives the prediction for the naive partner condition; parent is [78] (primary ✓).","cars_move":"M3","cars_step":"3C","move_note":null},{"id":80,"text":"This condition should tell us how D's own practice with one partner affects her references for a second person.","tag":"contribution","tier":"primary","parent_id":null,"note":"States the additional inferential purpose served by the naive partner condition.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":81,"text":"To the extent that changes in type and efficiency of references depend on common ground between partners, D should still use indirect references and lengthy collaboration on the Bl trial.","tag":"extension:speculative","tier":"secondary","parent_id":null,"note":"Elaborates the theoretical prediction for the naive partner condition; parent is [80] (primary ✓).","cars_move":"M3","cars_step":"3C","move_note":null},{"id":82,"text":"In summary, this study looks at how three levels of evidence for common ground affect references for a person with whom the speaker has not directly collaborated.","tag":"contribution","tier":"primary","parent_id":null,"note":"Summarizes the overall purpose of the study.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":83,"text":"These are: (1) whether or not the addressee has heard the speaker refer to the same figures in the past; (2) whether he knows, in addition, what those figures are; and (3) whether he might also have been considered a silent participant in the speaker's previous conversation.","tag":"extension:definitional","tier":"secondary","parent_id":null,"note":"Enumerates the three levels summarized in [82]; parent is [82] (primary ✓).","cars_move":"M3","cars_step":"3A","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"williams_2025","title":"williams 2025","authors":["Williams"],"year":2025,"section":"Introduction"},"arc_summary":"The introduction front-loads its **M2 gap** (observational opacity of collective creativity) and resolves it immediately with a **M3 model-system announcement** (free jazz), before cycling back into extended M1 territory to justify that choice. A second M3 block then installs the **foraging framework**, triggering another long M1 review of Lévy flights and Area Restricted Search — with a brief M2 interjection marking their indistinguishability. The arc closes with a tight M3 triple-punch announcing dataset, method, and research question. The paper's rhetorical bet is that two rounds of extended background-building earn the right to the foraging hypothesis.","structured_arc":"M1 -> M2 -> M3 -> M1 -> M3 -> M1 -> M3","move_roles":[{"move":"M1","span":[1,2],"role":"Establishes collective innovation as a broadly significant, species-defining phenomenon, priming the reader to care about the gap that follows."},{"move":"M2","span":[3,5],"role":"Identifies the opacity of the creative process as the specific scientific barrier blocking progress on collective innovation — the problem the whole paper answers."},{"move":"M3","span":[6,6],"role":"Makes an early, compact niche-occupation move by naming free jazz as the paper's solution to the observability problem, before background justification is provided."},{"move":"M1","span":[7,15],"role":"Builds post-hoc justification for the free-jazz model system by establishing its properties — real-time visibility, true collectivity, mutual adaptation — as field-accepted facts."},{"move":"M3","span":[16,20],"role":"Installs foraging as the paper's central analytical framework, anchors it in prior individual-creativity literature, and maps its terms onto the musical domain."},{"move":"M1","span":[21,33],"role":"Reviews the empirical and conceptual landscape of foraging theory — Lévy flights and Area Restricted Search — giving readers the background needed to evaluate the paper's discriminating test."},{"move":"M2","span":[34,34],"role":"Marks the key unresolved problem within the foraging literature: that Lévy flights and ARS produce superficially indistinguishable trajectories, motivating the paper's discriminating analytical approach."},{"move":"M1","span":[35,39],"role":"Resolves the M2 tension by identifying temporal clustering of large steps as the distinguishing empirical signature between the two strategies — the handle the paper will use."},{"move":"M3","span":[40,43],"role":"Closes the introduction with a concrete three-step niche occupation: announcing the corpus, the operationalization method, and the research question tested."}],"sentences":[{"id":1,"text":"Collective innovation is a cornerstone of our species' global success [1,2].","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the fundamental importance and significance of collective innovation.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":2,"text":"This capacity is manifest in activities as varied as technological invention [3], crisis problem solving [4], scientific collaboration [5], and even interpersonal conversation [6], all of which require the coordination of creative behaviors distributed among multiple actors.","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Illustrates the breadth of collective innovation established in [1]; parent is emph.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":3,"text":"Understanding the moment-to-moment dynamics of collective innovation remains a grand challenge.","tag":"nostat","tier":"primary","parent_id":null,"note":"Identifies an unresolved problem in the field.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":4,"text":"One major stumbling block to the scientific study of collective innovation is the inherent opacity of the creative process: while creative products like scientific publications or rehearsed musical performances are visible as the public 'frontstage' of innovation, the crucial 'backstage' of real-time collaborative creation often remains hidden [7].","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a specific limitation — opacity of the creative process — that blocks scientific progress.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":5,"text":"The opacity of the creative process has severely limited our understanding of the fine-grained dynamics of real-world collective innovation.","tag":"link:closing","tier":"secondary","parent_id":4,"note":"Synthesizes the consequence of the limitation introduced in [4]; parent is contrast (primary). Chain is valid.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":6,"text":"To penetrate this observational barrier, we turned to an unusual group of creative professionals notorious for engaging publicly in the process of collective innovation: free jazz musicians.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the paper's approach and choice of model system in response to the identified gap.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":7,"text":"Improvising musicians must coordinate continuously, make constant decisions on the timescale of milliseconds, and select their moment-to-moment activity from a huge space of acoustic possibility [9].","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports established characteristics of musical improvisation with citation support.","cars_move":"M1","cars_step":"1B","move_note":"Post-M3 return to territory; M2->M3 cycling — extended M1 block justifying the model system"},{"id":8,"text":"In stark contrast to domains where the creative process is hidden behind its product, in musical improvisation the process of creation is the publicly observable product.","tag":"contrast","tier":"primary","parent_id":null,"note":"Draws a direct contrast between improvisation and other creative domains to argue for its utility as a research window.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":9,"text":"This immediacy distinguishes it from, say, musical composition or scientific research, where creative products like musical scores or scientific publications are the polished outcomes of often protracted and private generative processes.","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Illustrates the contrast made in [8] with concrete examples; parent is contrast (primary).","cars_move":"M1","cars_step":"1B","move_note":null},{"id":10,"text":"Crucially, among improvisational practices, free jazz is especially well suited for studying truly collective creativity.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the particular significance and suitability of free jazz; independent positive claim about the object of study.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":11,"text":"Unlike genres that focus on individual soloists with harmonic or rhythmic accompaniment, in free jazz all ensemble members participate simultaneously in the improvisational process [10, 11].","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a contrast between free jazz and other improvisational genres to support the claim in [10].","cars_move":"M1","cars_step":"1B","move_note":null},{"id":12,"text":"Free jazz ensembles perform without established leaders, preexisting musical scores, predetermined chord changes, planned solo intervals, established harmonies, or canonical musical phrases.","tag":"extension:definitional","tier":"secondary","parent_id":10,"note":"Defines what free jazz performance entails, unpacking the collective nature asserted in [10]–[11]; parent is contrast (primary).","cars_move":"M1","cars_step":"1B","move_note":null},{"id":13,"text":"Instead, they make it up on the fly, collectively creating novel sounds as they navigate a space of possible sounds that is largely unconstrained [12].","tag":"extension:definitional","tier":"secondary","parent_id":12,"note":"Continues definitional unpacking of free jazz; parent is contrast (primary) at [11], re-parenting past [12] (secondary) is valid.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":14,"text":"Likewise, collaboratively improvising musicians rapidly and mutually adapt to their improvising partners to create optimal musical performances [13, 14].","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports an established finding about mutual adaptation in improvising musicians, with citations.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":15,"text":"Collective free jazz improvisation thus provides a unique real-world laboratory for studying the unscripted, fine-grained, moment-to-moment dynamics of collective innovation in vivo.","tag":"emph","tier":"primary","parent_id":null,"note":"Corrected from link:closing. The sentence makes an independent positive claim about the significance and uniqueness of free jazz as a research system — this is emph, not mere synthesis. \"Unique real-world laboratory\" asserts real-world relevance and importance of the phenomenon.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":16,"text":"Here, to quantify the fine-grained dynamics of collective innovation, we analyze the improvisational process as a kind of foraging, a search for rewards in an uncertain landscape.","tag":"framedef","tier":"primary","parent_id":null,"note":"Introduces the foraging framework as the central analytical metaphor; creates a new conceptual object for the paper's argument.","cars_move":"M3","cars_step":"3A","move_note":"Second M3 occupation; announces the foraging framework as the paper's central analytical approach"},{"id":17,"text":"More mundane forms of individual creativity have been characterized as foraging processes, including searching through semantic memory [15], creating interesting visual patterns [16, 17, 18], and solving insight puzzles [19].","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports prior work applying foraging frameworks to individual creativity, providing empirical grounding for the framework introduced in [16].","cars_move":"M3","cars_step":"3B","move_note":null},{"id":18,"text":"Similarly, free improvisation can be thought of as a collective foraging process, in which musical ensembles must move through an abstract space of sonic possibility with the goal of discovering sounds that are novel, interesting, or otherwise rewarding.","tag":"framedef","tier":"primary","parent_id":null,"note":"Extends and specifies the foraging framework to the collective/musical domain; continues framework-building.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":19,"text":"From this perspective, locations within the sonic space correspond to complex sounds produced by the musical ensemble, which could be sounds that the musicians have produced before (analogous to locations that a foraging organism has visited previously) or entirely novel sounds that have never been created (analogous to locations that a foraging organism has yet to visit).","tag":"extension:definitional","tier":"secondary","parent_id":null,"note":"Defines the terms of the foraging metaphor by mapping sonic locations onto foraging concepts; parent is framedef (primary) at [18].","cars_move":"M3","cars_step":"3B","move_note":null},{"id":20,"text":"Below, we explain how computational methods can formalize this foraging perspective on musical improvisation (Fig. 1, A-C).","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces what the paper will do — formalize the framework computationally.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":21,"text":"What foraging strategies might musical ensembles use to improvise?","tag":"link:opening","tier":"secondary","parent_id":null,"note":"Opens the foraging strategies sub-section; purely structural announcement with no independent claim.","cars_move":"M1","cars_step":"1B","move_note":"Post-M3 return to territory reviewing foraging literature; M2->M3 cycling — extended M1 block"},{"id":22,"text":"Across a wide range of environmental conditions where resources cluster together in patches, a highly effective foraging strategy is to move through the space using a Lévy flight random walk [20].","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports an established finding from behavioral ecology about Lévy flights, with citation.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":23,"text":"In a Lévy flight, the length of each step is drawn randomly from a heavy-tailed distribution, with frequent small steps and infrequent large steps [21].","tag":"extension:definitional","tier":"secondary","parent_id":22,"note":"Defines the Lévy flight mechanism introduced in [22]; parent is tempstat (primary).","cars_move":"M1","cars_step":"1C","move_note":null},{"id":24,"text":"Despite their randomness and lack of any plan or memory, Lévy flights can generate search trajectories that appear patchy, with extended periods spent within local regions, interspersed with large jumps to new regions.","tag":"emph","tier":"primary","parent_id":null,"note":"Corrected from tempstat. No citation is present. The sentence asserts the significance of a known property of Lévy flights — that apparent patchiness can emerge from randomness — establishing this as a real and notable phenomenon. Without citation, tempstat is not appropriate; emph fits as an assertion of a phenomenon's existence and relevance.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":25,"text":"The spatial foraging behavior of a wide variety of organisms has been characterized as Lévy flights, including albatrosses [22], sharks [23], mussels [24], deer [25], humans [26, 27, 28], and even entire sports teams [29], although subsequent reanalyses have cast doubt on some of these claims [30, 31].","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the broad empirical literature documenting Lévy flights across species, including caveats from reanalyses.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":26,"text":"While a random walk may seem an overly simplistic account of collective innovation, random walks have been used to model a range of high-level cognitive processes, including decision making [32, 33], memory retrieval [34], individual creativity [35], curiosity [36], and even scientific productivity [37], and some have argued that they are optimal in a wide range of conditions [20].","tag":"contrast","tier":"primary","parent_id":null,"note":"Acknowledges a potential objection (random walk seems simplistic) but rebuts it with citation-backed evidence; concessive-then-rebuttal structure.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":27,"text":"In the context of improvised music, novel and interesting sounds are distributed unevenly and unpredictably throughout the space of sonic possibility, so musicians could perform an abstract form of a Lévy flight to increase their odds of encountering particularly novel or interesting sounds.","tag":"extension:speculative","tier":"secondary","parent_id":null,"note":"Applies Lévy flight logic speculatively to musical improvisation as a hypothesis without new evidence; parent is contrast (primary) at [26].","cars_move":"M1","cars_step":"1C","move_note":null},{"id":28,"text":"Alternatively, instead of moving randomly as in a Lévy flight, foragers may respond strategically to resource encounters [38].","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces Area Restricted Search as an alternative to Lévy flight; \"Alternatively\" marks the contrast explicitly.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":29,"text":"In Area Restricted Search, for instance, resource encounters prompt the forager to search nearby, thus 'exploiting' the local region.","tag":"extension:definitional","tier":"secondary","parent_id":28,"note":"Defines the Area Restricted Search mechanism introduced in [28]; parent is contrast (primary).","cars_move":"M1","cars_step":"1C","move_note":null},{"id":30,"text":"As resource encounters become less frequent, the organism becomes more likely to abandon that region to 'explore' widely for a new patch of clustered rewards.","tag":"extension:definitional","tier":"secondary","parent_id":28,"note":"Continues defining Area Restricted Search, describing the explore phase; re-parents to contrast (primary) at [28], skipping [29] (secondary).","cars_move":"M1","cars_step":"1C","move_note":null},{"id":31,"text":"Much like Lévy flights, Area-Restricted Search has been documented widely in the natural world [38], including in ladybugs foraging for aphids [39], seabirds foraging for fish [40], and humans foraging for mushrooms [41].","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the empirical literature documenting Area Restricted Search across species.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":32,"text":"Since resources are often clustered spatially, Area Restricted Search can generate patchy trajectories that resemble those of a Lévy flight.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the known consequence of Area Restricted Search in patchy environments, establishing the problem of distinguishing the two strategies.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":33,"text":"After encountering an interesting sound, for instance, improvising musicians may decide collectively to persist in exploiting the similar sounds within a sonic patch or 'soundworld,' only switching to explore for a new soundworld when they have exhausted the current soundworld's novelty or interest.","tag":"extension:speculative","tier":"secondary","parent_id":null,"note":"Applies ARS framework speculatively to musical improvisation; also introduces the term \"soundworld\" informally. Parent is tempstat (primary) at [32]. Chain is valid.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":34,"text":"As accounts of foraging, Lévy flights and Area Restricted Search are difficult to distinguish because both can generate search patterns that are patchy, with periods of sustained search within a focal region punctuated by leaps to a new region.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces the key tension: the two strategies produce superficially similar patterns, making them hard to distinguish.","cars_move":"M2","cars_step":"2B","move_note":"Interlaced M2 within extended M1 block; names what is not yet resolvable between the two foraging accounts"},{"id":35,"text":"A key difference, however, is the role of memory in the transition between patches [42, 43].","tag":"contrast","tier":"primary","parent_id":null,"note":"Identifies the distinguishing feature that resolves the tension raised in [34]; \"however\" marks the contrast explicitly.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":36,"text":"In a Lévy flight, the organism does not adjust its behavior on the basis of recent resource encounters; it just draws randomly from a heavy-tailed distribution of steps.","tag":"extension:definitional","tier":"secondary","parent_id":null,"note":"Unpacks the memory-less nature of Lévy flights as part of the distinguishing contrast; parent is contrast (primary) at [35].","cars_move":"M1","cars_step":"1C","move_note":null},{"id":37,"text":"An organism engaged in Area Restricted Search, by contrast, will transition from exploring to exploiting when it encounters a new resource, and it may then persist in exploiting that region based on the memory of that resource encounter.","tag":"extension:definitional","tier":"secondary","parent_id":35,"note":"Unpacks the memory-based nature of Area Restricted Search; re-parents to contrast (primary) at [35], skipping [36] (secondary).","cars_move":"M1","cars_step":"1C","move_note":null},{"id":38,"text":"Area-Restricted Search and Lévy flights are thus distinguished by whether or not the organism adjusts its foraging behavior before and after a resource encounter.","tag":"link:closing","tier":"secondary","parent_id":null,"note":"Synthesizes the distinguishing criterion established in [35]–[37]; closes the comparison sub-section. Parent is contrast (primary) at [35].","cars_move":"M1","cars_step":"1C","move_note":null},{"id":39,"text":"As a consequence, when an organism uses Area Restricted Search to forage in a patchy landscape, large exploratory steps should cluster together temporally within periods of sustained exploration; in a Lévy flight, by contrast, the temporal distribution of large steps is random.","tag":"emph","tier":"primary","parent_id":null,"note":"Corrected from extension:speculative. Previous parent [38] was link:closing (secondary), violating the subordination rule. Elevated to primary. The sentence asserts the existence of a specific, identifiable distinguishing pattern — temporal clustering of large steps — as a real phenomenon with empirical consequences. This is emph: asserting that something real and important exists (the clustering pattern) that the paper will exploit.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":40,"text":"Using a corpus of audio recordings of professional musicians engaged in collective improvisation — a model system for the fine-grained study of in vivo collective innovation — we investigated the foraging strategies adopted collectively as the ensembles engaged in free improvisation (Fig. 1, A, D).","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the study's empirical approach, dataset, and research question.","cars_move":"M3","cars_step":"3A","move_note":"Final M3 occupation; third return to niche occupation after extended M1 background review"},{"id":41,"text":"We converted each track (N = 75, ranging from 1 min. to over 40 min.) into a trajectory through a space of sonic possibility by embedding consecutive moments in a high-dimensional 'sonic space' (Fig. 1B, E).","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the specific method used to operationalize the foraging framework.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":42,"text":"We quantified the dynamics of these trajectories by analyzing the moment-to-moment movements through this sonic space (Fig. 1C, F).","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the analytic approach applied to the trajectories.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":43,"text":"We then asked whether the dynamics of collective improvisation instantiate classic foraging strategies from behavioral ecology.","tag":"contribution","tier":"primary","parent_id":null,"note":"States the research question directly tested in the study.","cars_move":"M3","cars_step":"3A","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"ziems_2024","title":"ziems 2024","authors":["Ziems"],"year":2024,"section":"Introduction"},"arc_summary":"The introduction uses a fractured M1→M3→M2→M1→M3 arc rather than a clean linear progression, with an early M3 purpose statement (S6) interrupting the territory before the niche is established. **M2 is unusually compressed**—five sentences (7–12) identify the constraints of current CSS methods and position LLMs as the solution—sandwiched between two M1 blocks and
