1","cars_step":"1C","move_note":null},{"id":69,"text":"In itself, however, functional specificity of these regions is not evidence that these processes are owed to a biological endowment.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a limitation of the neuroimaging evidence just cited.","cars_move":"M2","cars_step":"2A","move_note":"Brief M2 counter-claim within extended M1 review; interlaced M1/M2."},{"id":70,"text":"This kind of anatomical specialization could emerge as part of a developmental process that relies on particular typical input.","tag":"extension:speculative","tier":"secondary","parent_id":69,"note":"Offers an alternative interpretation of anatomical findings consistent with experience-driven accounts; parent [69] contrast. —","cars_move":"M2","cars_step":"2A","move_note":null},{"id":71,"text":"C. M. Heyes and Frith (2014) make an analogy to print reading, which is also subserved by dedicated cortical areas, but depends on particular kinds of input and shows cultural variability.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a cross-domain analogy used to support the experience-driven interpretation.","cars_move":"M1","cars_step":"1C","move_note":"Returns to M1 reporting of prior work within the background review."},{"id":72,"text":"Bedny et al. (2009) provide stronger evidence for the insensitivity of functional organization to developmental input by recording brain activity of congenitally blind individuals while they listened to stories about mental states.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports empirical evidence on the robustness of ToM neural organization.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":73,"text":"Several theories stress the role of visual input in developing ToM, especially those that frame mentalizing as a kind of simulation of another agent's behavior (Baron-Cohen & Cross, 1992).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a class of theories predicting visual input matters for ToM development.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":74,"text":"In contrast to the predictions of these accounts, however, Bedny et al. found that blind participants' brains showed selective activity in the same regions that are implicated in sighted individuals.","tag":"contrast","tier":"primary","parent_id":null,"note":"Reports empirical findings that contradict the visual-input theories cited in [73].","cars_move":"M1","cars_step":"1C","move_note":"Contrast used rhetorically to report a specific finding, not to carve out the paper's own niche; remains M1."},{"id":75,"text":"The authors conclude that the ToM network appears to develop normally in the absence of visual input, but speculate that other kinds of input (including language and social interaction), may still be necessary.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the authors' conclusions and speculations from the Bedny et al. study.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":76,"text":"A variety of studies support the idea that particular experiences influence the development of ToM (Meltzoff, 2007).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the general finding that experience matters for ToM development.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":77,"text":"In a training study, Slaughter and Gopnik (1996) found that children who practiced reporting on their own or others beliefs or desires improved at a false belief task versus a control group, suggesting that the conceptual developments underlying belief sensitivity rely on being exposed to relevant evidence.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a specific empirical study supporting experience-driven accounts.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":78,"text":"Yagmurlu, Berument, and Celimli (2005) found that children raised at home outperformed children raised in orphanages at ToM tasks— controlling for verbal and nonverbal intelligence—suggesting that social interaction with adults is crucial for ToM development.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports another empirical study on social interaction's role in ToM development.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":79,"text":"Finally, in a longitudinal twin study, Hughes et al. (2005) found that ToM performance of monozygotic twins was no more correlated than that of dizygotic twins.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a key empirical finding on genetic vs. environmental contributions to ToM.","cars_move":"M1","cars_step":"1C","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"kello_2023","title":"Emergent Mental Lexicon Functions in ChatGPT","authors":["Kello, C.","Bruna, P."],"year":2023,"section":"Introduction"},"arc_summary":"The introduction uses an unusually long **M1 territory block** (S1–13) to stage the emergence-vs-memorization debate before pivoting abruptly into **M3** (S14–15) with a purpose statement and method. It then cycles back into **M1** (S16–22) to survey the mental lexicon literature and expose the shared assumption of dedicated, sustained structures across all prior theories. The final sentence (S23) closes with a **light M3 re-entry**, repositioning LLMs as a genuinely different theoretical approach—but without a formal gap claim, making this a **gapless M1→M3→M1→M3 arc** where the niche is occupied by theoretical contrast rather than critique.","structured_arc":"M1 -> M3 -> M1 -> M3","move_roles":[{"move":"M1","span":[1,13],"role":"Establishes the LLM landscape—capabilities, training mechanics, fine-tuning, emergence, and the emergence-vs-memorization debate—building the conceptual vocabulary the paper's experiment will probe."},{"move":"M3","span":[14,15],"role":"Announces the paper's aim (testing emergence vs. memorization) and specifies the empirical vehicle (ChatGPT prompted with mental lexicon tasks), converting the debate in S1–13 directly into a research agenda."},{"move":"M1","span":[16,22],"role":"Reviews the mental lexicon as a theoretical testbed and exposes the shared assumption—dedicated functions in sustained structures—across both rule-based and connectionist models, setting up LLMs as a structurally different alternative."},{"move":"M3","span":[23,23],"role":"Closes the introduction by re-occupying the niche: LLMs offer a different theoretical approach to the mental lexicon, implicitly claiming the paper's contribution without a formal gap statement."}],"sentences":[{"id":1,"text":"LLMs have developed a surprising and impressive ability to perform a wide range of prompted tasks on which they were not directly trained (Wei, Tay, et al., 2022).","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the existence and significance of a phenomenon to open the paper.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":2,"text":"Training is primarily based on learning sequences through prediction in the context of surrounding tokens (e.g. words), and training data consists of many long sequences of text and symbols culled from various corpora.","tag":"extension:definitional","tier":"secondary","parent_id":1,"note":"Unpacks the mechanism behind [1]. Parent: [1] (emph).","cars_move":"M1","cars_step":"1A","move_note":null},{"id":3,"text":"After training, a prompt can be written to begin a context, and then an LLM like that used in ChatGPT can continue and expand the context by autoregressively predicting and producing subsequent tokens until an end of response is predicted.","tag":"extension:definitional","tier":"secondary","parent_id":1,"note":"Continues unpacking the mechanism; parent [1].","cars_move":"M1","cars_step":"1A","move_note":null},{"id":4,"text":"As a result, LLMs can generalize from their training data to produce responses to prompts that answer questions, perform tasks, solve problems, and generate plausible text and/or numbers given the context (OpenAI, 2023).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Citation-backed generalization about LLM capability.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":5,"text":"Continuations can be sometimes bizarre, offensive, biased, untruthful, or otherwise unhelpful, so LLM responses are also fine-tuned to be more helpful and appropriate, often through reinforcement learning based on targeted sets of prompts and responses (Ouyang et al., 2022).","tag":"contrast","tier":"primary","parent_id":null,"note":"Qualifies/limits the capability in [4].","cars_move":"M1","cars_step":"1B","move_note":"Contrast here qualifies the territory rather than establishing a gap; still M1."},{"id":6,"text":"LLM functions assembled from prompts are often referred to as emergent because they are untrained and become available as training corpora and model parameters become larger (Bommasani et al., 2021).","tag":"framedef","tier":"primary","parent_id":null,"note":"Names the \"emergent\" construct used as analytical machinery.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":7,"text":"Fine-tuning plays a role in shaping LLM responses, especially those targeted by human feedback, but this feedback is limited relative to the remarkable breadth and scope of emergent functionality.","tag":"contrast","tier":"primary","parent_id":null,"note":"Qualifies [6] by limiting fine-tuning's role relative to emergence.","cars_move":"M1","cars_step":"1B","move_note":"Contrast qualifies territory; remains M1."},{"id":8,"text":"Investigations are underway to understand how LLM functions emerge from transformer networks.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports current state of research activity.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":9,"text":"One technique is to prompt them with examples of the desired function so the LLM may generalize by similarity and analogy (Wei, Tay, et al., 2022).","tag":"extension:illustrative","tier":"secondary","parent_id":8,"note":"Example of the investigations in [8]. Parent: [8] (tempstat).","cars_move":"M1","cars_step":"1C","move_note":null},{"id":10,"text":"Such few shot learning protocols can be effective, but functions can also be assembled with no examples, so-called zero shot learning or reasoning (Kojima et al., 2022).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Citation-backed report of an established distinction (few-shot vs. zero-shot), independent of [9].","cars_move":"M1","cars_step":"1C","move_note":null},{"id":11,"text":"Few and zero shot learning suggests that transformer networks learn general-purpose representations that serve as pre-trained \"building blocks\" ready for on-the-fly assembly directed by prompting (Jiang & Bansal, 2021).","tag":"extension:speculative","tier":"secondary","parent_id":10,"note":"Interpretive extension (\"suggests\") drawn from [10]; parent [10] is primary, so valid. Parent: [10] (tempstat).","cars_move":"M1","cars_step":"1C","move_note":null},{"id":12,"text":"Emergent function stands in contrast with the idea that prompts serve as cues for locating and recalling functions in training data memorized in ChatGPT's weight matrices (Reynolds & McDonell, 2021).","tag":"contrast","tier":"primary","parent_id":null,"note":"Sets emergence against the competing memorization account.","cars_move":"M1","cars_step":"1C","move_note":"Contrast between two theoretical positions; reviews the debate, still territory-establishing."},{"id":13,"text":"Indeed, LLMs can memorize sequences from their training data (Carlini et al., 2022), and the function of memorization may be as emergent as any other LLM function (Biderman et al., 2023).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Citation-backed findings complicating the contrast in [12].","cars_move":"M1","cars_step":"1C","move_note":null},{"id":14,"text":"We aim to test emergence versus memorization as a window into how LLMs may serve as models of human language and cognition.","tag":"contribution","tier":"primary","parent_id":null,"note":"States the paper's overarching aim.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":15,"text":"We investigate the emergence versus memorization hypotheses by prompting ChatGPT with tests of the human mental lexicon, which refers to a person's knowledge of, and facility with, the words of their language, including spelling, sound, meaning, and grammar (Aitchison, 2012).","tag":"contribution","tier":"primary","parent_id":null,"note":"Specifies the method/target construct for [14]'s aim.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":16,"text":"The mental lexicon has long been a testbed for theoretical frameworks of cognition and information processing, most notably in debates between rule-based versus connectionist processing (Coltheart et al., 1993; Smolensky, 1988).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Independent claim about the field's history; not link:opening since it asserts content beyond naming a topic.","cars_move":"M1","cars_step":"1C","move_note":"M2->M3->M1 cycle: paper returns to territory after initial M3 announcement."},{"id":17,"text":"LLMs are founded on connectionist processing, but they offer a different theory of the human mental lexicon, and of human cognition more generally, compared with prior connectionist or rule-based theories.","tag":"contrast","tier":"primary","parent_id":null,"note":"Positions LLMs against the two camps named in [16].","cars_move":"M1","cars_step":"1B","move_note":null},{"id":18,"text":"For instance, the Dual-Route Cascade model (Coltheart et al., 2001) of word and nonword reading posits several rule-based mechanisms for mapping letters to sounds, accessing the stored meanings and sounds of words, and producing sequences of phonemes.","tag":"extension:illustrative","tier":"secondary","parent_id":17,"note":"Concrete example illustrating the rule-based side of [17]'s contrast. Parent: [17] (contrast).","cars_move":"M1","cars_step":"1B","move_note":null},{"id":19,"text":"By contrast, the distributed connectionist (Plaut et al., 1996; Seidenberg & McClelland, 1987) posits learned mappings between the spellings, sounds, and meanings of words.","tag":"extension:illustrative","tier":"secondary","parent_id":17,"note":"Parallel example illustrating the connectionist side; same parent [17]. Parent: [17] (contrast).","cars_move":"M1","cars_step":"1B","move_note":null},{"id":20,"text":"The theories espouse different principles of word and nonword reading, but they make the same implicit assumption that the posited mechanisms and mappings are dedicated functions of sustained structures in the brains and minds of readers.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Asserts a novel generalization (shared implicit assumption) across the illustrated theories, going beyond mere synthesis, so retained as primary rather than link:closing.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":21,"text":"Model outputs can be shaped by task demands and context if enabled by the mechanisms or mappings, but the model architectures cannot reorganize themselves for different purposes under different conditions.","tag":"extension:definitional","tier":"secondary","parent_id":20,"note":"Unpacks \"dedicated functions of sustained structures\" from [20]. Parent: [20] (tempstat).","cars_move":"M1","cars_step":"1B","move_note":null},{"id":22,"text":"Assumptions of dedicated functions and sustained structures are held by most models of language of cognitive functions.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the breadth of the assumption defined in [20]/[21].","cars_move":"M1","cars_step":"1B","move_note":null},{"id":23,"text":"LLMs offer a different approach to theorizing about the mental lexicon, and language and cognition in general.","tag":"link:closing","tier":"secondary","parent_id":22,"note":"Synthesizes/transitions out of the dedicated-function discussion; nearest primary parent is [22] (immediately preceding). Parent: [22] (emph).","cars_move":"M3","cars_step":"3A","move_note":"Closing transition that re-occupies the niche by positioning LLMs as the paper's novel theoretical approach; second M3 in a cycling arc."}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"krauss_1969","title":"krauss 1969","authors":["Krauss"],"year":1969,"section":"Introduction"},"arc_summary":"The introduction builds territory almost entirely through M1, using a **counterfactual-to-reality pivot** (S1–S6) to establish communicative complexity, then a **two-part theoretical framework** (S7) anchoring the empirical review that follows (S8–S18). The **gap is never explicitly named**: S19 smuggles M2 inside a prior-findings sentence by juxtaposing adult success against child failure — a fully interlaced M1/M2 move. M3 is a single sentence announcing Experiment I, with no methodological preview or contribution claim beyond scope.","structured_arc":"M1 -> M2 -> M3","move_roles":[{"move":"M1","span":[1,2],"role":"Opens territory via counterfactual hypothetical — a simplified world where communication is trivial — setting up the real complexity to follow."},{"move":"M1","span":[3,6],"role":"Pivots from the hypothetical to the real world, asserting context-dependence in reference with two concrete examples that ground the territory in observable phenomena."},{"move":"M1","span":[7,7],"role":"Introduces the paper's core theoretical framework — speakers must analyze both stimulus arrays and listeners — giving the territory a conceptual structure to organize the empirical review."},{"move":"M1","span":[8,11],"role":"Marshals three cited adult studies to demonstrate that the framework is empirically supported, consolidating the research territory around a specific line of prior work."},{"move":"M1","span":[12,18],"role":"Narrows territory to the specific paradigm and prior findings — method, measures, and adult performance results — that directly precede and motivate the current study."},{"move":"M2","span":[19,19],"role":"Implicitly names the gap by contrasting young children's failure with adults' near-perfect performance, embedding the developmental problem within what appears to be a continuation of prior-findings reporting."},{"move":"M3","span":[20,20],"role":"Occupies the niche minimally by announcing the purpose of Experiment I — filling the developmental gap — with no further elaboration of method, predictions, or contribution."}],"sentences":[{"id":1,"text":"If language were simply a code in which every referent was denoted by one and only one reference and every reference was uniquely associated with a single referent, the problem of learning to communicate would be relatively simple.","tag":"emph","tier":"primary","parent_id":null,"note":"Counterfactual hypothetical used to assert the real complexity and significance of communicative competence as a phenomenon worth attending to.","cars_move":"M1","cars_step":"1A","move_note":"Centrality claim via counterfactual; broad 'X matters' framing that opens the territory."},{"id":2,"text":"Speakers and listeners would have only to learn the correct names for those referents that concern them; failures in communication could be attributed to the inability of the speaker and/or the listener to associate an object with its name.","tag":"extension:illustrative","tier":"secondary","parent_id":1,"note":"Extends the counterfactual scenario from [1], spelling out what the simplified world would look like. Parent: [1] emph.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":3,"text":"Clearly, in real life, matters are not so simple.","tag":"contrast","tier":"primary","parent_id":null,"note":"Pivots from the counterfactual to real complexity, signaling the tension that motivates the paper.","cars_move":"M1","cars_step":"1B","move_note":"Surface contrast tag, but rhetorically this completes the territory-establishment by asserting the real phenomenon; still within M1."},{"id":4,"text":"A name which is perfectly adequate to denote a referent in one situation may be entirely inappropriate in another.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the existence and significance of context-dependence in reference as a real phenomenon worth attending to.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":5,"text":"The term Streptopelia risoria may be appropriately used to identify a particular bird in a conversation between two ornithologists, but the same term would convey no information when used by an ornithologist talking to a child.","tag":"extension:illustrative","tier":"secondary","parent_id":4,"note":"Concrete example of context-dependence claimed in [4]. Parent: [4] emph.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":6,"text":"Similarly, the reference milk may be appropriate when a speaker wishes to refer to a glass of liquid, unless there happens to be more than one glass of milk.","tag":"extension:illustrative","tier":"secondary","parent_id":4,"note":"Second illustrative example of the same phenomenon established in [4]. Re-parents to [4] emph, skipping [5] secondary.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":7,"text":"This view of speaker-listener interaction suggests that in constructing a message a speaker must perform two rather subtle informational analyses: (1) of the stimulus array, in order that his message will take into account those attributes of the referent which distinguish it from nonreferents; and (2) of this listener, in order that a message may be formulated which is compatible with the listener's knowledge and capabilities.","tag":"framedef","tier":"primary","parent_id":null,"note":"Introduces the two-part analytical framework (stimulus array analysis + listener analysis) that the paper uses as its theoretical machinery for understanding communicative competence.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":8,"text":"There is evidence to indicate that adults perform such analyses and that their performance as speakers is affected by it.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the current state of the field — empirical evidence exists supporting the framework just introduced.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":9,"text":"For example, Krauss and Weinheimer (1967) found that speakers in a communication task encoded color names differently depending on whether they were elements of arrays of similar or dissimilar colors.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Per Rule 3, citation-backed domain-level findings are tempstat. Though framed as an example of [8]'s claim, the citation makes this an independent primary sentence. Corrected from extension:illustrative.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":10,"text":"Ratner and Rice (1963) report variations in a speaker's encoding as a function of the degree of knowledge attributed to his listener.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Independent cited finding supporting adult performance of listener analysis. Parent chain: independent primary.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":11,"text":"And Krauss, Vivekananthan, and Weinheimer (1968) found systematic differences in encoding depending upon whether the recipient of the message was the speaker himself or some other person.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Third independent cited finding supporting the adult encoding framework.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":12,"text":"A method has been developed for studying referential communication behavior in children (Glucksberg, Krauss, & Weisberg, 1966), patterned after a communication task employed by Krauss and Weinheimer (1964).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the existence of a prior methodological development relevant to the current work.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":13,"text":"The experimental task requires that pairs of visually separated subjects communicate about novel graphic forms.","tag":"extension:definitional","tier":"secondary","parent_id":12,"note":"Unpacks the method introduced in [12]. Parent: [12] tempstat.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":14,"text":"Two classes of measurement may be employed.","tag":"extension:definitional","tier":"secondary","parent_id":12,"note":"Continues elaborating the methodological framework from [12]. Re-parents to [12] tempstat, skipping [13] secondary.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":15,"text":"The first reflects the pair's adequacy in communicating: how well they succeed in transmitting information, as measured by their success in matching the novel forms on the basis of verbal interchange.","tag":"extension:definitional","tier":"secondary","parent_id":12,"note":"Defines the first class of measurement introduced in [14]. Re-parents to [12] tempstat (nearest primary), skipping intermediate secondaries.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":16,"text":"The second class of measures involves the analysis of characteristics of the verbal behavior itself (e.g., lexical characteristics of the speakers' messages, the nature and amount of feedback supplied by the listener, and the response of the speaker to such feedback).","tag":"extension:definitional","tier":"secondary","parent_id":12,"note":"Defines the second class of measurement. Re-parents to [12] tempstat (nearest primary), skipping intermediate secondaries.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":17,"text":"With respect to adequacy of communication, adults are able to perform the task with near-perfect accuracy.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a prior empirical finding about adult performance on the task.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":18,"text":"In several studies, they were able to develop standarized nomenclatures, although the particular nomenclatures differed from pair to pair; that is, the names used by one pair of Ss were not necessarily the same as those used by any other pair of Ss (Krauss & Weinheimer, 1964).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports more detailed prior findings about adult behavior in the task, with citation support.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":19,"text":"Nursery school children, age 52-63 months, were unable to communicate effectively about these novel graphic forms, although they were able to perform the communication task with familiar forms for which common names were available (Glucksberg et al., 1966).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports prior empirical finding about young children's performance, establishing the developmental contrast motivating the current study.","cars_move":"M2","cars_step":"2B","move_note":"Interlaced M1/M2: this sentence reads as prior-research reporting (tempstat tag) but its rhetorical function is to name the gap — children cannot do what adults can — thereby implicitly indicating what remains unknown about the developmental trajectory. Assigned M2/2B."},{"id":20,"text":"Experiment I examined the relation between age and communication skills, as evaluated in the experimental paradigm previously employed with adults and young children.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the purpose and scope of the first experiment.","cars_move":"M3","cars_step":"3A","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"lee_2024","title":"lee 2024","authors":["Lee"],"year":2024,"section":"Introduction"},"arc_summary":"The introduction uses an interlaced M1→M3→M2→M3→M1→M3 arc, unusual in that the **research question appears before the gap is named**. This early M3 move anchors the paper's empirical agenda, while the M2 block (sentences 9–11) retrospectively legitimizes it by identifying conflicting findings and an unexplored real-world comparison. A second M1 block (sentences 13–19) then grounds the study in creativity theory, before **pilot survey data (sentence 20) bridges back into the final, sustained M3 close**. The paper's rhetorical strength lies in deploying its own pre-study data twice — once to motivate the question, once to justify the Web-search comparison — rather than relying solely on prior literature.","structured_arc":"M1 -> M3 -> M2 -> M3 -> M1 -> M3","move_roles":[{"move":"M1","span":[1,5],"role":"Establishes the societal significance and rapid adoption of generative AI across domains, priming the reader to accept the research question as timely and consequential."},{"move":"M3","span":[6,8],"role":"Introduces the central research question ahead of formal gap-identification, then immediately grounds it in pilot survey data showing lay scepticism about AI's creative utility — an unusually early commitment to the paper's empirical agenda."},{"move":"M2","span":[9,11],"role":"Retrospectively legitimizes the research question by citing the field's immaturity, conflicting findings, and a specific gap: no real-world comparison of AI against conventional creative tools."},{"move":"M3","span":[12,12],"role":"Delivers a concise aim statement that directly answers the gap identified in sentences 9–11, completing the first M2→M3 cycle and focusing the study on the ChatGPT-versus-web-search comparison."},{"move":"M1","span":[13,19],"role":"Provides the theoretical grounding the paper will rely on: the dual originality/appropriateness definition of creativity and the associative mechanisms that underlie it, plus an inventory of conventional creative tools — all needed to frame the hypothesis and design rationale that follow."},{"move":"M3","span":[20,32],"role":"Delivers the paper's full programmatic statement: purpose, comparative design rationale (anchored by the second pilot data point), the central hypothesis about ChatGPT enhancing associative thinking, and a detailed account of methodological choices and scope delimitation."}],"sentences":[{"id":1,"text":"The recent advancement in generative artificial intelligence (AI) technology has captured worldwide interest.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance and reach of generative AI as a phenomenon worth attending to.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":2,"text":"One notable AI, ChatGPT, developed by OpenAI, attracted more than 100 million users within just 2 months of its launch.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the scale and significance of ChatGPT's adoption; primary function is establishing prominence of the phenomenon.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":3,"text":"Generative AI has shown remarkable performance in objective knowledge assessments, such as the bar exam and US medical licensing exams, and its use has broadened to encompass a variety of fields, including coding, language translation and now creative tasks.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports established findings about AI performance across domains with citation support.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":4,"text":"For example, Copy.ai, an AI-powered copywriting service, claims to assist in writing blog and social media content, as well as aiding in email marketing.","tag":"extension:illustrative","tier":"secondary","parent_id":null,"note":"Provides a concrete example of AI use in creative tasks; parent is [3] (tempstat). ✓","cars_move":"M1","cars_step":"1B","move_note":null},{"id":5,"text":"Whether in design, writing or engineering, the role of generative AI as a support tool to enhance human creativity continues to expand.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the growing significance of generative AI as a creativity support tool across domains.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":6,"text":"Given this societal shift, we investigated the following question: can AI chatbots such as ChatGPT improve human response to problems that require creative thinking?","tag":"contribution","tier":"primary","parent_id":null,"note":"States the research question motivating the paper.","cars_move":"M3","cars_step":"3A","move_note":"M2->M3 cycling: first M3 statement before returning to gap language at sentence 9."},{"id":7,"text":"To explore this question, we surveyed lay individuals (n = 100) and discovered that they remain somewhat sceptical about the effectiveness of AI chatbots in creative tasks (Supplementary Note A).","tag":"contribution","tier":"primary","parent_id":null,"note":"Reports a pilot study conducted as part of the current research program to motivate the main investigation.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":8,"text":"Specifically, although many acknowledge the utility of chatbots in translating languages (74%), programming (46%) and professional writing (24.2%), only a small fraction (7%) see value in their use for generating creative ideas.","tag":"extension:illustrative","tier":"secondary","parent_id":7,"note":"Unpacks the specific findings from the pilot survey mentioned in [7] (contribution); parent is primary. ✓","cars_move":"M3","cars_step":"3B","move_note":null},{"id":9,"text":"As this scepticism persists, the empirical study of generative AI's role in creative tasks is still in its early stages.","tag":"nostat","tier":"primary","parent_id":null,"note":"Identifies a gap — the field is underdeveloped despite practical relevance.","cars_move":"M2","cars_step":"2B","move_note":"Return to gap language after initial M3; part of M2->M3 cycling pattern."},{"id":10,"text":"Research findings on its performance are varied, with some studies suggesting that it is limited and others finding it to be remarkable, resulting in a wide range of opinions about AI's potential in creativity tasks.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces tension and disagreement in the existing literature on AI creativity.","cars_move":"M2","cars_step":"2A","move_note":null},{"id":11,"text":"However, research has yet to fully explore the application of AI chatbots in daily life, where the technology is often compared to other conventional approaches to creative problem-solving.","tag":"nostat","tier":"primary","parent_id":null,"note":"Identifies a specific gap — lack of ecological/real-world comparison studies.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":12,"text":"This research therefore aims to examine whether using ChatGPT can enhance creativity beyond what is achievable without it, or when using traditional tools such as standard Web search engines.","tag":"contribution","tier":"primary","parent_id":null,"note":"States the aim and scope of the present research directly.","cars_move":"M3","cars_step":"3A","move_note":"Second M3 statement following the M2 gap block; M2->M3 cycling continues."},{"id":13,"text":"Creativity is commonly viewed as the generation of original and appropriate ideas.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the established definitional consensus in the creativity literature.","cars_move":"M1","cars_step":"1B","move_note":"Return to M1 territory review — extended definitional and conceptual background block after first M3 close."},{"id":14,"text":"Originality refers to a new idea's deviation from common ideas, combining existing knowledge in novel ways through analogical thinking; when the idea is original, it is deemed novel, surprising and uncommon.","tag":"extension:definitional","tier":"secondary","parent_id":13,"note":"Unpacks the first component (originality) of the creativity definition introduced in [13] (tempstat). ✓","cars_move":"M1","cars_step":"1B","move_note":null},{"id":15,"text":"Meanwhile, appropriateness relates to the feasibility and practicality of the generated idea; when an idea is appropriate, it can be used to solve a problem and to improve the given context.","tag":"extension:definitional","tier":"secondary","parent_id":13,"note":"Unpacks the second component (appropriateness) of the creativity definition introduced in [13] (tempstat). Re-parents to [13] directly, skipping [14]. ✓","cars_move":"M1","cars_step":"1B","move_note":null},{"id":16,"text":"Either of these two—originality or appropriateness—is an outcome of creative thinking.","tag":"link:closing","tier":"secondary","parent_id":13,"note":"Synthesizes the three-sentence definitional block on creativity components ([13]–[15]); re-parents to [13] (tempstat). Corrected from extension:definitional to avoid secondary-parents-secondary violation. ✓","cars_move":"M1","cars_step":"1B","move_note":null},{"id":17,"text":"Regardless of whether it focuses on originality or appropriateness, creative problem-solving commonly involves connecting associative elements to create new combinations of concepts.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports an established finding about the associative mechanism underlying creative problem-solving, with citation support.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":18,"text":"Creative ideas thus often result from the cohesive association of two seemingly unrelated pieces of knowledge.","tag":"extension:illustrative","tier":"secondary","parent_id":17,"note":"Provides a more concrete restatement/illustration of the associative combination mechanism from [17] (tempstat). Corrected from extension:definitional; the sentence illustrates rather than defines. ✓","cars_move":"M1","cars_step":"1B","move_note":null},{"id":19,"text":"To achieve this, individuals rely on techniques such as brainstorming, sketching and storyboarding or digital tools such as Web services and interactive whiteboards.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports established knowledge about tools and techniques used to support creative problem-solving, with citation support.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":20,"text":"In fact, our pilot survey revealed that, when faced with a problem requiring creative thinking, a vast majority (68%) of lay consumers seek assistance from online resources such as Google (Supplementary Note B).","tag":"contribution","tier":"primary","parent_id":null,"note":"Reports the authors' own pilot data generated as part of the current research program to establish the empirical basis for the Web-search comparison. Corrected from tempstat — this is not prior literature but the authors' own pre-study data. ✓","cars_move":"M3","cars_step":"3B","move_note":"Pilot data used as justification/context for design; bridges M1 territory review into final M3 block."},{"id":21,"text":"With a specific focus on ChatGPT, this paper examines whether AI chatbots can substantially enhance creative problem-solving beyond what is achievable without them.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the purpose and focus of the paper.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":22,"text":"Specifically, we compare ChatGPT with a commonly used resource—namely, traditional Web search engines without AI chatbot functionality.","tag":"contribution","tier":"primary","parent_id":null,"note":"Specifies the comparative design of the study, elaborating on [21].","cars_move":"M3","cars_step":"3A","move_note":null},{"id":23,"text":"While traditional Web search engines such as Google have made accessing information easier, enabling users to find information with just a few keystrokes, the tasks of navigating through search results and synthesizing information from multiple sources still largely require human effort.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a limitation of existing tools (Web search) to set up the case for ChatGPT's advantage.","cars_move":"M3","cars_step":"3B","move_note":"Contrast used as justification for the study design rather than as a niche-carving move; rhetorical function is 3B within the sustained M3 block."},{"id":24,"text":"Designed to generate text on the basis of the context, ChatGPT goes beyond traditional Web searches by integrating disparate pieces of knowledge into coherent, articulate verbal responses, rather than merely presenting a list of relevant pages.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the distinctive capability of ChatGPT relative to Web search, establishing its relevance for creative tasks.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":25,"text":"For example, recent studies examining ChatGPT's performance without human intervention have found that ChatGPT demonstrates substantial creative capabilities.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports prior empirical findings on ChatGPT's standalone creative performance, with citation support.","cars_move":"M3","cars_step":"3B","move_note":"Prior literature cited as justification for the study's focus and hypothesis; functioning as 3B within the M3 block."},{"id":26,"text":"Consequently, we argue that ChatGPT can substantially help users solve creative problems by improving the associative process involved in creative problem-solving.","tag":"contribution","tier":"primary","parent_id":null,"note":"States the paper's central theoretical argument/hypothesis derived from prior evidence.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":27,"text":"Our experiments focus on incentive-compatible idea contests that require verbal output, considering ChatGPT's capabilities as a large language model.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the methodological design choice for the experimental paradigm.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":28,"text":"To avoid any potential biases from ChatGPT's prior exposure to the tasks, we avoided publicly available tests of creativity such as the Alternative Uses Test or Torrance Test.","tag":"contribution","tier":"primary","parent_id":null,"note":"Explains a methodological decision and its rationale.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":29,"text":"Instead, we designed problem-solving tasks, based on the paradigm adapted from creativity literature.","tag":"contribution","tier":"primary","parent_id":null,"note":"States the alternative methodological approach taken.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":30,"text":"In all experiments, participants were randomly assigned to either use or not use ChatGPT assistance.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes a core feature of the experimental design.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":31,"text":"Their submitted ideas were later rated by external judges on originality and appropriateness sub-dimensions, which were averaged to compute the overall creativity score.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the measurement procedure used across experiments.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":32,"text":"It is important to note that our focus in this paper is the impact of ChatGPT's assistance on the creativity of an idea, rather than on task efficiency and productivity, which concern the ratio between input and output in a performance task.","tag":"contribution","tier":"primary","parent_id":null,"note":"Delimits the scope of the paper, distinguishing it from adjacent research questions.","cars_move":"M3","cars_step":"3B","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"mahowald_2024","title":"mahowald 2024","authors":["Mahowald"],"year":2024,"section":"Introduction"},"arc_summary":"The introduction invests heavily in M1 territory (S1–13), building a layered case that language and thought are tightly coupled in everyday cognition and LLM discourse before any gap is named. **The M2 pivot at S14** is unusually conceptually dense: rather than simply pointing to a gap in knowledge, it dismantles two named fallacies and diagnoses their shared root, making the niche argumentative rather than empirical. **M3 opens with the formal/functional competence framework** as the direct remedy to those fallacies, then closes with principal findings, theoretical qualifications, and a full four-section roadmap. The arc is linear but the M2 does double duty — both correcting a field-wide confusion and creating the very conceptual space the M3 framework is designed to fill.","structured_arc":"M1 -> M2 -> M3","move_roles":[{"move":"M1","span":[1,3],"role":"Anchors the paper in a universal human phenomenon — that language use is assumed to reflect cognition — establishing the intuitive basis for why language–thought conflation occurs at all."},{"move":"M1","span":[4,6],"role":"Historicizes the conflation through the Turing test, showing that the language-as-cognition heuristic has deep institutional roots in AI discourse."},{"move":"M1","span":[7,10],"role":"Names and formally labels the first fallacy ('good at language → good at thought'), converting a diffuse cultural tendency into a tractable conceptual object the paper can argue against."},{"move":"M1","span":[11,13],"role":"Grounds the fallacy in the contemporary moment by surveying LLM capabilities and the 'sparks of AGI' discourse, giving the problem immediate stakes."},{"move":"M2","span":[14,15],"role":"Delivers the contrastive pivot: flags the importance of distinguishing linguistic from cognitive ability and illustrates how the first fallacy has historically misled even expert observers (Eliza example)."},{"move":"M2","span":[16,17],"role":"Introduces and names the second fallacy ('bad at thought → bad at language'), widening the niche from one error to a symmetrical pair of errors."},{"move":"M2","span":[18,19],"role":"Instantiates the second fallacy by reporting real LLM criticisms in the literature, showing the error is not hypothetical but actively shaping field judgments."},{"move":"M2","span":[20,22],"role":"Diagnoses both fallacies as having a shared root in language–thought conflation, then closes the niche by framing this as a breakdown of human heuristics — positioning the problem as cognitive and structural, not merely empirical."},{"move":"M3","span":[23,23],"role":"Announces the formal/functional competence framework as the paper's direct remedy to the fallacies, introducing the two-part distinction that organizes all subsequent analysis."},{"move":"M3","span":[24,25],"role":"Grounds the framework in human neuroscience and asserts the necessity of both competence types, pre-empting the objection that the distinction is merely analytical rather than empirically motivated."},{"move":"M3","span":[26,31],"role":"States the principal finding — a formal/functional gap in LLMs — and elaborates it with scaling evidence, the training-objective hypothesis, and open theoretical questions about the ceiling of functional competence."},{"move":"M3","span":[32,36],"role":"Maps the paper's four-section structure onto the framework, giving each section a distinct role and signaling to readers the full scope of the planned argument."}],"sentences":[{"id":1,"text":"When we hear a sentence, we typically assume that it was produced by a rational, thinking agent (another person).","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts a phenomenon about human cognition as real and worth attending to — sets up the language-thought conflation argument.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":2,"text":"The sentences that people generate in day-to-day conversations are based on their world knowledge ('Not all birds can fly.'), their reasoning abilities ('You're 15, you can't go to a bar.'), and their goals ('Would you give me a ride, please?').","tag":"extension:illustrative","tier":"secondary","parent_id":1,"note":"Illustrates the claim in [1] with concrete examples of how thought underlies language production.","cars_move":"M1","cars_step":"1A","move_note":null},{"id":3,"text":"Thus, we often use other people's statements as a window into their minds.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts a significant phenomenon — that language reveals cognition — which is the foundational observation motivating the paper's entire argument. Previously tagged link:closing, but this sentence makes an independent claim that is worth attending to in its own right.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":4,"text":"In 1950, Alan Turing leveraged this tight relationship between language and thought to propose his famous test.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a prior historical event/claim in the literature.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":5,"text":"The Turing test uses language as an interface to cognition, allowing a human participant to probe the knowledge and reasoning capacities of two conversation partners to determine which of them is a human and which is a machine.","tag":"extension:definitional","tier":"secondary","parent_id":4,"note":"Unpacks what the Turing test is; defines the concept introduced in [4].","cars_move":"M1","cars_step":"1C","move_note":null},{"id":6,"text":"Although the utility of the Turing test has since been questioned, it has undoubtedly shaped the way society today thinks of machine intelligence.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the field's assessment of the Turing test's legacy and influence.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":7,"text":"The popularity of the Turing test, combined with language–thought coupling in everyday life, has led to several common fallacies related to the language–thought relationship.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the existence and significance of a problem (fallacies) in how we think about language and thought.","cars_move":"M1","cars_step":"1B","move_note":"Transitional sentence bridging M1 territory to the niche; still establishes the phenomenon rather than naming what is unknown."},{"id":8,"text":"One fallacy is that an entity (be it a human or a machine) that is good at language must also be good at thinking.","tag":"framedef","tier":"primary","parent_id":null,"note":"Names and introduces the first fallacy as a conceptual object the paper will analyze.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":9,"text":"If an entity generates coherent stretches of text, it must possess rich knowledge and reasoning capacities.","tag":"extension:definitional","tier":"secondary","parent_id":8,"note":"Unpacks/elaborates the content of the fallacy introduced in [8].","cars_move":"M1","cars_step":"1B","move_note":null},{"id":10,"text":"Let's call this the 'good at language -> good at thought' fallacy.","tag":"framedef","tier":"primary","parent_id":null,"note":"Formally names the construct introduced in [8]–[9], creating a labeled conceptual object for the paper's argument.","cars_move":"M1","cars_step":"1B","move_note":null},{"id":11,"text":"This fallacy has come to the forefront due to the recent rise of large language models (LLMs), including OpenAI's GPT models, Anthropic's Claude, and more open alternatives like Meta's LLaMa models and EleutherAI's GPT-J.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the current state of the field — the rise of LLMs as a contemporary development.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":12,"text":"LLMs today can produce text that is difficult to distinguish from human output, outperform humans at some text comprehension tasks, and show superhuman performance on next-word prediction.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Summarizes established findings about LLM capabilities.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":13,"text":"As a result, claims have emerged, both in the popular press and in the academic literature, that LLMs are not only a major advance in language processing, but are also showing 'sparks of artificial general intelligence'.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the current state of claims in the literature and popular discourse about LLMs.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":14,"text":"However, when evaluating LLMs' capabilities, it is important to distinguish between their ability to think and their linguistic ability.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a tension against the conflation described in prior sentences; pivots to the paper's corrective stance.","cars_move":"M2","cars_step":"2A","move_note":null},{"id":15,"text":"The 'good at language -> good at thought' fallacy makes it easy to confuse the two, leading people to mistakenly attribute intelligence and intentionality to even the most basic dialog systems (e.g., the chatbot Eliza from the 1960s).","tag":"extension:illustrative","tier":"secondary","parent_id":10,"note":"Illustrates the consequence of the fallacy named in [10]; Eliza serves as a concrete historical example. Parents to [14] (contrast), a primary tag — valid.","cars_move":"M2","cars_step":"2A","move_note":null},{"id":16,"text":"The contrapositive of this fallacy is that a model that is bad at thinking must also be a bad model of language.","tag":"framedef","tier":"primary","parent_id":null,"note":"Introduces the second fallacy as a new conceptual object derived from the first.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":17,"text":"Let's call this the 'bad at thought -> bad at language' fallacy.","tag":"framedef","tier":"primary","parent_id":null,"note":"Formally names the second fallacy construct.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":18,"text":"LLMs are commonly criticized for their lack of consistent, generalizable world knowledge, lack of commonsense reasoning abilities, and failure to understand what an utterance is really about.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports existing criticisms of LLMs in the literature.","cars_move":"M2","cars_step":"2B","move_note":"Instantiates the second fallacy's premise — reports critiques that implicitly invoke the bad-at-thought gap."},{"id":19,"text":"Based on this evidence, some critics suggest that the models' failure to produce linguistic output that fully captures the richness and sophistication of human thought means that they are not good models of human language.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a position held by critics in the field — the 'bad at thought -> bad at language' inference in practice.","cars_move":"M2","cars_step":"2A","move_note":"Counter-claims an erroneous inference in the literature; complements the gap identified in [18]."},{"id":20,"text":"Both the 'good at language -> good at thought' and the 'bad at thought -> bad at language' fallacies stem from the conflation of language and thought.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts that the conflation of language and thought is real and is the common root of both fallacies — an independent claim establishing the significance of the problem. Previously tagged link:closing, but it makes an independent claim and must parent [21] (extension:speculative), requiring primary status.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":21,"text":"This conflation is unsurprising: it is still novel, and thus uncanny, to encounter an entity that generates fluent sentences despite lacking a human identity.","tag":"extension:speculative","tier":"secondary","parent_id":null,"note":"Offers an explanatory speculation for why the conflation occurs, without new evidence. Parents to [20] (emph), a primary — valid.","cars_move":"M2","cars_step":"2B","move_note":null},{"id":22,"text":"Thus, our heuristics for understanding what a language model is doing, heuristics that emerged from our language experience with other humans, are broken.","tag":"contrast","tier":"primary","parent_id":null,"note":"Asserts a critical limitation — our intuitive heuristics fail when applied to LLMs. This is a contrast move marking a rupture against expectation, not merely a synthesis. Previously tagged link:closing; corrected because it makes an independent critical claim and must parent [23] (contribution), requiring primary status.","cars_move":"M2","cars_step":"2B","move_note":"Closing statement of niche; frames the problem as a breakdown in human heuristics before the M3 pivot."},{"id":23,"text":"To mitigate the language–thought conflation fallacies, we propose to systematically distinguish between two kinds of linguistic competence: formal linguistic competence, the knowledge of rules and statistical regularities of language, and functional linguistic competence, the ability to use language in real-world situations.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the paper's core proposal and introduces the formal/functional distinction as the paper's analytical framework.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":24,"text":"Our motivation for the formal/functional distinction comes from the human brain, where these skills are robustly dissociable.","tag":"contribution","tier":"primary","parent_id":null,"note":"States the grounding rationale for the framework proposed in [23]; specifies the evidentiary basis.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":25,"text":"Both formal and functional linguistic competence are essential components of human language use: an effective communicator needs to both generate grammatical, meaningful utterances and strategically use those utterances to achieve diverse, context-dependent goals.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the importance and necessity of both competence types for human language use.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":26,"text":"Armed with this distinction, we evaluate the capabilities of contemporary LLMs and argue that LLMs exhibit a gap between formal and functional competence skills: for modern LLMs, formal competence in English is near human-level, whereas their functional competence remains patchy, with results depending on specific functional competence domains and on tasks within those domains.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the paper's central empirical argument and scope of evaluation.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":27,"text":"Moreover, whereas formal linguistic competence in LLMs improves drastically with the amount of training data, functional linguistic competence improvements with scale are less consistent, such that LLM developers have now shifted away from simple scaling-up of the language prediction task to more specialized methods targeting behaviors of interest [e.g., reinforcement learning from human feedback (RLHF)] or coupling an LLM with external specialized modules (leading to so-called 'augmented language models').","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports current state of the field regarding scaling behavior and developer practices.","cars_move":"M3","cars_step":"3C","move_note":"Field-state report that supports and extends the principal finding announced in [26]."},{"id":28,"text":"Therefore, we posit that the next-word prediction objective allows a model to master formal but not necessarily functional linguistic competence.","tag":"contribution","tier":"primary","parent_id":null,"note":"States a core theoretical claim/hypothesis of the paper.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":29,"text":"What is required for mastery of functional competence is harder to pin down, in part because so much of human cognition (commonsense reasoning, scientific knowledge, cultural knowledge) can be conveyed through language and thus learned from language, even if the underlying cognitive capacities are not themselves inherently linguistic.","tag":"nostat","tier":"primary","parent_id":null,"note":"Identifies an unresolved issue — what functional competence requires is not well understood.","cars_move":"M3","cars_step":"3C","move_note":"Qualifies the principal finding; acknowledges remaining open questions without reopening M2."},{"id":30,"text":"As a result, language models acquire a variety of non-linguistic capacities.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports an established observation about what language models do as a consequence of learning from language. Previously tagged extension:speculative, but this is a domain-level factual claim, not a speculation — and it must parent [31] (nostat), requiring primary status.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":31,"text":"But the ultimate ceiling for functional competence depends on important open questions about the information contained in the linguistic signal and the mechanisms used to leverage that information.","tag":"nostat","tier":"primary","parent_id":null,"note":"Identifies open questions that bound what can be known about functional competence limits.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":32,"text":"In the rest of the paper, we develop a framework for evaluating the competence of modern language models from a cognitive science perspective.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the paper's overall organizational structure and purpose.","cars_move":"M3","cars_step":"3D","move_note":null},{"id":33,"text":"In the first section, we elaborate on the constructs of formal and functional linguistic competence and motivate this distinction based on evidence from human neuroscience.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the structure/content of the first section of the paper.","cars_move":"M3","cars_step":"3D","move_note":null},{"id":34,"text":"In the second section, we discuss the successes of LLMs in achieving formal linguistic competence, showing that models trained on word-in-context prediction capture numerous complex linguistic phenomena.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the structure/content of the second section.","cars_move":"M3","cars_step":"3D","move_note":null},{"id":35,"text":"In the third section, we consider several domains required for functional linguistic competence, formal reasoning, world knowledge, situation modeling, and social cognition, on which today's LLMs often fail, or at least perform worse than humans.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the structure/content of the third section.","cars_move":"M3","cars_step":"3D","move_note":null},{"id":36,"text":"In the fourth section, we discuss the implications of our framework for building and evaluating future models of language and thought before summarizing our key conclusions in the final section.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the structure/content of the fourth and final sections.","cars_move":"M3","cars_step":"3D","move_note":null}],"prompt_version":"v0.5","gloss_version":"v0.3"},{"paper":{"id":"manning_2024","title":"manning 2024","authors":["Manning"],"year":2024,"section":"Introduction"},"arc_summary":"The introduction opens with an **inverted M2→M1 interleave**: the gap precedes the territory, forcing readers to register a deficiency before the field is even established. A massive **M3 block (sentences 8–48)** then dominates — announcing the system, methodology, and full results — before cycling back through **M1→M2→M1** (sentences 49–53) to retroactively justify why LLMs are appropriate for this task. The paper closes with a clean **final M3** contribution claim and roadmap. This late-justification cycling is the defining structural quirk: the 'why LLMs' argument follows, not precedes, the 'what we found' argument.","structured_arc":"M2 -> M1 -> M2 -> M1 -> M3 -> M1 -> M2 -> M3","move_roles":[{"move":"M2","span":[1,1],"role":"Opens by naming an asymmetry in the literature — testing is underserved relative to estimation — before any territory is established, creating immediate reader buy-in to the problem."},{"move":"M1","span":[2,3],"role":"Establishes the emerging territory of automated hypothesis generation, situating the paper within a field that is actively changing."},{"move":"M2","span":[4,4],"role":"Reintroduces the gap: even with automated hypothesis generation, testing remains unsolved — sharpening the niche the paper will occupy."},{"move":"M1","span":[5,7],"role":"Builds out the territory of LLM-based simulation as an established and promising approach, licensing the paper's combination of simulation and hypothesis generation."},{"move":"M3","span":[8,30],"role":"Occupies the niche in full: announces the paper's purpose, introduces the SCM-based system, describes the four experimental scenarios and their methodologies, and reports empirical findings including the benchmark-validating auction results."},{"move":"M2","span":[31,32],"role":"Inserts a mid-findings gap question — whether simulation adds anything over direct LLM querying — pivoting to a second empirical contribution without leaving M3's findings frame."},{"move":"M3","span":[33,48],"role":"Resolves the gap question empirically: introduces the predict-yi and predict-β̂ tasks, reports quantitative results showing that direct elicitation is poor while simulation-informed prediction is substantially better."},{"move":"M1","span":[49,51],"role":"Retroactively grounds the paper's approach in territory: LLMs contain latent human behavioral information because of how they are trained, providing post-hoc scientific justification for using them as subjects."},{"move":"M2","span":[52,52],"role":"Concedes LLM limitations as human proxies while pivoting to a growing body of validating evidence — a concessive move that strengthens rather than undermines the paper's positioning."},{"move":"M1","span":[53,53],"role":"Asserts the centrality and power of automated LLM exploration as a tool for social science insight, bridging the late justification block back into a final contribution claim."},{"move":"M3","span":[54,55],"role":"Closes with an explicit novelty claim — a full end-to-end automated social science system — and announces the paper's structure, completing the occupation of the niche."}],"sentences":[{"id":1,"text":"There is much work on efficiently estimating econometric models of human behavior but comparatively little work on efficiently generating and testing those models to estimate.","tag":"contrast","tier":"primary","parent_id":null,"note":"Opens by positing an asymmetry in the literature — much work on one side, little on the other. Establishes the gap via contrast.","cars_move":"M2","cars_step":"2B","move_note":"M1-absent opening; gap indicated before territory is established."},{"id":2,"text":"Previously, developing such models and hypotheses to test was exclusively a human task.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports the prior state of the field as an established fact.","cars_move":"M1","cars_step":"1B","move_note":"Interlaced M1/M2; territory established after opening gap sentence."},{"id":3,"text":"This is changing as researchers have begun to explore automated hypothesis generation through the use of machine learning.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports an emerging trend in the field with citation support (footnote 1).","cars_move":"M1","cars_step":"1C","move_note":null},{"id":4,"text":"But even with novel machine-generated hypotheses, there is still the problem of testing.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a residual limitation against the prior tempstat — automated hypothesis generation doesn't solve the testing problem.","cars_move":"M2","cars_step":"2B","move_note":"Interlaced M1/M2; returns to gap language after brief territory."},{"id":5,"text":"A potential solution is simulation.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the existence and relevance of simulation as a candidate solution. This introduces a real approach worth attending to, fitting emph rather than extension:speculative, which requires a conditional prediction extending a prior claim.","cars_move":"M1","cars_step":"1B","move_note":"Bridges gap back to territory by introducing simulation as a known approach."},{"id":6,"text":"Researchers have shown that Large Language Models (LLM) can simulate humans as experimental subjects with surprising degrees of realism.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports a finding from the literature with citation support (footnote 2).","cars_move":"M1","cars_step":"1C","move_note":null},{"id":7,"text":"To the extent that these simulation results carry over to human subjects in out-of-sample tasks, they provide another option for testing (Horton, 2023).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Carries a citation (Horton, 2023); per the citation = primary rule, this is tempstat regardless of the conditional framing. It asserts a cross-domain claim with citation support.","cars_move":"M1","cars_step":"1C","move_note":null},{"id":8,"text":"In this paper, we combine these ideas—automated hypothesis generation and automated in silico hypothesis testing—by using LLMs for both purposes.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the core approach and purpose of the current paper.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":9,"text":"We demonstrate that such automation is possible.","tag":"contribution","tier":"primary","parent_id":null,"note":"States a specific goal/claim of the paper — demonstrating feasibility of the approach.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":10,"text":"We evaluate the approach by comparing results to a setting where the real-world predictions are well known and test to see if an LLM can be used to generate information that it cannot access through direct elicitation.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the evaluation strategy for the paper's approach.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":11,"text":"The key innovation in our approach is the use of structural causal models to organize the research process.","tag":"novstat","tier":"primary","parent_id":null,"note":"Claims novelty for a specific feature of the current work.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":12,"text":"Structural causal models are mathematical representations of cause and effect (Pearl, 2009b; Wright, 1934) and have long offered a language for expressing hypotheses.","tag":"tempstat","tier":"primary","parent_id":null,"note":"Reports established knowledge about SCMs with citations.","cars_move":"M3","cars_step":"3B","move_note":"Provides background justification for the SCM-based innovation claimed in sentence 11."},{"id":13,"text":"What is novel in our paper is the use of these models as a blueprint for the design of agents and experiments.","tag":"novstat","tier":"primary","parent_id":null,"note":"Distinguishes the paper's specific contribution from prior uses of SCMs.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":14,"text":"In short, each explanatory variable describes something about a person or scenario that has to vary for the effect to be identified, so the system 'knows' it needs to generate agents or scenarios that vary on that dimension—a straightforward transition from stated theory to experimental design and data generation.","tag":"extension:definitional","tier":"secondary","parent_id":null,"note":"Unpacks and elaborates the blueprint mechanism claimed in [13], a primary novstat. Legal parent chain.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":15,"text":"Furthermore, the structural causal model offers a pre-specified plan for estimation (Haavelmo, 1943, 1944; Jöreskog, 1970).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Cites established work to support an additional property of SCMs relevant to the paper's approach.","cars_move":"M3","cars_step":"3B","move_note":"Continues justification for SCM-based approach within M3."},{"id":16,"text":"We built an open-source computational system implementing this structural causal model-based approach.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the artifact produced by the paper.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":17,"text":"The system can automatically generate hypotheses, design experiments, run those experiments on independent LLM-powered agents, and analyze the results.","tag":"extension:definitional","tier":"secondary","parent_id":16,"note":"Elaborates the capabilities of the system introduced in [16], a primary contribution. Legal parent chain.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":18,"text":"We use this system to explore several social scenarios: (1) two people bargaining over a mug, (2) a bail hearing for tax fraud, (3) a lawyer interviewing for a job, and (4) an open ascending price auction with private values for a piece of art.","tag":"contribution","tier":"primary","parent_id":null,"note":"Describes the scope and content of the paper's demonstrations.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":19,"text":"We allow the system to propose the hypotheses for the first two scenarios and then run the experimental simulations without intervention.","tag":"contribution","tier":"primary","parent_id":null,"note":"Specifies the methodology used in two of the four scenarios.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":20,"text":"For (3) and (4), we demonstrate the system's ability to accommodate human input at any point by selecting the hypotheses ourselves and editing some of the agents, but otherwise, we allow the system to proceed autonomously.","tag":"contribution","tier":"primary","parent_id":null,"note":"Specifies the methodology for the remaining two scenarios and highlights an additional feature of the system.","cars_move":"M3","cars_step":"3B","move_note":null},{"id":21,"text":"Though yet to be optimized for novelty, the system formulates and tests multiple falsifiable hypotheses—from which it generates several findings.","tag":"contribution","tier":"primary","parent_id":null,"note":"Characterizes the system's output and frames the results to follow.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":22,"text":"The probability of a deal increased as the seller's sentimental attachment to the mug decreased, and both the buyer's and the seller's reservation prices mattered.","tag":"contribution","tier":"primary","parent_id":null,"note":"Reports a finding from the bargaining scenario experiment.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":23,"text":"A remorseful defendant was granted lower bail but was not so fortunate if his criminal history was extensive.","tag":"contribution","tier":"primary","parent_id":null,"note":"Reports a finding from the bail hearing scenario.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":24,"text":"However, the judge's case count before the hearing—which was hypothesized to matter—did not affect the final bail amount.","tag":"contribution","tier":"primary","parent_id":null,"note":"Reports a null finding from the bail hearing scenario, notable because it falsifies a hypothesis.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":25,"text":"The candidate passing the bar exam was the only important factor in her getting the job.","tag":"contribution","tier":"primary","parent_id":null,"note":"Reports a finding from the lawyer interview scenario.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":26,"text":"Neither the candidate's height nor the interviewer's friendliness affected the outcome.","tag":"contribution","tier":"primary","parent_id":null,"note":"Reports null findings from the lawyer interview scenario.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":27,"text":"The auction scenario is particularly illuminating.","tag":"emph","tier":"primary","parent_id":null,"note":"Asserts the significance/importance of the auction scenario — makes a content claim (\"particularly illuminating\") rather than merely naming a topic. Not a bare structural announcement, so link:opening is incorrect; emph fits.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":28,"text":"An increase in the bidders' reservation prices caused an increase in the clearing price, a clearing price that is always close to the second-highest reservation amongst the bidders.","tag":"contribution","tier":"primary","parent_id":null,"note":"Reports the key empirical finding from the auction simulation.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":29,"text":"These simulation results closely match the theory (Maskin and Riley, 1985) and what has been observed empirically (Athey et al., 2011).","tag":"tempstat","tier":"primary","parent_id":null,"note":"Validates the simulation results by citing established theoretical and empirical benchmarks.","cars_move":"M3","cars_step":"3C","move_note":"Provides validation of findings within M3."},{"id":30,"text":"None of the findings from the system's experiments are 'counterintuitive,' but it is important to emphasize they were the result of empiricism, not just model introspection.","tag":"contrast","tier":"primary","parent_id":null,"note":"Introduces a tension: the results look unremarkable, but the method (empiricism vs. introspection) is what matters. The rhetorical move is contrastive — pushing back against a potential dismissal of the results.","cars_move":"M3","cars_step":"3C","move_note":null},{"id":31,"text":"However, this does raise the question of whether the simulations are even necessary.","tag":"nostat","tier":"primary","parent_id":null,"note":"Identifies an open question raised by the results — whether simulations add value beyond direct LLM querying.","cars_move":"M2","cars_step":"2C","move_note":"M2->M3 cycling; returns to gap/question language after extended M3 findings block."},{"id":32,"text":"Instead of simulation, could an LLM simply do a 'thought experiment' about the proposed in silico experiment and achieve the same insight?","tag":"nostat","tier":"primary","parent_id":null,"note":"Independently identifies an open question/gap as a specific testable research question. Stands as a primary sentence in its own right rather than extending [31] speculatively.","cars_move":"M2","cars_step":"2C","move_note":null},{"id":33,"text":"To test this idea, we describe the experiments that will be simulated and ask the LLM to predict the results—both the path estimates and point predictions.","tag":"contribution","tier":"primary","parent_id":null,"note":"Announces the design of an additional empirical test within the paper.","cars_move":"M3","cars_step":"3A","move_note":"Second M3 block following M2 cycling."},{"id":34,"text":"The path estimates being the coefficients in the linear structural causal model.","tag":"extension:definitional","tier":"secondary","parent_id":33,"note":"Defines terminology introduced in [33], a primary contribution. Legal parent chain.","cars_move":"M3","cars_step":"3A","move_note":null},{"id":35,"text":"To make this concrete, suppose we had the simple linear model y = Xβ to describe some scenario, and we ran
